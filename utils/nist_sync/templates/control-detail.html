<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIST 800-53 Control Viewer - Control Detail</title>
    <!-- SHARED_STYLES_PLACEHOLDER -->
    <style>
        .detail-section {
            margin-bottom: 25px;
        }

        .detail-section h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #24292e;
            border-bottom: 2px solid #e1e4e8;
            padding-bottom: 8px;
        }

        .detail-content {
            line-height: 1.6;
            color: #24292e;
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .metadata-item {
            background: #f6f8fa;
            padding: 12px;
            border-radius: 4px;
        }

        .metadata-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #586069;
            margin-bottom: 5px;
        }

        .metadata-value {
            font-size: 14px;
            color: #24292e;
        }

        .rule-list {
            list-style: none;
            padding: 0;
        }

        .rule-list li {
            padding: 8px 12px;
            background: #f6f8fa;
            border-left: 3px solid #0366d6;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 13px;
        }

        .related-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .related-control-link {
            display: inline-block;
            padding: 4px 12px;
            background: #e1e4e8;
            border-radius: 12px;
            text-decoration: none;
            color: #0366d6;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .related-control-link:hover {
            background: #0366d6;
            color: white;
        }

        .parameter-list {
            background: #f6f8fa;
            border-radius: 4px;
            padding: 15px;
        }

        .parameter-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e1e4e8;
        }

        .parameter-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .parameter-id {
            font-weight: 600;
            color: #0366d6;
            font-family: monospace;
            font-size: 13px;
        }

        .parameter-label {
            margin: 5px 0;
            color: #24292e;
        }

        .todo-section {
            background: #fffbea;
            border: 1px solid #ffd33d;
            border-radius: 6px;
            padding: 20px;
        }

        .todo-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .todo-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e1e4e8;
            border-radius: 4px;
        }

        .todo-list {
            list-style: none;
            padding: 0;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .todo-item.completed {
            opacity: 0.6;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
        }

        .todo-text {
            flex: 1;
        }

        .breadcrumb {
            margin-bottom: 20px;
            font-size: 14px;
            color: #586069;
        }

        .breadcrumb a {
            color: #0366d6;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- SHARED_HEADER_PLACEHOLDER -->

    <div class="container">
        <div class="breadcrumb">
            <a href="index.html">Dashboard</a> /
            <a href="controls.html">Controls</a> /
            <span id="breadcrumb-id">Loading...</span>
        </div>

        <div id="control-detail-container">
            <div class="empty-state"><h3>Loading control details...</h3></div>
        </div>
    </div>

    <script>
        /* DATA_PLACEHOLDER */

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function getCurrentProduct() {
            return localStorage.getItem('selected-product') || 'rhel9';
        }

        function getTodos(controlId) {
            const todos = localStorage.getItem(`todos-${controlId}`);
            return todos ? JSON.parse(todos) : [];
        }

        function saveTodos(controlId, todos) {
            localStorage.setItem(`todos-${controlId}`, JSON.stringify(todos));
        }

        function renderControlDetail() {
            if (!EMBEDDED_DATA || !EMBEDDED_DATA.products) {
                document.getElementById('control-detail-container').innerHTML =
                    '<div class="empty-state"><h3>Error loading data</h3></div>';
                return;
            }

            const controlId = getQueryParam('id');
            if (!controlId) {
                document.getElementById('control-detail-container').innerHTML =
                    '<div class="empty-state"><h3>No control ID specified</h3></div>';
                return;
            }

            const product = getCurrentProduct();
            const controls = EMBEDDED_DATA.products[product]?.controls || [];
            const control = controls.find(c => c.id === controlId.toLowerCase());

            if (!control) {
                document.getElementById('control-detail-container').innerHTML =
                    `<div class="empty-state"><h3>Control ${controlId.toUpperCase()} not found</h3></div>`;
                return;
            }

            document.getElementById('breadcrumb-id').textContent = control.id.toUpperCase();
            document.title = `${control.id.toUpperCase()} - NIST 800-53 Control Viewer`;

            const statusClass = control.is_automated ? 'automated' :
                              control.is_manual ? 'manual' : 'pending';
            const gapIndicator = control.has_rules ? '' :
                '<span class="gap-indicator gap-full" title="No rules implemented"></span>';

            let html = `
                <div class="page-header">
                    <h2>${gapIndicator}${control.id.toUpperCase()}</h2>
                    <p>${control.title}</p>
                </div>

                <div class="metadata-grid">
                    <div class="metadata-item">
                        <div class="metadata-label">Status</div>
                        <div class="metadata-value">
                            <span class="badge badge-${statusClass}">${statusClass.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">Baseline Levels</div>
                        <div class="metadata-value">${(control.levels || []).join(', ').toUpperCase() || 'None'}</div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">Rules</div>
                        <div class="metadata-value">${(control.rules || []).length}</div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">Family</div>
                        <div class="metadata-value">${getFamilyName(control.id)}</div>
                    </div>
                </div>
            `;

            // Description
            if (control.description) {
                html += `
                    <div class="card detail-section">
                        <h3>Description</h3>
                        <div class="detail-content">${control.description}</div>
                    </div>
                `;
            }

            // Guidance
            if (control.guidance) {
                html += `
                    <div class="card detail-section">
                        <h3>Supplemental Guidance</h3>
                        <div class="detail-content">${control.guidance}</div>
                    </div>
                `;
            }

            // Parameters
            if (control.parameters && control.parameters.length > 0) {
                html += `
                    <div class="card detail-section">
                        <h3>Parameters (ODPs)</h3>
                        <div class="parameter-list">
                `;
                control.parameters.forEach(param => {
                    html += `
                        <div class="parameter-item">
                            <div class="parameter-id">${param.id || ''}</div>
                            <div class="parameter-label">${param.label || ''}</div>
                        </div>
                    `;
                });
                html += `
                        </div>
                    </div>
                `;
            }

            // Rules
            if (control.rules && control.rules.length > 0) {
                html += `
                    <div class="card detail-section">
                        <h3>Mapped Rules</h3>
                        <ul class="rule-list">
                            ${control.rules.map(rule => `<li>${rule}</li>`).join('')}
                        </ul>
                    </div>
                `;
            } else {
                html += `
                    <div class="card detail-section">
                        <h3>Mapped Rules</h3>
                        <div class="empty-state" style="padding: 30px;">
                            <p style="color: #d73a49;">⚠️ No rules mapped to this control</p>
                            <p style="color: #586069; margin-top: 10px;">This control needs implementation. Add TODO items below to track the work.</p>
                        </div>
                    </div>
                `;
            }

            // Related Controls
            if (control.related_controls && control.related_controls.length > 0) {
                html += `
                    <div class="card detail-section">
                        <h3>Related Controls</h3>
                        <div class="related-controls">
                            ${control.related_controls.map(relId =>
                                `<a href="control-detail.html?id=${relId}" class="related-control-link">${relId.toUpperCase()}</a>`
                            ).join('')}
                        </div>
                    </div>
                `;
            }

            // TODO / Backlog
            html += `
                <div class="card detail-section todo-section">
                    <h3>TODO / Backlog Items</h3>
                    <div class="todo-input-group">
                        <input type="text" id="todo-input" class="todo-input" placeholder="Add a TODO item...">
                        <button class="btn btn-primary" onclick="addTodo()">Add</button>
                    </div>
                    <ul class="todo-list" id="todo-list">
                        <!-- Populated by JavaScript -->
                    </ul>
                </div>
            `;

            document.getElementById('control-detail-container').innerHTML = html;
            renderTodos(control.id);
        }

        function getFamilyName(controlId) {
            const familyId = controlId.split('-')[0];
            const family = EMBEDDED_DATA.families.find(f => f.id === familyId);
            return family ? family.name : 'Other';
        }

        function renderTodos(controlId) {
            const todos = getTodos(controlId);
            const todoList = document.getElementById('todo-list');

            if (todos.length === 0) {
                todoList.innerHTML = '<li style="color: #586069; text-align: center; padding: 20px;">No TODO items yet</li>';
                return;
            }

            todoList.innerHTML = todos.map((todo, index) => `
                <li class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''}
                           onchange="toggleTodo(${index})">
                    <span class="todo-text">${todo.text}</span>
                    <button class="btn" onclick="deleteTodo(${index})"
                            style="padding: 4px 8px; font-size: 12px;">Delete</button>
                </li>
            `).join('');
        }

        function addTodo() {
            const controlId = getQueryParam('id');
            const input = document.getElementById('todo-input');
            const text = input.value.trim();

            if (!text) return;

            const todos = getTodos(controlId);
            todos.push({ text, completed: false });
            saveTodos(controlId, todos);

            input.value = '';
            renderTodos(controlId);
        }

        function toggleTodo(index) {
            const controlId = getQueryParam('id');
            const todos = getTodos(controlId);
            todos[index].completed = !todos[index].completed;
            saveTodos(controlId, todos);
            renderTodos(controlId);
        }

        function deleteTodo(index) {
            const controlId = getQueryParam('id');
            const todos = getTodos(controlId);
            todos.splice(index, 1);
            saveTodos(controlId, todos);
            renderTodos(controlId);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', renderControlDetail);

        // Allow Enter key to add TODO
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.target.id === 'todo-input') {
                addTodo();
            }
        });
    </script>
</body>
</html>
