default:
  aide_audit_binaries:
    - "auditctl"
    - "auditd"
    - "ausearch"
    - "aureport"
    {{% if product not in ['rhel10', 'sle16', 'fedora'] %}}
    - "autrace"
    {{% endif %}}
    {{% if 'rhel' not in product and 'ol' not in families and 'debian' not in families and 'ubuntu' not in families %}}
    - "audispd"
    {{% endif %}}
    {{% if 'ol' in families %}}
    - "rsyslogd"
    {{% endif %}}
    - "augenrules"
