srg_requirement: |-
    {{{ full_name }}} must maintain an account lock until the locked account is released by an administrator.

fixtext: |-
    Configure {{{ full_name }}} to lock an account after three unsuccessful login attempts until released by an administrator with the following command:

    $ authselect enable-feature with-faillock

    Edit the "/etc/security/faillock.conf" file as follows:

    unlock_time = 0

checktext: |-
    Verify {{{ full_name }}} is configured to lock an account after three unsuccessful login attempts until released by an administrator with the following command:

    $ sudo grep 'unlock_time =' /etc/security/faillock.conf
    unlock_time = 0

    If the "unlock_time" option is not set to "0", or the line is missing or commented out, this is a finding.

vuldiscussion: |-
    By limiting the number of failed login attempts, the risk of unauthorized system access via user password guessing, otherwise known as brute-forcing, is reduced. Limits are imposed by locking the account.


