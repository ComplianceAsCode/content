srg_requirement: |-
    {{{ full_name }}} must log username information when unsuccessful login attempts occur.

fixtext: |-
    Configure {{{ full_name }}} to log username information when unsuccessful login attempts occur.

    Enable the feature using the following command:

    $ sudo authselect enable-feature with-faillock

    Add/modify the "/etc/security/faillock.conf" file to match the following line:

    audit

checktext: |-
    Verify {{{ full_name }}} "/etc/security/faillock.conf" is configured to log username information when unsuccessful login attempts occur with the following command:

    $ sudo grep audit /etc/security/faillock.conf
    audit

    If the "audit" option is not set, is missing, or is commented out, this is a finding.

vuldiscussion: |-
    Without auditing of these events, it may be harder or impossible to identify what an attacker did after an attack.
