srg_requirement: |-
    {{{ full_name }}} must automatically lock the root account until the root account is released by an administrator when three unsuccessful login attempts occur during a 15-minute time period.

fixtext: |-
    Configure {{{ full_name }}} to lock out the "root" account after a number of incorrect login attempts using "pam_faillock.so".

    Enable the feature using the following command:

    $ sudo authselect enable-feature with-faillock

    Edit the "/etc/security/faillock.conf" by uncommenting or adding the following line:

    even_deny_root

checktext: |-
    Verify {{{ full_name }}} is configured to lock the root account after three unsuccessful login attempts with the following command:

    $ sudo grep even_deny_root /etc/security/faillock.conf
    even_deny_root

    If the "even_deny_root" option is not set or is missing or commented out, this is a finding.

vuldiscussion: |-
    By limiting the number of failed login attempts, the risk of unauthorized system access via user password guessing, also known as brute-forcing, is reduced. Limits are imposed by locking the account.


