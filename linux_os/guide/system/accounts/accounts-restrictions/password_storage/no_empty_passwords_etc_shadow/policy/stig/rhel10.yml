srg_requirement: |-
    {{{ full_name }}} must not have accounts configured with blank or null passwords.

fixtext: |-
    Configure {{{ full_name }}} so that all accounts have a password, or lock the account with the following commands:

    Perform a password reset:

    $ sudo passwd [username]

    To lock an account:

    $ sudo passwd -l [username]

checktext: |-
    Verify {{{ full_name }}} prohibits null or blank passwords with the following command:

    $ sudo awk -F: '!$2 {print $1}' /etc/shadow

    If the command returns any results, this is a finding.

vuldiscussion: |-
    If an account has an empty password, anyone could log in and run commands with the privileges of that account. Accounts with empty passwords should never be used in operational environments.
