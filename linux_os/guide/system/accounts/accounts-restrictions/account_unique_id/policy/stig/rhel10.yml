srg_requirement: |-
    {{{ full_name }}} must not allow duplicate user IDs (UIDs) to exist for interactive users.

fixtext: |-
    Configure {{{ full_name }}} to not allow duplicate UIDs to exist for interactive users.

    Edit the file "/etc/passwd", and provide each interactive user account that has a duplicate UID with a unique UID.

checktext: |-
    Verify {{{ full_name }}} contains no duplicate UIDs for interactive users with the following command:

    $ sudo awk -F ":" 'list[$3]++{print $1, $3}' /etc/passwd

    If output is produced and the accounts listed are interactive user accounts, this is a finding.

vuldiscussion: |-
    To ensure accountability and prevent unauthenticated access, interactive users must be identified and authenticated to prevent potential misuse and compromise of the system.


