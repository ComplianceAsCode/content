srg_requirement: |-
    {{{ full_name }}} must disable the ability of systemd to spawn an interactive boot process.

fixtext: |-
    Configure {{{ full_name }}} so that the current GRUB 2 configuration disables the ability of systemd to spawn an interactive boot process with the following command:

    $ sudo grubby --update-kernel=ALL --remove-args="systemd.confirm_spawn"

checktext: |-
    Verify {{{ full_name }}} is configured so that the current GRUB 2 configuration disables the ability of systemd to spawn an interactive boot process with the following command:

    $ sudo grubby --info=ALL | grep args | grep 'systemd.confirm_spawn'

    If any output is returned, this is a finding.

vuldiscussion: |-
    Using interactive or recovery boot, the console user could disable auditing, firewalls, or other services, weakening system security.
