srg_requirement: |-
    {{{ full_name }}} must assign a home directory for local interactive user accounts upon creation.

fixtext: |-
    Configure {{{ full_name }}} to assign home directories to all new local interactive users by setting the "CREATE_HOME" parameter in "/etc/login.defs" to "yes" as follows:

    CREATE_HOME yes

checktext: |-
    Verify {{{ full_name }}} assigns a home directory for local interactive user accounts upon creation with the following command:

    $ sudo grep -i create_home /etc/login.defs
    CREATE_HOME yes

    If the value for "CREATE_HOME" parameter is not set to "yes", the line is missing, or the line is commented out, this is a finding.

vuldiscussion: |-
    If local interactive users are not assigned a valid home directory, there is no place for the storage and control of files they should own.
