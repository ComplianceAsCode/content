srg_requirement: |-
    {{{ full_name }}} must be configured so that system commands are owned by "root".

fixtext: |-
    Configure {{{ full_name }}} so that the system commands are protected from unauthorized access.

    Run the following command, replacing "[FILE]" with any system command file not owned by "root".

    $ sudo chown root [FILE]

checktext: |-
    Verify {{{ full_name }}} is configured so that the system commands contained in the following directories are owned by "root" with the following command:

    $ sudo find -L /bin /sbin /usr/bin /usr/sbin /usr/libexec /usr/local/bin /usr/local/sbin ! -user root -exec stat -L -c "%U %n" {} \;

    If any system commands are found to not be owned by root, this is a finding.

vuldiscussion: |-
    If {{{ full_name }}} allowed any user to make changes to software libraries, those changes might be implemented without undergoing the appropriate testing and approvals that are part of a robust change management process.

    This requirement applies to {{{ full_name }}} with software libraries that are accessible and configurable, as in the case of interpreted languages. Software libraries also include privileged programs that execute with escalated privileges.
