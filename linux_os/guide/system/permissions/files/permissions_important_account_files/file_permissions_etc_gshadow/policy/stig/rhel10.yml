srg_requirement: |-
    {{{ full_name }}} must enforce mode "0000" or less permissive for the "/etc/gshadow" file to prevent unauthorized access.

fixtext: |-
    Configure {{{ full_name }}} so that the mode of the "/etc/gshadow" file is set to "0000" by running the following command:

    $ sudo chmod 0000 /etc/gshadow

checktext: |-
    Verify {{{ full_name }}} is configured so that the "/etc/gshadow" file has mode "0000" with the following command:

    $ sudo stat -c "%a %n" /etc/gshadow
    0 /etc/gshadow

    If a value of "0" is not returned, this is a finding.

vuldiscussion: |-
    The "/etc/gshadow" file contains group password hashes. Protection of this file is critical for system security.
