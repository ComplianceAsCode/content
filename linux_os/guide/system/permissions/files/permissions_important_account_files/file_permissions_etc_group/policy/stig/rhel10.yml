srg_requirement: |-
    {{{ full_name }}} must enforce mode "0644" or less permissive for the "/etc/group" file to prevent unauthorized access.

fixtext: |-
    Configure {{{ full_name }}} so that the mode of the file "/etc/group" is set to "0644" by running the following command:

    $ sudo chmod 0644 /etc/group

checktext: |-
    Verify {{{ full_name }}} is configured so that the "/etc/group" file has mode "0644" or less permissive with the following command:

    $ sudo stat -c "%a %n" /etc/group
    644 /etc/group

    If a value of "0644" or less permissive is not returned, this is a finding.

vuldiscussion: |-
    The "/etc/group" file contains information regarding groups that are configured on the system. Protection of this file is important for system security.
