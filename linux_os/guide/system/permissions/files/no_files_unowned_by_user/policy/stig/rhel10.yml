srg_requirement: |-
    {{{ full_name }}} must be configured so that all local files and directories must have a valid owner.

fixtext: |-
    Configure {{{ full_name }}} so that all local files and directories must have a valid owner.

    Either remove all files and directories that do not have a valid user from the system, or assign a valid user to all unowned files and directories on {{{ full_name }}} with the "chown" command:

    $ sudo chown &lt;user&gt; &lt;file&gt;

checktext: |-
    Verify {{{ full_name }}} is configured so that all local files and directories have a valid owner with the following command:

    $ df --local -P | awk {'if (NR!=1) print $6'} | sudo xargs -I '{}' find '{}' -xdev -nouser

    If any files on the system do not have an assigned owner, this is a finding.

vuldiscussion: |-
    Unowned files and directories may be unintentionally inherited if a user is assigned the same user identifier (UID) as the UID of the unowned files.
