srg_requirement: |-
    {{{ full_name }}} must disable file system automount function unless required.

fixtext: |-
    Configure {{{ full_name }}} to disable the ability to automount devices.

    The "autofs" service can be disabled with the following command:

    $ sudo systemctl mask --now autofs.service

checktext: |-
    Note: If the "autofs" service is not installed, this requirement is not applicable.

    Verify {{{ full_name }}} is configured so that the file system automount function has been disabled with the following command:

    $ systemctl is-enabled  autofs
    masked

    If the returned value is not "masked", "disabled", or "not-found" and is not documented as an operational requirement with the information system security officer, this is a finding.

vuldiscussion: |-
    An authentication process resists replay attacks if it is impractical to achieve a successful authentication by recording and replaying a previous authentication message.


