srg_requirement: |-
    {{{ full_name }}} must enforce "root" group ownership of the "/boot/grub2/grub.cfg" file.

fixtext: |-
    Configure {{{ full_name }}} to enforce group ownership of the "/boot/grub2/grub.cfg" file.

    Change the group owner of the file "/boot/grub2/grub.cfg" to "root" by running the following command:

    $ sudo chgrp root /boot/grub2/grub.cfg

checktext: |-
    Verify {{{ full_name }}} enforces group ownership of the "/boot/grub2/grub.cfg" file with the following command:

    $ sudo stat -c "%G %n" /boot/grub2/grub.cfg
    root /boot/grub2/grub.cfg

    If the "/boot/grub2/grub.cfg" file does not have a group owner of "root", this is a finding.

vuldiscussion: |-
    The "root" group is a highly privileged group. Furthermore, the group owner of this file should not have any access privileges anyway.
