srg_requirement: |-
    {{{ full_name }}} must not accept router advertisements on all Internet Protocol version 6 (IPv6) interfaces.

fixtext: |-
    Configure {{{ full_name }}} to not accept router advertisements on all IPv6 interfaces, unless the system is a router.

    Create a configuration file if it does not already exist:

    $ sudo vi /etc/sysctl.d/ipv4_accept_ra.conf

    Add the following line to the file:

    net.ipv6.conf.all.accept_ra = 0

    Reload settings from all system configuration files with the following command:

    $ sudo sysctl --system

checktext: |-
    Note: If IPv6 is disabled on the system, this requirement is not applicable.

    Verify {{{ full_name }}} does not accept router advertisements on all IPv6 interfaces, unless the system is a router.

    Check that "net.ipv6.conf.all.accept_ra" is set to not accept router advertisements by using the following command:

    $ sudo sysctl net.ipv6.conf.all.accept_ra
    net.ipv6.conf.all.accept_ra = 0

    If "net.ipv6.conf.all.accept_ra" is not set to "0" or is missing, this is a finding.

vuldiscussion: |-
    An illicit router advertisement message could result in a man-in-the-middle attack.


