srg_requirement: |-
    {{{ full_name }}} must have the "firewalld" service set to active.

fixtext: |-
    Configure {{{ full_name }}} to have the "firewalld" service set to active.

    To enable the "firewalld" service, run the following command:

    $ sudo systemctl enable --now firewalld

checktext: |-
    Verify {{{ full_name }}} is configured so that "firewalld" is active with the following command:

    $ systemctl is-active firewalld
    active

    If the "firewalld" service is not active, this is a finding.

vuldiscussion: |-
    "Firewalld" provides an easy and effective way to block/limit remote access to the system via ports, services, and protocols.

    Remote access services, such as those providing remote access to network devices and information systems, which lack automated control capabilities, increase risk and make remote user access management difficult at best.

    Remote access is access to DOD nonpublic information systems by an authorized user (or an information system) communicating through an external, nonorganization-controlled network. Remote access methods include, for example, dial-up, broadband, and wireless.

    {{{ full_name }}} functionality (e.g., Remote Desktop Protocol [RDP]) must be capable of taking enforcement action if the audit reveals unauthorized activity. Automated control of remote access sessions allows organizations to ensure ongoing compliance with remote access policies by enforcing connection rules of remote access applications on a variety of information system components (e.g., servers, workstations, notebook computers, smartphones, and tablets).


