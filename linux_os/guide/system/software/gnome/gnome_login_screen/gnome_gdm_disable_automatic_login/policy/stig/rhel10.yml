srg_requirement: |-
    {{{ full_name }}} must not allow unattended or automatic login via the graphical user interface.

fixtext: |-
    Configure {{{ full_name }}} so that the GNOME desktop display manager disables automatic login.

    Update the "/etc/gdm/custom.conf" file to disable automatic login to the GNOME desktop:

    $ sudo vi /etc/gdm/custom.conf

    [daemon]
    AutomaticLoginEnable=false

checktext: |-
    Note: This requirement assumes the use of the {{{ full_name }}} default graphical user interface, the GNOME desktop environment. If the system does not have any graphical user interface installed, this requirement is not applicable.

    Verify {{{ full_name }}} does not allow an unattended or automatic login to the system via a graphical user interface.

    Check for the value of the "AutomaticLoginEnable" in the "/etc/gdm/custom.conf" file with the following command:

    $  grep -i automaticlogin /etc/gdm/custom.conf
    AutomaticLoginEnable=false

    If the value of "AutomaticLoginEnable" is not set to "false", this is a finding.

vuldiscussion: |-
    Failure to restrict system access to authenticated users negatively impacts operating system security.
