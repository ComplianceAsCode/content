srg_requirement: |-
    {{{ full_name }}} must disable the graphical user interface automounter unless required.

fixtext: |-
    Configure {{{ full_name }}} GNOME to disable automated mount of removable media.

    Note: The example below is using the database "local" for the system. If the system is using another database in "/etc/dconf/profile/user", the file should be created under the appropriate subdirectory.

    Update the "/etc/dconf/db/local.d/00-security-settings" database file with the following lines:

    $ sudo vi /etc/dconf/db/local.d/00-security-settings

    [org/gnome/desktop/media-handling]
    automount-open=false

    Update the dconf system databases:

    $ sudo dconf update

checktext: |-
    Note: This requirement assumes the use of the {{{ full_name }}} default graphical user interface, the GNOME desktop environment. If the system does not have any graphical user interface installed, this requirement is not applicable.

    Verify {{{ full_name }}} disables the graphical user interface automount function.

    Disable the setting with the following command:

    $ gsettings get org.gnome.desktop.media-handling automount-open
    false

    If "automount-open" is set to "true" and is not documented with the information system security officer as an operational requirement, this is a finding.

vuldiscussion: |-
    Automatically mounting file systems permits easy introduction of unknown devices, thereby facilitating malicious activity.




