srg_requirement: |-
    {{{ full_name }}} must restrict privilege elevation to authorized personnel.

fixtext: |-
    Configure {{{ full_name }}} to restrict privilege elevation to authorized personnel.

    Remove the following entries from the "/etc/sudoers" file or configuration file under "/etc/sudoers.d/":

    ALL     ALL=(ALL) ALL
    ALL     ALL=(ALL:ALL) ALL

checktext: |-
    Verify {{{ full_name }}} restricts privilege elevation to authorized personnel with the following command:

    $ sudo grep -riw ALL /etc/sudoers /etc/sudoers.d/ | grep -v "#"

    If the either of the following entries is returned, this is a finding:

    ALL     ALL=(ALL) ALL
    ALL     ALL=(ALL:ALL) ALL

vuldiscussion: |-
    If the "sudoers" file is not configured correctly, any user defined on the system can initiate privileged actions on the target system.
