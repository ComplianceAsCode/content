srg_requirement: |-
    {{{ full_name }}} must be configured so that audit tools are owned by "root".

fixtext: |-
    Configure {{{ full_name }}} so that the audit tools are owned by "root" by running the following command:

    $ sudo chown root [audit_tool]

    Replace "[audit_tool]" with each audit tool not owned by "root".

checktext: |-
    Verify {{{ full_name }}} audit tools are owned by "root" with the following command:

    $ sudo stat -c "%U %n" /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/auditd /sbin/rsyslogd /sbin/augenrules
    root /sbin/auditctl
    root /sbin/aureport
    root /sbin/ausearch
    root /sbin/auditd
    root /sbin/rsyslogd
    root /sbin/augenrules

    If any audit tools do not have an owner of "root", this is a finding.

vuldiscussion: |-
    Protecting audit information also includes identifying and protecting the tools used to view and manipulate log data. Therefore, protecting audit tools is necessary to prevent unauthorized operation on audit information.

    {{{ full_name }}} systems providing tools to interface with audit information will leverage user permissions and roles identifying the user accessing the tools, and the corresponding rights the user enjoys, to make access decisions regarding the access to audit tools.

    Audit tools include, but are not limited to, vendor-provided and open source audit tools needed to successfully view and manipulate audit information system activity and records. Audit tools include custom queries and report generators.


