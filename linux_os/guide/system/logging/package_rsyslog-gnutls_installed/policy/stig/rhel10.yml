checktext: |-
    Verify {{{ full_name }}} has the "rsyslog-gnutls" package installed with the following command:

    $ sudo dnf list --installed rsyslog-gnutls
    Installed Packages
    rsyslog-gnutls.x86_64                                     8.2412.0-1.el10                                     @AppStream

    If the "rsyslog-gnutls" package is not installed, this is a finding.

srg_requirement: |-
    {{{ full_name }}} must have the packages required for encrypting off-loaded audit logs installed.

vuldiscussion: |-
    The "rsyslog-gnutls" package provides Transport Layer Security (TLS) support for the rsyslog daemon, which enables secure remote logging.

fixtext: |-
    Configure {{{ full_name }}} to have the "rsyslog-gnutls" package installed with the following command:

    $ sudo dnf -y install rsyslog-gnutls




