srg_requirement: |-
    {{{ full_name }}} must encrypt, via the gtls driver, the transfer of audit records off-loaded onto a different system or media from the system being audited via rsyslog.

fixtext: |-
    Configure {{{ full_name }}} to explicitly define a TLS driver for rsyslog to use for encrypting off-loaded audit records. The "ossl" driver is required for environments operating in FIPS mode.

    Add the "streamdriver" parameter to the "omfwd" action rule in its configuration file (e.g., /etc/rsyslog.d/99-forwarding.conf).

    Example:
    action(
      type="omfwd"
      streamdriver="ossl"
      target="logserver.example.com"
      protocol="tcp"
      port="6514"
      tls="on"
    )

    After applying the configuration, restart the rsyslog service:
    $ sudo systemctl restart rsyslog

checktext: |-
    Verify {{{ full_name }}} explicitly defines a TLS driver (gtls or ossl) for encrypted rsyslog off-loading.

    Search for an explicitly defined stream driver within "omfwd" action blocks with the following command:

    $ sudo grep -rE 'StreamDriver\s*=\s*"(gtls|ossl)"' /etc/rsyslog.conf /etc/rsyslog.d/

    If TLS-based "omfwd" forwarding is configured, but the command above returns no active configuration lines specifying either "gtls" or "ossl" within the action block, this is a finding.

vuldiscussion: |-
    Information stored in one location is vulnerable to accidental or incidental deletion or alteration.

    Off-loading is a common process in information systems with limited audit storage capacity.

    {{{ full_name }}} installation media provides "rsyslogd", a system utility providing support for message logging. Support for both internet and Unix domain sockets enables this utility to support both local and remote logging. Coupling this utility with "gnutls" (a secure communications library implementing the Secure Sockets Layer [SSL], Transport Layer Security [TLS], and Datagram TLS [DTLS] protocols) creates a method to securely encrypt and off-load auditing. When this utility is coupled with the omfwd module, it can use the ossl network stream driver, which leverages the OpenSSL library for Transport Layer Security (TLS) to securely encrypt and off-load auditing.
