checktext: |-
    Verify {{{ full_name }}} has the "chrony" package installed with the following command:

    $ sudo dnf list --installed chrony
    Installed Packages
    chrony.x86_64                                           4.6.1-1.el10                                           @anaconda

    If the "chrony" package is not installed, this is a finding.

srg_requirement: |-
    {{{ full_name }}} must have the "chrony" package installed.

vuldiscussion: |-
    Inaccurate time stamps make it more difficult to correlate events and can lead to an inaccurate analysis. Determining the correct time a particular event occurred on a system is critical when conducting forensic analysis and investigating system events. Sources outside the configured acceptable allowance (drift) may be inaccurate.

fixtext: |-
    Configure {{{ full_name }}} to have the "chrony" package installed with the following command:

    $ sudo dnf -y install chrony




