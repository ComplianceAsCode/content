srg_requirement: |-
    {{{ full_name }}} must be configured so that cron configuration files directories are group-owned by root.

fixtext: |-
    Configure {{{ full_name }}} so that any cron configuration file directories are group-owned by "root" with the following command:

    $ sudo chgrp root [cron config file]

checktext: |-
    Verify {{{ full_name }}} group ownership of all cron configuration files with the following command:

    $ stat -c "%G %n" /etc/cron*
    root /etc/cron.d
    root /etc/cron.daily
    root /etc/cron.deny
    root /etc/cron.hourly
    root /etc/cron.monthly
    root /etc/crontab
    root /etc/cron.weekly

    If any crontab is not group-owned by "root", this is a finding.

vuldiscussion: |-
    Service configuration files enable or disable features of their respective services, which if configured incorrectly can lead to insecure and vulnerable configurations. Therefore, service configuration files should be owned by the correct group to prevent unauthorized changes.
