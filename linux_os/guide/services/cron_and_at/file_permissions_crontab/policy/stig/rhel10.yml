srg_requirement: |-
    {{{ full_name }}} must be configured to prohibit modification of permissions for cron configuration files and directories from the operating system defaults.

fixtext: |-
    Configure {{{ full_name }}} to prohibit modification of permissions for cron configuration files and directories from the operating system defaults with the following commands:

    $ sudo dnf reinstall cronie crontabs
    $ rpm --setugids cronie crontabs
    $ rpm --setperms cronie crontabs

checktext: |-
    Verify {{{ full_name }}} is configured so that the owner, group, and mode of cron configuration files and directories match the operating system defaults with the following command:

    $ rpm --verify cronie crontabs | awk '! ($2 == "c" && $1 ~ /^.\..\.\.\.\..\./) {print $0}'

    If the command returns any output, this is a finding.

vuldiscussion: |-
    If the permissions of cron configuration files or directories are modified from the operating system defaults, it may be possible for individuals to insert unauthorized cron jobs that perform unauthorized actions, including potentially escalating privileges.
