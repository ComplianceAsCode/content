documentation_complete: true

title: 'Verify Permissions on Cron Configuration Files Are Not Modified'

description: |-
    Verify that {{{ full_name }}} is configured so that the permissions
    of cron configuration files and directories are not modified from
    the vendor defaults. Check the cronie and crontabs package
    verification status with the following command:
    <pre>$ sudo rpm --verify cronie crontabs</pre>
    If the command returns any output indicating that file permissions
    have been changed, this is a finding.

rationale: |-
    If the permissions of cron configuration files or directories are
    modified from the operating system defaults, it may be possible for
    individuals to insert unauthorized cron jobs that perform unauthorized
    actions, including potentially escalating privileges.

severity: medium

identifiers:
    cce@rhel10: CCE-88846-1

references:
    nist: CM-6(a),CM-6(1)
    srg: SRG-OS-000480-GPOS-00227

ocil_clause: 'the command returns any output'

ocil: |-
    Verify {{{ full_name }}} is configured so that the permissions
    of cron configuration files and directories are not modified.

    Check the permissions of the cron configuration files and directories
    with the following command:

    <pre>$ rpm --verify cronie crontabs | awk '! ($2 == "c" &amp;&amp; $1 ~ /^.\..\.\.\.\..\./) {print $0}'</pre>

    If the command returns any output, this is a finding.

fixtext: |-
    Configure {{{ full_name }}} to prohibit modification of permissions
    for cron configuration files and directories from the operating
    system defaults with the following commands:

    $ sudo dnf reinstall cronie crontabs
    $ sudo rpm --setugids cronie crontabs
    $ sudo rpm --setperms cronie crontabs

srg_requirement: |-
    {{{ full_name }}} must be configured to prohibit modification of permissions for cron configuration files and directories from the operating system defaults.

platform: system_with_kernel
