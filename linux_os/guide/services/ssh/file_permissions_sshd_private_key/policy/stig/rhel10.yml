srg_requirement: |-
    {{{ full_name }}} must enforce mode "0600" or less permissive for Secure Shell (SSH) private host key files.

fixtext: |-
    Configure {{{ full_name }}} to enforce mode "0600" for SSH private host key files with the following command:

    $ sudo chmod 0600 /etc/ssh/ssh_host*key

    Restart the SSH daemon for the changes to take effect:

    $ sudo systemctl restart sshd.service

checktext: |-
    Verify {{{ full_name }}} enforces mode "0600" for SSH private host key files with the following command:

    $ sudo stat -c "%a %n" /etc/ssh/*_key
    600 /etc/ssh/ssh_host_ecdsa_key
    600 /etc/ssh/ssh_host_ed25519_key
    600 /etc/ssh/ssh_host_rsa_key

    If any private host key file has a mode more permissive than "0600", this is a finding.

vuldiscussion: |-
    If an unauthorized user obtains the private SSH host key file, the host could be impersonated.
