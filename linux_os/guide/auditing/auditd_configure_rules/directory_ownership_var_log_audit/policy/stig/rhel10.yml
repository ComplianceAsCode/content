srg_requirement: |-
    {{{ full_name }}} must enforce "root" ownership of the audit log directory to prevent unauthorized read access.

fixtext: |-
    Configure {{{ full_name }}} to prevent unauthorized read access by ensuring the audit log directory is "root" owned with the following command:

    $ sudo chown root /var/log/audit

checktext: |-
    Verify {{{ full_name }}} audit logs directory is owned by "root".

    Determine where the audit logs are stored with the following command:

    $ sudo grep -iw log_file /etc/audit/auditd.conf
    log_file = /var/log/audit/audit.log

    Using the location of the audit log file, determine if the audit log directory is owned by "root" using the following command:

    $ sudo stat -c '%U %n' /var/log/audit
    root /var/log/audit

    If the audit log directory is not owned by "root", this is a finding.

vuldiscussion: |-
    Unauthorized disclosure of audit records can reveal system and configuration data to attackers, thus compromising its confidentiality.


