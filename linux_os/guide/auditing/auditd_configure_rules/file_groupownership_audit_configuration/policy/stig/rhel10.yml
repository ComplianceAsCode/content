srg_requirement: |-
    {{{ full_name }}} must enforce root group ownership of the "/etc/audit/" directory.

fixtext: |-
    Configure {{{ full_name }}} so that the "/etc/audit/" directory is group-owned by "root" with the following command:

    $ sudo chgrp root /etc/audit/

checktext: |-
    Verify {{{ full_name }}} enforces root group ownership of the "/etc/audit/" directory with the following command:

    $ sudo stat -c "%G %n" /etc/audit/
    root /etc/audit/

    If "/etc/audit/" does not have a group owner of "root", this is a finding.

vuldiscussion: |-
    The "/etc/audit/" directory contains files that ensure the proper auditing of command execution, privilege escalation, file manipulation, and more. Protection of this directory is critical for system security.
