srg_requirement: |-
    {{{ full_name }}} must generate audit records for successful and unsuccessful uses of the "umount" system call.

fixtext: |-
    Configure {{{ full_name }}} to generate audit records upon successful and unsuccessful uses of the "umount" system call by adding or updating the following rules in "/etc/audit/audit.rules" and adding the following rules to "/etc/audit/rules.d/perm_mod.rules" or updating the existing rules in files in the "/etc/audit/rules.d/" directory:

    -a always,exit -F arch=b32 -S umount -F auid&gt;={{{ uid_min }}} -F auid!=unset -k privileged-umount

    Restart the audit daemon with the following command for the changes to take effect:

    $ sudo service auditd restart

checktext: |-
    Verify {{{ full_name }}} generates an audit record for all uses of the "umount" system call with the following command:

    $ sudo auditctl -l | grep b32 | grep 'umount\b'
    -a always,exit -F arch=b32 -S umount -F auid&gt;={{{ uid_min }}} -F auid!=-1 -F key=privileged-umount

    If the command does not return a line, or the line is commented out, this is a finding.

vuldiscussion: |-
    The changing of file permissions could indicate that a user is attempting to gain access to information that would otherwise be disallowed. Auditing discretionary access control (DAC) modifications can facilitate the identification of patterns of abuse among both authorized and unauthorized users.


