srg_requirement: |-
    {{{ full_name }}} must generate audit records for successful and unsuccessful uses of the "chcon" command.

fixtext: |-
    Configure {{{ full_name }}} to generate audit records upon successful and unsuccessful attempts to use the "chcon" command by adding or updating the following rule in "/etc/audit/rules.d/audit.rules":

    -a always,exit -F path=/usr/bin/chcon -F perm=x -F auid&gt;={{{ uid_min }}} -F auid!=unset -k perm_mod

    Restart the audit daemon with the following command for the changes to take effect:

    $ sudo service auditd restart

checktext: |-
    Verify {{{ full_name }}} is configured to audit the execution of the "chcon" command with the following command:

    $ sudo auditctl -l | grep chcon
    -a always,exit -S all -F path=/usr/bin/chcon -F perm=x -F auid&gt;={{{ uid_min }}} -F auid!=-1 -F key=perm_mod

    If the command does not return a line, or the line is commented out, this is a finding.

vuldiscussion: |-
    Without generating audit records that are specific to the security and mission needs of the organization, it would be difficult to establish, correlate, and investigate the events relating to an incident or identify those responsible for one.

    Audit records can be generated from various components within the information system (e.g., module or policy filter).

    When a user logs on, the auid is set to the uid of the account that is being authenticated. Daemons are not user sessions and have the loginuid set to -1. The auid representation is an unsigned 32-bit integer, which equals 4294967295. The audit system interprets -1, 4294967295, and "unset" in the same way.

    The system call rules are loaded into a matching engine that intercepts each system call made by all programs on the system. Therefore, it is very important to use system call rules only when absolutely necessary because these affect performance. More rules lead to poorer performance. The performance can be helped, however, by combining system calls into one rule whenever possible.


