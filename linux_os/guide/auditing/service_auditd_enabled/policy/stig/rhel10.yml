srg_requirement: |-
    {{{ full_name }}} must enable the audit service.

fixtext: |-
    Configure {{{ full_name }}} to enable the auditd service with the following command:

    $ sudo systemctl enable --now auditd

checktext: |-
    Verify {{{ full_name }}} enables the audit service to produce audit records with the following command:

    $ systemctl status auditd.service
    o auditd.service - Security Audit Logging Service
         Loaded: loaded (/usr/lib/systemd/system/auditd.service; enabled; preset: enabled)
         Active: active (running) since Wed 2025-10-01 14:00:21 EDT; 1 week 6 days ago

    If the audit service is not "active" and "running", this is a finding.

vuldiscussion: |-
    Without establishing what type of events occurred, it would be difficult to establish, correlate, and investigate the events leading up to an outage or attack. Ensuring the auditd service is active ensures audit records generated by the kernel are appropriately recorded.

    Additionally, a properly configured audit subsystem ensures that actions of individual system users can be uniquely traced to those users so they can be held accountable for their actions.


