checktext: |-
    Verify {{{ full_name }}} has the "audit" service package installed with the following command:

    $ sudo dnf list --installed audit
    Installed Packages
    audit.x86_64                                           4.0.3-1.el10                                            @anaconda

    If the "audit" package is not installed, this is a finding.

fixtext: |-
    Configure {{{ full_name }}} to have the "audit" service package installed with the following command:

    $ sudo dnf -y install audit

srg_requirement: |-
    {{{ full_name }}} must have the "audit" package installed.

vuldiscussion: |-
    Without establishing what type of events occurred, along with the source, location, and outcome, it would be difficult to establish, correlate, and investigate the events leading up to an outage or attack.

    Audit record content that may be necessary to satisfy this requirement includes, for example, time stamps, source and destination addresses, user/process identifiers, event descriptions, success/fail indications, filenames involved, and access control or flow control rules invoked.

    Associating event types with detected events in audit logs provides a means of investigating an attack, recognizing resource utilization or capacity thresholds, or identifying an improperly configured {{{ full_name }}} system.




