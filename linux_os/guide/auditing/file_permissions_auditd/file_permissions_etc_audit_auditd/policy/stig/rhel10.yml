srg_requirement: |-
    {{{ full_name }}} must enforce mode "0640" or less for the "/etc/audit/auditd.conf" file to prevent unauthorized access.

fixtext: |-
    Configure {{{ full_name }}} to set the mode of the "/etc/audit/auditd.conf" file to "0640" with the following command:

    $ sudo chmod 0640 /etc/audit/auditd.conf

checktext: |-
    Verify {{{ full_name }}} enforces the mode of "/etc/audit/auditd.conf" with the following command:

    $ sudo stat -c "%a %n" /etc/audit/auditd.conf
    640 /etc/audit/auditd.conf

    If "/etc/audit/auditd.conf" does not have a mode of "0640", this is a finding.

vuldiscussion: |-
    Without the capability to restrict the roles and individuals that can select which events are audited, unauthorized personnel may be able to prevent the auditing of critical events. Misconfigured audits may degrade the system's performance by overwhelming the audit log. Misconfigured audits may also make it more difficult to establish, correlate, and investigate the events relating to an incident or identify those responsible for one.


