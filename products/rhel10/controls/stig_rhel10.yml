---
policy: Red Hat Enterprise Linux 10 Security Technical Implementation Guide
title: Red Hat Enterprise Linux 10 Security Technical Implementation Guide
id: stig_rhel10
version: V1R2
source: https://www.cyber.mil/stigs/downloads/
reference_type: stigid
product: rhel10

levels:
    - id: high
    - id: medium
    - id: low

controls:
    - id: RHEL-10-700970
      levels:
          - medium
      title: RHEL 10 must disable the debug-shell systemd service.
      rules:
          - service_debug-shell_disabled
      status: automated
    - id: RHEL-10-001020
      levels:
          - medium
      title: RHEL 10 must ensure cryptographic verification of vendor software packages.
      rules:
          - ensure_redhat_gpgkey_installed
          - package_sequoia-sq_installed
      status: automated
    - id: RHEL-10-001030
      levels:
          - high
      title: RHEL 10 must check the GNU Privacy Guard (GPG) signature of software packages originating
          from external software repositories before installation.
      rules:
          - ensure_gpgcheck_globally_activated
      status: automated
    - id: RHEL-10-001040
      levels:
          - high
      title: RHEL 10 must check the GNU Privacy Guard (GPG) signature of locally installed software packages
          before installation.
      rules:
          - ensure_gpgcheck_local_packages
      status: automated
    - id: RHEL-10-001050
      levels:
          - high
      title: RHEL 10 must have GNU Privacy Guard (GPG) signature verification enabled for all software
          repositories.
      rules:
          - enable_gpgcheck_for_all_repositories
      status: automated
    - id: RHEL-10-000510
      levels:
          - high
      title: RHEL 10 must implement cryptographic mechanisms to prevent unauthorized disclosure or modification
          of all information on local disk partitions that requires at-rest protection.
      rules:
          - encrypt_partitions
      status: automated
    - id: RHEL-10-000520
      levels:
          - low
      title: RHEL 10 must use a separate file system for the system audit data path.
      rules:
          - partition_for_var_log_audit
      status: automated
    - id: RHEL-10-000530
      levels:
          - medium
      title: RHEL 10 must use a separate file system for user home directories (such as "/home" or an
          equivalent).
      rules:
          - partition_for_home
      status: automated
    - id: RHEL-10-000540
      levels:
          - medium
      title: RHEL 10 must use a separate file system for "/tmp".
      rules:
          - partition_for_tmp
      status: automated
    - id: RHEL-10-000550
      levels:
          - medium
      title: RHEL 10 must use a separate file system for "/var".
      rules:
          - partition_for_var
      status: automated
    - id: RHEL-10-000560
      levels:
          - medium
      title: RHEL 10 must use a separate file system for "/var/log".
      rules:
          - partition_for_var_log
      status: automated
    - id: RHEL-10-000570
      levels:
          - medium
      title: RHEL 10 must use a separate file system for "/var/tmp".
      rules:
          - partition_for_var_tmp
      status: automated
    - id: RHEL-10-200000
      levels:
          - medium
      title: RHEL 10 must remove all software components after updated versions have been installed.
      rules:
          - clean_components_post_updating
      status: automated
    - id: RHEL-10-200010
      levels:
          - medium
      title: RHEL 10 must not have the "nfs-utils" package installed.
      rules:
          - package_nfs-utils_removed
      status: automated
    - id: RHEL-10-200020
      levels:
          - high
      title: RHEL 10 must not have the "telnet-server" package installed.
      rules:
          - package_telnet-server_removed
      status: automated
    - id: RHEL-10-200030
      levels:
          - medium
      title: RHEL 10 must not have the "gssproxy" package installed.
      rules:
          - package_gssproxy_removed
      status: automated
    - id: RHEL-10-200040
      levels:
          - medium
      title: RHEL 10 must not have the tuned package installed.
      rules:
          - package_tuned_removed
      status: automated
    - id: RHEL-10-200050
      levels:
          - medium
      title: RHEL 10 must not have a Trivial File Transfer Protocol (TFTP) server package installed unless
          it is required by the mission, and if required, the TFTP daemon must be configured to operate
          in secure mode.
      rules:
          - package_tftp-server_removed
      status: automated
    - id: RHEL-10-200060
      levels:
          - medium
      title: RHEL 10 must not have the unbound package installed.
      rules:
          - package_unbound_removed
      status: automated
    - id: RHEL-10-200070
      levels:
          - high
      title: RHEL 10 must not have the "tftp" package installed.
      rules:
          - package_tftp_removed
      status: automated
    - id: RHEL-10-200080
      levels:
          - medium
      title: RHEL 10 must not have the "gdm" package installed.
      rules:
          - package_gdm_removed
      status: automated
    - id: RHEL-10-200090
      levels:
          - high
      title: RHEL 10 must not have a File Transfer Protocol (FTP) server package installed.
      rules:
          - package_vsftpd_removed
      status: automated
    - id: RHEL-10-200500
      levels:
          - medium
      title: RHEL 10 must have the "subscription-manager" package installed.
      rules:
          - package_subscription-manager_installed
      status: automated
    - id: RHEL-10-200510
      levels:
          - medium
      title: RHEL 10 must have the "nss-tools" package installed.
      rules:
          - package_nss-tools_installed
      status: automated
    - id: RHEL-10-200520
      levels:
          - medium
      title: RHEL 10 must have the "s-nail" package installed.
      rules:
          - package_s-nail_installed
      status: automated
    - id: RHEL-10-200530
      levels:
          - medium
      title: RHEL 10 must have the "firewalld" package installed.
      rules:
          - package_firewalld_installed
      status: automated
    - id: RHEL-10-200531
      levels:
          - medium
      title: RHEL 10 must have the "firewalld" service set to active.
      rules:
          - service_firewalld_enabled
      status: automated
    - id: RHEL-10-200532
      levels:
          - medium
      title: RHEL 10 must employ a deny-all, allow-by-exception policy for allowing connections to other
          systems.
      rules:
          - configured_firewalld_default_deny
      related_rules:
          - set_firewalld_default_zone
      status: automated
    - id: RHEL-10-200540
      levels:
          - medium
      title: RHEL 10 must have the "chrony" package installed.
      rules:
          - package_chrony_installed
      status: automated
    - id: RHEL-10-200541
      levels:
          - medium
      title: RHEL 10 must enable the chronyd service.
      rules:
          - service_chronyd_enabled
      status: automated
    - id: RHEL-10-200542
      levels:
          - medium
      title: RHEL 10 must disable the chrony daemon from acting as a server.
      rules:
          - chronyd_client_only
      status: automated
    - id: RHEL-10-200543
      levels:
          - medium
      title: RHEL 10 must disable network management of the chrony daemon.
      rules:
          - chronyd_no_chronyc_network
      status: automated
    - id: RHEL-10-200560
      levels:
          - medium
      title: RHEL 10 must have the USBGuard package installed.
      rules:
          - package_usbguard_installed
      status: automated
    - id: RHEL-10-200561
      levels:
          - medium
      title: RHEL 10 must have the USBGuard package enabled.
      rules:
          - service_usbguard_enabled
      status: automated
    - id: RHEL-10-200562
      levels:
          - medium
      title: RHEL 10 must block unauthorized peripherals before establishing a connection.
      rules:
          - usbguard_generate_policy
      status: automated
    - id: RHEL-10-200563
      levels:
          - medium
      title: RHEL 10 must enable audit logging for the USBGuard daemon.
      rules:
          - configure_usbguard_auditbackend
      status: automated
    - id: RHEL-10-200570
      levels:
          - medium
      title: RHEL 10 must have the "policycoreutils" package installed.
      rules:
          - package_policycoreutils_installed
      status: automated
    - id: RHEL-10-200580
      levels:
          - medium
      title: RHEL 10 must have the "policycoreutils-python-utils" package installed.
      rules:
          - package_policycoreutils-python-utils_installed
      status: automated
    - id: RHEL-10-200590
      levels:
          - medium
      title: RHEL 10 must have the "sudo" package installed.
      rules:
          - package_sudo_installed
      status: automated
    - id: RHEL-10-200600
      levels:
          - medium
      title: RHEL 10 must have the "fapolicy" module installed.
      rules:
          - package_fapolicyd_installed
      status: automated
    - id: RHEL-10-200601
      levels:
          - medium
      title: RHEL 10 must enable the "fapolicy" module.
      rules:
          - service_fapolicyd_enabled
      status: automated
    - id: RHEL-10-200602
      levels:
          - medium
      title: RHEL 10 must be configured to employ a deny-all, permit-by-exception policy to allow the
          execution of authorized software programs.
      rules:
          - fapolicy_default_deny
      status: automated
    - id: RHEL-10-200610
      levels:
          - medium
      title: RHEL 10 must have the "pcsc-lite" package installed.
      rules:
          - package_pcsc-lite_installed
      status: automated
    - id: RHEL-10-200611
      levels:
          - medium
      title: RHEL 10 must have the "pcscd" socket set to active.
      rules:
          - service_pcscd_enabled
      status: automated
    - id: RHEL-10-200612
      levels:
          - medium
      title: RHEL 10 must have the "pcsc-lite-ccid" package installed.
      rules:
          - package_pcsc-lite-ccid_installed
      status: automated
    - id: RHEL-10-200620
      levels:
          - medium
      title: RHEL 10 must have the "opensc" package installed.
      rules:
          - package_opensc_installed
      status: automated
    - id: RHEL-10-200621
      levels:
          - medium
      title: RHEL 10 must use the common access card (CAC) smart card driver.
      rules:
          - configure_opensc_card_drivers
          - var_smartcard_drivers=cac
      status: automated
    - id: RHEL-10-200630
      levels:
          - medium
      title: RHEL 10 must have the Advanced Intrusion Detection Environment (AIDE) package installed.
      rules:
          - package_aide_installed
          - aide_build_database
      status: automated
    - id: RHEL-10-200631
      levels:
          - high
      title: RHEL 10 must use cryptographic mechanisms to protect the integrity of audit tools.
      rules:
          - aide_check_audit_tools
      status: automated
    - id: RHEL-10-200632
      levels:
          - medium
      title: RHEL 10 must use a file integrity tool that is configured to use FIPS 140-3-approved cryptographic
          hashes for validating file contents and directories.
      rules:
          - aide_use_fips_hashes
      status: automated
    - id: RHEL-10-200633
      levels:
          - medium
      title: RHEL 10 must routinely check the baseline configuration for unauthorized changes and notify
          the system administrator when anomalies in the operation of any security functions are discovered.
      rules:
          - aide_scan_notification
      status: automated
    - id: RHEL-10-200634
      levels:
          - medium
      title: RHEL 10 must be configured so that the file integrity tool verifies Access Control Lists
          (ACLs).
      rules:
          - aide_verify_acls
      status: automated
    - id: RHEL-10-200635
      levels:
          - medium
      title: RHEL 10 must be configured so that the file integrity tool verifies extended attributes.
      rules:
          - aide_verify_ext_attributes
      status: automated
    - id: RHEL-10-200640
      levels:
          - medium
      title: RHEL 10 must have the "rsyslog" package installed.
      rules:
          - package_rsyslog_installed
      status: automated
    - id: RHEL-10-200641
      levels:
          - medium
      title: RHEL 10 must have the rsyslog service set to active.
      rules:
          - service_rsyslog_enabled
      status: automated
    - id: RHEL-10-200642
      levels:
          - medium
      title: RHEL 10 must be configured to forward audit records via Transmission Control Protocol (TCP)
          to a different system or media from the system being audited via rsyslog.
      rules:
          - rsyslog_remote_loghost
      status: automated
    - id: RHEL-10-200643
      levels:
          - medium
      title: RHEL 10 must be configured so that the rsyslog daemon does not accept log messages from
          other servers unless the server is being used for log aggregation.
      rules:
          - rsyslog_nolisten
      status: automated
    - id: RHEL-10-200644
      levels:
          - medium
      title: RHEL 10 must authenticate the remote logging server for off-loading audit logs via "rsyslog".
      rules:
          - rsyslog_encrypt_offload_actionsendstreamdriverauthmode
      status: automated
    - id: RHEL-10-200645
      levels:
          - medium
      title: RHEL 10 must encrypt the transfer of audit records off-loaded onto a different system or
          media from the system being audited via rsyslog.
      rules:
          - rsyslog_encrypt_offload_actionsendstreamdrivermode
      status: automated
    - id: RHEL-10-200646
      levels:
          - medium
      title: RHEL 10 must encrypt, via the gtls driver, the transfer of audit records off-loaded onto
          a different system or media from the system being audited via rsyslog.
      rules:
          - rsyslog_encrypt_offload_defaultnetstreamdriver
      status: automated
    - id: RHEL-10-200647
      levels:
          - medium
      title: RHEL 10 must monitor all remote access methods.
      rules:
          - rsyslog_remote_access_monitoring
      status: automated
    - id: RHEL-10-200648
      levels:
          - medium
      title: RHEL 10 must use cron logging.
      rules:
          - rsyslog_cron_logging
      status: automated
    - id: RHEL-10-200650
      levels:
          - medium
      title: RHEL 10 must have the packages required for encrypting off-loaded audit logs installed.
      rules:
          - package_rsyslog-gnutls_installed
      status: automated
    - id: RHEL-10-200660
      levels:
          - medium
      title: RHEL 10 must have the "audit" package installed.
      rules:
          - package_audit_installed
      status: automated
    - id: RHEL-10-200661
      levels:
          - medium
      title: RHEL 10 must enable the audit service.
      rules:
          - service_auditd_enabled
      status: automated
    - id: RHEL-10-200662
      levels:
          - low
      title: RHEL 10 must have the "audispd-plugins" package installed.
      rules:
          - package_audispd-plugins_installed
      status: automated
    - id: RHEL-10-200680
      levels:
          - medium
      title: RHEL 10 must have the "libreswan" package installed.
      rules:
          - package_libreswan_installed
      status: automated
    - id: RHEL-10-200690
      levels:
          - medium
      title: RHEL 10 must notify designated personnel if baseline configurations are changed in an unauthorized
          manner.
      rules:
          - package_postfix_installed
      status: automated
    - id: RHEL-10-200691
      levels:
          - medium
      title: RHEL 10 must have mail aliases to notify the information system security officer (ISSO)
          and system administrator (SA) (at a minimum) of an audit processing failure.
      rules:
          - postfix_client_configure_mail_alias
          - var_postfix_root_mail_alias=mil_sysadmin
      status: automated
    - id: RHEL-10-200692
      levels:
          - medium
      title: RHEL 10 must be configured to prevent unrestricted mail relaying.
      rules:
          - postfix_prevent_unrestricted_relay
      status: automated
    - id: RHEL-10-200700
      levels:
          - medium
      title: RHEL 10 must have the "cronie" package installed.
      rules:
          - package_cron_installed
      status: automated
    - id: RHEL-10-200720
      levels:
          - medium
      title: RHEL 10 must have a Secure Shell (SSH) server installed for all networked systems.
      rules:
          - package_openssh-server_installed
      status: automated
    - id: RHEL-10-200721
      levels:
          - medium
      title: RHEL 10 must, for all networked systems, have and implement Secure Shell (SSH) to protect
          the confidentiality and integrity of transmitted and received information.
      rules:
          - service_sshd_enabled
      status: automated
    - id: RHEL-10-200722
      levels:
          - medium
      title: RHEL 10 must have the "openssh-clients" package installed.
      rules:
          - package_openssh-clients_installed
      status: automated
    - id: RHEL-10-200730
      levels:
          - medium
      title: RHEL 10 must have the "pkcs11-provider" package installed.
      rules:
          - install_smartcard_packages
      status: automated
    - id: RHEL-10-200740
      levels:
          - medium
      title: RHEL 10 must have the "gnutls-utils" package installed.
      rules:
          - package_gnutls-utils_installed
      status: automated
    - id: RHEL-10-300000
      levels:
          - high
      title: RHEL 10 must have the "crypto-policies" package installed.
      rules:
          - package_crypto-policies_installed
      status: automated
    - id: RHEL-10-300010
      levels:
          - high
      title: RHEL 10 must implement a FIPS 140-3-compliant systemwide cryptographic policy.
      rules:
          - configure_crypto_policy
          - var_system_crypto_policy=fips
      status: automated
    - id: RHEL-10-000500
      levels:
          - high
      title: RHEL 10 must enable FIPS mode.
      rules:
          - sysctl_crypto_fips_enabled
      status: automated
    - id: RHEL-10-300030
      levels:
          - high
      title: RHEL 10 must be configured so that Secure Shell (SSH) clients use only DOD-approved encryption
          ciphers employing FIPS 140-3-validated cryptographic hash algorithms to protect the confidentiality
          of SSH client connections.
      rules:
          - harden_sshd_ciphers_openssh_conf_crypto_policy
          - sshd_approved_ciphers=stig_rhel10
      status: automated
    - id: RHEL-10-300040
      levels:
          - high
      title: RHEL 10 must be configured so that Secure Shell (SSH) servers use only DOD-approved encryption
          ciphers employing FIPS 140-3-validated cryptographic hash algorithms to protect the confidentiality
          of SSH server connections.
      rules:
          - harden_sshd_ciphers_opensshserver_conf_crypto_policy
          - sshd_approved_ciphers=stig_rhel10
      status: automated
    - id: RHEL-10-300050
      levels:
          - high
      title: RHEL 10 must be configured so that Secure Shell (SSH) clients use only DOD-approved Message
          Authentication Codes (MACs) employing FIPS 140-3-validated cryptographic hash algorithms to
          protect the confidentiality of SSH client connections.
      rules:
          - harden_sshd_macs_openssh_conf_crypto_policy
          - sshd_approved_macs=stig_rhel10
      status: automated
    - id: RHEL-10-300060
      levels:
          - high
      title: RHEL 10 must be configured so that Secure Shell (SSH) servers use only DOD-approved Message
          Authentication Codes (MACs) employing FIPS 140-3-validated cryptographic hash algorithms to
          protect the confidentiality of SSH server connections.
      rules:
          - harden_sshd_macs_opensshserver_conf_crypto_policy
          - sshd_approved_macs=stig_rhel10
      status: automated
    - id: RHEL-10-300070
      levels:
          - high
      title: RHEL 10 must use FIPS 140-3-approved cryptographic algorithms for IP tunnels.
      rules:
          - configure_libreswan_crypto_policy
      status: automated
    - id: RHEL-10-300080
      levels:
          - high
      title: RHEL 10 must implement DOD-approved encryption in the bind package.
      rules:
          - configure_bind_crypto_policy
      status: automated
    - id: RHEL-10-300090
      levels:
          - high
      title: RHEL 10 cryptographic policy must not be overridden.
      notes: >-
          This rule only contains SCE (Script Check Engine) content. The package
          openscap-engine-sce must be installed on the target system for the check to work.
      rules:
          - crypto_policy_not_overridden
      status: automated
    - id: RHEL-10-400000
