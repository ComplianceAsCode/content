policy: Red Hat Enterprise Linux 10 Security Technical Implementation Guide
title: Red Hat Enterprise Linux 10 Security Technical Implementation Guide
id: stig_rhel10
version: V1R1
source: https://www.cyber.mil/stigs/downloads/
reference_type: stigid
product: rhel10
levels:
- id: high
- id: medium
- id: low
controls:
- id: RHEL-10-700970
  levels:
  - medium
  title: RHEL 10 must disable the debug-shell systemd service.
  rules:
  - disable_ctrlaltdel_burstaction
  - disable_ctrlaltdel_reboot
  - disallow_bypass_password_sudo
  - package_sudo_installed
  - service_debug-shell_disabled
  - sudo_remove_no_authenticate
  - sudo_remove_nopasswd
  - sudo_require_reauthentication
  - sysctl_fs_protected_hardlinks
  - sysctl_fs_protected_symlinks
  - var_sudo_timestamp_timeout=always_prompt
  status: automated
- id: RHEL-10-001020
  levels:
  - medium
  title: RHEL 10 must ensure cryptographic verification of vendor software packages.
  rules:
  - ensure_gpgcheck_globally_activated
  - ensure_gpgcheck_local_packages
  - ensure_gpgcheck_never_disabled
  - ensure_redhat_gpgkey_installed
  - package_sequoia-sq_installed
  - package_subscription-manager_installed
  - sysctl_kernel_kexec_load_disabled
  status: automated
- id: RHEL-10-001030
  levels:
  - high
  title: RHEL 10 must check the GNU Privacy Guard (GPG) signature of software packages
    originating from external software repositories before installation.
  rules:
  - ensure_gpgcheck_globally_activated
  - ensure_gpgcheck_local_packages
  - ensure_gpgcheck_never_disabled
  - ensure_redhat_gpgkey_installed
  - package_sequoia-sq_installed
  - package_subscription-manager_installed
  - sysctl_kernel_kexec_load_disabled
  status: automated
- id: RHEL-10-001040
  levels:
  - high
  title: RHEL 10 must check the GNU Privacy Guard (GPG) signature of locally installed
    software packages before installation.
  rules:
  - ensure_gpgcheck_globally_activated
  - ensure_gpgcheck_local_packages
  - ensure_gpgcheck_never_disabled
  - ensure_redhat_gpgkey_installed
  - package_sequoia-sq_installed
  - package_subscription-manager_installed
  - sysctl_kernel_kexec_load_disabled
  status: automated
- id: RHEL-10-001050
  levels:
  - high
  title: RHEL 10 must have GNU Privacy Guard (GPG) signature verification enabled
    for all software repositories.
  rules:
  - ensure_gpgcheck_globally_activated
  - ensure_gpgcheck_local_packages
  - ensure_gpgcheck_never_disabled
  - ensure_redhat_gpgkey_installed
  - package_sequoia-sq_installed
  - package_subscription-manager_installed
  - sysctl_kernel_kexec_load_disabled
  status: automated
- id: RHEL-10-000510
  levels:
  - high
  title: RHEL 10 must implement cryptographic mechanisms to prevent unauthorized disclosure
    or modification of all information on local disk partitions that requires at-rest
    protection.
  rules:
  - encrypt_partitions
  status: automated
- id: RHEL-10-000520
  levels:
  - low
  title: RHEL 10 must use a separate file system for the system audit data path.
  rules:
  - auditd_audispd_configure_sufficiently_large_partition
  - grub2_audit_backlog_limit_argument
  - partition_for_var_log_audit
  - var_audit_backlog_limit=8192
  status: automated
- id: RHEL-10-000530
  levels:
  - medium
  title: RHEL 10 must use a separate file system for user home directories (such as
    "/home" or an equivalent).
  rules:
  - firewalld-backend
  - sysctl_net_ipv4_tcp_invalid_ratelimit
  - sysctl_net_ipv4_tcp_invalid_ratelimit_value=five_hundred
  - sysctl_net_ipv4_tcp_syncookies
