- id: RHEL-10-000560
  levels:
  - medium
  title: RHEL 10 must use a separate file system for "/var/log".
  rules:
  - firewalld-backend
  - sysctl_net_ipv4_tcp_invalid_ratelimit
  - sysctl_net_ipv4_tcp_invalid_ratelimit_value=five_hundred
