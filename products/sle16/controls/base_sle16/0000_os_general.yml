#
# A group of rules regarding general operating system functionality
# and system software installed
#
# SLES-16 ids allocated for this group from SLES-16-16016000 till SLES-16-16016099
#

controls:
    - id: SLES-16-16016005
      levels:
          - pcidss4
          - anssi_minimal
      title: SLES 16 must be a vendor-supported release.
      rules:
          - installed_OS_is_vendor_supported
      status: automated

    - id: SLES-16-16016010
      levels:
          - hipaa
      title: SLES 16 should restrict serial port root logins
      rules:
          - restrict_serial_port_logins
      status: automated

    - id: SLES-15-16016015
      title: Disable DHCP Service
      levels:
          - pcidss4
      status: automated
      rules:
          - package_kea_removed
          - package_dhcp_client_removed
          - service_kea_dhcp4_server_disabled
          - service_kea_dhcp6_server_disabled
