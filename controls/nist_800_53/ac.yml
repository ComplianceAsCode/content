  - id: ac-21
    title: Information Sharing
    description: "  a. Enable authorized users to determine whether access authorizations assigned to a sharing partner match the information’s access and use restrictions for [[ insert: param, ac-21_odp.01 ]] ; and\n  b. Employ [[ insert: param, ac-21_odp.02 ]] to assist users in making information sharing and collaboration decisions."
    parameters:
      - id: ac-21_odp.01
        label: information-sharing circumstances
        guidelines:
          - information-sharing circumstances where user discretion is required to determine whether access authorizations assigned to a sharing partner match the information’s access and use restrictions are defined;
      - id: ac-21_odp.02
        label: automated mechanisms
        guidelines:
          - automated mechanisms or manual processes that assist users in making information-sharing and collaboration decisions are defined;
    guidance: Information sharing applies to information that may be restricted in some manner based on some formal or administrative determination. Examples of such information include, contract-sensitive information, classified information related to special access programs or compartments, privileged information, proprietary information, and personally identifiable information. Security and privacy risk assessments as well as applicable laws, regulations, and policies can provide useful inputs to these determinations. Depending on the circumstances, sharing partners may be defined at the individual, group, or organizational level. Information may be defined by content, type, security category, or special access program or compartment. Access restrictions may include non-disclosure agreements (NDA). Information flow techniques and security attributes may be used to provide automated assistance to users making sharing and collaboration decisions.
    related_controls:
      - ac-3
      - ac-4
      - ac-16
      - pt-2
      - pt-7
      - ra-3
      - sc-15
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-21.1
    title: Automated Decision Support
    description: 'Employ [[ insert: param, ac-21.01_odp ]] to enforce information-sharing decisions by authorized users based on access authorizations of sharing partners and access restrictions on information to be shared.'
    parameters:
      - id: ac-21.01_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms employed to enforce information-sharing decisions by authorized users are defined;
    guidance: Automated mechanisms are used to enforce information sharing decisions.
    rules: []
    status: pending
  - id: ac-21.2
    title: Information Search and Retrieval
    description: 'Implement information search and retrieval services that enforce [[ insert: param, ac-21.02_odp ]].'
    parameters:
      - id: ac-21.02_odp
        label: information-sharing restrictions
        guidelines:
          - information-sharing restrictions to be enforced by information search and retrieval services are defined;
    guidance: Information search and retrieval services identify information system resources relevant to an information need.
    rules: []
    status: pending
  - id: ac-22
    title: Publicly Accessible Content
    description: "  a. Designate individuals authorized to make information publicly accessible;\n  b. Train authorized individuals to ensure that publicly accessible information does not contain nonpublic information;\n  c. Review the proposed content of information prior to posting onto the publicly accessible system to ensure that nonpublic information is not included; and\n  d. Review the content on the publicly accessible system for nonpublic information [[ insert: param, ac-22_odp ]] and remove such information, if discovered."
    parameters:
      - id: ac-22_odp
        label: frequency
        guidelines:
          - the frequency at which to review the content on the publicly accessible system for non-public information is defined;
    guidance: In accordance with applicable laws, executive orders, directives, policies, regulations, standards, and guidelines, the public is not authorized to have access to nonpublic information, including information protected under the [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) and proprietary information. Publicly accessible content addresses systems that are controlled by the organization and accessible to the public, typically without identification or authentication. Posting information on non-organizational systems (e.g., non-organizational public websites, forums, and social media) is covered by organizational policy. While organizations may have individuals who are responsible for developing and implementing policies about the information that can be made publicly accessible, publicly accessible content addresses the management of the individuals who make such information publicly accessible.
    related_controls:
      - ac-3
      - at-2
      - at-3
      - au-13
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-23
    title: Data Mining Protection
    description: 'Employ [[ insert: param, ac-23_odp.01 ]] for [[ insert: param, ac-23_odp.02 ]] to detect and protect against unauthorized data mining.'
    parameters:
      - id: ac-23_odp.01
        label: techniques
        guidelines:
          - data mining prevention and detection techniques are defined;
      - id: ac-23_odp.02
        label: data storage objects
        guidelines:
          - data storage objects to be protected against unauthorized data mining are defined;
    guidance: "Data mining is an analytical process that attempts to find correlations or patterns in large data sets for the purpose of data or knowledge discovery. Data storage objects include database records and database fields. Sensitive information can be extracted from data mining operations. When information is personally identifiable information, it may lead to unanticipated revelations about individuals and give rise to privacy risks. Prior to performing data mining activities, organizations determine whether such activities are authorized. Organizations may be subject to applicable laws, executive orders, directives, regulations, or policies that address data mining requirements. Organizational personnel consult with the senior agency official for privacy and legal counsel regarding such requirements.\n\nData mining prevention and detection techniques include limiting the number and frequency of database queries to increase the work factor needed to determine the contents of databases, limiting types of responses provided to database queries, applying differential privacy techniques or homomorphic encryption, and notifying personnel when atypical database queries or accesses occur. Data mining protection focuses on protecting information from data mining while such information resides in organizational data stores. In contrast, [AU-13](#au-13) focuses on monitoring for organizational information that may have been mined or otherwise obtained from data stores and is available as open-source information residing on external sites, such as social networking or social media websites.\n\n[EO 13587](#0af071a6-cf8e-48ee-8c82-fe91efa20f94) requires the establishment of an insider threat program for deterring, detecting, and mitigating insider threats, including the safeguarding of sensitive information from exploitation, compromise, or other unauthorized disclosure. Data mining protection requires organizations to identify appropriate techniques to prevent and detect unnecessary or unauthorized data mining. Data mining can be used by an insider to collect organizational information for the purpose of exfiltration."
    related_controls:
      - pm-12
      - pt-2
    rules: []
    status: pending
  - id: ac-24
    title: Access Control Decisions
    description: '[[ insert: param, ac-24_odp.01 ]] to ensure [[ insert: param, ac-24_odp.02 ]] are applied to each access request prior to access enforcement.'
    parameters:
      - id: ac-24_odp.01
        label: ''
        choices:
          - establish procedures
          - implement mechanisms
      - id: ac-24_odp.02
        label: access control decisions
        guidelines:
          - access control decisions applied to each access request prior to access enforcement are defined;
    guidance: Access control decisions (also known as authorization decisions) occur when authorization information is applied to specific accesses. In contrast, access enforcement occurs when systems enforce access control decisions. While it is common to have access control decisions and access enforcement implemented by the same entity, it is not required, and it is not always an optimal implementation choice. For some architectures and distributed systems, different entities may make access control decisions and enforce access.
    related_controls:
      - ac-2
      - ac-3
    rules: []
    status: pending
  - id: ac-24.1
    title: Transmit Access Authorization Information
    description: 'Transmit [[ insert: param, ac-24.01_odp.01 ]] using [[ insert: param, ac-24.01_odp.02 ]] to [[ insert: param, ac-24.01_odp.03 ]] that enforce access control decisions.'
    parameters:
      - id: ac-24.01_odp.01
        label: access authorization information
        guidelines:
          - access authorization information transmitted to systems that enforce access control decisions is defined;
      - id: ac-24.01_odp.02
        label: controls
        guidelines:
          - controls to be used when authorization information is transmitted to systems that enforce access control decisions are defined;
      - id: ac-24.01_odp.03
        label: systems
        guidelines:
          - systems that enforce access control decisions are defined;
    guidance: Authorization processes and access control decisions may occur in separate parts of systems or in separate systems. In such instances, authorization information is transmitted securely (e.g., using cryptographic mechanisms) so that timely access control decisions can be enforced at the appropriate locations. To support the access control decisions, it may be necessary to transmit as part of the access authorization information supporting security and privacy attributes. This is because in distributed systems, there are various access control decisions that need to be made, and different entities make these decisions in a serial fashion, each requiring those attributes to make the decisions. Protecting access authorization information ensures that such information cannot be altered, spoofed, or compromised during transmission.
    related_controls:
      - au-10
    rules: []
    status: pending
  - id: ac-24.2
    title: No User or Process Identity
    description: 'Enforce access control decisions based on [[ insert: param, ac-24.2_prm_1 ]] that do not include the identity of the user or process acting on behalf of the user.'
    parameters:
      - id: ac-24.2_prm_1
        label: organization-defined security or privacy attributes
      - id: ac-24.02_odp.01
        label: security attributes
        guidelines:
          - security attributes that do not include the identity of the user or process acting on behalf of the user are defined (if selected);
      - id: ac-24.02_odp.02
        label: privacy attributes
        guidelines:
          - privacy attributes that do not include the identity of the user or process acting on behalf of the user are defined (if selected);
    guidance: In certain situations, it is important that access control decisions can be made without information regarding the identity of the users issuing the requests. These are generally instances where preserving individual privacy is of paramount importance. In other situations, user identification information is simply not needed for access control decisions, and especially in the case of distributed systems, transmitting such information with the needed degree of assurance may be very expensive or difficult to accomplish. MAC, RBAC, ABAC, and label-based control policies, for example, might not include user identity as an attribute.
    rules: []
    status: pending
  - id: ac-25
    title: Reference Monitor
    description: 'Implement a reference monitor for [[ insert: param, ac-25_odp ]] that is tamperproof, always invoked, and small enough to be subject to analysis and testing, the completeness of which can be assured.'
    parameters:
      - id: ac-25_odp
        label: access control policies
        guidelines:
          - access control policies for which a reference monitor is implemented are defined;
    guidance: A reference monitor is a set of design requirements on a reference validation mechanism that, as a key component of an operating system, enforces an access control policy over all subjects and objects. A reference validation mechanism is always invoked, tamper-proof, and small enough to be subject to analysis and tests, the completeness of which can be assured (i.e., verifiable). Information is represented internally within systems using abstractions known as data structures. Internal data structures can represent different types of entities, both active and passive. Active entities, also known as subjects, are associated with individuals, devices, or processes acting on behalf of individuals. Passive entities, also known as objects, are associated with data structures, such as records, buffers, communications ports, tables, files, and inter-process pipes. Reference monitors enforce access control policies that restrict access to objects based on the identity of subjects or groups to which the subjects belong. The system enforces the access control policy based on the rule set established by the policy. The tamper-proof property of the reference monitor prevents determined adversaries from compromising the functioning of the reference validation mechanism. The always invoked property prevents adversaries from bypassing the mechanism and violating the security policy. The smallness property helps to ensure completeness in the analysis and testing of the mechanism to detect any weaknesses or deficiencies (i.e., latent flaws) that would prevent the enforcement of the security policy.
    related_controls:
      - ac-3
      - ac-16
      - sa-8
      - sa-17
      - sc-3
      - sc-11
      - sc-39
      - si-13
    rules: []
    status: pending
