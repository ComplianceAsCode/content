    rules: []
    status: pending
  - id: ac-20.3
    title: Non-organizationally Owned Systems — Restricted Use
    description: 'Restrict the use of non-organizationally owned systems or system components to process, store, or transmit organizational information using [[ insert: param, ac-20.03_odp ]].'
    parameters:
      - id: ac-20.03_odp
        label: restrictions
        guidelines:
          - restrictions on the use of non-organizationally owned systems or system components to process, store, or transmit organizational information are defined;
    guidance: Non-organizationally owned systems or system components include systems or system components owned by other organizations as well as personally owned devices. There are potential risks to using non-organizationally owned systems or components. In some cases, the risk is sufficiently high as to prohibit such use (see [AC-20 b.](#ac-20_smt.b) ). In other cases, the use of such systems or system components may be allowed but restricted in some way. Restrictions include requiring the implementation of approved controls prior to authorizing the connection of non-organizationally owned systems and components; limiting access to types of information, services, or applications; using virtualization techniques to limit processing and storage activities to servers or system components provisioned by the organization; and agreeing to the terms and conditions for usage. Organizations consult with the Office of the General Counsel regarding legal issues associated with using personally owned devices, including requirements for conducting forensic analyses during investigations after an incident.
    rules: []
    status: pending
  - id: ac-20.4
    title: Network Accessible Storage Devices — Prohibited Use
    description: 'Prohibit the use of [[ insert: param, ac-20.04_odp ]] in external systems.'
    parameters:
      - id: ac-20.04_odp
        label: network-accessible storage devices
        guidelines:
          - network-accessible storage devices prohibited from use in external systems are defined;
    guidance: Network-accessible storage devices in external systems include online storage devices in public, hybrid, or community cloud-based systems.
    rules: []
    status: pending
  - id: ac-20.5
    title: Portable Storage Devices — Prohibited Use
    description: Prohibit the use of organization-controlled portable storage devices by authorized individuals on external systems.
    guidance: Limits on the use of organization-controlled portable storage devices in external systems include a complete prohibition of the use of such devices. Prohibiting such use is enforced using technical methods and/or nontechnical (i.e., process-based) methods.
