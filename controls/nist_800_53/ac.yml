    status: automated
  - id: ac-3.1
    title: Restricted Access to Privileged Functions
    rules: []
    status: pending
  - id: ac-3.2
    title: Dual Authorization
    description: 'Enforce dual authorization for [[ insert: param, ac-03.02_odp ]].'
    parameters:
      - id: ac-03.02_odp
        label: privileged commands and/or other actions
        guidelines:
          - privileged commands and/or other actions requiring dual authorization are defined;
    guidance: Dual authorization, also known as two-person control, reduces risk related to insider threats. Dual authorization mechanisms require the approval of two authorized individuals to execute. To reduce the risk of collusion, organizations consider rotating dual authorization duties. Organizations consider the risk associated with implementing dual authorization mechanisms when immediate responses are necessary to ensure public and environmental safety.
    related_controls:
      - cp-9
      - mp-6
    rules: []
    status: pending
  - id: ac-3.3
    title: Mandatory Access Control
    description: "Enforce [[ insert: param, ac-3.3_prm_1 ]] over the set of covered subjects and objects specified in the policy, and where the policy:\n  a. Is uniformly enforced across the covered subjects and objects within the system;\n  b. Specifies that a subject that has been granted access to information is constrained from doing any of the following;\n    1. Passing the information to unauthorized subjects or objects;\n    2. Granting its privileges to other subjects;\n    3. Changing one or more security attributes (specified by the policy) on subjects, objects, the system, or system components;\n    4. Choosing the security attributes and attribute values (specified by the policy) to be associated with newly created or modified objects; and\n    5. Changing the rules governing access control; and\n  c. Specifies that [[ insert: param, ac-03.03_odp.03 ]] may explicitly be granted [[ insert: param, ac-03.03_odp.04 ]] such that they are not limited by any defined subset (or all) of the above constraints."
    parameters:
      - id: ac-3.3_prm_1
        label: organization-defined mandatory access control policy
      - id: ac-03.03_odp.01
        label: mandatory access control policy
        guidelines:
          - mandatory access control policy enforced over the set of covered subjects is defined;
      - id: ac-03.03_odp.02
        label: mandatory access control policy
        guidelines:
          - mandatory access control policy enforced over the set of covered objects is defined;
      - id: ac-03.03_odp.03
        label: subjects
        guidelines:
          - subjects to be explicitly granted privileges are defined;
      - id: ac-03.03_odp.04
        label: privileges
        guidelines:
          - privileges to be explicitly granted to subjects are defined;
    guidance: "Mandatory access control is a type of nondiscretionary access control. Mandatory access control policies constrain what actions subjects can take with information obtained from objects for which they have already been granted access. This prevents the subjects from passing the information to unauthorized subjects and objects. Mandatory access control policies constrain actions that subjects can take with respect to the propagation of access control privileges; that is, a subject with a privilege cannot pass that privilege to other subjects. The policy is uniformly enforced over all subjects and objects to which the system has control. Otherwise, the access control policy can be circumvented. This enforcement is provided by an implementation that meets the reference monitor concept as described in [AC-25](#ac-25) . The policy is bounded by the system (i.e., once the information is passed outside of the control of the system, additional means may be required to ensure that the constraints on the information remain in effect).\n\nThe trusted subjects described above are granted privileges consistent with the concept of least privilege (see [AC-6](#ac-6) ). Trusted subjects are only given the minimum privileges necessary for satisfying organizational mission/business needs relative to the above policy. The control is most applicable when there is a mandate that establishes a policy regarding access to controlled unclassified information or classified information and some users of the system are not authorized access to all such information resident in the system. Mandatory access control can operate in conjunction with discretionary access control as described in [AC-3(4)](#ac-3.4) . A subject constrained in its operation by mandatory access control policies can still operate under the less rigorous constraints of AC-3(4), but mandatory access control policies take precedence over the less rigorous constraints of AC-3(4). For example, while a mandatory access control policy imposes a constraint that prevents a subject from passing information to another subject operating at a different impact or classification level, AC-3(4) permits the subject to pass the information to any other subject with the same impact or classification level as the subject. Examples of mandatory access control policies include the Bell-LaPadula policy to protect confidentiality of information and the Biba policy to protect the integrity of information."
    related_controls:
      - sc-7
    rules: []
    status: pending
  - id: ac-3.4
    title: Discretionary Access Control
    description: "Enforce [[ insert: param, ac-3.4_prm_1 ]] over the set of covered subjects and objects specified in the policy, and where the policy specifies that a subject that has been granted access to information can do one or more of the following:\n  a. Pass the information to any other subjects or objects;\n  b. Grant its privileges to other subjects;\n  c. Change security attributes on subjects, objects, the system, or the system’s components;\n  d. Choose the security attributes to be associated with newly created or revised objects; or\n  e. Change the rules governing access control."
    parameters:
      - id: ac-3.4_prm_1
        label: organization-defined discretionary access control policy
      - id: ac-03.04_odp.01
        label: discretionary access control policy
        guidelines:
          - discretionary access control policy enforced over the set of covered subjects is defined;
      - id: ac-03.04_odp.02
        label: discretionary access control policy
        guidelines:
          - discretionary access control policy enforced over the set of covered objects is defined;
    guidance: When discretionary access control policies are implemented, subjects are not constrained with regard to what actions they can take with information for which they have already been granted access. Thus, subjects that have been granted access to information are not prevented from passing the information to other subjects or objects (i.e., subjects have the discretion to pass). Discretionary access control can operate in conjunction with mandatory access control as described in [AC-3(3)](#ac-3.3) and [AC-3(15)](#ac-3.15) . A subject that is constrained in its operation by mandatory access control policies can still operate under the less rigorous constraints of discretionary access control. Therefore, while [AC-3(3)](#ac-3.3) imposes constraints that prevent a subject from passing information to another subject operating at a different impact or classification level, [AC-3(4)](#ac-3.4) permits the subject to pass the information to any subject at the same impact or classification level. The policy is bounded by the system. Once the information is passed outside of system control, additional means may be required to ensure that the constraints remain in effect. While traditional definitions of discretionary access control require identity-based access control, that limitation is not required for this particular use of discretionary access control.
    rules: []
    status: pending
  - id: ac-3.5
    title: Security-relevant Information
    description: 'Prevent access to [[ insert: param, ac-03.05_odp ]] except during secure, non-operable system states.'
    parameters:
      - id: ac-03.05_odp
        label: security-relevant information
        guidelines:
          - security-relevant information to which access is prevented except during secure, non-operable system states is defined;
    guidance: Security-relevant information is information within systems that can potentially impact the operation of security functions or the provision of security services in a manner that could result in failure to enforce system security and privacy policies or maintain the separation of code and data. Security-relevant information includes access control lists, filtering rules for routers or firewalls, configuration parameters for security services, and cryptographic key management information. Secure, non-operable system states include the times in which systems are not performing mission or business-related processing, such as when the system is offline for maintenance, boot-up, troubleshooting, or shut down.
    related_controls:
      - cm-6
      - sc-39
    rules: []
    status: pending
  - id: ac-3.6
    title: Protection of User and System Information
    rules: []
    status: pending
  - id: ac-3.7
    title: Role-based Access Control
    description: 'Enforce a role-based access control policy over defined subjects and objects and control access based upon [[ insert: param, ac-3.7_prm_1 ]].'
    parameters:
      - id: ac-3.7_prm_1
        label: organization-defined roles and users authorized to assume such roles
      - id: ac-03.07_odp.01
        label: roles
        guidelines:
          - roles upon which to base control of access are defined;
      - id: ac-03.07_odp.02
        label: users authorized to assume such roles
        guidelines:
          - users authorized to assume roles (defined in AC-03(07)_ODP[01]) are defined;
    guidance: Role-based access control (RBAC) is an access control policy that enforces access to objects and system functions based on the defined role (i.e., job function) of the subject. Organizations can create specific roles based on job functions and the authorizations (i.e., privileges) to perform needed operations on the systems associated with the organization-defined roles. When users are assigned to specific roles, they inherit the authorizations or privileges defined for those roles. RBAC simplifies privilege administration for organizations because privileges are not assigned directly to every user (which can be a large number of individuals) but are instead acquired through role assignments. RBAC can also increase privacy and security risk if individuals assigned to a role are given access to information beyond what they need to support organizational missions or business functions. RBAC can be implemented as a mandatory or discretionary form of access control. For organizations implementing RBAC with mandatory access controls, the requirements in [AC-3(3)](#ac-3.3) define the scope of the subjects and objects covered by the policy.
    rules: []
    status: pending
  - id: ac-3.8
    title: Revocation of Access Authorizations
    description: 'Enforce the revocation of access authorizations resulting from changes to the security attributes of subjects and objects based on [[ insert: param, ac-03.08_odp ]].'
    parameters:
      - id: ac-03.08_odp
        label: rules
        guidelines:
          - rules governing the timing of revocations of access authorizations are defined;
    guidance: Revocation of access rules may differ based on the types of access revoked. For example, if a subject (i.e., user or process acting on behalf of a user) is removed from a group, access may not be revoked until the next time the object is opened or the next time the subject attempts to access the object. Revocation based on changes to security labels may take effect immediately. Organizations provide alternative approaches on how to make revocations immediate if systems cannot provide such capability and immediate revocation is necessary.
    rules: []
    status: pending
  - id: ac-3.9
    title: Controlled Release
    description: "Release information outside of the system only if:\n  a. The receiving [[ insert: param, ac-03.09_odp.01 ]] provides [[ insert: param, ac-03.09_odp.02 ]] ; and\n  b. [[ insert: param, ac-03.09_odp.03 ]] are used to validate the appropriateness of the information designated for release."
    parameters:
      - id: ac-03.09_odp.01
        label: system or system component
        guidelines:
          - the outside system or system component to which to release information is defined;
      - id: ac-03.09_odp.02
        label: controls
        guidelines:
          - controls to be provided by the outside system or system component (defined in AC-03(09)_ODP[01]) are defined;
      - id: ac-03.09_odp.03
        label: controls
        guidelines:
          - controls used to validate appropriateness of information to be released are defined;
    guidance: "Organizations can only directly protect information when it resides within the system. Additional controls may be needed to ensure that organizational information is adequately protected once it is transmitted outside of the system. In situations where the system is unable to determine the adequacy of the protections provided by external entities, as a mitigation measure, organizations procedurally determine whether the external systems are providing adequate controls. The means used to determine the adequacy of controls provided by external systems include conducting periodic assessments (inspections/tests), establishing agreements between the organization and its counterpart organizations, or some other process. The means used by external entities to protect the information received need not be the same as those used by the organization, but the means employed are sufficient to provide consistent adjudication of the security and privacy policy to protect the information and individuals’ privacy.\n\nControlled release of information requires systems to implement technical or procedural means to validate the information prior to releasing it to external systems. For example, if the system passes information to a system controlled by another organization, technical means are employed to validate that the security and privacy attributes associated with the exported information are appropriate for the receiving system. Alternatively, if the system passes information to a printer in organization-controlled space, procedural means can be employed to ensure that only authorized individuals gain access to the printer."
    related_controls:
      - ca-3
      - pt-7
      - pt-8
      - sa-9
      - sc-16
    rules: []
    status: pending
  - id: ac-3.10
    title: Audited Override of Access Control Mechanisms
    description: 'Employ an audited override of automated access control mechanisms under [[ insert: param, ac-03.10_odp.01 ]] by [[ insert: param, ac-03.10_odp.02 ]].'
    parameters:
      - id: ac-03.10_odp.01
        label: conditions
        guidelines:
          - conditions under which to employ an audited override of automated access control mechanisms are defined;
      - id: ac-03.10_odp.02
        label: roles
        guidelines:
          - roles allowed to employ an audited override of automated access control mechanisms are defined;
    guidance: In certain situations, such as when there is a threat to human life or an event that threatens the organization’s ability to carry out critical missions or business functions, an override capability for access control mechanisms may be needed. Override conditions are defined by organizations and used only in those limited circumstances. Audit events are defined in [AU-2](#au-2) . Audit records are generated in [AU-12](#au-12).
    related_controls:
      - au-2
      - au-6
      - au-10
      - au-12
      - au-14
    rules: []
    status: pending
  - id: ac-3.11
    title: Restrict Access to Specific Information Types
    description: 'Restrict access to data repositories containing [[ insert: param, ac-03.11_odp ]].'
    parameters:
      - id: ac-03.11_odp
        label: information types
        guidelines:
          - information types requiring restricted access to data repositories are defined;
    guidance: Restricting access to specific information is intended to provide flexibility regarding access control of specific information types within a system. For example, role-based access could be employed to allow access to only a specific type of personally identifiable information within a database rather than allowing access to the database in its entirety. Other examples include restricting access to cryptographic keys, authentication information, and selected system information.
    related_controls:
      - cm-8
      - cm-12
      - cm-13
      - pm-5
    rules: []
    status: pending
  - id: ac-3.12
    title: Assert and Enforce Application Access
    description: "  a. Require applications to assert, as part of the installation process, the access needed to the following system applications and functions: [[ insert: param, ac-03.12_odp ]];\n  b. Provide an enforcement mechanism to prevent unauthorized access; and\n  c. Approve access changes after initial installation of the application."
    parameters:
      - id: ac-03.12_odp
        label: system applications and functions
        guidelines:
          - system applications and functions requiring access assertion are defined;
    guidance: Asserting and enforcing application access is intended to address applications that need to access existing system applications and functions, including user contacts, global positioning systems, cameras, keyboards, microphones, networks, phones, or other files.
    related_controls:
      - cm-7
    rules: []
    status: pending
  - id: ac-3.13
    title: Attribute-based Access Control
    description: 'Enforce attribute-based access control policy over defined subjects and objects and control access based upon [[ insert: param, ac-03.13_odp ]].'
    parameters:
      - id: ac-03.13_odp
        label: attributes
        guidelines:
          - attributes to assume access permissions are defined;
    guidance: Attribute-based access control is an access control policy that restricts system access to authorized users based on specified organizational attributes (e.g., job function, identity), action attributes (e.g., read, write, delete), environmental attributes (e.g., time of day, location), and resource attributes (e.g., classification of a document). Organizations can create rules based on attributes and the authorizations (i.e., privileges) to perform needed operations on the systems associated with organization-defined attributes and rules. When users are assigned to attributes defined in attribute-based access control policies or rules, they can be provisioned to a system with the appropriate privileges or dynamically granted access to a protected resource. Attribute-based access control can be implemented as either a mandatory or discretionary form of access control. When implemented with mandatory access controls, the requirements in [AC-3(3)](#ac-3.3) define the scope of the subjects and objects covered by the policy.
    rules: []
    status: pending
  - id: ac-3.14
    title: Individual Access
    description: 'Provide [[ insert: param, ac-03.14_odp.01 ]] to enable individuals to have access to the following elements of their personally identifiable information: [[ insert: param, ac-03.14_odp.02 ]].'
    parameters:
      - id: ac-03.14_odp.01
        label: mechanisms
        guidelines:
          - mechanisms enabling individuals to have access to elements of their personally identifiable information are defined;
      - id: ac-03.14_odp.02
        label: elements
        guidelines:
          - elements of personally identifiable information to which individuals have access are defined;
    guidance: Individual access affords individuals the ability to review personally identifiable information about them held within organizational records, regardless of format. Access helps individuals to develop an understanding about how their personally identifiable information is being processed. It can also help individuals ensure that their data is accurate. Access mechanisms can include request forms and application interfaces. For federal agencies, [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) processes can be located in systems of record notices and on agency websites. Access to certain types of records may not be appropriate (e.g., for federal agencies, law enforcement records within a system of records may be exempt from disclosure under the [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) ) or may require certain levels of authentication assurance. Organizational personnel consult with the senior agency official for privacy and legal counsel to determine appropriate mechanisms and access rights or limitations.
    related_controls:
      - ia-8
      - pm-22
      - pm-20
      - pm-21
      - pt-6
    rules: []
    status: pending
  - id: ac-3.15
    title: Discretionary and Mandatory Access Control
    description: "  a. Enforce [[ insert: param, ac-3.15_prm_1 ]] over the set of covered subjects and objects specified in the policy; and\n  b. Enforce [[ insert: param, ac-3.15_prm_2 ]] over the set of covered subjects and objects specified in the policy."
    parameters:
      - id: ac-3.15_prm_1
        label: organization-defined mandatory access control policy
      - id: ac-3.15_prm_2
        label: organization-defined discretionary access control policy
      - id: ac-03.15_odp.01
        label: mandatory access control policy
        guidelines:
          - a mandatory access control policy enforced over the set of covered subjects specified in the policy is defined;
      - id: ac-03.15_odp.02
        label: mandatory access control policy
        guidelines:
          - a mandatory access control policy enforced over the set of covered objects specified in the policy is defined;
      - id: ac-03.15_odp.03
        label: discretionary access control policy
        guidelines:
          - a discretionary access control policy enforced over the set of covered subjects specified in the policy is defined;
      - id: ac-03.15_odp.04
        label: discretionary access control policy
        guidelines:
          - a discretionary access control policy enforced over the set of covered objects specified in the policy is defined;
    guidance: Simultaneously implementing a mandatory access control policy and a discretionary access control policy can provide additional protection against the unauthorized execution of code by users or processes acting on behalf of users. This helps prevent a single compromised user or process from compromising the entire system.
    related_controls:
      - sc-2
      - sc-3
      - ac-4
    rules: []
    status: pending
  - id: ac-4
    title: Information Flow Enforcement
    description: 'Enforce approved authorizations for controlling the flow of information within the system and between connected systems based on [[ insert: param, ac-04_odp ]].'
    parameters:
      - id: ac-04_odp
        label: information flow control policies
        guidelines:
          - information flow control policies within the system and between connected systems are defined;
    guidance: "Information flow control regulates where information can travel within a system and between systems (in contrast to who is allowed to access the information) and without regard to subsequent accesses to that information. Flow control restrictions include blocking external traffic that claims to be from within the organization, keeping export-controlled information from being transmitted in the clear to the Internet, restricting web requests that are not from the internal web proxy server, and limiting information transfers between organizations based on data structures and content. Transferring information between organizations may require an agreement specifying how the information flow is enforced (see [CA-3](#ca-3) ). Transferring information between systems in different security or privacy domains with different security or privacy policies introduces the risk that such transfers violate one or more domain security or privacy policies. In such situations, information owners/stewards provide guidance at designated policy enforcement points between connected systems. Organizations consider mandating specific architectural solutions to enforce specific security and privacy policies. Enforcement includes prohibiting information transfers between connected systems (i.e., allowing access only), verifying write permissions before accepting information from another security or privacy domain or connected system, employing hardware mechanisms to enforce one-way information flows, and implementing trustworthy regrading mechanisms to reassign security or privacy attributes and labels.\n\nOrganizations commonly employ information flow control policies and enforcement mechanisms to control the flow of information between designated sources and destinations within systems and between connected systems. Flow control is based on the characteristics of the information and/or the information path. Enforcement occurs, for example, in boundary protection devices that employ rule sets or establish configuration settings that restrict system services, provide a packet-filtering capability based on header information, or provide a message-filtering capability based on message content. Organizations also consider the trustworthiness of filtering and/or inspection mechanisms (i.e., hardware, firmware, and software components) that are critical to information flow enforcement. Control enhancements 3 through 32 primarily address cross-domain solution needs that focus on more advanced filtering techniques, in-depth analysis, and stronger flow enforcement mechanisms implemented in cross-domain products, such as high-assurance guards. Such capabilities are generally not available in commercial off-the-shelf products. Information flow enforcement also applies to control plane traffic (e.g., routing and DNS)."
    related_controls:
      - ac-3
      - ac-6
      - ac-16
      - ac-17
      - ac-19
      - ac-21
      - au-10
      - ca-3
      - ca-9
      - cm-7
      - pl-9
      - pm-24
      - sa-17
      - sc-4
      - sc-7
      - sc-16
      - sc-31
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-4.1
    title: Object Security and Privacy Attributes
    description: 'Use [[ insert: param, ac-4.1_prm_1 ]] associated with [[ insert: param, ac-4.1_prm_2 ]] to enforce [[ insert: param, ac-04.01_odp.09 ]] as a basis for flow control decisions.'
    parameters:
      - id: ac-4.1_prm_1
        label: organization-defined security and privacy attributes
      - id: ac-4.1_prm_2
        label: organization-defined information, source, and destination objects
      - id: ac-04.01_odp.01
        label: security attributes
        guidelines:
          - security attributes to be associated with information, source, and destination objects are defined;
      - id: ac-04.01_odp.02
        label: privacy attributes
        guidelines:
          - privacy attributes to be associated with information, source, and destination objects are defined;
      - id: ac-04.01_odp.03
        label: information objects
        guidelines:
          - information objects to be associated with information security attributes are defined;
      - id: ac-04.01_odp.04
        label: information objects
        guidelines:
          - information objects to be associated with privacy attributes are defined;
      - id: ac-04.01_odp.05
        label: source objects
        guidelines:
          - source objects to be associated with information security attributes are defined;
      - id: ac-04.01_odp.06
        label: source objects
        guidelines:
          - source objects to be associated with privacy attributes are defined;
      - id: ac-04.01_odp.07
        label: destination objects
        guidelines:
          - destination objects to be associated with information security attributes are defined;
      - id: ac-04.01_odp.08
        label: destination objects
        guidelines:
          - destination objects to be associated with privacy attributes are defined;
      - id: ac-04.01_odp.09
        label: information flow control policies
        guidelines:
          - information flow control policies as a basis for enforcement of flow control decisions are defined;
    guidance: Information flow enforcement mechanisms compare security and privacy attributes associated with information (i.e., data content and structure) and source and destination objects and respond appropriately when the enforcement mechanisms encounter information flows not explicitly allowed by information flow policies. For example, an information object labeled Secret would be allowed to flow to a destination object labeled Secret, but an information object labeled Top Secret would not be allowed to flow to a destination object labeled Secret. A dataset of personally identifiable information may be tagged with restrictions against combining with other types of datasets and, thus, would not be allowed to flow to the restricted dataset. Security and privacy attributes can also include source and destination addresses employed in traffic filter firewalls. Flow enforcement using explicit security or privacy attributes can be used, for example, to control the release of certain types of information.
    rules: []
    status: pending
  - id: ac-4.2
    title: Processing Domains
    description: 'Use protected processing domains to enforce [[ insert: param, ac-04.02_odp ]] as a basis for flow control decisions.'
    parameters:
      - id: ac-04.02_odp
        label: information flow control policies
        guidelines:
          - information flow control policies to be enforced by use of protected processing domains are defined;
    guidance: Protected processing domains within systems are processing spaces that have controlled interactions with other processing spaces, enabling control of information flows between these spaces and to/from information objects. A protected processing domain can be provided, for example, by implementing domain and type enforcement. In domain and type enforcement, system processes are assigned to domains, information is identified by types, and information flows are controlled based on allowed information accesses (i.e., determined by domain and type), allowed signaling among domains, and allowed process transitions to other domains.
    related_controls:
      - sc-39
    rules: []
    status: pending
  - id: ac-4.3
    title: Dynamic Information Flow Control
    description: 'Enforce [[ insert: param, ac-04.03_odp ]].'
    parameters:
      - id: ac-04.03_odp
        label: information flow control policies
        guidelines:
          - information flow control policies to be enforced are defined;
    guidance: Organizational policies regarding dynamic information flow control include allowing or disallowing information flows based on changing conditions or mission or operational considerations. Changing conditions include changes in risk tolerance due to changes in the immediacy of mission or business needs, changes in the threat environment, and detection of potentially harmful or adverse events.
    related_controls:
      - si-4
    rules: []
    status: pending
  - id: ac-4.4
    title: Flow Control of Encrypted Information
    description: 'Prevent encrypted information from bypassing [[ insert: param, ac-04.04_odp.01 ]] by [[ insert: param, ac-04.04_odp.02 ]].'
    parameters:
      - id: ac-04.04_odp.01
        label: information flow control mechanisms
        guidelines:
          - information flow control mechanisms that encrypted information is prevented from bypassing are defined;
      - id: ac-04.04_odp.02
        label: ''
        choices:
          - decrypting the information
          - blocking the flow of the encrypted information
          - terminating communications sessions attempting to pass encrypted information
          - '[[ insert: param, ac-04.04_odp.03 ]] '
      - id: ac-04.04_odp.03
        label: organization-defined procedure or method
        guidelines:
          - the organization-defined procedure or method used to prevent encrypted information from bypassing information flow control mechanisms is defined (if selected);
    guidance: Flow control mechanisms include content checking, security policy filters, and data type identifiers. The term encryption is extended to cover encoded data not recognized by filtering mechanisms.
    related_controls:
      - si-4
    levels:
      - high
    rules: []
    status: pending
  - id: ac-4.5
    title: Embedded Data Types
    description: 'Enforce [[ insert: param, ac-04.05_odp ]] on embedding data types within other data types.'
    parameters:
      - id: ac-04.05_odp
        label: limitations
        guidelines:
          - limitations on embedding data types within other data types are defined;
    guidance: Embedding data types within other data types may result in reduced flow control effectiveness. Data type embedding includes inserting files as objects within other files and using compressed or archived data types that may include multiple embedded data types. Limitations on data type embedding consider the levels of embedding and prohibit levels of data type embedding that are beyond the capability of the inspection tools.
    rules: []
    status: pending
  - id: ac-4.6
    title: Metadata
    description: 'Enforce information flow control based on [[ insert: param, ac-04.06_odp ]].'
    parameters:
      - id: ac-04.06_odp
        label: metadata
        guidelines:
          - metadata on which to base enforcement of information flow control is defined;
    guidance: Metadata is information that describes the characteristics of data. Metadata can include structural metadata describing data structures or descriptive metadata describing data content. Enforcement of allowed information flows based on metadata enables simpler and more effective flow control. Organizations consider the trustworthiness of metadata regarding data accuracy (i.e., knowledge that the metadata values are correct with respect to the data), data integrity (i.e., protecting against unauthorized changes to metadata tags), and the binding of metadata to the data payload (i.e., employing sufficiently strong binding techniques with appropriate assurance).
    related_controls:
      - ac-16
      - si-7
    rules: []
    status: pending
  - id: ac-4.7
    title: One-way Flow Mechanisms
    description: Enforce one-way information flows through hardware-based flow control mechanisms.
    guidance: One-way flow mechanisms may also be referred to as a unidirectional network, unidirectional security gateway, or data diode. One-way flow mechanisms can be used to prevent data from being exported from a higher impact or classified domain or system while permitting data from a lower impact or unclassified domain or system to be imported.
    rules: []
    status: pending
  - id: ac-4.8
    title: Security and Privacy Policy Filters
    description: "  a. Enforce information flow control using [[ insert: param, ac-4.8_prm_1 ]] as a basis for flow control decisions for [[ insert: param, ac-4.8_prm_2 ]] ; and\n  b. [[ insert: param, ac-04.08_odp.05 ]] data after a filter processing failure in accordance with [[ insert: param, ac-4.8_prm_4 ]]."
    parameters:
      - id: ac-4.8_prm_1
        label: organization-defined security or privacy policy filters
      - id: ac-4.8_prm_2
        label: organization-defined information flows
      - id: ac-4.8_prm_4
        label: organization-defined security or privacy policy
      - id: ac-04.08_odp.01
        label: security policy filter
        guidelines:
          - security policy filters to be used as a basis for enforcing information flow control are defined;
      - id: ac-04.08_odp.02
        label: privacy policy filter
        guidelines:
          - privacy policy filters to be used as a basis for enforcing information flow control are defined;
      - id: ac-04.08_odp.03
        label: information flows
        guidelines:
          - information flows for which information flow control is enforced by security filters are defined;
      - id: ac-04.08_odp.04
        label: information flows
        guidelines:
          - information flows for which information flow control is enforced by privacy filters are defined;
      - id: ac-04.08_odp.05
        label: ''
        choices:
          - block
          - strip
          - modify
          - quarantine
      - id: ac-04.08_odp.06
        label: security policy
        guidelines:
          - security policy identifying actions to be taken after a filter processing failure are defined;
      - id: ac-04.08_odp.07
        label: privacy policy
        guidelines:
          - privacy policy identifying actions to be taken after a filter processing failure are defined;
    guidance: Organization-defined security or privacy policy filters can address data structures and content. For example, security or privacy policy filters for data structures can check for maximum file lengths, maximum field sizes, and data/file types (for structured and unstructured data). Security or privacy policy filters for data content can check for specific words, enumerated values or data value ranges, and hidden content. Structured data permits the interpretation of data content by applications. Unstructured data refers to digital information without a data structure or with a data structure that does not facilitate the development of rule sets to address the impact or classification level of the information conveyed by the data or the flow enforcement decisions. Unstructured data consists of bitmap objects that are inherently non-language-based (i.e., image, video, or audio files) and textual objects that are based on written or printed languages. Organizations can implement more than one security or privacy policy filter to meet information flow control objectives.
    rules: []
    status: pending
  - id: ac-4.9
    title: Human Reviews
    description: 'Enforce the use of human reviews for [[ insert: param, ac-04.09_odp.01 ]] under the following conditions: [[ insert: param, ac-04.09_odp.02 ]].'
    parameters:
      - id: ac-04.09_odp.01
        label: information flows
        guidelines:
          - information flows requiring the use of human reviews are defined;
      - id: ac-04.09_odp.02
        label: conditions
        guidelines:
          - conditions under which the use of human reviews for information flows are to be enforced are defined;
    guidance: Organizations define security or privacy policy filters for all situations where automated flow control decisions are possible. When a fully automated flow control decision is not possible, then a human review may be employed in lieu of or as a complement to automated security or privacy policy filtering. Human reviews may also be employed as deemed necessary by organizations.
    rules: []
    status: pending
  - id: ac-4.10
    title: Enable and Disable Security or Privacy Policy Filters
    description: 'Provide the capability for privileged administrators to enable and disable [[ insert: param, ac-4.10_prm_1 ]] under the following conditions: [[ insert: param, ac-4.10_prm_2 ]].'
    parameters:
      - id: ac-4.10_prm_1
        label: organization-defined security or privacy policy filters
      - id: ac-4.10_prm_2
        label: organization-defined conditions
      - id: ac-04.10_odp.01
        label: security filters
        guidelines:
          - security policy filters that privileged administrators have the capability to enable and disable are defined;
      - id: ac-04.10_odp.02
        label: privacy filters
        guidelines:
          - privacy policy filters that privileged administrators have the capability to enable and disable are defined;
      - id: ac-04.10_odp.03
        label: conditions
        guidelines:
          - conditions under which privileged administrators have the capability to enable and disable security policy filters are defined;
      - id: ac-04.10_odp.04
        label: conditions
        guidelines:
          - conditions under which privileged administrators have the capability to enable and disable privacy policy filters are defined;
    guidance: For example, as allowed by the system authorization, administrators can enable security or privacy policy filters to accommodate approved data types. Administrators also have the capability to select the filters that are executed on a specific data flow based on the type of data that is being transferred, the source and destination security domains, and other security or privacy relevant features, as needed.
    rules: []
    status: pending
  - id: ac-4.11
    title: Configuration of Security or Privacy Policy Filters
    description: 'Provide the capability for privileged administrators to configure [[ insert: param, ac-4.11_prm_1 ]] to support different security or privacy policies.'
    parameters:
      - id: ac-4.11_prm_1
        label: organization-defined security or privacy policy filters
      - id: ac-04.11_odp.01
        label: security policy filters
        guidelines:
          - security policy filters that privileged administrators have the capability to configure to support different security and privacy policies are defined;
      - id: ac-04.11_odp.02
        label: privacy policy filters
        guidelines:
          - privacy policy filters that privileged administrators have the capability to configure to support different security and privacy policies are defined;
    guidance: Documentation contains detailed information for configuring security or privacy policy filters. For example, administrators can configure security or privacy policy filters to include the list of inappropriate words that security or privacy policy mechanisms check in accordance with the definitions provided by organizations.
    rules: []
    status: pending
  - id: ac-4.12
    title: Data Type Identifiers
    description: 'When transferring information between different security domains, use [[ insert: param, ac-04.12_odp ]] to validate data essential for information flow decisions.'
    parameters:
      - id: ac-04.12_odp
        label: data type identifiers
        guidelines:
          - data type identifiers to be used to validate data essential for information flow decisions are defined;
    guidance: Data type identifiers include filenames, file types, file signatures or tokens, and multiple internal file signatures or tokens. Systems only allow transfer of data that is compliant with data type format specifications. Identification and validation of data types is based on defined specifications associated with each allowed data format. The filename and number alone are not used for data type identification. Content is validated syntactically and semantically against its specification to ensure that it is the proper data type.
    rules: []
    status: pending
  - id: ac-4.13
    title: Decomposition into Policy-relevant Subcomponents
    description: 'When transferring information between different security domains, decompose information into [[ insert: param, ac-04.13_odp ]] for submission to policy enforcement mechanisms.'
    parameters:
      - id: ac-04.13_odp
        label: policy-relevant subcomponents
        guidelines:
          - policy-relevant subcomponents into which to decompose information for submission to policy enforcement mechanisms are defined;
    guidance: Decomposing information into policy-relevant subcomponents prior to information transfer facilitates policy decisions on source, destination, certificates, classification, attachments, and other security- or privacy-related component differentiators. Policy enforcement mechanisms apply filtering, inspection, and/or sanitization rules to the policy-relevant subcomponents of information to facilitate flow enforcement prior to transferring such information to different security domains.
    rules: []
    status: pending
  - id: ac-4.14
    title: Security or Privacy Policy Filter Constraints
    description: 'When transferring information between different security domains, implement [[ insert: param, ac-4.14_prm_1 ]] requiring fully enumerated formats that restrict data structure and content.'
    parameters:
      - id: ac-4.14_prm_1
        label: organization-defined security or privacy policy filters
      - id: ac-04.14_odp.01
        label: security policy filters
        guidelines:
          - security policy filters to be implemented that require fully enumerated formats restricting data structure and content have been defined;
      - id: ac-04.14_odp.02
        label: privacy policy filters
        guidelines:
          - privacy policy filters to be implemented that require fully enumerated formats restricting data structure and content are defined;
    guidance: Data structure and content restrictions reduce the range of potential malicious or unsanctioned content in cross-domain transactions. Security or privacy policy filters that restrict data structures include restricting file sizes and field lengths. Data content policy filters include encoding formats for character sets, restricting character data fields to only contain alpha-numeric characters, prohibiting special characters, and validating schema structures.
    rules: []
    status: pending
  - id: ac-4.15
    title: Detection of Unsanctioned Information
    description: 'When transferring information between different security domains, examine the information for the presence of [[ insert: param, ac-04.15_odp.01 ]] and prohibit the transfer of such information in accordance with the [[ insert: param, ac-4.15_prm_2 ]].'
    parameters:
      - id: ac-4.15_prm_2
        label: organization-defined security or privacy policy
      - id: ac-04.15_odp.01
        label: unsanctioned information
        guidelines:
          - unsanctioned information to be detected is defined;
      - id: ac-04.15_odp.02
        label: security policy
        guidelines:
          - security policy that requires the transfer of unsanctioned information between different security domains to be prohibited is defined (if selected);
      - id: ac-04.15_odp.03
        label: privacy policy
        guidelines:
          - privacy policy that requires the transfer of organization-defined unsanctioned information between different security domains to be prohibited is defined (if selected);
    guidance: Unsanctioned information includes malicious code, information that is inappropriate for release from the source network, or executable code that could disrupt or harm the services or systems on the destination network.
    related_controls:
      - si-3
    rules: []
    status: pending
  - id: ac-4.16
    title: Information Transfers on Interconnected Systems
    rules: []
    status: pending
  - id: ac-4.17
    title: Domain Authentication
    description: 'Uniquely identify and authenticate source and destination points by [[ insert: param, ac-04.17_odp ]] for information transfer.'
    parameters:
      - id: ac-04.17_odp
        label: ''
        choices:
          - organization, system, application, service, individual
    guidance: Attribution is a critical component of a security and privacy concept of operations. The ability to identify source and destination points for information flowing within systems allows the forensic reconstruction of events and encourages policy compliance by attributing policy violations to specific organizations or individuals. Successful domain authentication requires that system labels distinguish among systems, organizations, and individuals involved in preparing, sending, receiving, or disseminating information. Attribution also allows organizations to better maintain the lineage of personally identifiable information processing as it flows through systems and can facilitate consent tracking, as well as correction, deletion, or access requests from individuals.
    related_controls:
      - ia-2
      - ia-3
      - ia-9
    rules: []
    status: pending
  - id: ac-4.18
    title: Security Attribute Binding
    rules: []
    status: pending
  - id: ac-4.19
    title: Validation of Metadata
    description: 'When transferring information between different security domains, implement [[ insert: param, ac-4.19_prm_1 ]] on metadata.'
    parameters:
      - id: ac-4.19_prm_1
        label: organization-defined security or privacy policy filters
      - id: ac-04.19_odp.01
        label: security policy filters
        guidelines:
          - security policy filters to be implemented on metadata are defined (if selected);
      - id: ac-04.19_odp.02
        label: privacy policy filters
        guidelines:
          - privacy policy filters to be implemented on metadata are defined (if selected);
    guidance: All information (including metadata and the data to which the metadata applies) is subject to filtering and inspection. Some organizations distinguish between metadata and data payloads (i.e., only the data to which the metadata is bound). Other organizations do not make such distinctions and consider metadata and the data to which the metadata applies to be part of the payload.
    rules: []
    status: pending
  - id: ac-4.20
    title: Approved Solutions
    description: 'Employ [[ insert: param, ac-04.20_odp.01 ]] to control the flow of [[ insert: param, ac-04.20_odp.02 ]] across security domains.'
    parameters:
      - id: ac-04.20_odp.01
        label: solutions in approved configurations
        guidelines:
          - solutions in approved configurations to control the flow of information across security domains are defined;
      - id: ac-04.20_odp.02
        label: information
        guidelines:
          - information to be controlled when it flows across security domains is defined;
    guidance: Organizations define approved solutions and configurations in cross-domain policies and guidance in accordance with the types of information flows across classification boundaries. The National Security Agency (NSA) National Cross Domain Strategy and Management Office provides a listing of approved cross-domain solutions. Contact [ncdsmo@nsa.gov](mailto:ncdsmo@nsa.gov) for more information.
    rules: []
    status: pending
  - id: ac-4.21
    title: Physical or Logical Separation of Information Flows
    description: 'Separate information flows logically or physically using [[ insert: param, ac-4.21_prm_1 ]] to accomplish [[ insert: param, ac-04.21_odp.03 ]].'
    parameters:
      - id: ac-4.21_prm_1
        label: organization-defined mechanisms and/or techniques
      - id: ac-04.21_odp.01
        label: mechanisms and/or techniques
        guidelines:
          - mechanisms and/or techniques used to logically separate information flows are defined (if selected);
      - id: ac-04.21_odp.02
        label: mechanisms and/or techniques
        guidelines:
          - mechanisms and/or techniques used to physically separate information flows are defined (if selected);
      - id: ac-04.21_odp.03
        label: required separations
        guidelines:
          - required separations by types of information are defined;
    guidance: Enforcing the separation of information flows associated with defined types of data can enhance protection by ensuring that information is not commingled while in transit and by enabling flow control by transmission paths that are not otherwise achievable. Types of separable information include inbound and outbound communications traffic, service requests and responses, and information of differing security impact or classification levels.
    related_controls:
      - sc-32
    rules: []
    status: pending
  - id: ac-4.22
    title: Access Only
    description: Provide access from a single device to computing platforms, applications, or data residing in multiple different security domains, while preventing information flow between the different security domains.
    guidance: The system provides a capability for users to access each connected security domain without providing any mechanisms to allow users to transfer data or information between the different security domains. An example of an access-only solution is a terminal that provides a user access to information with different security classifications while assuredly keeping the information separate.
    rules: []
    status: pending
  - id: ac-4.23
    title: Modify Non-releasable Information
    description: 'When transferring information between different security domains, modify non-releasable information by implementing [[ insert: param, ac-04.23_odp ]].'
    parameters:
      - id: ac-04.23_odp
        label: modification action
        guidelines:
          - modification action implemented on non-releasable information is defined;
    guidance: Modifying non-releasable information can help prevent a data spill or attack when information is transferred across security domains. Modification actions include masking, permutation, alteration, removal, or redaction.
    rules: []
    status: pending
  - id: ac-4.24
    title: Internal Normalized Format
    description: When transferring information between different security domains, parse incoming data into an internal normalized format and regenerate the data to be consistent with its intended specification.
    guidance: Converting data into normalized forms is one of most of effective mechanisms to stop malicious attacks and large classes of data exfiltration.
    rules: []
    status: pending
  - id: ac-4.25
    title: Data Sanitization
    description: 'When transferring information between different security domains, sanitize data to minimize [[ insert: param, ac-04.25_odp.01 ]] in accordance with [[ insert: param, ac-04.25_odp.02 ]].'
    parameters:
      - id: ac-04.25_odp.01
        label: ''
        choices:
          - delivery of malicious content, command and control of malicious code, malicious code augmentation, and steganography-encoded data
          - spillage of sensitive information
      - id: ac-04.25_odp.02
        label: policy
        guidelines:
          - policy for sanitizing data is defined;
    guidance: Data sanitization is the process of irreversibly removing or destroying data stored on a memory device (e.g., hard drives, flash memory/solid state drives, mobile devices, CDs, and DVDs) or in hard copy form.
    related_controls:
      - mp-6
    rules: []
    status: pending
  - id: ac-4.26
    title: Audit Filtering Actions
    description: When transferring information between different security domains, record and audit content filtering actions and results for the information being filtered.
    guidance: Content filtering is the process of inspecting information as it traverses a cross-domain solution and determines if the information meets a predefined policy. Content filtering actions and the results of filtering actions are recorded for individual messages to ensure that the correct filter actions were applied. Content filter reports are used to assist in troubleshooting actions by, for example, determining why message content was modified and/or why it failed the filtering process. Audit events are defined in [AU-2](#au-2) . Audit records are generated in [AU-12](#au-12).
    related_controls:
      - au-2
      - au-3
      - au-12
    rules: []
    status: pending
  - id: ac-4.27
    title: Redundant/Independent Filtering Mechanisms
    description: When transferring information between different security domains, implement content filtering solutions that provide redundant and independent filtering mechanisms for each data type.
    guidance: Content filtering is the process of inspecting information as it traverses a cross-domain solution and determines if the information meets a predefined policy. Redundant and independent content filtering eliminates a single point of failure filtering system. Independence is defined as the implementation of a content filter that uses a different code base and supporting libraries (e.g., two JPEG filters using different vendors’ JPEG libraries) and multiple, independent system processes.
    rules: []
    status: pending
  - id: ac-4.28
    title: Linear Filter Pipelines
    description: When transferring information between different security domains, implement a linear content filter pipeline that is enforced with discretionary and mandatory access controls.
    guidance: Content filtering is the process of inspecting information as it traverses a cross-domain solution and determines if the information meets a predefined policy. The use of linear content filter pipelines ensures that filter processes are non-bypassable and always invoked. In general, the use of parallel filtering architectures for content filtering of a single data type introduces bypass and non-invocation issues.
    rules: []
    status: pending
  - id: ac-4.29
    title: Filter Orchestration Engines
    description: "When transferring information between different security domains, employ content filter orchestration engines to ensure that:\n  a. Content filtering mechanisms successfully complete execution without errors; and\n  b. Content filtering actions occur in the correct order and comply with [[ insert: param, ac-04.29_odp ]]."
    parameters:
      - id: ac-04.29_odp
        label: policy
        guidelines:
          - policy for content-filtering actions is defined;
    guidance: Content filtering is the process of inspecting information as it traverses a cross-domain solution and determines if the information meets a predefined security policy. An orchestration engine coordinates the sequencing of activities (manual and automated) in a content filtering process. Errors are defined as either anomalous actions or unexpected termination of the content filter process. This is not the same as a filter failing content due to non-compliance with policy. Content filter reports are a commonly used mechanism to ensure that expected filtering actions are completed successfully.
    rules: []
    status: pending
  - id: ac-4.30
    title: Filter Mechanisms Using Multiple Processes
    description: When transferring information between different security domains, implement content filtering mechanisms using multiple processes.
    guidance: The use of multiple processes to implement content filtering mechanisms reduces the likelihood of a single point of failure.
    rules: []
    status: pending
  - id: ac-4.31
    title: Failed Content Transfer Prevention
    description: When transferring information between different security domains, prevent the transfer of failed content to the receiving domain.
    guidance: Content that failed filtering checks can corrupt the system if transferred to the receiving domain.
    rules: []
    status: pending
  - id: ac-4.32
    title: Process Requirements for Information Transfer
    description: "When transferring information between different security domains, the process that transfers information between filter pipelines:\n  a. Does not filter message content;\n  b. Validates filtering metadata;\n  c. Ensures the content associated with the filtering metadata has successfully completed filtering; and\n  d. Transfers the content to the destination filter pipeline."
    guidance: The processes transferring information between filter pipelines have minimum complexity and functionality to provide assurance that the processes operate correctly.
    rules: []
    status: pending
  - id: ac-5
    title: Separation of Duties
    description: "  a. Identify and document [[ insert: param, ac-05_odp ]] ; and\n  b. Define system access authorizations to support separation of duties."
    parameters:
      - id: ac-05_odp
        label: duties of individuals
        guidelines:
          - duties of individuals requiring separation are defined;
    guidance: Separation of duties addresses the potential for abuse of authorized privileges and helps to reduce the risk of malevolent activity without collusion. Separation of duties includes dividing mission or business functions and support functions among different individuals or roles, conducting system support functions with different individuals, and ensuring that security personnel who administer access control functions do not also administer audit functions. Because separation of duty violations can span systems and application domains, organizations consider the entirety of systems and system components when developing policy on separation of duties. Separation of duties is enforced through the account management activities in [AC-2](#ac-2) , access control mechanisms in [AC-3](#ac-3) , and identity management activities in [IA-2](#ia-2), [IA-4](#ia-4) , and [IA-12](#ia-12).
    related_controls:
      - ac-2
      - ac-3
      - ac-6
      - au-9
      - cm-5
      - cm-11
      - cp-9
      - ia-2
      - ia-4
      - ia-5
      - ia-12
      - ma-3
      - ma-5
      - ps-2
      - sa-8
      - sa-17
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-6
    title: Least Privilege
    description: Employ the principle of least privilege, allowing only authorized accesses for users (or processes acting on behalf of users) that are necessary to accomplish assigned organizational tasks.
    guidance: Organizations employ least privilege for specific duties and systems. The principle of least privilege is also applied to system processes, ensuring that the processes have access to systems and operate at privilege levels no higher than necessary to accomplish organizational missions or business functions. Organizations consider the creation of additional processes, roles, and accounts as necessary to achieve least privilege. Organizations apply least privilege to the development, implementation, and operation of organizational systems.
    related_controls:
      - ac-2
      - ac-3
      - ac-5
      - ac-16
      - cm-5
      - cm-11
      - pl-2
      - pm-12
      - sa-8
      - sa-15
      - sa-17
      - sc-38
    levels:
      - moderate
      - high
    rules:
      - sshd_disable_root_login
      - sudo_add_use_pty
      - sudo_remove_no_authenticate
      - sudo_remove_nopasswd
    status: automated
  - id: ac-6.1
    title: Authorize Access to Security Functions
    description: "Authorize access for [[ insert: param, ac-06.01_odp.01 ]] to:\n  a. [[ insert: param, ac-6.1_prm_2 ]] ; and\n  b. [[ insert: param, ac-06.01_odp.05 ]]."
    parameters:
      - id: ac-6.1_prm_2
        label: organization-defined security functions (deployed in hardware, software, and firmware)
      - id: ac-06.01_odp.01
        label: individuals and roles
        guidelines:
          - individuals and roles with authorized access to security functions and security-relevant information are defined;
      - id: ac-06.01_odp.02
        label: security functions (deployed in hardware)
        guidelines:
          - security functions (deployed in hardware) for authorized access are defined;
      - id: ac-06.01_odp.03
        label: security functions (deployed in software)
        guidelines:
          - security functions (deployed in software) for authorized access are defined;
      - id: ac-06.01_odp.04
        label: security functions (deployed in firmware)
        guidelines:
          - security functions (deployed in firmware) for authorized access are defined;
      - id: ac-06.01_odp.05
        label: security-relevant information
        guidelines:
          - security-relevant information for authorized access is defined;
    guidance: Security functions include establishing system accounts, configuring access authorizations (i.e., permissions, privileges), configuring settings for events to be audited, and establishing intrusion detection parameters. Security-relevant information includes filtering rules for routers or firewalls, configuration parameters for security services, cryptographic key management information, and access control lists. Authorized personnel include security administrators, system administrators, system security officers, system programmers, and other privileged users.
    related_controls:
      - ac-17
      - ac-18
      - ac-19
      - au-9
      - pe-2
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-6.2
    title: Non-privileged Access for Nonsecurity Functions
    description: 'Require that users of system accounts (or roles) with access to [[ insert: param, ac-06.02_odp ]] use non-privileged accounts or roles, when accessing nonsecurity functions.'
    parameters:
      - id: ac-06.02_odp
        label: security functions or security-relevant information
        guidelines:
          - security functions or security-relevant information, the access to which requires users to use non-privileged accounts to access non-security functions, are defined;
    guidance: Requiring the use of non-privileged accounts when accessing nonsecurity functions limits exposure when operating from within privileged accounts or roles. The inclusion of roles addresses situations where organizations implement access control policies, such as role-based access control, and where a change of role provides the same degree of assurance in the change of access authorizations for the user and the processes acting on behalf of the user as would be provided by a change between a privileged and non-privileged account.
    related_controls:
      - ac-17
      - ac-18
      - ac-19
      - pl-4
    levels:
      - moderate
      - high
    rules:
      - package_sudo_installed
    status: automated
  - id: ac-6.3
    title: Network Access to Privileged Commands
    description: 'Authorize network access to [[ insert: param, ac-06.03_odp.01 ]] only for [[ insert: param, ac-06.03_odp.02 ]] and document the rationale for such access in the security plan for the system.'
    parameters:
      - id: ac-06.03_odp.01
        label: privileged commands
        guidelines:
          - privileged commands to which network access is to be authorized only for compelling operational needs are defined;
      - id: ac-06.03_odp.02
        label: compelling operational needs
        guidelines:
          - compelling operational needs necessitating network access to privileged commands are defined;
    guidance: Network access is any access across a network connection in lieu of local access (i.e., user being physically present at the device).
    related_controls:
      - ac-17
      - ac-18
      - ac-19
    levels:
      - high
    rules: []
    status: pending
  - id: ac-6.4
    title: Separate Processing Domains
    description: Provide separate processing domains to enable finer-grained allocation of user privileges.
    guidance: Providing separate processing domains for finer-grained allocation of user privileges includes using virtualization techniques to permit additional user privileges within a virtual machine while restricting privileges to other virtual machines or to the underlying physical machine, implementing separate physical domains, and employing hardware or software domain separation mechanisms.
    related_controls:
      - ac-4
      - sc-2
      - sc-3
      - sc-30
      - sc-32
      - sc-39
    rules: []
    status: pending
  - id: ac-6.5
    title: Privileged Accounts
    description: 'Restrict privileged accounts on the system to [[ insert: param, ac-06.05_odp ]].'
    parameters:
      - id: ac-06.05_odp
        label: personnel or roles
        guidelines:
          - personnel or roles to which privileged accounts on the system are to be restricted is/are defined;
    guidance: Privileged accounts, including super user accounts, are typically described as system administrator for various types of commercial off-the-shelf operating systems. Restricting privileged accounts to specific personnel or roles prevents day-to-day users from accessing privileged information or privileged functions. Organizations may differentiate in the application of restricting privileged accounts between allowed privileges for local accounts and for domain accounts provided that they retain the ability to control system configurations for key parameters and as otherwise necessary to sufficiently mitigate risk.
    related_controls:
      - ia-2
      - ma-3
      - ma-4
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-6.6
    title: Privileged Access by Non-organizational Users
    description: Prohibit privileged access to the system by non-organizational users.
    guidance: An organizational user is an employee or an individual considered by the organization to have the equivalent status of an employee. Organizational users include contractors, guest researchers, or individuals detailed from other organizations. A non-organizational user is a user who is not an organizational user. Policies and procedures for granting equivalent status of employees to individuals include a need-to-know, citizenship, and the relationship to the organization.
    related_controls:
      - ac-18
      - ac-19
      - ia-2
      - ia-8
    rules: []
    status: pending
  - id: ac-6.7
    title: Review of User Privileges
    description: "  a. Review [[ insert: param, ac-06.07_odp.01 ]] the privileges assigned to [[ insert: param, ac-06.07_odp.02 ]] to validate the need for such privileges; and\n  b. Reassign or remove privileges, if necessary, to correctly reflect organizational mission and business needs."
    parameters:
      - id: ac-06.07_odp.01
        label: frequency
        guidelines:
          - the frequency at which to review the privileges assigned to roles or classes of users is defined;
      - id: ac-06.07_odp.02
        label: roles and classes
        guidelines:
          - roles or classes of users to which privileges are assigned are defined;
    guidance: The need for certain assigned user privileges may change over time to reflect changes in organizational mission and business functions, environments of operation, technologies, or threats. A periodic review of assigned user privileges is necessary to determine if the rationale for assigning such privileges remains valid. If the need cannot be revalidated, organizations take appropriate corrective actions.
    related_controls:
      - ca-7
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-6.8
    title: Privilege Levels for Code Execution
    description: 'Prevent the following software from executing at higher privilege levels than users executing the software: [[ insert: param, ac-06.08_odp ]].'
    parameters:
      - id: ac-06.08_odp
        label: software
        guidelines:
          - software to be prevented from executing at higher privilege levels than users executing the software is defined;
    guidance: In certain situations, software applications or programs need to execute with elevated privileges to perform required functions. However, depending on the software functionality and configuration, if the privileges required for execution are at a higher level than the privileges assigned to organizational users invoking such applications or programs, those users may indirectly be provided with greater privileges than assigned.
    rules: []
    status: pending
  - id: ac-6.9
    title: Log Use of Privileged Functions
    description: Log the execution of privileged functions.
    guidance: The misuse of privileged functions, either intentionally or unintentionally by authorized users or by unauthorized external entities that have compromised system accounts, is a serious and ongoing concern and can have significant adverse impacts on organizations. Logging and analyzing the use of privileged functions is one way to detect such misuse and, in doing so, help mitigate the risk from insider threats and the advanced persistent threat.
    related_controls:
      - au-2
      - au-3
      - au-12
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-6.10
    title: Prohibit Non-privileged Users from Executing Privileged Functions
    description: Prevent non-privileged users from executing privileged functions.
    guidance: Privileged functions include disabling, circumventing, or altering implemented security or privacy controls, establishing system accounts, performing system integrity checks, and administering cryptographic key management activities. Non-privileged users are individuals who do not possess appropriate authorizations. Privileged functions that require protection from non-privileged users include circumventing intrusion detection and prevention mechanisms or malicious code protection mechanisms. Preventing non-privileged users from executing privileged functions is enforced by [AC-3](#ac-3).
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-7
    title: Unsuccessful Logon Attempts
    description: "  a. Enforce a limit of [[ insert: param, ac-07_odp.01 ]] consecutive invalid logon attempts by a user during a [[ insert: param, ac-07_odp.02 ]] ; and\n  b. Automatically [[ insert: param, ac-07_odp.03 ]] when the maximum number of unsuccessful attempts is exceeded."
    parameters:
      - id: ac-07_odp.01
        label: number
        guidelines:
          - the number of consecutive invalid logon attempts by a user allowed during a time period is defined;
      - id: ac-07_odp.02
        label: time period
        guidelines:
          - the time period to which the number of consecutive invalid logon attempts by a user is limited is defined;
      - id: ac-07_odp.03
        label: ''
        choices:
          - 'lock the account or node for [[ insert: param, ac-07_odp.04 ]] '
          - lock the account or node until released by an administrator
          - 'delay next logon prompt per [[ insert: param, ac-07_odp.05 ]] '
          - notify system administrator
          - 'take other [[ insert: param, ac-07_odp.06 ]] '
      - id: ac-07_odp.04
        label: time period
        guidelines:
          - time period for an account or node to be locked is defined (if selected);
      - id: ac-07_odp.05
        label: delay algorithm
        guidelines:
          - delay algorithm for the next logon prompt is defined (if selected);
      - id: ac-07_odp.06
        label: action
        guidelines:
          - other action to be taken when the maximum number of unsuccessful attempts is exceeded is defined (if selected);
    guidance: The need to limit unsuccessful logon attempts and take subsequent action when the maximum number of attempts is exceeded applies regardless of whether the logon occurs via a local or network connection. Due to the potential for denial of service, automatic lockouts initiated by systems are usually temporary and automatically release after a predetermined, organization-defined time period. If a delay algorithm is selected, organizations may employ different algorithms for different components of the system based on the capabilities of those components. Responses to unsuccessful logon attempts may be implemented at the operating system and the application levels. Organization-defined actions that may be taken when the number of allowed consecutive invalid logon attempts is exceeded include prompting the user to answer a secret question in addition to the username and password, invoking a lockdown mode with limited user capabilities (instead of full lockout), allowing users to only logon from specified Internet Protocol (IP) addresses, requiring a CAPTCHA to prevent automated attacks, or applying user profiles such as location, time of day, IP address, device, or Media Access Control (MAC) address. If automatic system lockout or execution of a delay algorithm is not implemented in support of the availability objective, organizations consider a combination of other actions to help prevent brute force attacks. In addition to the above, organizations can prompt users to respond to a secret question before the number of allowed unsuccessful logon attempts is exceeded. Automatically unlocking an account after a specified period of time is generally not permitted. However, exceptions may be required based on operational mission or need.
    related_controls:
      - ac-2
      - ac-9
      - au-2
      - au-6
      - ia-5
    levels:
      - low
      - moderate
      - high
    rules:
      - account_password_pam_faillock_password_auth
      - account_password_pam_faillock_system_auth
    status: automated
  - id: ac-7.1
    title: Automatic Account Lock
    rules: []
    status: pending
  - id: ac-7.2
    title: Purge or Wipe Mobile Device
    description: 'Purge or wipe information from [[ insert: param, ac-07.02_odp.01 ]] based on [[ insert: param, ac-07.02_odp.02 ]] after [[ insert: param, ac-07.02_odp.03 ]] consecutive, unsuccessful device logon attempts.'
    parameters:
      - id: ac-07.02_odp.01
        label: mobile devices
        guidelines:
          - mobile devices to be purged or wiped of information are defined;
      - id: ac-07.02_odp.02
        label: purging or wiping requirements and techniques
        guidelines:
          - purging and wiping requirements and techniques to be used when mobile devices are purged or wiped of information are defined;
      - id: ac-07.02_odp.03
        label: number
        guidelines:
          - the number of consecutive, unsuccessful logon attempts before the information is purged or wiped from mobile devices is defined;
    guidance: A mobile device is a computing device that has a small form factor such that it can be carried by a single individual; is designed to operate without a physical connection; possesses local, non-removable or removable data storage; and includes a self-contained power source. Purging or wiping the device applies only to mobile devices for which the organization-defined number of unsuccessful logons occurs. The logon is to the mobile device, not to any one account on the device. Successful logons to accounts on mobile devices reset the unsuccessful logon count to zero. Purging or wiping may be unnecessary if the information on the device is protected with sufficiently strong encryption mechanisms.
    related_controls:
      - ac-19
      - mp-5
      - mp-6
    rules: []
    status: pending
  - id: ac-7.3
    title: Biometric Attempt Limiting
    description: 'Limit the number of unsuccessful biometric logon attempts to [[ insert: param, ac-07.03_odp ]].'
    parameters:
      - id: ac-07.03_odp
        label: number
        guidelines:
          - the number of unsuccessful biometric logon attempts is defined;
    guidance: Biometrics are probabilistic in nature. The ability to successfully authenticate can be impacted by many factors, including matching performance and presentation attack detection mechanisms. Organizations select the appropriate number of attempts for users based on organizationally-defined factors.
    related_controls:
      - ia-3
    rules: []
    status: pending
  - id: ac-7.4
    title: Use of Alternate Authentication Factor
    description: "  a. Allow the use of [[ insert: param, ac-07.04_odp.01 ]] that are different from the primary authentication factors after the number of organization-defined consecutive invalid logon attempts have been exceeded; and\n  b. Enforce a limit of [[ insert: param, ac-07.04_odp.02 ]] consecutive invalid logon attempts through use of the alternative factors by a user during a [[ insert: param, ac-07.04_odp.03 ]]."
    parameters:
      - id: ac-07.04_odp.01
        label: authentication factors
        guidelines:
          - authentication factors allowed to be used that are different from the primary authentication factors are defined;
      - id: ac-07.04_odp.02
        label: number
        guidelines:
          - the number of consecutive, invalid logon attempts through the use of alternative factors for which to enforce a limit by a user is defined;
      - id: ac-07.04_odp.03
        label: time period
        guidelines:
          - time period during which a user can attempt logons through alternative factors is defined;
    guidance: The use of alternate authentication factors supports the objective of availability and allows a user who has inadvertently been locked out to use additional authentication factors to bypass the lockout.
    related_controls:
      - ia-3
    rules: []
    status: pending
  - id: ac-8
    title: System Use Notification
    description: "  a. Display [[ insert: param, ac-08_odp.01 ]] to users before granting access to the system that provides privacy and security notices consistent with applicable laws, executive orders, directives, regulations, policies, standards, and guidelines and state that:\n    1. Users are accessing a U.S. Government system;\n    2. System usage may be monitored, recorded, and subject to audit;\n    3. Unauthorized use of the system is prohibited and subject to criminal and civil penalties; and\n    4. Use of the system indicates consent to monitoring and recording;\n  b. Retain the notification message or banner on the screen until users acknowledge the usage conditions and take explicit actions to log on to or further access the system; and\n  c. For publicly accessible systems:\n    1. Display system use information [[ insert: param, ac-08_odp.02 ]] , before granting further access to the publicly accessible system;\n    2. Display references, if any, to monitoring, recording, or auditing that are consistent with privacy accommodations for such systems that generally prohibit those activities; and\n    3. Include a description of the authorized uses of the system."
    parameters:
      - id: ac-08_odp.01
        label: system use notification
        guidelines:
          - system use notification message or banner to be displayed by the system to users before granting access to the system is defined;
      - id: ac-08_odp.02
        label: conditions
        guidelines:
          - conditions for system use to be displayed by the system before granting further access are defined;
    guidance: System use notifications can be implemented using messages or warning banners displayed before individuals log in to systems. System use notifications are used only for access via logon interfaces with human users. Notifications are not required when human interfaces do not exist. Based on an assessment of risk, organizations consider whether or not a secondary system use notification is needed to access applications or other system resources after the initial network logon. Organizations consider system use notification messages or banners displayed in multiple languages based on organizational needs and the demographics of system users. Organizations consult with the privacy office for input regarding privacy messaging and the Office of the General Counsel or organizational equivalent for legal review and approval of warning banner content.
    related_controls:
      - ac-14
      - pl-4
      - si-4
    levels:
      - low
      - moderate
      - high
    rules:
      - dconf_login_banner_contents=cis_default
      - dconf_login_banner_text=cis_banners
      - dconf_gnome_banner_enabled
      - dconf_gnome_login_banner_text
    status: automated
  - id: ac-9
    title: Previous Logon Notification
    description: Notify the user, upon successful logon to the system, of the date and time of the last logon.
    guidance: Previous logon notification is applicable to system access via human user interfaces and access to systems that occurs in other types of architectures. Information about the last successful logon allows the user to recognize if the date and time provided is not consistent with the user’s last access.
    related_controls:
      - ac-7
      - pl-4
    rules: []
    status: pending
  - id: ac-9.1
    title: Unsuccessful Logons
    description: Notify the user, upon successful logon, of the number of unsuccessful logon attempts since the last successful logon.
    guidance: Information about the number of unsuccessful logon attempts since the last successful logon allows the user to recognize if the number of unsuccessful logon attempts is consistent with the user’s actual logon attempts.
    rules: []
    status: pending
  - id: ac-9.2
    title: Successful and Unsuccessful Logons
    description: 'Notify the user, upon successful logon, of the number of [[ insert: param, ac-09.02_odp.01 ]] during [[ insert: param, ac-09.02_odp.02 ]].'
    parameters:
      - id: ac-09.02_odp.01
        label: ''
        choices:
          - successful logons
          - unsuccessful logon attempts
          - both
      - id: ac-09.02_odp.02
        label: time period
        guidelines:
          - the time period for which the system notifies the user of the number of successful logons, unsuccessful logon attempts, or both is defined;
    guidance: Information about the number of successful and unsuccessful logon attempts within a specified time period allows the user to recognize if the number and type of logon attempts are consistent with the user’s actual logon attempts.
    rules: []
    status: pending
  - id: ac-9.3
    title: Notification of Account Changes
    description: 'Notify the user, upon successful logon, of changes to [[ insert: param, ac-09.03_odp.01 ]] during [[ insert: param, ac-09.03_odp.02 ]].'
    parameters:
      - id: ac-09.03_odp.01
        label: security-related characteristics or parameters
        guidelines:
          - changes to security-related characteristics or parameters of the user’s account that require notification are defined;
      - id: ac-09.03_odp.02
        label: time period
        guidelines:
          - the time period for which the system notifies the user of changes to security-related characteristics or parameters of the user’s account is defined;
    guidance: Information about changes to security-related account characteristics within a specified time period allows users to recognize if changes were made without their knowledge.
    rules: []
    status: pending
  - id: ac-9.4
    title: Additional Logon Information
    description: 'Notify the user, upon successful logon, of the following additional information: [[ insert: param, ac-09.04_odp ]].'
    parameters:
      - id: ac-09.04_odp
        label: additional information
        guidelines:
          - additional information about which to notify the user is defined;
    guidance: Organizations can specify additional information to be provided to users upon logon, including the location of the last logon. User location is defined as information that can be determined by systems, such as Internet Protocol (IP) addresses from which network logons occurred, notifications of local logons, or device identifiers.
    rules: []
    status: pending
  - id: ac-10
    title: Concurrent Session Control
    description: 'Limit the number of concurrent sessions for each [[ insert: param, ac-10_odp.01 ]] to [[ insert: param, ac-10_odp.02 ]].'
    parameters:
      - id: ac-10_odp.01
        label: account and/or account types
        guidelines:
          - accounts and/or account types for which to limit the number of concurrent sessions is defined;
      - id: ac-10_odp.02
        label: number
        guidelines:
          - the number of concurrent sessions to be allowed for each account and/or account type is defined;
    guidance: Organizations may define the maximum number of concurrent sessions for system accounts globally, by account type, by account, or any combination thereof. For example, organizations may limit the number of concurrent sessions for system administrators or other individuals working in particularly sensitive domains or mission-critical applications. Concurrent session control addresses concurrent sessions for system accounts. It does not, however, address concurrent sessions by single users via multiple system accounts.
    related_controls:
      - sc-23
    levels:
      - high
    rules: []
    status: pending
  - id: ac-11
    title: Device Lock
    description: "  a. Prevent further access to the system by [[ insert: param, ac-11_odp.01 ]] ; and\n  b. Retain the device lock until the user reestablishes access using established identification and authentication procedures."
    parameters:
      - id: ac-11_odp.01
        label: ''
        choices:
          - 'initiating a device lock after [[ insert: param, ac-11_odp.02 ]] of inactivity'
          - requiring the user to initiate a device lock before leaving the system unattended
      - id: ac-11_odp.02
        label: time period
        guidelines:
          - time period of inactivity after which a device lock is initiated is defined (if selected);
    guidance: Device locks are temporary actions taken to prevent logical access to organizational systems when users stop work and move away from the immediate vicinity of those systems but do not want to log out because of the temporary nature of their absences. Device locks can be implemented at the operating system level or at the application level. A proximity lock may be used to initiate the device lock (e.g., via a Bluetooth-enabled device or dongle). User-initiated device locking is behavior or policy-based and, as such, requires users to take physical action to initiate the device lock. Device locks are not an acceptable substitute for logging out of systems, such as when organizations require users to log out at the end of workdays.
    related_controls:
      - ac-2
      - ac-7
      - ia-11
      - pl-4
    levels:
      - moderate
      - high
    rules:
      - inactivity_timeout_value=15_minutes
      - var_screensaver_lock_delay=5_seconds
      - dconf_gnome_screensaver_idle_delay
      - dconf_gnome_screensaver_lock_delay
      - dconf_gnome_screensaver_user_locks
      - dconf_gnome_session_idle_user_locks
    status: automated
  - id: ac-11.1
    title: Pattern-hiding Displays
    description: Conceal, via the device lock, information previously visible on the display with a publicly viewable image.
    guidance: The pattern-hiding display can include static or dynamic images, such as patterns used with screen savers, photographic images, solid colors, clock, battery life indicator, or a blank screen with the caveat that controlled unclassified information is not displayed.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-12
    title: Session Termination
    description: 'Automatically terminate a user session after [[ insert: param, ac-12_odp ]].'
    parameters:
      - id: ac-12_odp
        label: conditions or trigger events
        guidelines:
          - conditions or trigger events requiring session disconnect are defined;
    guidance: Session termination addresses the termination of user-initiated logical sessions (in contrast to [SC-10](#sc-10) , which addresses the termination of network connections associated with communications sessions (i.e., network disconnect)). A logical session (for local, network, and remote access) is initiated whenever a user (or process acting on behalf of a user) accesses an organizational system. Such user sessions can be terminated without terminating network sessions. Session termination ends all processes associated with a user’s logical session except for those processes that are specifically created by the user (i.e., session owner) to continue after the session is terminated. Conditions or trigger events that require automatic termination of the session include organization-defined periods of user inactivity, targeted responses to certain types of incidents, or time-of-day restrictions on system use.
    related_controls:
      - ma-4
      - sc-10
      - sc-23
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-12.1
    title: User-initiated Logouts
    description: 'Provide a logout capability for user-initiated communications sessions whenever authentication is used to gain access to [[ insert: param, ac-12.01_odp ]].'
    parameters:
      - id: ac-12.01_odp
        label: information resources
        guidelines:
          - information resources for which a logout capability for user-initiated communications sessions is required are defined;
    guidance: Information resources to which users gain access via authentication include local workstations, databases, and password-protected websites or web-based services.
    rules: []
    status: pending
  - id: ac-12.2
    title: Termination Message
    description: Display an explicit logout message to users indicating the termination of authenticated communications sessions.
    guidance: Logout messages for web access can be displayed after authenticated sessions have been terminated. However, for certain types of sessions, including file transfer protocol (FTP) sessions, systems typically send logout messages as final messages prior to terminating sessions.
    rules: []
    status: pending
  - id: ac-12.3
    title: Timeout Warning Message
    description: 'Display an explicit message to users indicating that the session will end in [[ insert: param, ac-12.03_odp ]].'
    parameters:
      - id: ac-12.03_odp
        label: time
        guidelines:
          - time until the end of session for display to users is defined;
    guidance: To increase usability, notify users of pending session termination and prompt users to continue the session. The pending session termination time period is based on the parameters defined in the [AC-12](#ac-12) base control.
    rules: []
    status: pending
  - id: ac-13
    title: Supervision and Review — Access Control
    rules: []
    status: pending
  - id: ac-14
    title: Permitted Actions Without Identification or Authentication
    description: "  a. Identify [[ insert: param, ac-14_odp ]] that can be performed on the system without identification or authentication consistent with organizational mission and business functions; and\n  b. Document and provide supporting rationale in the security plan for the system, user actions not requiring identification or authentication."
    parameters:
      - id: ac-14_odp
        label: user actions
        guidelines:
          - user actions that can be performed on the system without identification or authentication are defined;
    guidance: 'Specific user actions may be permitted without identification or authentication if organizations determine that identification and authentication are not required for the specified user actions. Organizations may allow a limited number of user actions without identification or authentication, including when individuals access public websites or other publicly accessible federal systems, when individuals use mobile phones to receive calls, or when facsimiles are received. Organizations identify actions that normally require identification or authentication but may, under certain circumstances, allow identification or authentication mechanisms to be bypassed. Such bypasses may occur, for example, via a software-readable physical switch that commands bypass of the logon functionality and is protected from accidental or unmonitored use. Permitting actions without identification or authentication does not apply to situations where identification and authentication have already occurred and are not repeated but rather to situations where identification and authentication have not yet occurred. Organizations may decide that there are no user actions that can be performed on organizational systems without identification and authentication, and therefore, the value for the assignment operation can be "none." '
    related_controls:
      - ac-8
      - ia-2
      - pl-2
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-14.1
    title: Necessary Uses
    rules: []
    status: pending
  - id: ac-15
    title: Automated Marking
    rules: []
    status: pending
  - id: ac-16
    title: Security and Privacy Attributes
    description: "  a. Provide the means to associate [[ insert: param, ac-16_prm_1 ]] with [[ insert: param, ac-16_prm_2 ]] for information in storage, in process, and/or in transmission;\n  b. Ensure that the attribute associations are made and retained with the information;\n  c. Establish the following permitted security and privacy attributes from the attributes defined in [AC-16a](#ac-16_smt.a) for [[ insert: param, ac-16_prm_3 ]]: [[ insert: param, ac-16_prm_4 ]];\n  d. Determine the following permitted attribute values or ranges for each of the established attributes: [[ insert: param, ac-16_odp.09 ]];\n  e. Audit changes to attributes; and\n  f. Review [[ insert: param, ac-16_prm_6 ]] for applicability [[ insert: param, ac-16_prm_7 ]]."
    parameters:
      - id: ac-16_prm_1
        label: organization-defined types of security and privacy attributes
      - id: ac-16_prm_2
        label: organization-defined security and privacy attribute values
      - id: ac-16_prm_3
        label: organization-defined systems
      - id: ac-16_prm_4
        label: organization-defined security and privacy attributes
      - id: ac-16_prm_6
        label: organization-defined security and privacy attributes
      - id: ac-16_prm_7
        label: organization-defined frequency
      - id: ac-16_odp.01
        label: types of security attributes
        guidelines:
          - types of security attributes to be associated with information security attribute values for information in storage, in process, and/or in transmission are defined;
      - id: ac-16_odp.02
        label: types of privacy attributes
        guidelines:
          - types of privacy attributes to be associated with privacy attribute values for information in storage, in process, and/or in transmission are defined;
      - id: ac-16_odp.03
        label: security attribute values
        guidelines:
          - security attribute values for types of security attributes are defined;
      - id: ac-16_odp.04
        label: privacy attribute values
        guidelines:
          - privacy attribute values for types of privacy attributes are defined;
      - id: ac-16_odp.05
        label: systems
        guidelines:
          - systems for which permitted security attributes are to be established are defined;
      - id: ac-16_odp.06
        label: systems
        guidelines:
          - systems for which permitted privacy attributes are to be established are defined;
      - id: ac-16_odp.07
        label: security attributes
        guidelines:
          - security attributes defined as part of AC-16a that are permitted for systems are defined;
      - id: ac-16_odp.08
        label: privacy attributes
        guidelines:
          - privacy attributes defined as part of AC-16a that are permitted for systems are defined;
      - id: ac-16_odp.09
        label: attribute values or ranges
        guidelines:
          - attribute values or ranges for established attributes are defined;
      - id: ac-16_odp.10
        label: frequency
        guidelines:
          - the frequency at which to review security attributes for applicability is defined;
      - id: ac-16_odp.11
        label: frequency
        guidelines:
          - the frequency at which to review privacy attributes for applicability is defined;
    guidance: "Information is represented internally within systems using abstractions known as data structures. Internal data structures can represent different types of entities, both active and passive. Active entities, also known as subjects, are typically associated with individuals, devices, or processes acting on behalf of individuals. Passive entities, also known as objects, are typically associated with data structures, such as records, buffers, tables, files, inter-process pipes, and communications ports. Security attributes, a form of metadata, are abstractions that represent the basic properties or characteristics of active and passive entities with respect to safeguarding information. Privacy attributes, which may be used independently or in conjunction with security attributes, represent the basic properties or characteristics of active or passive entities with respect to the management of personally identifiable information. Attributes can be either explicitly or implicitly associated with the information contained in organizational systems or system components.\n\nAttributes may be associated with active entities (i.e., subjects) that have the potential to send or receive information, cause information to flow among objects, or change the system state. These attributes may also be associated with passive entities (i.e., objects) that contain or receive information. The association of attributes to subjects and objects by a system is referred to as binding and is inclusive of setting the attribute value and the attribute type. Attributes, when bound to data or information, permit the enforcement of security and privacy policies for access control and information flow control, including data retention limits, permitted uses of personally identifiable information, and identification of personal information within data objects. Such enforcement occurs through organizational processes or system functions or mechanisms. The binding techniques implemented by systems affect the strength of attribute binding to information. Binding strength and the assurance associated with binding techniques play important parts in the trust that organizations have in the information flow enforcement process. The binding techniques affect the number and degree of additional reviews required by organizations. The content or assigned values of attributes can directly affect the ability of individuals to access organizational information.\n\nOrganizations can define the types of attributes needed for systems to support missions or business functions. There are many values that can be assigned to a security attribute. By specifying the permitted attribute ranges and values, organizations ensure that attribute values are meaningful and relevant. Labeling refers to the association of attributes with the subjects and objects represented by the internal data structures within systems. This facilitates system-based enforcement of information security and privacy policies. Labels include classification of information in accordance with legal and compliance requirements (e.g., top secret, secret, confidential, controlled unclassified), information impact level; high value asset information, access authorizations, nationality; data life cycle protection (i.e., encryption and data expiration), personally identifiable information processing permissions, including individual consent to personally identifiable information processing, and contractor affiliation. A related term to labeling is marking. Marking refers to the association of attributes with objects in a human-readable form and displayed on system media. Marking enables manual, procedural, or process-based enforcement of information security and privacy policies. Security and privacy labels may have the same value as media markings (e.g., top secret, secret, confidential). See [MP-3](#mp-3) (Media Marking)."
    related_controls:
      - ac-3
      - ac-4
      - ac-6
      - ac-21
      - ac-25
      - au-2
      - au-10
      - mp-3
      - pe-22
      - pt-2
      - pt-3
      - pt-4
      - sc-11
      - sc-16
      - si-12
      - si-18
    rules: []
    status: pending
  - id: ac-16.1
    title: Dynamic Attribute Association
    description: 'Dynamically associate security and privacy attributes with [[ insert: param, ac-16.1_prm_1 ]] in accordance with the following security and privacy policies as information is created and combined: [[ insert: param, ac-16.1_prm_2 ]].'
    parameters:
      - id: ac-16.1_prm_1
        label: organization-defined subjects and objects
      - id: ac-16.1_prm_2
        label: organization-defined security and privacy policies
      - id: ac-16.01_odp.01
        label: subjects
        guidelines:
          - subjects with which security attributes are to be dynamically associated as information is created and combined are defined;
      - id: ac-16.01_odp.02
        label: objects
        guidelines:
          - objects with which security attributes are to be dynamically associated as information is created and combined are defined;
      - id: ac-16.01_odp.03
        label: subjects
        guidelines:
          - subjects with which privacy attributes are to be dynamically associated as information is created and combined are defined;
      - id: ac-16.01_odp.04
        label: objects
        guidelines:
          - objects with which privacy attributes are to be dynamically associated as information is created and combined are defined;
      - id: ac-16.01_odp.05
        label: security policies
        guidelines:
          - security policies requiring dynamic association of security attributes with subjects and objects are defined;
      - id: ac-16.01_odp.06
        label: privacy policies
        guidelines:
          - privacy policies requiring dynamic association of privacy attributes with subjects and objects are defined;
    guidance: Dynamic association of attributes is appropriate whenever the security or privacy characteristics of information change over time. Attributes may change due to information aggregation issues (i.e., characteristics of individual data elements are different from the combined elements), changes in individual access authorizations (i.e., privileges), changes in the security category of information, or changes in security or privacy policies. Attributes may also change situationally.
    rules: []
    status: pending
  - id: ac-16.2
    title: Attribute Value Changes by Authorized Individuals
    description: Provide authorized individuals (or processes acting on behalf of individuals) the capability to define or change the value of associated security and privacy attributes.
    guidance: The content or assigned values of attributes can directly affect the ability of individuals to access organizational information. Therefore, it is important for systems to be able to limit the ability to create or modify attributes to authorized individuals.
    rules: []
    status: pending
  - id: ac-16.3
    title: Maintenance of Attribute Associations by System
    description: 'Maintain the association and integrity of [[ insert: param, ac-16.3_prm_1 ]] to [[ insert: param, ac-16.3_prm_2 ]].'
    parameters:
      - id: ac-16.3_prm_1
        label: organization-defined security and privacy attributes
      - id: ac-16.3_prm_2
        label: organization-defined subjects and objects
      - id: ac-16.03_odp.01
        label: security attributes
        guidelines:
          - security attributes that require association and integrity maintenance are defined;
      - id: ac-16.03_odp.02
        label: privacy attributes
        guidelines:
          - privacy attributes that require association and integrity maintenance are defined;
      - id: ac-16.03_odp.03
        label: subjects
        guidelines:
          - subjects requiring the association and integrity of security attributes to such subjects to be maintained are defined;
      - id: ac-16.03_odp.04
        label: objects
        guidelines:
          - objects requiring the association and integrity of security attributes to such objects to be maintained are defined;
      - id: ac-16.03_odp.05
        label: subjects
        guidelines:
          - subjects requiring the association and integrity of privacy attributes to such subjects to be maintained are defined;
      - id: ac-16.03_odp.06
        label: objects
        guidelines:
          - objects requiring the association and integrity of privacy attributes to such objects to be maintained are defined;
    guidance: Maintaining the association and integrity of security and privacy attributes to subjects and objects with sufficient assurance helps to ensure that the attribute associations can be used as the basis of automated policy actions. The integrity of specific items, such as security configuration files, may be maintained through the use of an integrity monitoring mechanism that detects anomalies and changes that deviate from "known good" baselines. Automated policy actions include retention date expirations, access control decisions, information flow control decisions, and information disclosure decisions.
    rules: []
    status: pending
  - id: ac-16.4
    title: Association of Attributes by Authorized Individuals
    description: 'Provide the capability to associate [[ insert: param, ac-16.4_prm_1 ]] with [[ insert: param, ac-16.4_prm_2 ]] by authorized individuals (or processes acting on behalf of individuals).'
    parameters:
      - id: ac-16.4_prm_1
        label: organization-defined security and privacy attributes
      - id: ac-16.4_prm_2
        label: organization-defined subjects and objects
      - id: ac-16.04_odp.01
        label: security attributes
        guidelines:
          - security attributes to be associated with subjects by authorized individuals (or processes acting on behalf of individuals) are defined;
      - id: ac-16.04_odp.02
        label: security attributes
        guidelines:
          - security attributes to be associated with objects by authorized individuals (or processes acting on behalf of individuals) are defined;
      - id: ac-16.04_odp.03
        label: privacy attributes
        guidelines:
          - privacy attributes to be associated with subjects by authorized individuals (or processes acting on behalf of individuals) are defined;
      - id: ac-16.04_odp.04
        label: privacy attributes
        guidelines:
          - privacy attributes to be associated with objects by authorized individuals (or processes acting on behalf of individuals) are defined;
      - id: ac-16.04_odp.05
        label: subjects
        guidelines:
          - subjects requiring the association of security attributes by authorized individuals (or processes acting on behalf of individuals) are defined;
      - id: ac-16.04_odp.06
        label: objects
        guidelines:
          - objects requiring the association of security attributes by authorized individuals (or processes acting on behalf of individuals) are defined;
      - id: ac-16.04_odp.07
        label: subjects
        guidelines:
          - subjects requiring the association of privacy attributes by authorized individuals (or processes acting on behalf of individuals) are defined;
      - id: ac-16.04_odp.08
        label: objects
        guidelines:
          - objects requiring the association of privacy attributes by authorized individuals (or processes acting on behalf of individuals) are defined;
    guidance: Systems, in general, provide the capability for privileged users to assign security and privacy attributes to system-defined subjects (e.g., users) and objects (e.g., directories, files, and ports). Some systems provide additional capability for general users to assign security and privacy attributes to additional objects (e.g., files, emails). The association of attributes by authorized individuals is described in the design documentation. The support provided by systems can include prompting users to select security and privacy attributes to be associated with information objects, employing automated mechanisms to categorize information with attributes based on defined policies, or ensuring that the combination of the security or privacy attributes selected is valid. Organizations consider the creation, deletion, or modification of attributes when defining auditable events.
    rules: []
    status: pending
  - id: ac-16.5
    title: Attribute Displays on Objects to Be Output
    description: 'Display security and privacy attributes in human-readable form on each object that the system transmits to output devices to identify [[ insert: param, ac-16.05_odp.01 ]] using [[ insert: param, ac-16.05_odp.02 ]].'
    parameters:
      - id: ac-16.05_odp.01
        label: instructions
        guidelines:
          - special dissemination, handling, or distribution instructions to be used for each object that the system transmits to output devices are defined;
      - id: ac-16.05_odp.02
        label: naming conventions
        guidelines:
          - human-readable, standard naming conventions for the security and privacy attributes to be displayed in human-readable form on each object that the system transmits to output devices are defined;
    guidance: System outputs include printed pages, screens, or equivalent items. System output devices include printers, notebook computers, video displays, smart phones, and tablets. To mitigate the risk of unauthorized exposure of information (e.g., shoulder surfing), the outputs display full attribute values when unmasked by the subscriber.
    rules: []
    status: pending
  - id: ac-16.6
    title: Maintenance of Attribute Association
    description: 'Require personnel to associate and maintain the association of [[ insert: param, ac-16.6_prm_1 ]] with [[ insert: param, ac-16.6_prm_2 ]] in accordance with [[ insert: param, ac-16.6_prm_3 ]].'
    parameters:
      - id: ac-16.6_prm_1
        label: organization-defined security and privacy attributes
      - id: ac-16.6_prm_2
        label: organization-defined subjects and objects
      - id: ac-16.6_prm_3
        label: organization-defined security and privacy policies
      - id: ac-16.06_odp.01
        label: security attributes
        guidelines:
          - security attributes to be associated with subjects are defined;
      - id: ac-16.06_odp.02
        label: security attributes
        guidelines:
          - security attributes to be associated with objects are defined;
      - id: ac-16.06_odp.03
        label: privacy attributes
        guidelines:
          - privacy attributes to be associated with subjects are defined;
      - id: ac-16.06_odp.04
        label: privacy attributes
        guidelines:
          - privacy attributes to be associated with objects are defined;
      - id: ac-16.06_odp.05
        label: subjects
        guidelines:
          - subjects to be associated with information security attributes are defined;
      - id: ac-16.06_odp.06
        label: objects
        guidelines:
          - objects to be associated with information security attributes are defined;
      - id: ac-16.06_odp.07
        label: subjects
        guidelines:
          - subjects to be associated with privacy attributes are defined;
      - id: ac-16.06_odp.08
        label: objects
        guidelines:
          - objects to be associated with privacy attributes are defined;
      - id: ac-16.06_odp.09
        label: security policies
        guidelines:
          - security policies that require personnel to associate and maintain the association of security and privacy attributes with subjects and objects;
      - id: ac-16.06_odp.10
        label: privacy policies
        guidelines:
          - privacy policies that require personnel to associate and maintain the association of security and privacy attributes with subjects and objects;
    guidance: Maintaining attribute association requires individual users (as opposed to the system) to maintain associations of defined security and privacy attributes with subjects and objects.
    rules: []
    status: pending
  - id: ac-16.7
    title: Consistent Attribute Interpretation
    description: Provide a consistent interpretation of security and privacy attributes transmitted between distributed system components.
    guidance: To enforce security and privacy policies across multiple system components in distributed systems, organizations provide a consistent interpretation of security and privacy attributes employed in access enforcement and flow enforcement decisions. Organizations can establish agreements and processes to help ensure that distributed system components implement attributes with consistent interpretations in automated access enforcement and flow enforcement actions.
    rules: []
    status: pending
  - id: ac-16.8
    title: Association Techniques and Technologies
    description: 'Implement [[ insert: param, ac-16.8_prm_1 ]] in associating security and privacy attributes to information.'
    parameters:
      - id: ac-16.8_prm_1
        label: organization-defined techniques and technologies
      - id: ac-16.08_odp.01
        label: techniques and technologies
        guidelines:
          - techniques and technologies to be implemented in associating security attributes to information are defined;
      - id: ac-16.08_odp.02
        label: techniques and technologies
        guidelines:
          - techniques and technologies to be implemented in associating privacy attributes to information are defined;
    guidance: The association of security and privacy attributes to information within systems is important for conducting automated access enforcement and flow enforcement actions. The association of such attributes to information (i.e., binding) can be accomplished with technologies and techniques that provide different levels of assurance. For example, systems can cryptographically bind attributes to information using digital signatures that support cryptographic keys protected by hardware devices (sometimes known as hardware roots of trust).
    related_controls:
      - sc-12
      - sc-13
    rules: []
    status: pending
  - id: ac-16.9
    title: Attribute Reassignment — Regrading Mechanisms
    description: 'Change security and privacy attributes associated with information only via regrading mechanisms validated using [[ insert: param, ac-16.9_prm_1 ]].'
    parameters:
      - id: ac-16.9_prm_1
        label: organization-defined techniques or procedures
      - id: ac-16.09_odp.01
        label: techniques or procedures
        guidelines:
          - techniques or procedures used to validate regrading mechanisms for security attributes are defined;
      - id: ac-16.09_odp.02
        label: techniques or procedures
        guidelines:
          - techniques or procedures used to validate regrading mechanisms for privacy attributes are defined;
    guidance: A regrading mechanism is a trusted process authorized to re-classify and re-label data in accordance with a defined policy exception. Validated regrading mechanisms are used by organizations to provide the requisite levels of assurance for attribute reassignment activities. The validation is facilitated by ensuring that regrading mechanisms are single purpose and of limited function. Since security and privacy attribute changes can directly affect policy enforcement actions, implementing trustworthy regrading mechanisms is necessary to help ensure that such mechanisms perform in a consistent and correct mode of operation.
    rules: []
    status: pending
  - id: ac-16.10
    title: Attribute Configuration by Authorized Individuals
    description: Provide authorized individuals the capability to define or change the type and value of security and privacy attributes available for association with subjects and objects.
    guidance: The content or assigned values of security and privacy attributes can directly affect the ability of individuals to access organizational information. Thus, it is important for systems to be able to limit the ability to create or modify the type and value of attributes available for association with subjects and objects to authorized individuals only.
    rules: []
    status: pending
  - id: ac-17
    title: Remote Access
    description: "  a. Establish and document usage restrictions, configuration/connection requirements, and implementation guidance for each type of remote access allowed; and\n  b. Authorize each type of remote access to the system prior to allowing such connections."
    guidance: Remote access is access to organizational systems (or processes acting on behalf of users) that communicate through external networks such as the Internet. Types of remote access include dial-up, broadband, and wireless. Organizations use encrypted virtual private networks (VPNs) to enhance confidentiality and integrity for remote connections. The use of encrypted VPNs provides sufficient assurance to the organization that it can effectively treat such connections as internal networks if the cryptographic mechanisms used are implemented in accordance with applicable laws, executive orders, directives, regulations, policies, standards, and guidelines. Still, VPN connections traverse external networks, and the encrypted VPN does not enhance the availability of remote connections. VPNs with encrypted tunnels can also affect the ability to adequately monitor network communications traffic for malicious code. Remote access controls apply to systems other than public web servers or systems designed for public access. Authorization of each remote access type addresses authorization prior to allowing remote access without specifying the specific formats for such authorization. While organizations may use information exchange and system connection security agreements to manage remote access connections to other systems, such agreements are addressed as part of [CA-3](#ca-3) . Enforcing access restrictions for remote access is addressed via [AC-3](#ac-3).
    related_controls:
      - ac-2
      - ac-3
      - ac-4
      - ac-18
      - ac-19
      - ac-20
      - ca-3
      - cm-10
      - ia-2
      - ia-3
      - ia-8
      - ma-4
      - pe-17
      - pl-2
      - pl-4
      - sc-10
      - sc-12
      - sc-13
      - si-4
    levels:
      - low
      - moderate
      - high
    rules:
      - configure_custom_crypto_policy_cis
      {{% if product == "rhel8" %}}
      - configure_ssh_crypto_policy
      {{% endif %}}
    status: automated
  - id: ac-17.1
    title: Monitoring and Control
    description: Employ automated mechanisms to monitor and control remote access methods.
    guidance: Monitoring and control of remote access methods allows organizations to detect attacks and help ensure compliance with remote access policies by auditing the connection activities of remote users on a variety of system components, including servers, notebook computers, workstations, smart phones, and tablets. Audit logging for remote access is enforced by [AU-2](#au-2) . Audit events are defined in [AU-2a](#au-2_smt.a).
    related_controls:
      - au-2
      - au-6
      - au-12
      - au-14
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-17.2
    title: Protection of Confidentiality and Integrity Using Encryption
    description: Implement cryptographic mechanisms to protect the confidentiality and integrity of remote access sessions.
    guidance: Virtual private networks can be used to protect the confidentiality and integrity of remote access sessions. Transport Layer Security (TLS) is an example of a cryptographic protocol that provides end-to-end communications security over networks and is used for Internet communications and online transactions.
    related_controls:
      - sc-8
      - sc-12
      - sc-13
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-17.3
    title: Managed Access Control Points
    description: Route remote accesses through authorized and managed network access control points.
    guidance: Organizations consider the Trusted Internet Connections (TIC) initiative [DHS TIC](#4f42ee6e-86cc-403b-a51f-76c2b4f81b54) requirements for external network connections since limiting the number of access control points for remote access reduces attack surfaces.
    related_controls:
      - sc-7
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-17.4
    title: Privileged Commands and Access
    description: "  a. Authorize the execution of privileged commands and access to security-relevant information via remote access only in a format that provides assessable evidence and for the following needs: [[ insert: param, ac-17.4_prm_1 ]] ; and\n  b. Document the rationale for remote access in the security plan for the system."
    parameters:
      - id: ac-17.4_prm_1
        label: organization-defined needs
      - id: ac-17.04_odp.01
        label: needs requiring remote access
        guidelines:
          - needs requiring execution of privileged commands via remote access are defined;
      - id: ac-17.04_odp.02
        label: needs requiring remote access
        guidelines:
          - needs requiring access to security-relevant information via remote access are defined;
    guidance: Remote access to systems represents a significant potential vulnerability that can be exploited by adversaries. As such, restricting the execution of privileged commands and access to security-relevant information via remote access reduces the exposure of the organization and the susceptibility to threats by adversaries to the remote access capability.
    related_controls:
      - ac-6
      - sc-12
      - sc-13
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-17.5
    title: Monitoring for Unauthorized Connections
    rules: []
    status: pending
  - id: ac-17.6
    title: Protection of Mechanism Information
    description: Protect information about remote access mechanisms from unauthorized use and disclosure.
    guidance: Remote access to organizational information by non-organizational entities can increase the risk of unauthorized use and disclosure about remote access mechanisms. The organization considers including remote access requirements in the information exchange agreements with other organizations, as applicable. Remote access requirements can also be included in rules of behavior (see [PL-4](#pl-4) ) and access agreements (see [PS-6](#ps-6)).
    related_controls:
      - at-2
      - at-3
      - ps-6
    rules: []
    status: pending
  - id: ac-17.7
    title: Additional Protection for Security Function Access
    rules: []
    status: pending
  - id: ac-17.8
    title: Disable Nonsecure Network Protocols
    rules: []
    status: pending
  - id: ac-17.9
    title: Disconnect or Disable Access
    description: 'Provide the capability to disconnect or disable remote access to the system within [[ insert: param, ac-17.09_odp ]].'
    parameters:
      - id: ac-17.09_odp
        label: time period
        guidelines:
          - the time period within which to disconnect or disable remote access to the system is defined;
    guidance: The speed of system disconnect or disablement varies based on the criticality of missions or business functions and the need to eliminate immediate or future remote access to systems.
    rules: []
    status: pending
  - id: ac-17.10
    title: Authenticate Remote Commands
    description: 'Implement [[ insert: param, ac-17.10_odp.01 ]] to authenticate [[ insert: param, ac-17.10_odp.02 ]].'
    parameters:
      - id: ac-17.10_odp.01
        label: mechanisms
        guidelines:
          - mechanisms implemented to authenticate remote commands are defined;
      - id: ac-17.10_odp.02
        label: remote commands
        guidelines:
          - remote commands to be authenticated by mechanisms are defined;
    guidance: Authenticating remote commands protects against unauthorized commands and the replay of authorized commands. The ability to authenticate remote commands is important for remote systems for which loss, malfunction, misdirection, or exploitation would have immediate or serious consequences, such as injury, death, property damage, loss of high value assets, failure of mission or business functions, or compromise of classified or controlled unclassified information. Authentication mechanisms for remote commands ensure that systems accept and execute commands in the order intended, execute only authorized commands, and reject unauthorized commands. Cryptographic mechanisms can be used, for example, to authenticate remote commands.
    related_controls:
      - sc-12
      - sc-13
      - sc-23
    rules: []
    status: pending
  - id: ac-18
    title: Wireless Access
    description: "  a. Establish configuration requirements, connection requirements, and implementation guidance for each type of wireless access; and\n  b. Authorize each type of wireless access to the system prior to allowing such connections."
    guidance: Wireless technologies include microwave, packet radio (ultra-high frequency or very high frequency), 802.11x, and Bluetooth. Wireless networks use authentication protocols that provide authenticator protection and mutual authentication.
    related_controls:
      - ac-2
      - ac-3
      - ac-17
      - ac-19
      - ca-9
      - cm-7
      - ia-2
      - ia-3
      - ia-8
      - pl-4
      - sc-40
      - sc-43
      - si-4
    levels:
      - low
      - moderate
      - high
    rules:
      - wireless_disable_interfaces
    status: automated
  - id: ac-18.1
    title: Authentication and Encryption
    description: 'Protect wireless access to the system using authentication of [[ insert: param, ac-18.01_odp ]] and encryption.'
    parameters:
      - id: ac-18.01_odp
        label: ''
        choices:
          - users
          - devices
    guidance: Wireless networking capabilities represent a significant potential vulnerability that can be exploited by adversaries. To protect systems with wireless access points, strong authentication of users and devices along with strong encryption can reduce susceptibility to threats by adversaries involving wireless technologies.
    related_controls:
      - sc-8
      - sc-12
      - sc-13
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-18.2
    title: Monitoring Unauthorized Connections
    rules: []
    status: pending
  - id: ac-18.3
    title: Disable Wireless Networking
    description: Disable, when not intended for use, wireless networking capabilities embedded within system components prior to issuance and deployment.
    guidance: Wireless networking capabilities that are embedded within system components represent a significant potential vulnerability that can be exploited by adversaries. Disabling wireless capabilities when not needed for essential organizational missions or functions can reduce susceptibility to threats by adversaries involving wireless technologies.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ac-18.4
    title: Restrict Configurations by Users
    description: Identify and explicitly authorize users allowed to independently configure wireless networking capabilities.
    guidance: Organizational authorizations to allow selected users to configure wireless networking capabilities are enforced, in part, by the access enforcement mechanisms employed within organizational systems.
    related_controls:
      - sc-7
      - sc-15
    levels:
      - high
    rules: []
    status: pending
  - id: ac-18.5
    title: Antennas and Transmission Power Levels
    description: Select radio antennas and calibrate transmission power levels to reduce the probability that signals from wireless access points can be received outside of organization-controlled boundaries.
    guidance: Actions that may be taken to limit unauthorized use of wireless communications outside of organization-controlled boundaries include reducing the power of wireless transmissions so that the transmissions are less likely to emit a signal that can be captured outside of the physical perimeters of the organization, employing measures such as emissions security to control wireless emanations, and using directional or beamforming antennas that reduce the likelihood that unintended receivers will be able to intercept signals. Prior to taking such mitigating actions, organizations can conduct periodic wireless surveys to understand the radio frequency profile of organizational systems as well as other systems that may be operating in the area.
    related_controls:
      - pe-19
    levels:
      - high
    rules: []
    status: pending
  - id: ac-19
    title: Access Control for Mobile Devices
    description: "  a. Establish configuration requirements, connection requirements, and implementation guidance for organization-controlled mobile devices, to include when such devices are outside of controlled areas; and\n  b. Authorize the connection of mobile devices to organizational systems."
    guidance: "A mobile device is a computing device that has a small form factor such that it can easily be carried by a single individual; is designed to operate without a physical connection; possesses local, non-removable or removable data storage; and includes a self-contained power source. Mobile device functionality may also include voice communication capabilities, on-board sensors that allow the device to capture information, and/or built-in features for synchronizing local data with remote locations. Examples include smart phones and tablets. Mobile devices are typically associated with a single individual. The processing, storage, and transmission capability of the mobile device may be comparable to or merely a subset of notebook/desktop systems, depending on the nature and intended purpose of the device. Protection and control of mobile devices is behavior or policy-based and requires users to take physical action to protect and control such devices when outside of controlled areas. Controlled areas are spaces for which organizations provide physical or procedural controls to meet the requirements established for protecting information and systems.\n\nDue to the large variety of mobile devices with different characteristics and capabilities, organizational restrictions may vary for the different classes or types of such devices. Usage restrictions and specific implementation guidance for mobile devices include configuration management, device identification and authentication, implementation of mandatory protective software, scanning devices for malicious code, updating virus protection software, scanning for critical software updates and patches, conducting primary operating system (and possibly other resident software) integrity checks, and disabling unnecessary hardware.\n\nUsage restrictions and authorization to connect may vary among organizational systems. For example, the organization may authorize the connection of mobile devices to its network and impose a set of usage restrictions, while a system owner may withhold authorization for mobile device connection to specific applications or impose additional usage restrictions before allowing mobile device connections to a system. Adequate security for mobile devices goes beyond the requirements specified in [AC-19](#ac-19) . Many safeguards for mobile devices are reflected in other controls. [AC-20](#ac-20) addresses mobile devices that are not organization-controlled."
    related_controls:
