  - id: ac-19.4
    title: Restrictions for Classified Information
    description: "  a. Prohibit the use of unclassified mobile devices in facilities containing systems processing, storing, or transmitting classified information unless specifically permitted by the authorizing official; and\n  b. Enforce the following restrictions on individuals permitted by the authorizing official to use unclassified mobile devices in facilities containing systems processing, storing, or transmitting classified information:\n    1. Connection of unclassified mobile devices to classified systems is prohibited;\n    2. Connection of unclassified mobile devices to unclassified systems requires approval from the authorizing official;\n    3. Use of internal or external modems or wireless interfaces within the unclassified mobile devices is prohibited; and\n    4. Unclassified mobile devices and the information stored on those devices are subject to random reviews and inspections by [[ insert: param, ac-19.04_odp.01 ]] , and if classified information is found, the incident handling policy is followed.\n  c. Restrict the connection of classified mobile devices to classified systems in accordance with [[ insert: param, ac-19.04_odp.02 ]]."
    parameters:
      - id: ac-19.04_odp.01
        label: security officials
        guidelines:
          - security officials responsible for the review and inspection of unclassified mobile devices and the information stored on those devices are defined;
      - id: ac-19.04_odp.02
        label: security policies
        guidelines:
          - security policies restricting the connection of classified mobile devices to classified systems are defined;
    guidance: None.
    related_controls:
      - cm-8
      - ir-4
    rules: []
    status: pending
  - id: ac-19.5
    title: Full Device or Container-based Encryption
    description: 'Employ [[ insert: param, ac-19.05_odp.01 ]] to protect the confidentiality and integrity of information on [[ insert: param, ac-19.05_odp.02 ]].'
    parameters:
      - id: ac-19.05_odp.01
        label: ''
        choices:
          - full-device encryption
          - container-based encryption
      - id: ac-19.05_odp.02
        label: mobile devices
        guidelines:
          - mobile devices on which to employ encryption are defined;
    guidance: Container-based encryption provides a more fine-grained approach to data and information encryption on mobile devices, including encrypting selected data structures such as files, records, or fields.
