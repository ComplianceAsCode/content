      - pl-2
      - sc-12
      - sc-13
      - sc-28
      - sc-34
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: mp-5.1
    title: Protection Outside of Controlled Areas
    rules: []
    status: pending
