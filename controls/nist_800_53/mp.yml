    title: Documentation of Activities
    rules: []
    status: pending
  - id: mp-5.3
    title: Custodians
    description: Employ an identified custodian during transport of system media outside of controlled areas.
    guidance: Identified custodians provide organizations with specific points of contact during the media transport process and facilitate individual accountability. Custodial responsibilities can be transferred from one individual to another if an unambiguous custodian is identified.
    rules: []
    status: pending
