    title: Cryptographic Protection
    rules: []
    status: pending
  - id: mp-6
    title: Media Sanitization
    description: "  a. Sanitize [[ insert: param, mp-6_prm_1 ]] prior to disposal, release out of organizational control, or release for reuse using [[ insert: param, mp-6_prm_2 ]] ; and\n  b. Employ sanitization mechanisms with the strength and integrity commensurate with the security category or classification of the information."
    parameters:
      - id: mp-6_prm_1
        label: organization-defined system media
      - id: mp-6_prm_2
        label: organization-defined sanitization techniques and procedures
      - id: mp-06_odp.01
        label: system media
        guidelines:
          - system media to be sanitized prior to disposal is defined;
      - id: mp-06_odp.02
        label: system media
        guidelines:
          - system media to be sanitized prior to release from organizational control is defined;
      - id: mp-06_odp.03
        label: system media
        guidelines:
          - system media to be sanitized prior to release for reuse is defined;
      - id: mp-06_odp.04
        label: sanitization techniques and procedures
        guidelines:
          - sanitization techniques and procedures to be used for sanitization prior to disposal are defined;
      - id: mp-06_odp.05
        label: sanitization techniques and procedures
        guidelines:
          - sanitization techniques and procedures to be used for sanitization prior to release from organizational control are defined;
      - id: mp-06_odp.06
        label: sanitization techniques and procedures
        guidelines:
          - sanitization techniques and procedures to be used for sanitization prior to release for reuse are defined;
    guidance: Media sanitization applies to all digital and non-digital system media subject to disposal or reuse, whether or not the media is considered removable. Examples include digital media in scanners, copiers, printers, notebook computers, workstations, network components, mobile devices, and non-digital media (e.g., paper and microfilm). The sanitization process removes information from system media such that the information cannot be retrieved or reconstructed. Sanitization techniques—including clearing, purging, cryptographic erase, de-identification of personally identifiable information, and destruction—prevent the disclosure of information to unauthorized individuals when such media is reused or released for disposal. Organizations determine the appropriate sanitization methods, recognizing that destruction is sometimes necessary when other methods cannot be applied to media requiring sanitization. Organizations use discretion on the employment of approved sanitization techniques and procedures for media that contains information deemed to be in the public domain or publicly releasable or information deemed to have no adverse impact on organizations or individuals if released for reuse or disposal. Sanitization of non-digital media includes destruction, removing a classified appendix from an otherwise unclassified document, or redacting selected sections or words from a document by obscuring the redacted sections or words in a manner equivalent in effectiveness to removing them from the document. NSA standards and policies control the sanitization process for media that contains classified information. NARA policies control the sanitization process for controlled unclassified information.
    related_controls:
      - ac-3
      - ac-7
      - au-11
      - ma-2
      - ma-3
      - ma-4
      - ma-5
      - pm-22
      - si-12
      - si-18
      - si-19
      - sr-11
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: mp-6.1
    title: Review, Approve, Track, Document, and Verify
    description: Review, approve, track, document, and verify media sanitization and disposal actions.
    guidance: Organizations review and approve media to be sanitized to ensure compliance with records retention policies. Tracking and documenting actions include listing personnel who reviewed and approved sanitization and disposal actions, types of media sanitized, files stored on the media, sanitization methods used, date and time of the sanitization actions, personnel who performed the sanitization, verification actions taken and personnel who performed the verification, and the disposal actions taken. Organizations verify that the sanitization of the media was effective prior to disposal.
    levels:
      - high
    rules: []
    status: pending
  - id: mp-6.2
    title: Equipment Testing
    description: 'Test sanitization equipment and procedures [[ insert: param, mp-6.2_prm_1 ]] to ensure that the intended sanitization is being achieved.'
    parameters:
      - id: mp-6.2_prm_1
        label: organization-defined frequency
      - id: mp-06.02_odp.01
        label: frequency
        guidelines:
          - frequency with which to test sanitization equipment is defined;
      - id: mp-06.02_odp.02
        label: frequency
        guidelines:
          - frequency with which to test sanitization procedures is defined;
    guidance: Testing of sanitization equipment and procedures may be conducted by qualified and authorized external entities, including federal agencies or external service providers.
    levels:
      - high
    rules: []
    status: pending
  - id: mp-6.3
    title: Nondestructive Techniques
    description: 'Apply nondestructive sanitization techniques to portable storage devices prior to connecting such devices to the system under the following circumstances: [[ insert: param, mp-06.03_odp ]].'
    parameters:
      - id: mp-06.03_odp
        label: circumstances
        guidelines:
          - circumstances requiring sanitization of portable storage devices are defined;
    guidance: Portable storage devices include external or removable hard disk drives (e.g., solid state, magnetic), optical discs, magnetic or optical tapes, flash memory devices, flash memory cards, and other external or removable disks. Portable storage devices can be obtained from untrustworthy sources and contain malicious code that can be inserted into or transferred to organizational systems through USB ports or other entry portals. While scanning storage devices is recommended, sanitization provides additional assurance that such devices are free of malicious code. Organizations consider nondestructive sanitization of portable storage devices when the devices are purchased from manufacturers or vendors prior to initial use or when organizations cannot maintain a positive chain of custody for the devices.
    levels:
      - high
    rules: []
    status: pending
  - id: mp-6.4
    title: Controlled Unclassified Information
    rules: []
    status: pending
  - id: mp-6.5
    title: Classified Information
    rules: []
    status: pending
  - id: mp-6.6
    title: Media Destruction
    rules: []
    status: pending
  - id: mp-6.7
    title: Dual Authorization
    description: 'Enforce dual authorization for the sanitization of [[ insert: param, mp-06.07_odp ]].'
    parameters:
      - id: mp-06.07_odp
        label: system media
        guidelines:
          - system media to be sanitized using dual authorization is defined;
    guidance: Organizations employ dual authorization to help ensure that system media sanitization cannot occur unless two technically qualified individuals conduct the designated task. Individuals who sanitize system media possess sufficient skills and expertise to determine if the proposed sanitization reflects applicable federal and organizational standards, policies, and procedures. Dual authorization also helps to ensure that sanitization occurs as intended, protecting against errors and false claims of having performed the sanitization actions. Dual authorization may also be known as two-person control. To reduce the risk of collusion, organizations consider rotating dual authorization duties to other individuals.
    related_controls:
      - ac-3
      - mp-2
    rules: []
    status: pending
  - id: mp-6.8
    title: Remote Purging or Wiping of Information
    description: 'Provide the capability to purge or wipe information from [[ insert: param, mp-06.08_odp.01 ]] [[ insert: param, mp-06.08_odp.02 ]].'
    parameters:
      - id: mp-06.08_odp.01
        label: systems or system components
        guidelines:
          - systems or system components to purge or wipe information either remotely or under specific conditions are defined;
      - id: mp-06.08_odp.02
        label: ''
        choices:
          - remotely
          - 'under [[ insert: param, mp-06.08_odp.03 ]] '
      - id: mp-06.08_odp.03
        label: conditions
        guidelines:
          - conditions under which information is to be purged or wiped are defined (if selected);
    guidance: Remote purging or wiping of information protects information on organizational systems and system components if systems or components are obtained by unauthorized individuals. Remote purge or wipe commands require strong authentication to help mitigate the risk of unauthorized individuals purging or wiping the system, component, or device. The purge or wipe function can be implemented in a variety of ways, including by overwriting data or information multiple times or by destroying the key necessary to decrypt encrypted data.
    rules: []
    status: pending
  - id: mp-7
    title: Media Use
    description: "  a. [[ insert: param, mp-07_odp.02 ]] the use of [[ insert: param, mp-07_odp.01 ]] on [[ insert: param, mp-07_odp.03 ]] using [[ insert: param, mp-07_odp.04 ]] ; and\n  b. Prohibit the use of portable storage devices in organizational systems when such devices have no identifiable owner."
    parameters:
      - id: mp-07_odp.01
        label: types of system media
        guidelines:
          - types of system media to be restricted or prohibited from use on systems or system components are defined;
      - id: mp-07_odp.02
        label: ''
        choices:
          - restrict
          - prohibit
      - id: mp-07_odp.03
        label: systems or system components
        guidelines:
          - systems or system components on which the use of specific types of system media to be restricted or prohibited are defined;
      - id: mp-07_odp.04
        label: controls
        guidelines:
          - controls to restrict or prohibit the use of specific types of system media on systems or system components are defined;
    guidance: System media includes both digital and non-digital media. Digital media includes diskettes, magnetic tapes, flash drives, compact discs, digital versatile discs, and removable hard disk drives. Non-digital media includes paper and microfilm. Media use protections also apply to mobile devices with information storage capabilities. In contrast to [MP-2](#mp-2) , which restricts user access to media, MP-7 restricts the use of certain types of media on systems, for example, restricting or prohibiting the use of flash drives or external hard disk drives. Organizations use technical and nontechnical controls to restrict the use of system media. Organizations may restrict the use of portable storage devices, for example, by using physical cages on workstations to prohibit access to certain external ports or disabling or removing the ability to insert, read, or write to such devices. Organizations may also limit the use of portable storage devices to only approved devices, including devices provided by the organization, devices provided by other approved organizations, and devices that are not personally owned. Finally, organizations may restrict the use of portable storage devices based on the type of device, such as by prohibiting the use of writeable, portable storage devices and implementing this restriction by disabling or removing the capability to write to such devices. Requiring identifiable owners for storage devices reduces the risk of using such devices by allowing organizations to assign responsibility for addressing known vulnerabilities in the devices.
    related_controls:
      - ac-19
      - ac-20
      - pl-4
      - pm-12
      - sc-34
      - sc-41
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: mp-7.1
    title: Prohibit Use Without Owner
    rules: []
    status: pending
  - id: mp-7.2
    title: Prohibit Use of Sanitization-resistant Media
    description: Prohibit the use of sanitization-resistant media in organizational systems.
    guidance: Sanitization resistance refers to how resistant media are to non-destructive sanitization techniques with respect to the capability to purge information from media. Certain types of media do not support sanitization commands, or if supported, the interfaces are not supported in a standardized way across these devices. Sanitization-resistant media includes compact flash, embedded flash on boards and devices, solid state drives, and USB removable media.
    related_controls:
      - mp-6
    rules: []
    status: pending
  - id: mp-8
    title: Media Downgrading
    description: "  a. Establish [[ insert: param, mp-08_odp.01 ]] that includes employing downgrading mechanisms with strength and integrity commensurate with the security category or classification of the information;\n  b. Verify that the system media downgrading process is commensurate with the security category and/or classification level of the information to be removed and the access authorizations of the potential recipients of the downgraded information;\n  c. Identify [[ insert: param, mp-08_odp.02 ]] ; and\n  d. Downgrade the identified system media using the established process."
    parameters:
      - id: mp-08_odp.01
        label: system media downgrading process
        guidelines:
          - a system media downgrading process is defined;
      - id: mp-08_odp.02
        label: system media requiring downgrading
        guidelines:
          - system media requiring downgrading is defined;
    guidance: Media downgrading applies to digital and non-digital media subject to release outside of the organization, whether the media is considered removable or not. When applied to system media, the downgrading process removes information from the media, typically by security category or classification level, such that the information cannot be retrieved or reconstructed. Downgrading of media includes redacting information to enable wider release and distribution. Downgrading ensures that empty space on the media is devoid of information.
    rules: []
    status: pending
  - id: mp-8.1
    title: Documentation of Process
    description: Document system media downgrading actions.
    guidance: Organizations can document the media downgrading process by providing information, such as the downgrading technique employed, the identification number of the downgraded media, and the identity of the individual that authorized and/or performed the downgrading action.
    rules: []
    status: pending
  - id: mp-8.2
    title: Equipment Testing
    description: 'Test downgrading equipment and procedures [[ insert: param, mp-8.2_prm_1 ]] to ensure that downgrading actions are being achieved.'
    parameters:
      - id: mp-8.2_prm_1
        label: organization-defined frequency
      - id: mp-08.02_odp.01
        label: frequency
        guidelines:
          - the frequency with which to test downgrading equipment is defined;
      - id: mp-08.02_odp.02
        label: frequency
        guidelines:
          - the frequency with which to test downgrading procedures is defined;
    guidance: None.
    rules: []
    status: pending
  - id: mp-8.3
    title: Controlled Unclassified Information
    description: Downgrade system media containing controlled unclassified information prior to public release.
    guidance: The downgrading of controlled unclassified information uses approved sanitization tools, techniques, and procedures.
    rules: []
    status: pending
  - id: mp-8.4
    title: Classified Information
    description: Downgrade system media containing classified information prior to release to individuals without required access authorizations.
    guidance: Downgrading of classified information uses approved sanitization tools, techniques, and procedures to transfer information confirmed to be unclassified from classified systems to unclassified media.
    rules: []
    status: pending
