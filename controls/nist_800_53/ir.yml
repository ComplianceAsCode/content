# NIST 800-53 IR Family: Incident Response
controls:
  - id: ir-1
    title: Policy and Procedures
    description: "  a. Develop, document, and disseminate to [[ insert: param, ir-1_prm_1 ]]:\n    1. [[ insert: param, ir-01_odp.03 ]] incident response policy that:\n    2. Procedures to facilitate the implementation of the incident response policy and the associated incident response controls;\n  b. Designate an [[ insert: param, ir-01_odp.04 ]] to manage the development, documentation, and dissemination of the incident response policy and procedures; and\n  c. Review and update the current incident response:\n    1. Policy [[ insert: param, ir-01_odp.05 ]] and following [[ insert: param, ir-01_odp.06 ]] ; and\n    2. Procedures [[ insert: param, ir-01_odp.07 ]] and following [[ insert: param, ir-01_odp.08 ]]."
    parameters:
      - id: ir-1_prm_1
        label: organization-defined personnel or roles
      - id: ir-01_odp.01
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the incident response policy is to be disseminated is/are defined;
      - id: ir-01_odp.02
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the incident response procedures are to be disseminated is/are defined;
      - id: ir-01_odp.03
        label: ''
        choices:
          - organization-level
          - mission/business process-level
          - system-level
      - id: ir-01_odp.04
        label: official
        guidelines:
          - an official to manage the incident response policy and procedures is defined;
      - id: ir-01_odp.05
        label: frequency
        guidelines:
          - the frequency at which the current incident response policy is reviewed and updated is defined;
      - id: ir-01_odp.06
        label: events
        guidelines:
          - events that would require the current incident response policy to be reviewed and updated are defined;
      - id: ir-01_odp.07
        label: frequency
        guidelines:
          - the frequency at which the current incident response procedures are reviewed and updated is defined;
      - id: ir-01_odp.08
        label: events
        guidelines:
          - events that would require the incident response procedures to be reviewed and updated are defined;
    guidance: Incident response policy and procedures address the controls in the IR family that are implemented within systems and organizations. The risk management strategy is an important factor in establishing such policies and procedures. Policies and procedures contribute to security and privacy assurance. Therefore, it is important that security and privacy programs collaborate on the development of incident response policy and procedures. Security and privacy program policies and procedures at the organization level are preferable, in general, and may obviate the need for mission- or system-specific policies and procedures. The policy can be included as part of the general security and privacy policy or be represented by multiple policies that reflect the complex nature of organizations. Procedures can be established for security and privacy programs, for mission or business processes, and for systems, if needed. Procedures describe how the policies or controls are implemented and can be directed at the individual or role that is the object of the procedure. Procedures can be documented in system security and privacy plans or in one or more separate documents. Events that may precipitate an update to incident response policy and procedures include assessment or audit findings, security incidents or breaches, or changes in laws, executive orders, directives, regulations, policies, standards, and guidelines. Simply restating controls does not constitute an organizational policy or procedure.
    related_controls:
      - pm-9
      - ps-8
      - si-12
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-2
    title: Incident Response Training
    description: "  a. Provide incident response training to system users consistent with assigned roles and responsibilities:\n    1. Within [[ insert: param, ir-02_odp.01 ]] of assuming an incident response role or responsibility or acquiring system access;\n    2. When required by system changes; and\n    3. [[ insert: param, ir-02_odp.02 ]] thereafter; and\n  b. Review and update incident response training content [[ insert: param, ir-02_odp.03 ]] and following [[ insert: param, ir-02_odp.04 ]]."
    parameters:
      - id: ir-02_odp.01
        label: time period
        guidelines:
          - a time period within which incident response training is to be provided to system users assuming an incident response role or responsibility is defined;
      - id: ir-02_odp.02
        label: frequency
        guidelines:
          - frequency at which to provide incident response training to users is defined;
      - id: ir-02_odp.03
        label: frequency
        guidelines:
          - frequency at which to review and update incident response training content is defined;
      - id: ir-02_odp.04
        label: events
        guidelines:
          - events that initiate a review of the incident response training content are defined;
    guidance: Incident response training is associated with the assigned roles and responsibilities of organizational personnel to ensure that the appropriate content and level of detail are included in such training. For example, users may only need to know who to call or how to recognize an incident; system administrators may require additional training on how to handle incidents; and incident responders may receive more specific training on forensics, data collection techniques, reporting, system recovery, and system restoration. Incident response training includes user training in identifying and reporting suspicious activities from external and internal sources. Incident response training for users may be provided as part of [AT-2](#at-2) or [AT-3](#at-3) . Events that may precipitate an update to incident response training content include, but are not limited to, incident response plan testing or response to an actual incident (lessons learned), assessment or audit findings, or changes in applicable laws, executive orders, directives, regulations, policies, standards, and guidelines.
    related_controls:
      - at-2
      - at-3
      - at-4
      - cp-3
      - ir-3
      - ir-4
      - ir-8
      - ir-9
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-2.1
    title: Simulated Events
    description: Incorporate simulated events into incident response training to facilitate the required response by personnel in crisis situations.
    guidance: Organizations establish requirements for responding to incidents in incident response plans. Incorporating simulated events into incident response training helps to ensure that personnel understand their individual responsibilities and what specific actions to take in crisis situations.
    levels:
      - high
    rules: []
    status: pending
  - id: ir-2.2
    title: Automated Training Environments
    description: 'Provide an incident response training environment using [[ insert: param, ir-02.02_odp ]].'
    parameters:
      - id: ir-02.02_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms used in an incident response training environment are defined;
    guidance: Automated mechanisms can provide a more thorough and realistic incident response training environment. This can be accomplished, for example, by providing more complete coverage of incident response issues, selecting more realistic training scenarios and environments, and stressing the response capability.
    levels:
      - high
    rules: []
    status: pending
  - id: ir-2.3
    title: Breach
    description: Provide incident response training on how to identify and respond to a breach, including the organization’s process for reporting a breach.
    guidance: For federal agencies, an incident that involves personally identifiable information is considered a breach. A breach results in the loss of control, compromise, unauthorized disclosure, unauthorized acquisition, or a similar occurrence where a person other than an authorized user accesses or potentially accesses personally identifiable information or an authorized user accesses or potentially accesses such information for other than authorized purposes. The incident response training emphasizes the obligation of individuals to report both confirmed and suspected breaches involving information in any medium or form, including paper, oral, and electronic. Incident response training includes tabletop exercises that simulate a breach. See [IR-2(1)](#ir-2.1).
    rules: []
    status: pending
  - id: ir-3
    title: Incident Response Testing
    description: 'Test the effectiveness of the incident response capability for the system [[ insert: param, ir-03_odp.01 ]] using the following tests: [[ insert: param, ir-03_odp.02 ]].'
    parameters:
      - id: ir-03_odp.01
        label: frequency
        guidelines:
          - frequency at which to test the effectiveness of the incident response capability for the system is defined;
      - id: ir-03_odp.02
        label: tests
        guidelines:
          - tests used to test the effectiveness of the incident response capability for the system are defined;
    guidance: Organizations test incident response capabilities to determine their effectiveness and identify potential weaknesses or deficiencies. Incident response testing includes the use of checklists, walk-through or tabletop exercises, and simulations (parallel or full interrupt). Incident response testing can include a determination of the effects on organizational operations and assets and individuals due to incident response. The use of qualitative and quantitative data aids in determining the effectiveness of incident response processes.
    related_controls:
      - cp-3
      - cp-4
      - ir-2
      - ir-4
      - ir-8
      - pm-14
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-3.1
    title: Automated Testing
    description: 'Test the incident response capability using [[ insert: param, ir-03.01_odp ]].'
    parameters:
      - id: ir-03.01_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to test the incident response capability are defined;
    guidance: Organizations use automated mechanisms to more thoroughly and effectively test incident response capabilities. This can be accomplished by providing more complete coverage of incident response issues, selecting realistic test scenarios and environments, and stressing the response capability.
    rules: []
    status: pending
  - id: ir-3.2
    title: Coordination with Related Plans
    description: Coordinate incident response testing with organizational elements responsible for related plans.
    guidance: Organizational plans related to incident response testing include business continuity plans, disaster recovery plans, continuity of operations plans, contingency plans, crisis communications plans, critical infrastructure plans, and occupant emergency plans.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-3.3
    title: Continuous Improvement
    description: "Use qualitative and quantitative data from testing to:\n  a. Determine the effectiveness of incident response processes;\n  b. Continuously improve incident response processes; and\n  c. Provide incident response measures and metrics that are accurate, consistent, and in a reproducible format."
    guidance: To help incident response activities function as intended, organizations may use metrics and evaluation criteria to assess incident response programs as part of an effort to continually improve response performance. These efforts facilitate improvement in incident response efficacy and lessen the impact of incidents.
    rules: []
    status: pending
  - id: ir-4
    title: Incident Handling
    description: "  a. Implement an incident handling capability for incidents that is consistent with the incident response plan and includes preparation, detection and analysis, containment, eradication, and recovery;\n  b. Coordinate incident handling activities with contingency planning activities;\n  c. Incorporate lessons learned from ongoing incident handling activities into incident response procedures, training, and testing, and implement the resulting changes accordingly; and\n  d. Ensure the rigor, intensity, scope, and results of incident handling activities are comparable and predictable across the organization."
    guidance: Organizations recognize that incident response capabilities are dependent on the capabilities of organizational systems and the mission and business processes being supported by those systems. Organizations consider incident response as part of the definition, design, and development of mission and business processes and systems. Incident-related information can be obtained from a variety of sources, including audit monitoring, physical access monitoring, and network monitoring; user or administrator reports; and reported supply chain events. An effective incident handling capability includes coordination among many organizational entities (e.g., mission or business owners, system owners, authorizing officials, human resources offices, physical security offices, personnel security offices, legal departments, risk executive [function], operations personnel, procurement offices). Suspected security incidents include the receipt of suspicious email communications that can contain malicious code. Suspected supply chain incidents include the insertion of counterfeit hardware or malicious code into organizational systems or system components. For federal agencies, an incident that involves personally identifiable information is considered a breach. A breach results in unauthorized disclosure, the loss of control, unauthorized acquisition, compromise, or a similar occurrence where a person other than an authorized user accesses or potentially accesses personally identifiable information or an authorized user accesses or potentially accesses such information for other than authorized purposes.
    related_controls:
      - ac-19
      - au-6
      - au-7
      - cm-6
      - cp-2
      - cp-3
      - cp-4
      - ir-2
      - ir-3
      - ir-5
      - ir-6
      - ir-8
      - pe-6
      - pl-2
      - pm-12
      - sa-8
      - sc-5
      - sc-7
      - si-3
      - si-4
      - si-7
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-4.1
    title: Automated Incident Handling Processes
    description: 'Support the incident handling process using [[ insert: param, ir-04.01_odp ]].'
    parameters:
      - id: ir-04.01_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to support the incident handling process are defined;
    guidance: Automated mechanisms that support incident handling processes include online incident management systems and tools that support the collection of live response data, full network packet capture, and forensic analysis.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-4.2
    title: Dynamic Reconfiguration
    description: 'Include the following types of dynamic reconfiguration for [[ insert: param, ir-04.02_odp.02 ]] as part of the incident response capability: [[ insert: param, ir-04.02_odp.01 ]].'
    parameters:
      - id: ir-04.02_odp.01
        label: types of dynamic reconfiguration
        guidelines:
          - types of dynamic reconfiguration for system components are defined;
      - id: ir-04.02_odp.02
        label: system components
        guidelines:
          - system components that require dynamic reconfiguration are defined;
    guidance: Dynamic reconfiguration includes changes to router rules, access control lists, intrusion detection or prevention system parameters, and filter rules for guards or firewalls. Organizations may perform dynamic reconfiguration of systems to stop attacks, misdirect attackers, and isolate components of systems, thus limiting the extent of the damage from breaches or compromises. Organizations include specific time frames for achieving the reconfiguration of systems in the definition of the reconfiguration capability, considering the potential need for rapid response to effectively address cyber threats.
    related_controls:
      - ac-2
      - ac-4
      - cm-2
    rules: []
    status: pending
  - id: ir-4.3
    title: Continuity of Operations
    description: 'Identify [[ insert: param, ir-04.03_odp.01 ]] and take the following actions in response to those incidents to ensure continuation of organizational mission and business functions: [[ insert: param, ir-04.03_odp.02 ]].'
    parameters:
      - id: ir-04.03_odp.01
        label: classes of incidents
        guidelines:
          - classes of incidents requiring an organization-defined action (defined in IR-04(03)_ODP[02]) to be taken are defined;
      - id: ir-04.03_odp.02
        label: actions
        guidelines:
          - actions to be taken in response to organization-defined classes of incidents are defined;
    guidance: Classes of incidents include malfunctions due to design or implementation errors and omissions, targeted malicious attacks, and untargeted malicious attacks. Incident response actions include orderly system degradation, system shutdown, fall back to manual mode or activation of alternative technology whereby the system operates differently, employing deceptive measures, alternate information flows, or operating in a mode that is reserved for when systems are under attack. Organizations consider whether continuity of operations requirements during an incident conflict with the capability to automatically disable the system as specified as part of [IR-4(5)](#ir-4.5).
    rules: []
    status: pending
  - id: ir-4.4
    title: Information Correlation
    description: Correlate incident information and individual incident responses to achieve an organization-wide perspective on incident awareness and response.
    guidance: Sometimes, a threat event, such as a hostile cyber-attack, can only be observed by bringing together information from different sources, including various reports and reporting procedures established by organizations.
    levels:
      - high
    rules: []
    status: pending
  - id: ir-4.5
    title: Automatic Disabling of System
    description: 'Implement a configurable capability to automatically disable the system if [[ insert: param, ir-04.05_odp ]] are detected.'
    parameters:
      - id: ir-04.05_odp
        label: security violations
        guidelines:
          - security violations that automatically disable a system are defined;
    guidance: Organizations consider whether the capability to automatically disable the system conflicts with continuity of operations requirements specified as part of [CP-2](#cp-2) or [IR-4(3)](#ir-4.3) . Security violations include cyber-attacks that have compromised the integrity of the system or exfiltrated organizational information and serious errors in software programs that could adversely impact organizational missions or functions or jeopardize the safety of individuals.
    rules: []
    status: pending
  - id: ir-4.6
    title: Insider Threats
    description: Implement an incident handling capability for incidents involving insider threats.
    guidance: Explicit focus on handling incidents involving insider threats provides additional emphasis on this type of threat and the need for specific incident handling capabilities to provide appropriate and timely responses.
    rules: []
    status: pending
  - id: ir-4.7
    title: Insider Threats — Intra-organization Coordination
    description: 'Coordinate an incident handling capability for insider threats that includes the following organizational entities [[ insert: param, ir-04.07_odp ]].'
    parameters:
      - id: ir-04.07_odp
        label: entities
        guidelines:
          - entities that require coordination for an incident handling capability for insider threats are defined;
    guidance: Incident handling for insider threat incidents (e.g., preparation, detection and analysis, containment, eradication, and recovery) requires coordination among many organizational entities, including mission or business owners, system owners, human resources offices, procurement offices, personnel offices, physical security offices, senior agency information security officer, operations personnel, risk executive (function), senior agency official for privacy, and legal counsel. In addition, organizations may require external support from federal, state, and local law enforcement agencies.
    rules: []
    status: pending
  - id: ir-4.8
    title: Correlation with External Organizations
    description: 'Coordinate with [[ insert: param, ir-04.08_odp.01 ]] to correlate and share [[ insert: param, ir-04.08_odp.02 ]] to achieve a cross-organization perspective on incident awareness and more effective incident responses.'
    parameters:
      - id: ir-04.08_odp.01
        label: external organizations
        guidelines:
          - external organizations with whom organizational incident information is to be coordinated and shared are defined;
      - id: ir-04.08_odp.02
        label: incident information
        guidelines:
          - incident information to be correlated and shared with organization-defined external organizations are defined;
    guidance: The coordination of incident information with external organizations—including mission or business partners, military or coalition partners, customers, and developers—can provide significant benefits. Cross-organizational coordination can serve as an important risk management capability. This capability allows organizations to leverage information from a variety of sources to effectively respond to incidents and breaches that could potentially affect the organization’s operations, assets, and individuals.
    related_controls:
      - au-16
      - pm-16
    rules: []
    status: pending
  - id: ir-4.9
    title: Dynamic Response Capability
    description: 'Employ [[ insert: param, ir-04.09_odp ]] to respond to incidents.'
    parameters:
      - id: ir-04.09_odp
        label: dynamic response capabilities
        guidelines:
          - dynamic response capabilities to be employed to respond to incidents are defined;
    guidance: The dynamic response capability addresses the timely deployment of new or replacement organizational capabilities in response to incidents. This includes capabilities implemented at the mission and business process level and at the system level.
    rules: []
    status: pending
  - id: ir-4.10
    title: Supply Chain Coordination
    description: Coordinate incident handling activities involving supply chain events with other organizations involved in the supply chain.
    guidance: Organizations involved in supply chain activities include product developers, system integrators, manufacturers, packagers, assemblers, distributors, vendors, and resellers. Supply chain incidents can occur anywhere through or to the supply chain and include compromises or breaches that involve primary or sub-tier providers, information technology products, system components, development processes or personnel, and distribution processes or warehousing facilities. Organizations consider including processes for protecting and sharing incident information in information exchange agreements and their obligations for reporting incidents to government oversight bodies (e.g., Federal Acquisition Security Council).
    related_controls:
      - ca-3
      - ma-2
      - sa-9
      - sr-8
    rules: []
    status: pending
  - id: ir-4.11
    title: Integrated Incident Response Team
    description: 'Establish and maintain an integrated incident response team that can be deployed to any location identified by the organization in [[ insert: param, ir-04.11_odp ]].'
    parameters:
      - id: ir-04.11_odp
        label: time period
        guidelines:
          - the time period within which an integrated incident response team can be deployed is defined;
    guidance: "An integrated incident response team is a team of experts that assesses, documents, and responds to incidents so that organizational systems and networks can recover quickly and implement the necessary controls to avoid future incidents. Incident response team personnel include forensic and malicious code analysts, tool developers, systems security and privacy engineers, and real-time operations personnel. The incident handling capability includes performing rapid forensic preservation of evidence and analysis of and response to intrusions. For some organizations, the incident response team can be a cross-organizational entity.\n\nAn integrated incident response team facilitates information sharing and allows organizational personnel (e.g., developers, implementers, and operators) to leverage team knowledge of the threat and implement defensive measures that enable organizations to deter intrusions more effectively. Moreover, integrated teams promote the rapid detection of intrusions, the development of appropriate mitigations, and the deployment of effective defensive measures. For example, when an intrusion is detected, the integrated team can rapidly develop an appropriate response for operators to implement, correlate the new incident with information on past intrusions, and augment ongoing cyber intelligence development. Integrated incident response teams are better able to identify adversary tactics, techniques, and procedures that are linked to the operations tempo or specific mission and business functions and to define responsive actions in a way that does not disrupt those mission and business functions. Incident response teams can be distributed within organizations to make the capability resilient."
    related_controls:
      - at-3
    levels:
      - high
    rules: []
    status: pending
  - id: ir-4.12
    title: Malicious Code and Forensic Analysis
    description: Analyze malicious code and/or other residual artifacts remaining in the system after the incident.
    guidance: When conducted carefully in an isolated environment, analysis of malicious code and other residual artifacts of a security incident or breach can give the organization insight into adversary tactics, techniques, and procedures. It can also indicate the identity or some defining characteristics of the adversary. In addition, malicious code analysis can help the organization develop responses to future incidents.
    rules: []
    status: pending
  - id: ir-4.13
    title: Behavior Analysis
    description: 'Analyze anomalous or suspected adversarial behavior in or related to [[ insert: param, ir-04.13_odp ]].'
    parameters:
      - id: ir-04.13_odp
        label: environments or resources
        guidelines:
          - environments or resources which may contain or may be related to anomalous or suspected adversarial behavior are defined;
    guidance: If the organization maintains a deception environment, an analysis of behaviors in that environment, including resources targeted by the adversary and timing of the incident or event, can provide insight into adversarial tactics, techniques, and procedures. External to a deception environment, the analysis of anomalous adversarial behavior (e.g., changes in system performance or usage patterns) or suspected behavior (e.g., changes in searches for the location of specific resources) can give the organization such insight.
    rules: []
    status: pending
  - id: ir-4.14
    title: Security Operations Center
    description: Establish and maintain a security operations center.
    guidance: A security operations center (SOC) is the focal point for security operations and computer network defense for an organization. The purpose of the SOC is to defend and monitor an organization’s systems and networks (i.e., cyber infrastructure) on an ongoing basis. The SOC is also responsible for detecting, analyzing, and responding to cybersecurity incidents in a timely manner. The organization staffs the SOC with skilled technical and operational personnel (e.g., security analysts, incident response personnel, systems security engineers) and implements a combination of technical, management, and operational controls (including monitoring, scanning, and forensics tools) to monitor, fuse, correlate, analyze, and respond to threat and security-relevant event data from multiple sources. These sources include perimeter defenses, network devices (e.g., routers, switches), and endpoint agent data feeds. The SOC provides a holistic situational awareness capability to help organizations determine the security posture of the system and organization. A SOC capability can be obtained in a variety of ways. Larger organizations may implement a dedicated SOC while smaller organizations may employ third-party organizations to provide such a capability.
    rules: []
    status: pending
  - id: ir-4.15
    title: Public Relations and Reputation Repair
    description: "  a. Manage public relations associated with an incident; and\n  b. Employ measures to repair the reputation of the organization."
    guidance: It is important for an organization to have a strategy in place for addressing incidents that have been brought to the attention of the general public, have cast the organization in a negative light, or have affected the organization’s constituents (e.g., partners, customers). Such publicity can be extremely harmful to the organization and affect its ability to carry out its mission and business functions. Taking proactive steps to repair the organization’s reputation is an essential aspect of reestablishing the trust and confidence of its constituents.
    rules: []
    status: pending
  - id: ir-5
    title: Incident Monitoring
    description: Track and document incidents.
    guidance: Documenting incidents includes maintaining records about each incident, the status of the incident, and other pertinent information necessary for forensics as well as evaluating incident details, trends, and handling. Incident information can be obtained from a variety of sources, including network monitoring, incident reports, incident response teams, user complaints, supply chain partners, audit monitoring, physical access monitoring, and user and administrator reports. [IR-4](#ir-4) provides information on the types of incidents that are appropriate for monitoring.
    related_controls:
      - au-6
      - au-7
      - ir-4
      - ir-6
      - ir-8
      - pe-6
      - pm-5
      - sc-5
      - sc-7
      - si-3
      - si-4
      - si-7
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-5.1
    title: Automated Tracking, Data Collection, and Analysis
    description: 'Track incidents and collect and analyze incident information using [[ insert: param, ir-5.1_prm_1 ]].'
    parameters:
      - id: ir-5.1_prm_1
        label: organization-defined automated mechanisms
      - id: ir-05.01_odp.01
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to track incidents are defined;
      - id: ir-05.01_odp.02
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to collect incident information are defined;
      - id: ir-05.01_odp.03
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to analyze incident information are defined;
    guidance: Automated mechanisms for tracking incidents and collecting and analyzing incident information include Computer Incident Response Centers or other electronic databases of incidents and network monitoring devices.
    levels:
      - high
    rules: []
    status: pending
  - id: ir-6
    title: Incident Reporting
    description: "  a. Require personnel to report suspected incidents to the organizational incident response capability within [[ insert: param, ir-06_odp.01 ]] ; and\n  b. Report incident information to [[ insert: param, ir-06_odp.02 ]]."
    parameters:
      - id: ir-06_odp.01
        label: time period
        guidelines:
          - time period for personnel to report suspected incidents to the organizational incident response capability is defined;
      - id: ir-06_odp.02
        label: authorities
        guidelines:
          - authorities to whom incident information is to be reported are defined;
    guidance: The types of incidents reported, the content and timeliness of the reports, and the designated reporting authorities reflect applicable laws, executive orders, directives, regulations, policies, standards, and guidelines. Incident information can inform risk assessments, control effectiveness assessments, security requirements for acquisitions, and selection criteria for technology products.
    related_controls:
      - cm-6
      - cp-2
      - ir-4
      - ir-5
      - ir-8
      - ir-9
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-6.1
    title: Automated Reporting
    description: 'Report incidents using [[ insert: param, ir-06.01_odp ]].'
    parameters:
      - id: ir-06.01_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms used for reporting incidents are defined;
    guidance: The recipients of incident reports are specified in [IR-6b](#ir-6_smt.b) . Automated reporting mechanisms include email, posting on websites (with automatic updates), and automated incident response tools and programs.
    related_controls:
      - ir-7
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-6.2
    title: Vulnerabilities Related to Incidents
    description: 'Report system vulnerabilities associated with reported incidents to [[ insert: param, ir-06.02_odp ]].'
    parameters:
      - id: ir-06.02_odp
        label: personnel or roles
        guidelines:
          - personnel or roles to whom system vulnerabilities associated with reported incidents are reported to is/are defined;
    guidance: Reported incidents that uncover system vulnerabilities are analyzed by organizational personnel including system owners, mission and business owners, senior agency information security officers, senior agency officials for privacy, authorizing officials, and the risk executive (function). The analysis can serve to prioritize and initiate mitigation actions to address the discovered system vulnerability.
    rules: []
    status: pending
  - id: ir-6.3
    title: Supply Chain Coordination
    description: Provide incident information to the provider of the product or service and other organizations involved in the supply chain or supply chain governance for systems or system components related to the incident.
    guidance: Organizations involved in supply chain activities include product developers, system integrators, manufacturers, packagers, assemblers, distributors, vendors, and resellers. Entities that provide supply chain governance include the Federal Acquisition Security Council (FASC). Supply chain incidents include compromises or breaches that involve information technology products, system components, development processes or personnel, distribution processes, or warehousing facilities. Organizations determine the appropriate information to share and consider the value gained from informing external organizations about supply chain incidents, including the ability to improve processes or to identify the root cause of an incident.
    related_controls:
      - sr-8
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-7
    title: Incident Response Assistance
    description: Provide an incident response support resource, integral to the organizational incident response capability, that offers advice and assistance to users of the system for the handling and reporting of incidents.
    guidance: Incident response support resources provided by organizations include help desks, assistance groups, automated ticketing systems to open and track incident response tickets, and access to forensics services or consumer redress services, when required.
    related_controls:
      - at-2
      - at-3
      - ir-4
      - ir-6
      - ir-8
      - pm-22
      - pm-26
      - sa-9
      - si-18
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-7.1
    title: Automation Support for Availability of Information and Support
    description: 'Increase the availability of incident response information and support using [[ insert: param, ir-07.01_odp ]].'
    parameters:
      - id: ir-07.01_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to increase the availability of incident response information and support are defined;
    guidance: Automated mechanisms can provide a push or pull capability for users to obtain incident response assistance. For example, individuals may have access to a website to query the assistance capability, or the assistance capability can proactively send incident response information to users (general distribution or targeted) as part of increasing understanding of current response capabilities and support.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-7.2
    title: Coordination with External Providers
    description: "  a. Establish a direct, cooperative relationship between its incident response capability and external providers of system protection capability; and\n  b. Identify organizational incident response team members to the external providers."
    guidance: External providers of a system protection capability include the Computer Network Defense program within the U.S. Department of Defense. External providers help to protect, monitor, analyze, detect, and respond to unauthorized activity within organizational information systems and networks. It may be beneficial to have agreements in place with external providers to clarify the roles and responsibilities of each party before an incident occurs.
    rules: []
    status: pending
  - id: ir-8
    title: Incident Response Plan
    description: "  a. Develop an incident response plan that:\n    1. Provides the organization with a roadmap for implementing its incident response capability;\n    2. Describes the structure and organization of the incident response capability;\n    3. Provides a high-level approach for how the incident response capability fits into the overall organization;\n    4. Meets the unique requirements of the organization, which relate to mission, size, structure, and functions;\n    5. Defines reportable incidents;\n    6. Provides metrics for measuring the incident response capability within the organization;\n    7. Defines the resources and management support needed to effectively maintain and mature an incident response capability;\n    8. Addresses the sharing of incident information;\n    9. Is reviewed and approved by [[ insert: param, ir-08_odp.01 ]] [[ insert: param, ir-08_odp.02 ]] ; and\n    10. Explicitly designates responsibility for incident response to [[ insert: param, ir-08_odp.03 ]].\n  b. Distribute copies of the incident response plan to [[ insert: param, ir-08_odp.04 ]];\n  c. Update the incident response plan to address system and organizational changes or problems encountered during plan implementation, execution, or testing;\n  d. Communicate incident response plan changes to [[ insert: param, ir-8_prm_5 ]] ; and\n  e. Protect the incident response plan from unauthorized disclosure and modification."
    parameters:
      - id: ir-8_prm_5
        label: organization-defined incident response personnel (identified by name and/or by role) and organizational elements
      - id: ir-08_odp.01
        label: personnel or roles
        guidelines:
          - personnel or roles that review and approve the incident response plan is/are identified;
      - id: ir-08_odp.02
        label: frequency
        guidelines:
          - the frequency at which to review and approve the incident response plan is defined;
      - id: ir-08_odp.03
        label: entities, personnel, or roles
        guidelines:
          - entities, personnel, or roles with designated responsibility for incident response are defined;
      - id: ir-08_odp.04
        label: incident response personnel
        guidelines:
          - incident response personnel (identified by name and/or by role) to whom copies of the incident response plan are to be distributed is/are defined;
      - id: ir-08_odp.05
        label: organizational elements
        guidelines:
          - organizational elements to which copies of the incident response plan are to be distributed are defined;
      - id: ir-08_odp.06
        label: incident response personnel
        guidelines:
          - incident response personnel (identified by name and/or by role) to whom changes to the incident response plan is/are communicated are defined;
      - id: ir-08_odp.07
        label: organizational elements
        guidelines:
          - organizational elements to which changes to the incident response plan are communicated are defined;
    guidance: It is important that organizations develop and implement a coordinated approach to incident response. Organizational mission and business functions determine the structure of incident response capabilities. As part of the incident response capabilities, organizations consider the coordination and sharing of information with external organizations, including external service providers and other organizations involved in the supply chain. For incidents involving personally identifiable information (i.e., breaches), include a process to determine whether notice to oversight organizations or affected individuals is appropriate and provide that notice accordingly.
    related_controls:
      - ac-2
      - cp-2
      - cp-4
      - ir-4
      - ir-7
      - ir-9
      - pe-6
      - pl-2
      - sa-15
      - si-12
      - sr-8
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ir-8.1
    title: Breaches
    description: "Include the following in the Incident Response Plan for breaches involving personally identifiable information:\n  a. A process to determine if notice to individuals or other organizations, including oversight organizations, is needed;\n  b. An assessment process to determine the extent of the harm, embarrassment, inconvenience, or unfairness to affected individuals and any mechanisms to mitigate such harms; and\n  c. Identification of applicable privacy requirements."
    guidance: Organizations may be required by law, regulation, or policy to follow specific procedures relating to breaches, including notice to individuals, affected organizations, and oversight bodies; standards of harm; and mitigation or other specific requirements.
    related_controls:
      - pt-1
      - pt-2
      - pt-3
      - pt-4
      - pt-5
      - pt-7
    rules: []
    status: pending
  - id: ir-9
    title: Information Spillage Response
    description: "Respond to information spills by:\n  a. Assigning [[ insert: param, ir-09_odp.01 ]] with responsibility for responding to information spills;\n  b. Identifying the specific information involved in the system contamination;\n  c. Alerting [[ insert: param, ir-09_odp.02 ]] of the information spill using a method of communication not associated with the spill;\n  d. Isolating the contaminated system or system component;\n  e. Eradicating the information from the contaminated system or component;\n  f. Identifying other systems or system components that may have been subsequently contaminated; and\n  g. Performing the following additional actions: [[ insert: param, ir-09_odp.03 ]]."
    parameters:
      - id: ir-09_odp.01
        label: personnel or roles
        guidelines:
          - personnel or roles assigned the responsibility for responding to information spills is/are defined;
      - id: ir-09_odp.02
        label: personnel or roles
        guidelines:
          - personnel or roles to be alerted of the information spill using a method of communication not associated with the spill is/are defined;
      - id: ir-09_odp.03
        label: actions
        guidelines:
          - actions to be performed are defined;
    guidance: Information spillage refers to instances where information is placed on systems that are not authorized to process such information. Information spills occur when information that is thought to be a certain classification or impact level is transmitted to a system and subsequently is determined to be of a higher classification or impact level. At that point, corrective action is required. The nature of the response is based on the classification or impact level of the spilled information, the security capabilities of the system, the specific nature of the contaminated storage media, and the access authorizations of individuals with authorized access to the contaminated system. The methods used to communicate information about the spill after the fact do not involve methods directly associated with the actual spill to minimize the risk of further spreading the contamination before such contamination is isolated and eradicated.
    related_controls:
      - cp-2
      - ir-6
      - pm-26
      - pm-27
      - pt-2
      - pt-3
      - pt-7
      - ra-7
    rules: []
    status: pending
  - id: ir-9.1
    title: Responsible Personnel
    rules: []
    status: pending
  - id: ir-9.2
    title: Training
    description: 'Provide information spillage response training [[ insert: param, ir-09.02_odp ]].'
    parameters:
      - id: ir-09.02_odp
        label: frequency
        guidelines:
          - frequency at which to provide information spillage response training is defined;
    guidance: Organizations establish requirements for responding to information spillage incidents in incident response plans. Incident response training on a regular basis helps to ensure that organizational personnel understand their individual responsibilities and what specific actions to take when spillage incidents occur.
    related_controls:
      - at-2
      - at-3
      - cp-3
      - ir-2
    rules: []
    status: pending
  - id: ir-9.3
    title: Post-spill Operations
    description: 'Implement the following procedures to ensure that organizational personnel impacted by information spills can continue to carry out assigned tasks while contaminated systems are undergoing corrective actions: [[ insert: param, ir-09.03_odp ]].'
    parameters:
      - id: ir-09.03_odp
        label: procedures
        guidelines:
          - procedures to be implemented to ensure that organizational personnel impacted by information spills can continue to carry out assigned tasks while contaminated systems are undergoing corrective actions are defined;
    guidance: Corrective actions for systems contaminated due to information spillages may be time-consuming. Personnel may not have access to the contaminated systems while corrective actions are being taken, which may potentially affect their ability to conduct organizational business.
    rules: []
    status: pending
  - id: ir-9.4
    title: Exposure to Unauthorized Personnel
    description: 'Employ the following controls for personnel exposed to information not within assigned access authorizations: [[ insert: param, ir-09.04_odp ]].'
    parameters:
      - id: ir-09.04_odp
        label: controls
        guidelines:
          - controls employed for personnel exposed to information not within assigned access authorizations are defined;
    guidance: Controls include ensuring that personnel who are exposed to spilled information are made aware of the laws, executive orders, directives, regulations, policies, standards, and guidelines regarding the information and the restrictions imposed based on exposure to such information.
    rules: []
    status: pending
