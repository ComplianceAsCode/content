      levels:
          - l1_server
          - l2_server
      status: pending
      notes: |-
          Check if /etc/apt/sources.list.d/* has permissions 0755 and owned by root:root

    - id: 1.2.2.1
      title: Ensure updates, patches, and additional security software are installed (Manual)
      levels:
        - l1_server
        - l1_workstation
      status: manual

    - id: 1.3.1.1
      title: Ensure AppArmor is installed (Automated) 
      levels:
        - l1_server
        - l1_workstation
      rules:
        - package_apparmor_installed
        - package_apparmor-utils_installed
      status: automated

    - id: 1.3.1.2
      title: Ensure AppArmor is enabled in the bootloader configuration (Automated)
      levels:
          - l1_server
          - l1_workstation
      rules:
          - grub2_enable_apparmor
      status: automated

    - id: 1.3.1.3
      title: Ensure all AppArmor Profiles are enforcing (Automated)
      levels:
          - l2_server
          - l2_workstation
      rules:
          - all_apparmor_profiles_enforced
      status: automated
      notes: |
          CIS recommendation does not adequately address the nuances
          of various profiles, including disabled, force-complain,
          and unconfined. Currently, the control changes the default apparmor
          mode for all profiles in /etc/apparmor.d which can
          break certain applications. See https://workbench.cisecurity.org/benchmarks/18959/tickets/23987

    - id: 1.3.1.4
      title: Ensure apparmor_restrict_unprivileged_unconfined is enabled (Automated)
      levels:
        - l1_server
        - l1_workstation
      status: pending
      notes: |-
          Check if sysctl kernel.apparmor_restrict_unprivileged_unconfined = 1

    - id: 1.4.1
      title: Ensure bootloader password is set (Automated)
      levels:
          - l1_server
          - l1_workstation
      rules:
          - grub2_password
          - grub2_uefi_password
      status: automated

    - id: 1.4.2
