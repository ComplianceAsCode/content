---
policy: CIS Benchmark for Debian 13
title: CIS Benchmark for Debian 13
id: cis_debian13
version: '1.0.0'
source: https://www.cisecurity.org/cis-benchmarks

levels:
    - id: l1_server
    - id: l2_server
      inherits_from:
          - l1_server
    - id: l1_workstation
    - id: l2_workstation
      inherits_from:
