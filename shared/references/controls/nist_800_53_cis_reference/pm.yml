  - id: pm-32
    title: Purposing
    description: 'Analyze [[ insert: param, pm-32_odp ]] supporting mission essential services or functions to ensure that the information resources are being used consistent with their intended purpose.'
    parameters:
      - id: pm-32_odp
        label: systems or system components
        guidelines:
          - the systems or system components supporting mission-essential services or functions are defined;
    guidance: Systems are designed to support a specific mission or business function. However, over time, systems and system components may be used to support services and functions that are outside of the scope of the intended mission or business functions. This can result in exposing information resources to unintended environments and uses that can significantly increase threat exposure. In doing so, the systems are more vulnerable to compromise, which can ultimately impact the services and functions for which they were intended. This is especially impactful for mission-essential services and functions. By analyzing resource use, organizations can identify such potential exposures.
    related_controls:
      - ca-7
      - pl-2
      - ra-3
      - ra-9
    rules: []
    status: pending
