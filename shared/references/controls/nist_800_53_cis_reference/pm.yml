  - id: pm-13
    title: Security and Privacy Workforce
    description: Establish a security and privacy workforce development and improvement program.
    guidance: Security and privacy workforce development and improvement programs include defining the knowledge, skills, and abilities needed to perform security and privacy duties and tasks; developing role-based training programs for individuals assigned security and privacy roles and responsibilities; and providing standards and guidelines for measuring and building individual qualifications for incumbents and applicants for security- and privacy-related positions. Such workforce development and improvement programs can also include security and privacy career paths to encourage security and privacy professionals to advance in the field and fill positions with greater responsibility. The programs encourage organizations to fill security- and privacy-related positions with qualified personnel. Security and privacy workforce development and improvement programs are complementary to organizational security awareness and training programs and focus on developing and institutionalizing the core security and privacy capabilities of personnel needed to protect organizational operations, assets, and individuals.
    related_controls:
      - at-2
      - at-3
    rules: []
    status: pending
  - id: pm-14
    title: Testing, Training, and Monitoring
    description: "  a. Implement a process for ensuring that organizational plans for conducting security and privacy testing, training, and monitoring activities associated with organizational systems:\n    1. Are developed and maintained; and\n    2. Continue to be executed; and\n  b. Review testing, training, and monitoring plans for consistency with the organizational risk management strategy and organization-wide priorities for risk response actions."
    guidance: A process for organization-wide security and privacy testing, training, and monitoring helps ensure that organizations provide oversight for testing, training, and monitoring activities and that those activities are coordinated. With the growing importance of continuous monitoring programs, the implementation of information security and privacy across the three levels of the risk management hierarchy and the widespread use of common controls, organizations coordinate and consolidate the testing and monitoring activities that are routinely conducted as part of ongoing assessments supporting a variety of controls. Security and privacy training activities, while focused on individual systems and specific roles, require coordination across all organizational elements. Testing, training, and monitoring plans and activities are informed by current threat and vulnerability assessments.
    related_controls:
      - at-2
      - at-3
      - ca-7
      - cp-4
      - ir-3
      - pm-12
      - si-4
    rules: []
    status: pending
  - id: pm-15
    title: Security and Privacy Groups and Associations
    description: "Establish and institutionalize contact with selected groups and associations within the security and privacy communities:\n  a. To facilitate ongoing security and privacy education and training for organizational personnel;\n  b. To maintain currency with recommended security and privacy practices, techniques, and technologies; and\n  c. To share current security and privacy information, including threats, vulnerabilities, and incidents."
    guidance: Ongoing contact with security and privacy groups and associations is important in an environment of rapidly changing technologies and threats. Groups and associations include special interest groups, professional associations, forums, news groups, users’ groups, and peer groups of security and privacy professionals in similar organizations. Organizations select security and privacy groups and associations based on mission and business functions. Organizations share threat, vulnerability, and incident information as well as contextual insights, compliance techniques, and privacy problems consistent with applicable laws, executive orders, directives, policies, regulations, standards, and guidelines.
    related_controls:
      - sa-11
      - si-5
    rules: []
    status: pending
  - id: pm-16
    title: Threat Awareness Program
    description: Implement a threat awareness program that includes a cross-organization information-sharing capability for threat intelligence.
    guidance: Because of the constantly changing and increasing sophistication of adversaries, especially the advanced persistent threat (APT), it may be more likely that adversaries can successfully breach or compromise organizational systems. One of the best techniques to address this concern is for organizations to share threat information, including threat events (i.e., tactics, techniques, and procedures) that organizations have experienced, mitigations that organizations have found are effective against certain types of threats, and threat intelligence (i.e., indications and warnings about threats). Threat information sharing may be bilateral or multilateral. Bilateral threat sharing includes government-to-commercial and government-to-government cooperatives. Multilateral threat sharing includes organizations taking part in threat-sharing consortia. Threat information may require special agreements and protection, or it may be freely shared.
    related_controls:
      - ir-4
      - pm-12
    rules: []
    status: pending
  - id: pm-16.1
    title: Automated Means for Sharing Threat Intelligence
    description: Employ automated mechanisms to maximize the effectiveness of sharing threat intelligence information.
    guidance: To maximize the effectiveness of monitoring, it is important to know what threat observables and indicators the sensors need to be searching for. By using well-established frameworks, services, and automated tools, organizations improve their ability to rapidly share and feed the relevant threat detection signatures into monitoring tools.
    rules: []
    status: pending
  - id: pm-17
    title: Protecting Controlled Unclassified Information on External Systems
    description: "  a. Establish policy and procedures to ensure that requirements for the protection of controlled unclassified information that is processed, stored or transmitted on external systems, are implemented in accordance with applicable laws, executive orders, directives, policies, regulations, and standards; and\n  b. Review and update the policy and procedures [[ insert: param, pm-17_prm_1 ]]."
    parameters:
      - id: pm-17_prm_1
        label: organization-defined frequency
      - id: pm-17_odp.01
        label: frequency
        guidelines:
          - the frequency at which to review and update the policy is defined;
      - id: pm-17_odp.02
        label: frequency
        guidelines:
          - the frequency at which to review and update the procedures is defined;
    guidance: Controlled unclassified information is defined by the National Archives and Records Administration along with the safeguarding and dissemination requirements for such information and is codified in [32 CFR 2002](#91f992fb-f668-4c91-a50f-0f05b95ccee3) and, specifically for systems external to the federal organization, [32 CFR 2002.14h](https://www.govinfo.gov/content/pkg/CFR-2017-title32-vol6/xml/CFR-2017-title32-vol6-part2002.xml) . The policy prescribes the specific use and conditions to be implemented in accordance with organizational procedures, including via its contracting processes.
    related_controls:
      - ca-6
      - pm-10
    rules: []
    status: pending
  - id: pm-18
    title: Privacy Program Plan
    description: "  a. Develop and disseminate an organization-wide privacy program plan that provides an overview of the agency’s privacy program, and:\n    1. Includes a description of the structure of the privacy program and the resources dedicated to the privacy program;\n    2. Provides an overview of the requirements for the privacy program and a description of the privacy program management controls and common controls in place or planned for meeting those requirements;\n    3. Includes the role of the senior agency official for privacy and the identification and assignment of roles of other privacy officials and staff and their responsibilities;\n    4. Describes management commitment, compliance, and the strategic goals and objectives of the privacy program;\n    5. Reflects coordination among organizational entities responsible for the different aspects of privacy; and\n    6. Is approved by a senior official with responsibility and accountability for the privacy risk being incurred to organizational operations (including mission, functions, image, and reputation), organizational assets, individuals, other organizations, and the Nation; and\n  b. Update the plan [[ insert: param, pm-18_odp ]] and to address changes in federal privacy laws and policy and organizational changes and problems identified during plan implementation or privacy control assessments."
    parameters:
      - id: pm-18_odp
        label: frequency
        guidelines:
          - the frequency of updates to the privacy program plan is defined;
    guidance: "A privacy program plan is a formal document that provides an overview of an organization’s privacy program, including a description of the structure of the privacy program, the resources dedicated to the privacy program, the role of the senior agency official for privacy and other privacy officials and staff, the strategic goals and objectives of the privacy program, and the program management controls and common controls in place or planned for meeting applicable privacy requirements and managing privacy risks. Privacy program plans can be represented in single documents or compilations of documents.\n\nThe senior agency official for privacy is responsible for designating which privacy controls the organization will treat as program management, common, system-specific, and hybrid controls. Privacy program plans provide sufficient information about the privacy program management and common controls (including the specification of parameters and assignment and selection operations explicitly or by reference) to enable control implementations that are unambiguously compliant with the intent of the plans and a determination of the risk incurred if the plans are implemented as intended.\n\nProgram management controls are generally implemented at the organization level and are essential for managing the organization’s privacy program. Program management controls are distinct from common, system-specific, and hybrid controls because program management controls are independent of any particular information system. Together, the privacy plans for individual systems and the organization-wide privacy program plan provide complete coverage for the privacy controls employed within the organization.\n\nCommon controls are documented in an appendix to the organization’s privacy program plan unless the controls are included in a separate privacy plan for a system. The organization-wide privacy program plan indicates which separate privacy plans contain descriptions of privacy controls."
    related_controls:
      - pm-8
      - pm-9
      - pm-19
    rules: []
    status: pending
  - id: pm-19
    title: Privacy Program Leadership Role
    description: Appoint a senior agency official for privacy with the authority, mission, accountability, and resources to coordinate, develop, and implement, applicable privacy requirements and manage privacy risks through the organization-wide privacy program.
    guidance: The privacy officer is an organizational official. For federal agencies—as defined by applicable laws, executive orders, directives, regulations, policies, standards, and guidelines—this official is designated as the senior agency official for privacy. Organizations may also refer to this official as the chief privacy officer. The senior agency official for privacy also has roles on the data management board (see [PM-23](#pm-23) ) and the data integrity board (see [PM-24](#pm-24)).
    related_controls:
      - pm-18
      - pm-20
      - pm-23
      - pm-24
      - pm-27
    rules: []
    status: pending
  - id: pm-20
    title: Dissemination of Privacy Program Information
    description: "Maintain a central resource webpage on the organization’s principal public website that serves as a central source of information about the organization’s privacy program and that:\n  a. Ensures that the public has access to information about organizational privacy activities and can communicate with its senior agency official for privacy;\n  b. Ensures that organizational privacy practices and reports are publicly available; and\n  c. Employs publicly facing email addresses and/or phone lines to enable the public to provide feedback and/or direct questions to privacy offices regarding privacy practices."
    guidance: For federal agencies, the webpage is located at www.[agency].gov/privacy. Federal agencies include public privacy impact assessments, system of records notices, computer matching notices and agreements, [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) exemption and implementation rules, privacy reports, privacy policies, instructions for individuals making an access or amendment request, email addresses for questions/complaints, blogs, and periodic publications.
    related_controls:
      - ac-3
      - pm-19
      - pt-5
      - pt-6
      - pt-7
      - ra-8
    rules: []
    status: pending
  - id: pm-20.1
    title: Privacy Policies on Websites, Applications, and Digital Services
    description: "Develop and post privacy policies on all external-facing websites, mobile applications, and other digital services, that:\n  a. Are written in plain language and organized in a way that is easy to understand and navigate;\n  b. Provide information needed by the public to make an informed decision about whether and how to interact with the organization; and\n  c. Are updated whenever the organization makes a substantive change to the practices it describes and includes a time/date stamp to inform the public of the date of the most recent changes."
    guidance: Organizations post privacy policies on all external-facing websites, mobile applications, and other digital services. Organizations post a link to the relevant privacy policy on any known, major entry points to the website, application, or digital service. In addition, organizations provide a link to the privacy policy on any webpage that collects personally identifiable information. Organizations may be subject to applicable laws, executive orders, directives, regulations, or policies that require the provision of specific information to the public. Organizational personnel consult with the senior agency official for privacy and legal counsel regarding such requirements.
    rules: []
    status: pending
  - id: pm-21
    title: Accounting of Disclosures
    description: "  a. Develop and maintain an accurate accounting of disclosures of personally identifiable information, including:\n    1. Date, nature, and purpose of each disclosure; and\n    2. Name and address, or other contact information of the individual or organization to which the disclosure was made;\n  b. Retain the accounting of disclosures for the length of the time the personally identifiable information is maintained or five years after the disclosure is made, whichever is longer; and\n  c. Make the accounting of disclosures available to the individual to whom the personally identifiable information relates upon request."
    guidance: "The purpose of accounting of disclosures is to allow individuals to learn to whom their personally identifiable information has been disclosed, to provide a basis for subsequently advising recipients of any corrected or disputed personally identifiable information, and to provide an audit trail for subsequent reviews of organizational compliance with conditions for disclosures. For federal agencies, keeping an accounting of disclosures is required by the [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) ; agencies should consult with their senior agency official for privacy and legal counsel on this requirement and be aware of the statutory exceptions and OMB guidance relating to the provision.\n\nOrganizations can use any system for keeping notations of disclosures, if it can construct from such a system, a document listing of all disclosures along with the required information. Automated mechanisms can be used by organizations to determine when personally identifiable information is disclosed, including commercial services that provide notifications and alerts. Accounting of disclosures may also be used to help organizations verify compliance with applicable privacy statutes and policies governing the disclosure or dissemination of information and dissemination restrictions."
    related_controls:
      - ac-3
      - au-2
      - pt-2
    rules: []
    status: pending
  - id: pm-22
    title: Personally Identifiable Information Quality Management
    description: "Develop and document organization-wide policies and procedures for:\n  a. Reviewing for the accuracy, relevance, timeliness, and completeness of personally identifiable information across the information life cycle;\n  b. Correcting or deleting inaccurate or outdated personally identifiable information;\n  c. Disseminating notice of corrected or deleted personally identifiable information to individuals or other appropriate entities; and\n  d. Appeals of adverse decisions on correction or deletion requests."
    guidance: "Personally identifiable information quality management includes steps that organizations take to confirm the accuracy and relevance of personally identifiable information throughout the information life cycle. The information life cycle includes the creation, collection, use, processing, storage, maintenance, dissemination, disclosure, and disposition of personally identifiable information. Organizational policies and procedures for personally identifiable information quality management are important because inaccurate or outdated personally identifiable information maintained by organizations may cause problems for individuals. Organizations consider the quality of personally identifiable information involved in business functions where inaccurate information may result in adverse decisions or the denial of benefits and services, or the disclosure of the information may cause stigmatization. Correct information, in certain circumstances, can cause problems for individuals that outweigh the benefits of organizations maintaining the information. Organizations consider creating policies and procedures for the removal of such information.\n\nThe senior agency official for privacy ensures that practical means and mechanisms exist and are accessible for individuals or their authorized representatives to seek the correction or deletion of personally identifiable information. Processes for correcting or deleting data are clearly defined and publicly available. Organizations use discretion in determining whether data is to be deleted or corrected based on the scope of requests, the changes sought, and the impact of the changes. Additionally, processes include the provision of responses to individuals of decisions to deny requests for correction or deletion. The responses include the reasons for the decisions, a means to record individual objections to the decisions, and a means of requesting reviews of the initial determinations.\n\nOrganizations notify individuals or their designated representatives when their personally identifiable information is corrected or deleted to provide transparency and confirm the completed action. Due to the complexity of data flows and storage, other entities may need to be informed of the correction or deletion. Notice supports the consistent correction and deletion of personally identifiable information across the data ecosystem."
    related_controls:
      - pm-23
      - si-18
    rules: []
    status: pending
  - id: pm-23
    title: Data Governance Body
    description: 'Establish a Data Governance Body consisting of [[ insert: param, pm-23_odp.01 ]] with [[ insert: param, pm-23_odp.02 ]].'
    parameters:
      - id: pm-23_odp.01
        label: roles
        guidelines:
          - the roles of a Data Governance Body are defined;
      - id: pm-23_odp.02
        label: responsibilities
        guidelines:
          - the responsibilities of a Data Governance Body are defined;
    guidance: A Data Governance Body can help ensure that the organization has coherent policies and the ability to balance the utility of data with security and privacy requirements. The Data Governance Body establishes policies, procedures, and standards that facilitate data governance so that data, including personally identifiable information, is effectively managed and maintained in accordance with applicable laws, executive orders, directives, regulations, policies, standards, and guidance. Responsibilities can include developing and implementing guidelines that support data modeling, quality, integrity, and the de-identification needs of personally identifiable information across the information life cycle as well as reviewing and approving applications to release data outside of the organization, archiving the applications and the released data, and performing post-release monitoring to ensure that the assumptions made as part of the data release continue to be valid. Members include the chief information officer, senior agency information security officer, and senior agency official for privacy. Federal agencies are required to establish a Data Governance Body with specific roles and responsibilities in accordance with the [EVIDACT](#511da9ca-604d-43f7-be41-b862085420a9) and policies set forth under [OMB M-19-23](#d886c141-c832-4ad7-ac6d-4b94f4b550d3).
    related_controls:
      - at-2
      - at-3
      - pm-19
      - pm-22
      - pm-24
      - pt-7
      - si-4
      - si-19
    rules: []
    status: pending
  - id: pm-24
    title: Data Integrity Board
    description: "Establish a Data Integrity Board to:\n  a. Review proposals to conduct or participate in a matching program; and\n  b. Conduct an annual review of all matching programs in which the agency has participated."
    guidance: A Data Integrity Board is the board of senior officials designated by the head of a federal agency and is responsible for, among other things, reviewing the agency’s proposals to conduct or participate in a matching program and conducting an annual review of all matching programs in which the agency has participated. As a general matter, a matching program is a computerized comparison of records from two or more automated [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) systems of records or an automated system of records and automated records maintained by a non-federal agency (or agent thereof). A matching program either pertains to Federal benefit programs or Federal personnel or payroll records. At a minimum, the Data Integrity Board includes the Inspector General of the agency, if any, and the senior agency official for privacy.
    related_controls:
      - ac-4
      - pm-19
      - pm-23
      - pt-2
      - pt-8
    rules: []
    status: pending
  - id: pm-25
    title: Minimization of Personally Identifiable Information Used in Testing, Training, and Research
    description: "  a. Develop, document, and implement policies and procedures that address the use of personally identifiable information for internal testing, training, and research;\n  b. Limit or minimize the amount of personally identifiable information used for internal testing, training, and research purposes;\n  c. Authorize the use of personally identifiable information when such information is required for internal testing, training, and research; and\n  d. Review and update policies and procedures [[ insert: param, pm-25_prm_1 ]]."
    parameters:
      - id: pm-25_prm_1
        label: organization-defined frequency
      - id: pm-25_odp.01
        label: frequency
        guidelines:
          - the frequency for reviewing policies that address the use of personally identifiable information for internal testing, training, and research is defined;
      - id: pm-25_odp.02
        label: frequency
        guidelines:
          - the frequency for updating policies that address the use of personally identifiable information for internal testing, training, and research is defined;
      - id: pm-25_odp.03
        label: frequency
        guidelines:
          - the frequency for reviewing procedures that address the use of personally identifiable information for internal testing, training, and research is defined;
      - id: pm-25_odp.04
        label: frequency
        guidelines:
          - the frequency for updating procedures that address the use of personally identifiable information for internal testing, training, and research is defined;
    guidance: The use of personally identifiable information in testing, research, and training increases the risk of unauthorized disclosure or misuse of such information. Organizations consult with the senior agency official for privacy and/or legal counsel to ensure that the use of personally identifiable information in testing, training, and research is compatible with the original purpose for which it was collected. When possible, organizations use placeholder data to avoid exposure of personally identifiable information when conducting testing, training, and research.
    related_controls:
      - pm-23
      - pt-3
      - sa-3
      - sa-8
      - si-12
    rules: []
    status: pending
  - id: pm-26
    title: Complaint Management
    description: "Implement a process for receiving and responding to complaints, concerns, or questions from individuals about the organizational security and privacy practices that includes:\n  a. Mechanisms that are easy to use and readily accessible by the public;\n  b. All information necessary for successfully filing complaints;\n  c. Tracking mechanisms to ensure all complaints received are reviewed and addressed within [[ insert: param, pm-26_prm_1 ]];\n  d. Acknowledgement of receipt of complaints, concerns, or questions from individuals within [[ insert: param, pm-26_odp.03 ]] ; and\n  e. Response to complaints, concerns, or questions from individuals within [[ insert: param, pm-26_odp.04 ]]."
    parameters:
      - id: pm-26_prm_1
        label: organization-defined time period
      - id: pm-26_odp.01
        label: time period
        guidelines:
          - the time period in which complaints (including concerns or questions) from individuals are to be reviewed is defined;
      - id: pm-26_odp.02
        label: time period
        guidelines:
          - the time period in which complaints (including concerns or questions) from individuals are to be addressed is defined;
      - id: pm-26_odp.03
        label: time period
        guidelines:
          - the time period for acknowledging the receipt of complaints is defined;
      - id: pm-26_odp.04
        label: time period
        guidelines:
          - the time period for responding to complaints is defined;
    guidance: Complaints, concerns, and questions from individuals can serve as valuable sources of input to organizations and ultimately improve operational models, uses of technology, data collection practices, and controls. Mechanisms that can be used by the public include telephone hotline, email, or web-based forms. The information necessary for successfully filing complaints includes contact information for the senior agency official for privacy or other official designated to receive complaints. Privacy complaints may also include personally identifiable information which is handled in accordance with relevant policies and processes.
    related_controls:
      - ir-7
      - ir-9
      - pm-22
      - si-18
    rules: []
    status: pending
  - id: pm-27
    title: Privacy Reporting
    description: "  a. Develop [[ insert: param, pm-27_odp.01 ]] and disseminate to:\n    1. [[ insert: param, pm-27_odp.02 ]] to demonstrate accountability with statutory, regulatory, and policy privacy mandates; and\n    2. [[ insert: param, pm-27_odp.03 ]] and other personnel with responsibility for monitoring privacy program compliance; and\n  b. Review and update privacy reports [[ insert: param, pm-27_odp.04 ]]."
    parameters:
      - id: pm-27_odp.01
        label: privacy reports
        guidelines:
          - privacy reports are defined;
      - id: pm-27_odp.02
        label: oversight bodies
        guidelines:
          - privacy oversight bodies are defined;
      - id: pm-27_odp.03
        label: officials
        guidelines:
          - officials responsible for monitoring privacy program compliance are defined;
      - id: pm-27_odp.04
        label: frequency
        guidelines:
          - the frequency for reviewing and updating privacy reports is defined;
    guidance: Through internal and external reporting, organizations promote accountability and transparency in organizational privacy operations. Reporting can also help organizations to determine progress in meeting privacy compliance requirements and privacy controls, compare performance across the federal government, discover vulnerabilities, identify gaps in policy and implementation, and identify models for success. For federal agencies, privacy reports include annual senior agency official for privacy reports to OMB, reports to Congress required by Implementing Regulations of the 9/11 Commission Act, and other public reports required by law, regulation, or policy, including internal policies of organizations. The senior agency official for privacy consults with legal counsel, where appropriate, to ensure that organizations meet all applicable privacy reporting requirements.
    related_controls:
      - ir-9
      - pm-19
    rules: []
    status: pending
  - id: pm-28
    title: Risk Framing
    description: "  a. Identify and document:\n    1. Assumptions affecting risk assessments, risk responses, and risk monitoring;\n    2. Constraints affecting risk assessments, risk responses, and risk monitoring;\n    3. Priorities and trade-offs considered by the organization for managing risk; and\n    4. Organizational risk tolerance;\n  b. Distribute the results of risk framing activities to [[ insert: param, pm-28_odp.01 ]] ; and\n  c. Review and update risk framing considerations [[ insert: param, pm-28_odp.02 ]]."
    parameters:
      - id: pm-28_odp.01
        label: personnel
        guidelines:
          - the personnel to receive the results of risk framing activities is/are defined;
      - id: pm-28_odp.02
        label: frequency
        guidelines:
          - the frequency for reviewing and updating risk framing considerations is defined;
    guidance: Risk framing is most effective when conducted at the organization level and in consultation with stakeholders throughout the organization including mission, business, and system owners. The assumptions, constraints, risk tolerance, priorities, and trade-offs identified as part of the risk framing process inform the risk management strategy, which in turn informs the conduct of risk assessment, risk response, and risk monitoring activities. Risk framing results are shared with organizational personnel, including mission and business owners, information owners or stewards, system owners, authorizing officials, senior agency information security officer, senior agency official for privacy, and senior accountable official for risk management.
    related_controls:
      - ca-7
      - pm-9
      - ra-3
      - ra-7
    rules: []
    status: pending
  - id: pm-29
    title: Risk Management Program Leadership Roles
    description: "  a. Appoint a Senior Accountable Official for Risk Management to align organizational information security and privacy management processes with strategic, operational, and budgetary planning processes; and\n  b. Establish a Risk Executive (function) to view and analyze risk from an organization-wide perspective and ensure management of risk is consistent across the organization."
    guidance: The senior accountable official for risk management leads the risk executive (function) in organization-wide risk management activities.
    related_controls:
      - pm-2
      - pm-19
    rules: []
    status: pending
  - id: pm-30
    title: Supply Chain Risk Management Strategy
    description: "  a. Develop an organization-wide strategy for managing supply chain risks associated with the development, acquisition, maintenance, and disposal of systems, system components, and system services;\n  b. Implement the supply chain risk management strategy consistently across the organization; and\n  c. Review and update the supply chain risk management strategy on [[ insert: param, pm-30_odp ]] or as required, to address organizational changes."
    parameters:
      - id: pm-30_odp
        label: frequency
        guidelines:
          - the frequency for reviewing and updating the supply chain risk management strategy is defined;
    guidance: An organization-wide supply chain risk management strategy includes an unambiguous expression of the supply chain risk appetite and tolerance for the organization, acceptable supply chain risk mitigation strategies or controls, a process for consistently evaluating and monitoring supply chain risk, approaches for implementing and communicating the supply chain risk management strategy, and the associated roles and responsibilities. Supply chain risk management includes considerations of the security and privacy risks associated with the development, acquisition, maintenance, and disposal of systems, system components, and system services. The supply chain risk management strategy can be incorporated into the organization’s overarching risk management strategy and can guide and inform supply chain policies and system-level supply chain risk management plans. In addition, the use of a risk executive function can facilitate a consistent, organization-wide application of the supply chain risk management strategy. The supply chain risk management strategy is implemented at the organization and mission/business levels, whereas the supply chain risk management plan (see [SR-2](#sr-2) ) is implemented at the system level.
    related_controls:
      - cm-10
      - pm-9
      - sr-1
      - sr-2
      - sr-3
      - sr-4
      - sr-5
      - sr-6
      - sr-7
      - sr-8
      - sr-9
      - sr-11
    rules: []
    status: pending
  - id: pm-30.1
    title: Suppliers of Critical or Mission-essential Items
    description: Identify, prioritize, and assess suppliers of critical or mission-essential technologies, products, and services.
    guidance: The identification and prioritization of suppliers of critical or mission-essential technologies, products, and services is paramount to the mission/business success of organizations. The assessment of suppliers is conducted using supplier reviews (see [SR-6](#sr-6) ) and supply chain risk assessment processes (see [RA-3(1)](#ra-3.1) ). An analysis of supply chain risk can help an organization identify systems or components for which additional supply chain risk mitigations are required.
    related_controls:
      - ra-3
      - sr-6
    rules: []
    status: pending
  - id: pm-31
    title: Continuous Monitoring Strategy
    description: "Develop an organization-wide continuous monitoring strategy and implement continuous monitoring programs that include:\n  a. Establishing the following organization-wide metrics to be monitored: [[ insert: param, pm-31_odp.01 ]];\n  b. Establishing [[ insert: param, pm-31_odp.02 ]] and [[ insert: param, pm-31_odp.03 ]] for control effectiveness;\n  c. Ongoing monitoring of organizationally-defined metrics in accordance with the continuous monitoring strategy;\n  d. Correlation and analysis of information generated by control assessments and monitoring;\n  e. Response actions to address results of the analysis of control assessment and monitoring information; and\n  f. Reporting the security and privacy status of organizational systems to [[ insert: param, pm-31_prm_4 ]] [[ insert: param, pm-31_prm_5 ]]."
    parameters:
      - id: pm-31_prm_4
        label: organization-defined personnel or roles
      - id: pm-31_prm_5
        label: organization-defined frequency
      - id: pm-31_odp.01
        label: metrics
        guidelines:
          - the metrics for organization-wide continuous monitoring are defined;
      - id: pm-31_odp.02
        label: monitoring frequencies
        guidelines:
          - the frequencies for monitoring are defined;
      - id: pm-31_odp.03
        label: assessment frequencies
        guidelines:
          - the frequencies for assessing control effectiveness are defined;
      - id: pm-31_odp.04
        label: personnel or roles
        guidelines:
          - the personnel or roles for reporting the security status of organizational systems to is/are defined;
      - id: pm-31_odp.05
        label: personnel or roles
        guidelines:
          - the personnel or roles for reporting the privacy status of organizational systems to is/are defined;
      - id: pm-31_odp.06
        label: frequency
        guidelines:
          - the frequency at which to report the security status of organizational systems is defined;
      - id: pm-31_odp.07
        label: frequency
        guidelines:
          - the frequency at which to report the privacy status of organizational systems is defined;
    guidance: Continuous monitoring at the organization level facilitates ongoing awareness of the security and privacy posture across the organization to support organizational risk management decisions. The terms "continuous" and "ongoing" imply that organizations assess and monitor their controls and risks at a frequency sufficient to support risk-based decisions. Different types of controls may require different monitoring frequencies. The results of continuous monitoring guide and inform risk response actions by organizations. Continuous monitoring programs allow organizations to maintain the authorizations of systems and common controls in highly dynamic environments of operation with changing mission and business needs, threats, vulnerabilities, and technologies. Having access to security- and privacy-related information on a continuing basis through reports and dashboards gives organizational officials the capability to make effective, timely, and informed risk management decisions, including ongoing authorization decisions. To further facilitate security and privacy risk management, organizations consider aligning organization-defined monitoring metrics with organizational risk tolerance as defined in the risk management strategy. Monitoring requirements, including the need for monitoring, may be referenced in other controls and control enhancements such as, [AC-2g](#ac-2_smt.g), [AC-2(7)](#ac-2.7), [AC-2(12)(a)](#ac-2.12_smt.a), [AC-2(7)(b)](#ac-2.7_smt.b), [AC-2(7)(c)](#ac-2.7_smt.c), [AC-17(1)](#ac-17.1), [AT-4a](#at-4_smt.a), [AU-13](#au-13), [AU-13(1)](#au-13.1), [AU-13(2)](#au-13.2), [CA-7](#ca-7), [CM-3f](#cm-3_smt.f), [CM-6d](#cm-6_smt.d), [CM-11c](#cm-11_smt.c), [IR-5](#ir-5), [MA-2b](#ma-2_smt.b), [MA-3a](#ma-3_smt.a), [MA-4a](#ma-4_smt.a), [PE-3d](#pe-3_smt.d), [PE-6](#pe-6), [PE-14b](#pe-14_smt.b), [PE-16](#pe-16), [PE-20](#pe-20), [PM-6](#pm-6), [PM-23](#pm-23), [PS-7e](#ps-7_smt.e), [SA-9c](#sa-9_smt.c), [SC-5(3)(b)](#sc-5.3_smt.b), [SC-7a](#sc-7_smt.a), [SC-7(24)(b)](#sc-7.24_smt.b), [SC-18b](#sc-18_smt.b), [SC-43b](#sc-43_smt.b), [SI-4](#si-4).
