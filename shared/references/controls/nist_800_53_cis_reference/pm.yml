# NIST 800-53 PM Family: Program Management
controls:
  - id: pm-1
    title: Information Security Program Plan
    description: "  a. Develop and disseminate an organization-wide information security program plan that:\n    1. Provides an overview of the requirements for the security program and a description of the security program management controls and common controls in place or planned for meeting those requirements;\n    2. Includes the identification and assignment of roles, responsibilities, management commitment, coordination among organizational entities, and compliance;\n    3. Reflects the coordination among organizational entities responsible for information security; and\n    4. Is approved by a senior official with responsibility and accountability for the risk being incurred to organizational operations (including mission, functions, image, and reputation), organizational assets, individuals, other organizations, and the Nation;\n  b. Review and update the organization-wide information security program plan [[ insert: param, pm-01_odp.01 ]] and following [[ insert: param, pm-01_odp.02 ]] ; and\n  c. Protect the information security program plan from unauthorized disclosure and modification."
    parameters:
      - id: pm-01_odp.01
        label: frequency
        guidelines:
          - the frequency at which to review and update the organization-wide information security program plan is defined;
      - id: pm-01_odp.02
        label: events
        guidelines:
          - events that trigger the review and update of the organization-wide information security program plan are defined;
    guidance: "An information security program plan is a formal document that provides an overview of the security requirements for an organization-wide information security program and describes the program management controls and common controls in place or planned for meeting those requirements. An information security program plan can be represented in a single document or compilations of documents. Privacy program plans and supply chain risk management plans are addressed separately in [PM-18](#pm-18) and [SR-2](#sr-2) , respectively.\n\nAn information security program plan documents implementation details about program management and common controls. The plan provides sufficient information about the controls (including specification of parameters for assignment and selection operations, explicitly or by reference) to enable implementations that are unambiguously compliant with the intent of the plan and a determination of the risk to be incurred if the plan is implemented as intended. Updates to information security program plans include organizational changes and problems identified during plan implementation or control assessments.\n\nProgram management controls may be implemented at the organization level or the mission or business process level, and are essential for managing the organization’s information security program. Program management controls are distinct from common, system-specific, and hybrid controls because program management controls are independent of any particular system. Together, the individual system security plans and the organization-wide information security program plan provide complete coverage for the security controls employed within the organization.\n\nCommon controls available for inheritance by organizational systems are documented in an appendix to the organization’s information security program plan unless the controls are included in a separate security plan for a system. The organization-wide information security program plan indicates which separate security plans contain descriptions of common controls.\n\nEvents that may precipitate an update to the information security program plan include, but are not limited to, organization-wide assessment or audit findings, security incidents or breaches, or changes in laws, executive orders, directives, regulations, policies, standards, and guidelines."
    related_controls:
      - pl-2
      - pm-18
      - pm-30
      - ra-9
      - si-12
      - sr-2
    rules: []
    status: pending
  - id: pm-2
    title: Information Security Program Leadership Role
    description: Appoint a senior agency information security officer with the mission and resources to coordinate, develop, implement, and maintain an organization-wide information security program.
    guidance: The senior agency information security officer is an organizational official. For federal agencies (as defined by applicable laws, executive orders, regulations, directives, policies, and standards), this official is the senior agency information security officer. Organizations may also refer to this official as the senior information security officer or chief information security officer.
    rules: []
    status: pending
  - id: pm-3
    title: Information Security and Privacy Resources
    description: "  a. Include the resources needed to implement the information security and privacy programs in capital planning and investment requests and document all exceptions to this requirement;\n  b. Prepare documentation required for addressing information security and privacy programs in capital planning and investment requests in accordance with applicable laws, executive orders, directives, policies, regulations, standards; and\n  c. Make available for expenditure, the planned information security and privacy resources."
    guidance: Organizations consider establishing champions for information security and privacy and, as part of including the necessary resources, assign specialized expertise and resources as needed. Organizations may designate and empower an Investment Review Board or similar group to manage and provide oversight for the information security and privacy aspects of the capital planning and investment control process.
    related_controls:
      - pm-4
      - sa-2
    rules: []
    status: pending
  - id: pm-4
    title: Plan of Action and Milestones Process
    description: "  a. Implement a process to ensure that plans of action and milestones for the information security, privacy, and supply chain risk management programs and associated organizational systems:\n    1. Are developed and maintained;\n    2. Document the remedial information security, privacy, and supply chain risk management actions to adequately respond to risk to organizational operations and assets, individuals, other organizations, and the Nation; and\n    3. Are reported in accordance with established reporting requirements.\n  b. Review plans of action and milestones for consistency with the organizational risk management strategy and organization-wide priorities for risk response actions."
    guidance: The plan of action and milestones is a key organizational document and is subject to reporting requirements established by the Office of Management and Budget. Organizations develop plans of action and milestones with an organization-wide perspective, prioritizing risk response actions and ensuring consistency with the goals and objectives of the organization. Plan of action and milestones updates are based on findings from control assessments and continuous monitoring activities. There can be multiple plans of action and milestones corresponding to the information system level, mission/business process level, and organizational/governance level. While plans of action and milestones are required for federal organizations, other types of organizations can help reduce risk by documenting and tracking planned remediations. Specific guidance on plans of action and milestones at the system level is provided in [CA-5](#ca-5).
    related_controls:
      - ca-5
      - ca-7
      - pm-3
      - ra-7
      - si-12
    rules: []
    status: pending
  - id: pm-5
    title: System Inventory
    description: 'Develop and update [[ insert: param, pm-05_odp ]] an inventory of organizational systems.'
    parameters:
      - id: pm-05_odp
        label: frequency
        guidelines:
          - the frequency at which to update the inventory of organizational systems is defined;
    guidance: '[OMB A-130](#27847491-5ce1-4f6a-a1e4-9e483782f0ef) provides guidance on developing systems inventories and associated reporting requirements. System inventory refers to an organization-wide inventory of systems, not system components as described in [CM-8](#cm-8).'
    rules: []
    status: pending
  - id: pm-5.1
    title: Inventory of Personally Identifiable Information
    description: 'Establish, maintain, and update [[ insert: param, pm-05.01_odp ]] an inventory of all systems, applications, and projects that process personally identifiable information.'
    parameters:
      - id: pm-05.01_odp
        label: frequency
        guidelines:
          - the frequency at which to update the inventory of systems, applications, and projects that process personally identifiable information is defined;
    guidance: An inventory of systems, applications, and projects that process personally identifiable information supports the mapping of data actions, providing individuals with privacy notices, maintaining accurate personally identifiable information, and limiting the processing of personally identifiable information when such information is not needed for operational purposes. Organizations may use this inventory to ensure that systems only process the personally identifiable information for authorized purposes and that this processing is still relevant and necessary for the purpose specified therein.
    related_controls:
      - ac-3
      - cm-8
      - cm-12
      - cm-13
      - pl-8
      - pm-22
      - pt-3
      - pt-5
      - si-12
      - si-18
    rules: []
    status: pending
  - id: pm-6
    title: Measures of Performance
    description: Develop, monitor, and report on the results of information security and privacy measures of performance.
    guidance: Measures of performance are outcome-based metrics used by an organization to measure the effectiveness or efficiency of the information security and privacy programs and the controls employed in support of the program. To facilitate security and privacy risk management, organizations consider aligning measures of performance with the organizational risk tolerance as defined in the risk management strategy.
    related_controls:
      - ca-7
      - pm-9
    rules: []
    status: pending
  - id: pm-7
    title: Enterprise Architecture
    description: Develop and maintain an enterprise architecture with consideration for information security, privacy, and the resulting risk to organizational operations and assets, individuals, other organizations, and the Nation.
    guidance: The integration of security and privacy requirements and controls into the enterprise architecture helps to ensure that security and privacy considerations are addressed throughout the system development life cycle and are explicitly related to the organization’s mission and business processes. The process of security and privacy requirements integration also embeds into the enterprise architecture and the organization’s security and privacy architectures consistent with the organizational risk management strategy. For PM-7, security and privacy architectures are developed at a system-of-systems level, representing all organizational systems. For [PL-8](#pl-8) , the security and privacy architectures are developed at a level that represents an individual system. The system-level architectures are consistent with the security and privacy architectures defined for the organization. Security and privacy requirements and control integration are most effectively accomplished through the rigorous application of the Risk Management Framework [SP 800-37](#482e4c99-9dc4-41ad-bba8-0f3f0032c1f8) and supporting security standards and guidelines.
    related_controls:
      - au-6
      - pl-2
      - pl-8
      - pm-11
      - ra-2
      - sa-3
      - sa-8
      - sa-17
    rules: []
    status: pending
  - id: pm-7.1
    title: Offloading
    description: 'Offload [[ insert: param, pm-07.01_odp ]] to other systems, system components, or an external provider.'
    parameters:
      - id: pm-07.01_odp
        label: non-essential functions or services
        guidelines:
          - non-essential functions or services to be offloaded are defined;
    guidance: Not every function or service that a system provides is essential to organizational mission or business functions. Printing or copying is an example of a non-essential but supporting service for an organization. Whenever feasible, such supportive but non-essential functions or services are not co-located with the functions or services that support essential mission or business functions. Maintaining such functions on the same system or system component increases the attack surface of the organization’s mission-essential functions or services. Moving supportive but non-essential functions to a non-critical system, system component, or external provider can also increase efficiency by putting those functions or services under the control of individuals or providers who are subject matter experts in the functions or services.
    related_controls:
      - sa-8
    rules: []
    status: pending
  - id: pm-8
    title: Critical Infrastructure Plan
    description: Address information security and privacy issues in the development, documentation, and updating of a critical infrastructure and key resources protection plan.
    guidance: Protection strategies are based on the prioritization of critical assets and resources. The requirement and guidance for defining critical infrastructure and key resources and for preparing an associated critical infrastructure protection plan are found in applicable laws, executive orders, directives, policies, regulations, standards, and guidelines.
    related_controls:
      - cp-2
      - cp-4
      - pe-18
      - pl-2
      - pm-9
      - pm-11
      - pm-18
      - ra-3
      - si-12
    rules: []
    status: pending
  - id: pm-9
    title: Risk Management Strategy
    description: "  a. Develops a comprehensive strategy to manage:\n    1. Security risk to organizational operations and assets, individuals, other organizations, and the Nation associated with the operation and use of organizational systems; and\n    2. Privacy risk to individuals resulting from the authorized processing of personally identifiable information;\n  b. Implement the risk management strategy consistently across the organization; and\n  c. Review and update the risk management strategy [[ insert: param, pm-09_odp ]] or as required, to address organizational changes."
    parameters:
      - id: pm-09_odp
        label: frequency
        guidelines:
          - the frequency at which to review and update the risk management strategy is defined;
    guidance: An organization-wide risk management strategy includes an expression of the security and privacy risk tolerance for the organization, security and privacy risk mitigation strategies, acceptable risk assessment methodologies, a process for evaluating security and privacy risk across the organization with respect to the organization’s risk tolerance, and approaches for monitoring risk over time. The senior accountable official for risk management (agency head or designated official) aligns information security management processes with strategic, operational, and budgetary planning processes. The risk executive function, led by the senior accountable official for risk management, can facilitate consistent application of the risk management strategy organization-wide. The risk management strategy can be informed by security and privacy risk-related inputs from other sources, both internal and external to the organization, to ensure that the strategy is broad-based and comprehensive. The supply chain risk management strategy described in [PM-30](#pm-30) can also provide useful inputs to the organization-wide risk management strategy.
    related_controls:
