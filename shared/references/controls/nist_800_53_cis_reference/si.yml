  - id: si-3.8
    title: Detect Unauthorized Commands
    description: "  a. Detect the following unauthorized operating system commands through the kernel application programming interface on [[ insert: param, si-03.08_odp.02 ]]: [[ insert: param, si-03.08_odp.01 ]] ; and\n  b. [[ insert: param, si-03.08_odp.03 ]]."
    parameters:
      - id: si-03.08_odp.01
        label: unauthorized operating system commands
        guidelines:
          - system hardware components for which unauthorized operating system commands are to be detected through the kernel application programming interface are defined;
      - id: si-03.08_odp.02
        label: system hardware components
        guidelines:
          - unauthorized operating system commands to be detected are defined;
      - id: si-03.08_odp.03
        label: ''
        choices:
          - issue a warning
          - audit the command execution
          - prevent the execution of the command
    guidance: Detecting unauthorized commands can be applied to critical interfaces other than kernel-based interfaces, including interfaces with virtual machines and privileged applications. Unauthorized operating system commands include commands for kernel functions from system processes that are not trusted to initiate such commands as well as commands for kernel functions that are suspicious even though commands of that type are reasonable for processes to initiate. Organizations can define the malicious commands to be detected by a combination of command types, command classes, or specific instances of commands. Organizations can also define hardware components by component type, component, component location in the network, or a combination thereof. Organizations may select different actions for different types, classes, or instances of malicious commands.
    related_controls:
      - au-2
      - au-6
      - au-12
    rules: []
    status: pending
  - id: si-3.9
    title: Authenticate Remote Commands
    rules: []
    status: pending
  - id: si-3.10
    title: Malicious Code Analysis
    description: "  a. Employ the following tools and techniques to analyze the characteristics and behavior of malicious code: [[ insert: param, si-03.10_odp ]] ; and\n  b. Incorporate the results from malicious code analysis into organizational incident response and flaw remediation processes."
    parameters:
      - id: si-03.10_odp
        label: tools and techniques
        guidelines:
          - tools and techniques to be employed to analyze the characteristics and behavior of malicious code are defined;
    guidance: The use of malicious code analysis tools provides organizations with a more in-depth understanding of adversary tradecraft (i.e., tactics, techniques, and procedures) and the functionality and purpose of specific instances of malicious code. Understanding the characteristics of malicious code facilitates effective organizational responses to current and future threats. Organizations can conduct malicious code analyses by employing reverse engineering techniques or by monitoring the behavior of executing code.
    rules: []
    status: pending
  - id: si-4
    title: System Monitoring
    description: "  a. Monitor the system to detect:\n    1. Attacks and indicators of potential attacks in accordance with the following monitoring objectives: [[ insert: param, si-04_odp.01 ]] ; and\n    2. Unauthorized local, network, and remote connections;\n  b. Identify unauthorized use of the system through the following techniques and methods: [[ insert: param, si-04_odp.02 ]];\n  c. Invoke internal monitoring capabilities or deploy monitoring devices:\n    1. Strategically within the system to collect organization-determined essential information; and\n    2. At ad hoc locations within the system to track specific types of transactions of interest to the organization;\n  d. Analyze detected events and anomalies;\n  e. Adjust the level of system monitoring activity when there is a change in risk to organizational operations and assets, individuals, other organizations, or the Nation;\n  f. Obtain legal opinion regarding system monitoring activities; and\n  g. Provide [[ insert: param, si-04_odp.03 ]] to [[ insert: param, si-04_odp.04 ]] [[ insert: param, si-04_odp.05 ]]."
    parameters:
      - id: si-04_odp.01
        label: monitoring objectives
        guidelines:
          - monitoring objectives to detect attacks and indicators of potential attacks on the system are defined;
      - id: si-04_odp.02
        label: techniques and methods
        guidelines:
          - techniques and methods used to identify unauthorized use of the system are defined;
      - id: si-04_odp.03
        label: system monitoring information
        guidelines:
          - system monitoring information to be provided to personnel or roles is defined;
      - id: si-04_odp.04
        label: personnel or roles
        guidelines:
          - personnel or roles to whom system monitoring information is to be provided is/are defined;
      - id: si-04_odp.05
        label: ''
        choices:
          - as needed
          - '[[ insert: param, si-04_odp.06 ]] '
      - id: si-04_odp.06
        label: frequency
        guidelines:
          - a frequency for providing system monitoring to personnel or roles is defined (if selected);
    guidance: "System monitoring includes external and internal monitoring. External monitoring includes the observation of events occurring at external interfaces to the system. Internal monitoring includes the observation of events occurring within the system. Organizations monitor systems by observing audit activities in real time or by observing other system aspects such as access patterns, characteristics of access, and other actions. The monitoring objectives guide and inform the determination of the events. System monitoring capabilities are achieved through a variety of tools and techniques, including intrusion detection and prevention systems, malicious code protection software, scanning tools, audit record monitoring software, and network monitoring software.\n\nDepending on the security architecture, the distribution and configuration of monitoring devices may impact throughput at key internal and external boundaries as well as at other locations across a network due to the introduction of network throughput latency. If throughput management is needed, such devices are strategically located and deployed as part of an established organization-wide security architecture. Strategic locations for monitoring devices include selected perimeter locations and near key servers and server farms that support critical applications. Monitoring devices are typically employed at the managed interfaces associated with controls [SC-7](#sc-7) and [AC-17](#ac-17) . The information collected is a function of the organizational monitoring objectives and the capability of systems to support such objectives. Specific types of transactions of interest include Hypertext Transfer Protocol (HTTP) traffic that bypasses HTTP proxies. System monitoring is an integral part of organizational continuous monitoring and incident response programs, and output from system monitoring serves as input to those programs. System monitoring requirements, including the need for specific types of system monitoring, may be referenced in other controls (e.g., [AC-2g](#ac-2_smt.g), [AC-2(7)](#ac-2.7), [AC-2(12)(a)](#ac-2.12_smt.a), [AC-17(1)](#ac-17.1), [AU-13](#au-13), [AU-13(1)](#au-13.1), [AU-13(2)](#au-13.2), [CM-3f](#cm-3_smt.f), [CM-6d](#cm-6_smt.d), [MA-3a](#ma-3_smt.a), [MA-4a](#ma-4_smt.a), [SC-5(3)(b)](#sc-5.3_smt.b), [SC-7a](#sc-7_smt.a), [SC-7(24)(b)](#sc-7.24_smt.b), [SC-18b](#sc-18_smt.b), [SC-43b](#sc-43_smt.b) ). Adjustments to levels of system monitoring are based on law enforcement information, intelligence information, or other sources of information. The legality of system monitoring activities is based on applicable laws, executive orders, directives, regulations, policies, standards, and guidelines."
    related_controls:
