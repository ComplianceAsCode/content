# NIST 800-53 SI Family: System and Information Integrity
controls:
  - id: si-1
    title: Policy and Procedures
    description: "  a. Develop, document, and disseminate to [[ insert: param, si-1_prm_1 ]]:\n    1. [[ insert: param, si-01_odp.03 ]] system and information integrity policy that:\n    2. Procedures to facilitate the implementation of the system and information integrity policy and the associated system and information integrity controls;\n  b. Designate an [[ insert: param, si-01_odp.04 ]] to manage the development, documentation, and dissemination of the system and information integrity policy and procedures; and\n  c. Review and update the current system and information integrity:\n    1. Policy [[ insert: param, si-01_odp.05 ]] and following [[ insert: param, si-01_odp.06 ]] ; and\n    2. Procedures [[ insert: param, si-01_odp.07 ]] and following [[ insert: param, si-01_odp.08 ]]."
    parameters:
      - id: si-1_prm_1
        label: organization-defined personnel or roles
      - id: si-01_odp.01
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the system and information integrity policy is to be disseminated is/are defined;
      - id: si-01_odp.02
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the system and information integrity procedures are to be disseminated is/are defined;
      - id: si-01_odp.03
        label: ''
        choices:
          - organization-level
          - mission/business process-level
          - system-level
      - id: si-01_odp.04
        label: official
        guidelines:
          - an official to manage the system and information integrity policy and procedures is defined;
      - id: si-01_odp.05
        label: frequency
        guidelines:
          - the frequency at which the current system and information integrity policy is reviewed and updated is defined;
      - id: si-01_odp.06
        label: events
        guidelines:
          - events that would require the current system and information integrity policy to be reviewed and updated are defined;
      - id: si-01_odp.07
        label: frequency
        guidelines:
          - the frequency at which the current system and information integrity procedures are reviewed and updated is defined;
      - id: si-01_odp.08
        label: events
        guidelines:
          - events that would require the system and information integrity procedures to be reviewed and updated are defined;
    guidance: System and information integrity policy and procedures address the controls in the SI family that are implemented within systems and organizations. The risk management strategy is an important factor in establishing such policies and procedures. Policies and procedures contribute to security and privacy assurance. Therefore, it is important that security and privacy programs collaborate on the development of system and information integrity policy and procedures. Security and privacy program policies and procedures at the organization level are preferable, in general, and may obviate the need for mission- or system-specific policies and procedures. The policy can be included as part of the general security and privacy policy or be represented by multiple policies that reflect the complex nature of organizations. Procedures can be established for security and privacy programs, for mission or business processes, and for systems, if needed. Procedures describe how the policies or controls are implemented and can be directed at the individual or role that is the object of the procedure. Procedures can be documented in system security and privacy plans or in one or more separate documents. Events that may precipitate an update to system and information integrity policy and procedures include assessment or audit findings, security incidents or breaches, or changes in applicable laws, executive orders, directives, regulations, policies, standards, and guidelines. Simply restating controls does not constitute an organizational policy or procedure.
    related_controls:
      - pm-9
      - ps-8
      - sa-8
      - si-12
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: si-2
    title: Flaw Remediation
    description: "  a. Identify, report, and correct system flaws;\n  b. Test software and firmware updates related to flaw remediation for effectiveness and potential side effects before installation;\n  c. Install security-relevant software and firmware updates within [[ insert: param, si-02_odp ]] of the release of the updates; and\n  d. Incorporate flaw remediation into the organizational configuration management process."
    parameters:
      - id: si-02_odp
        label: time period
        guidelines:
          - time period within which to install security-relevant software updates after the release of the updates is defined;
    guidance: "The need to remediate system flaws applies to all types of software and firmware. Organizations identify systems affected by software flaws, including potential vulnerabilities resulting from those flaws, and report this information to designated organizational personnel with information security and privacy responsibilities. Organizations consider establishing a controlled patching environment for mission-critical systems. Security-relevant updates include patches, service packs, and malicious code signatures. Organizations also address flaws discovered during assessments, continuous monitoring, incident response activities, and system error handling. By incorporating flaw remediation into configuration management processes, required remediation actions can be tracked and verified.\n\nOrganization-defined time periods for updating security-relevant software and firmware may vary based on a variety of risk factors, including the security category of the system, the criticality of the update (i.e., severity of the vulnerability related to the discovered flaw), the organizational risk tolerance, the mission supported by the system, or the threat environment. Some types of flaw remediation may require more testing than other types. Organizations determine the type of testing needed for the specific type of flaw remediation activity under consideration and the types of changes that are to be configuration-managed. Flaw remediation testing addresses both effectiveness of addressing security issues and for potential side effects on functionality, system and system component performance and operations. When implementing remediation activities, organizations consider the order and timing of updates to validate correct execution within the system environment, and to support system and component availability needs (i.e., implementing a staggered deployment strategy). In some situations, organizations may determine that the testing of software or firmware updates is not necessary or practical, such as when implementing simple malicious code signature updates. In testing decisions, organizations consider whether security-relevant software or firmware updates are obtained from authorized sources with appropriate digital signatures.\n\nWhen implementing remediation activities, organizations consider the order and timing of updates to validate correct execution within the system environment, and to support system and component availability needs (i.e., implementing a staggered deployment strategy). Organizations verify that software and firmware updates come from authorized sources prior to downloading."
    related_controls:
      - ca-5
      - cm-3
      - cm-4
      - cm-5
      - cm-6
      - cm-8
      - ma-2
      - ra-5
      - sa-8
      - sa-10
      - sa-11
      - si-3
      - si-5
      - si-7
      - si-11
    levels:
      - low
      - moderate
      - high
    rules:
      - ensure_gpgcheck_globally_activated
      {{% if product in ["rhel8", "rhel9"] %}}
      - ensure_gpgcheck_never_disabled
      {{% endif %}}
      - ensure_redhat_gpgkey_installed
    status: automated
  - id: si-2.1
    title: Central Management
    rules: []
    status: pending
  - id: si-2.2
    title: Automated Flaw Remediation Status
    description: 'Determine if system components have applicable security-relevant software and firmware updates installed using [[ insert: param, si-02.02_odp.01 ]] [[ insert: param, si-02.02_odp.02 ]].'
    parameters:
      - id: si-02.02_odp.01
        label: automated mechanisms
        guidelines:
          - automated mechanisms to determine if applicable security-relevant software and firmware updates are installed on system components are defined;
      - id: si-02.02_odp.02
        label: frequency
        guidelines:
          - the frequency at which to determine if applicable security-relevant software and firmware updates are installed on system components is defined;
    guidance: Automated mechanisms can track and determine the status of known flaws for system components.
    related_controls:
      - ca-7
      - si-4
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: si-2.3
    title: Time to Remediate Flaws and Benchmarks for Corrective Actions
    description: "  a. Measure the time between flaw identification and flaw remediation; and\n  b. Establish the following benchmarks for taking corrective actions: [[ insert: param, si-02.03_odp ]]."
    parameters:
      - id: si-02.03_odp
        label: benchmarks
        guidelines:
          - the benchmarks for taking corrective actions are defined;
    guidance: Organizations determine the time it takes on average to correct system flaws after such flaws have been identified and subsequently establish organizational benchmarks (i.e., time frames) for taking corrective actions. Benchmarks can be established by the type of flaw or the severity of the potential vulnerability if the flaw can be exploited.
    rules: []
    status: pending
  - id: si-2.4
    title: Automated Patch Management Tools
    description: 'Employ automated patch management tools to facilitate flaw remediation to the following system components: [[ insert: param, si-02.04_odp ]].'
    parameters:
      - id: si-02.04_odp
        label: components
        guidelines:
          - the system components requiring automated patch management tools to facilitate flaw remediation are defined;
    guidance: Using automated tools to support patch management helps to ensure the timeliness and completeness of system patching operations.
    rules: []
    status: pending
  - id: si-2.5
    title: Automatic Software and Firmware Updates
    description: 'Install [[ insert: param, si-02.05_odp.01 ]] automatically to [[ insert: param, si-02.05_odp.02 ]].'
    parameters:
      - id: si-02.05_odp.01
        label: security-relevant software and firmware updates
        guidelines:
          - security-relevant software and firmware updates to be automatically installed to system components are defined;
      - id: si-02.05_odp.02
        label: system components
        guidelines:
          - system components requiring security-relevant software updates to be automatically installed are defined;
    guidance: Due to system integrity and availability concerns, organizations consider the methodology used to carry out automatic updates. Organizations balance the need to ensure that the updates are installed as soon as possible with the need to maintain configuration management and control with any mission or operational impacts that automatic updates might impose (i.e., implementing a staggered deployment strategy).
    rules: []
    status: pending
  - id: si-2.6
    title: Removal of Previous Versions of Software and Firmware
    description: 'Remove previous versions of [[ insert: param, si-02.06_odp ]] after updated versions have been installed.'
    parameters:
      - id: si-02.06_odp
        label: software and firmware components
        guidelines:
          - software and firmware components to be removed after updated versions have been installed are defined;
    guidance: Previous versions of software or firmware components that are not removed from the system after updates have been installed may be exploited by adversaries. Some products may automatically remove previous versions of software and firmware from the system.
    rules: []
    status: pending
  - id: si-2.7
    title: Root Cause Analysis
    description: "  a. Conduct root cause analysis to identify underlying causes of issues or failures.\n  b. Develop actions to address the root cause of the issue or failure.\n  c. Implement the actions and monitor the implementation for effectiveness."
    guidance: Root cause analysis includes a wide range of approaches, tools, and techniques to systematically identify the underlying cause of issues or failures to systems and systems components (hardware, software, and firmware). Organizations consider the severity of the incident to determine what root cause analysis method is used and how quickly implementation of the remediation actions. The root cause analysis includes a timeline, missed warning signs, key decisions, gaps, mitigations, and verification of effectiveness. The actions identified to address the source of the issue are implemented and integrated into applicable organizational policy, procedures, and control implementation.
    related_controls:
