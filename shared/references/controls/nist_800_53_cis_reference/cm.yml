  - id: cm-7.5
    title: Authorized Software — Allow-by-exception
    description: "  a. Identify [[ insert: param, cm-07.05_odp.01 ]];\n  b. Employ a deny-all, permit-by-exception policy to allow the execution of authorized software programs on the system; and\n  c. Review and update the list of authorized software programs [[ insert: param, cm-07.05_odp.02 ]]."
    parameters:
      - id: cm-07.05_odp.01
        label: software programs
        guidelines:
          - software programs authorized to execute on the system are defined;
      - id: cm-07.05_odp.02
        label: frequency
        guidelines:
          - frequency at which to review and update the list of authorized software programs is defined;
    guidance: Authorized software programs can be limited to specific versions or from a specific source. To facilitate a comprehensive authorized software process and increase the strength of protection for attacks that bypass application level authorized software, software programs may be decomposed into and monitored at different levels of detail. These levels include applications, application programming interfaces, application modules, scripts, system processes, system services, kernel functions, registries, drivers, and dynamic link libraries. The concept of permitting the execution of authorized software may also be applied to user actions, system ports and protocols, IP addresses/ranges, websites, and MAC addresses. Organizations consider verifying the integrity of authorized software programs using digital signatures, cryptographic checksums, or hash functions. Verification of authorized software can occur either prior to execution or at system startup. The identification of authorized URLs for websites is addressed in [CA-3(5)](#ca-3.5) and [SC-7](#sc-7).
    related_controls:
      - cm-2
      - cm-6
      - cm-8
      - cm-10
      - pl-9
      - pm-5
      - sa-10
      - sc-34
      - si-7
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: cm-7.6
    title: Confined Environments with Limited Privileges
    description: 'Require that the following user-installed software execute in a confined physical or virtual machine environment with limited privileges: [[ insert: param, cm-07.06_odp ]].'
    parameters:
      - id: cm-07.06_odp
        label: user-installed software
        guidelines:
          - user-installed software required to be executed in a confined environment is defined;
    guidance: Organizations identify software that may be of concern regarding its origin or potential for containing malicious code. For this type of software, user installations occur in confined environments of operation to limit or contain damage from malicious code that may be executed.
    related_controls:
      - cm-11
      - sc-44
    rules: []
    status: pending
  - id: cm-7.7
    title: Code Execution in Protected Environments
    description: "Allow execution of binary or machine-executable code only in confined physical or virtual machine environments and with the explicit approval of [[ insert: param, cm-07.07_odp ]] when such code is:\n  a. Obtained from sources with limited or no warranty; and/or\n  b. Without the provision of source code."
    parameters:
      - id: cm-07.07_odp
        label: personnel or roles
        guidelines:
          - personnel or roles to explicitly approve execution of binary or machine-executable code is/are defined;
    guidance: Code execution in protected environments applies to all sources of binary or machine-executable code, including commercial software and firmware and open-source software.
    related_controls:
      - cm-10
      - sc-44
    rules: []
    status: pending
  - id: cm-7.8
    title: Binary or Machine Executable Code
    description: "  a. Prohibit the use of binary or machine-executable code from sources with limited or no warranty or without the provision of source code; and\n  b. Allow exceptions only for compelling mission or operational requirements and with the approval of the authorizing official."
    guidance: Binary or machine executable code applies to all sources of binary or machine-executable code, including commercial software and firmware and open-source software. Organizations assess software products without accompanying source code or from sources with limited or no warranty for potential security impacts. The assessments address the fact that software products without the provision of source code may be difficult to review, repair, or extend. In addition, there may be no owners to make such repairs on behalf of organizations. If open-source software is used, the assessments address the fact that there is no warranty, the open-source software could contain back doors or malware, and there may be no support available.
    related_controls:
      - sa-5
      - sa-22
    rules: []
    status: pending
  - id: cm-7.9
    title: Prohibiting The Use of Unauthorized Hardware
    description: "  a. Identify [[ insert: param, cm-07.09_odp.01 ]];\n  b. Prohibit the use or connection of unauthorized hardware components;\n  c. Review and update the list of authorized hardware components [[ insert: param, cm-07.09_odp.02 ]]."
    parameters:
      - id: cm-07.09_odp.01
        label: hardware components
        guidelines:
          - hardware components authorized for system use are defined;
      - id: cm-07.09_odp.02
        label: frequency
        guidelines:
          - frequency at which to review and update the list of authorized hardware components is defined;
    guidance: Hardware components provide the foundation for organizational systems and the platform for the execution of authorized software programs. Managing the inventory of hardware components and controlling which hardware components are permitted to be installed or connected to organizational systems is essential in order to provide adequate security.
    rules: []
    status: pending
  - id: cm-8
    title: System Component Inventory
    description: "  a. Develop and document an inventory of system components that:\n    1. Accurately reflects the system;\n    2. Includes all components within the system;\n    3. Does not include duplicate accounting of components or components assigned to any other system;\n    4. Is at the level of granularity deemed necessary for tracking and reporting; and\n    5. Includes the following information to achieve system component accountability: [[ insert: param, cm-08_odp.01 ]] ; and\n  b. Review and update the system component inventory [[ insert: param, cm-08_odp.02 ]]."
    parameters:
      - id: cm-08_odp.01
        label: information
        guidelines:
          - information deemed necessary to achieve effective system component accountability is defined;
      - id: cm-08_odp.02
        label: frequency
        guidelines:
          - frequency at which to review and update the system component inventory is defined;
    guidance: "System components are discrete, identifiable information technology assets that include hardware, software, and firmware. Organizations may choose to implement centralized system component inventories that include components from all organizational systems. In such situations, organizations ensure that the inventories include system-specific information required for component accountability. The information necessary for effective accountability of system components includes the system name, software owners, software version numbers, hardware inventory specifications, software license information, and for networked components, the machine names and network addresses across all implemented protocols (e.g., IPv4, IPv6). Inventory specifications include date of receipt, cost, model, serial number, manufacturer, supplier information, component type, and physical location.\n\nPreventing duplicate accounting of system components addresses the lack of accountability that occurs when component ownership and system association is not known, especially in large or complex connected systems. Effective prevention of duplicate accounting of system components necessitates use of a unique identifier for each component. For software inventory, centrally managed software that is accessed via other systems is addressed as a component of the system on which it is installed and managed. Software installed on multiple organizational systems and managed at the system level is addressed for each individual system and may appear more than once in a centralized component inventory, necessitating a system association for each software instance in the centralized inventory to avoid duplicate accounting of components. Scanning systems implementing multiple network protocols (e.g., IPv4 and IPv6) can result in duplicate components being identified in different address spaces. The implementation of [CM-8(7)](#cm-8.7) can help to eliminate duplicate accounting of components."
    related_controls:
      - cm-2
      - cm-7
      - cm-9
      - cm-10
      - cm-11
      - cm-13
      - cp-2
      - cp-9
      - ma-2
      - ma-6
      - pe-20
      - pl-9
      - pm-5
      - sa-4
      - sa-5
      - si-2
      - sr-4
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: cm-8.1
    title: Updates During Installation and Removal
    description: Update the inventory of system components as part of component installations, removals, and system updates.
    guidance: Organizations can improve the accuracy, completeness, and consistency of system component inventories if the inventories are updated as part of component installations or removals or during general system updates. If inventories are not updated at these key times, there is a greater likelihood that the information will not be appropriately captured and documented. System updates include hardware, software, and firmware components.
    related_controls:
      - pm-16
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: cm-8.2
    title: Automated Maintenance
    description: 'Maintain the currency, completeness, accuracy, and availability of the inventory of system components using [[ insert: param, cm-8.2_prm_1 ]].'
    parameters:
      - id: cm-8.2_prm_1
        label: organization-defined automated mechanisms
      - id: cm-08.02_odp.01
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to maintain the currency of the system component inventory are defined;
      - id: cm-08.02_odp.02
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to maintain the completeness of the system component inventory are defined;
      - id: cm-08.02_odp.03
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to maintain the accuracy of the system component inventory are defined;
      - id: cm-08.02_odp.04
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to maintain the availability of the system component inventory are defined;
    guidance: Organizations maintain system inventories to the extent feasible. For example, virtual machines can be difficult to monitor because such machines are not visible to the network when not in use. In such cases, organizations maintain as up-to-date, complete, and accurate an inventory as is deemed reasonable. Automated maintenance can be achieved by the implementation of [CM-2(2)](#cm-2.2) for organizations that combine system component inventory and baseline configuration activities.
    levels:
      - high
    rules: []
    status: pending
  - id: cm-8.3
    title: Automated Unauthorized Component Detection
    description: "  a. Detect the presence of unauthorized hardware, software, and firmware components within the system using [[ insert: param, cm-8.3_prm_1 ]] [[ insert: param, cm-08.03_odp.04 ]] ; and\n  b. Take the following actions when unauthorized components are detected: [[ insert: param, cm-08.03_odp.05 ]]."
    parameters:
      - id: cm-8.3_prm_1
        label: organization-defined automated mechanisms
      - id: cm-08.03_odp.01
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to detect the presence of unauthorized hardware within the system are defined;
      - id: cm-08.03_odp.02
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to detect the presence of unauthorized software within the system are defined;
      - id: cm-08.03_odp.03
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to detect the presence of unauthorized firmware within the system are defined;
      - id: cm-08.03_odp.04
        label: frequency
        guidelines:
          - frequency at which automated mechanisms are used to detect the presence of unauthorized system components within the system is defined;
      - id: cm-08.03_odp.05
        label: ''
        choices:
          - disable network access by unauthorized components
          - isolate unauthorized components
          - 'notify [[ insert: param, cm-08.03_odp.06 ]] '
      - id: cm-08.03_odp.06
        label: personnel or roles
        guidelines:
          - personnel or roles to be notified when unauthorized components are detected is/are defined (if selected);
    guidance: 'Automated unauthorized component detection is applied in addition to the monitoring for unauthorized remote connections and mobile devices. Monitoring for unauthorized system components may be accomplished on an ongoing basis or by the periodic scanning of systems for that purpose. Automated mechanisms may also be used to prevent the connection of unauthorized components (see [CM-7(9)](#cm-7.9) ). Automated mechanisms can be implemented in systems or in separate system components. When acquiring and implementing automated mechanisms, organizations consider whether such mechanisms depend on the ability of the system component to support an agent or supplicant in order to be detected since some types of components do not have or cannot support agents (e.g., IoT devices, sensors). Isolation can be achieved , for example, by placing unauthorized system components in separate domains or subnets or quarantining such components. This type of component isolation is commonly referred to as "sandboxing." '
    related_controls:
      - ac-19
      - ca-7
      - ra-5
      - sc-3
      - sc-39
      - sc-44
      - si-3
      - si-4
      - si-7
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: cm-8.4
    title: Accountability Information
    description: 'Include in the system component inventory information, a means for identifying by [[ insert: param, cm-08.04_odp ]] , individuals responsible and accountable for administering those components.'
    parameters:
      - id: cm-08.04_odp
        label: ''
        choices:
          - name
          - position
          - role
    guidance: Identifying individuals who are responsible and accountable for administering system components ensures that the assigned components are properly administered and that organizations can contact those individuals if some action is required (e.g., when the component is determined to be the source of a breach, needs to be recalled or replaced, or needs to be relocated).
    related_controls:
      - ac-3
    levels:
      - high
    rules: []
    status: pending
  - id: cm-8.5
    title: No Duplicate Accounting of Components
    rules: []
    status: pending
  - id: cm-8.6
    title: Assessed Configurations and Approved Deviations
    description: Include assessed component configurations and any approved deviations to current deployed configurations in the system component inventory.
    guidance: Assessed configurations and approved deviations focus on configuration settings established by organizations for system components, the specific components that have been assessed to determine compliance with the required configuration settings, and any approved deviations from established configuration settings.
    rules: []
    status: pending
  - id: cm-8.7
    title: Centralized Repository
    description: Provide a centralized repository for the inventory of system components.
    guidance: Organizations may implement centralized system component inventories that include components from all organizational systems. Centralized repositories of component inventories provide opportunities for efficiencies in accounting for organizational hardware, software, and firmware assets. Such repositories may also help organizations rapidly identify the location and responsible individuals of components that have been compromised, breached, or are otherwise in need of mitigation actions. Organizations ensure that the resulting centralized inventories include system-specific information required for proper component accountability.
    rules: []
    status: pending
  - id: cm-8.8
    title: Automated Location Tracking
    description: 'Support the tracking of system components by geographic location using [[ insert: param, cm-08.08_odp ]].'
    parameters:
      - id: cm-08.08_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms for tracking components are defined;
    guidance: The use of automated mechanisms to track the location of system components can increase the accuracy of component inventories. Such capability may help organizations rapidly identify the location and responsible individuals of system components that have been compromised, breached, or are otherwise in need of mitigation actions. The use of tracking mechanisms can be coordinated with senior agency officials for privacy if there are implications that affect individual privacy.
    rules: []
    status: pending
  - id: cm-8.9
    title: Assignment of Components to Systems
    description: "  a. Assign system components to a system; and\n  b. Receive an acknowledgement from [[ insert: param, cm-08.09_odp ]] of this assignment."
    parameters:
      - id: cm-08.09_odp
        label: personnel or roles
        guidelines:
          - personnel or roles from which to receive an acknowledgement is/are defined;
    guidance: System components that are not assigned to a system may be unmanaged, lack the required protection, and become an organizational vulnerability.
    rules: []
    status: pending
  - id: cm-9
    title: Configuration Management Plan
    description: "Develop, document, and implement a configuration management plan for the system that:\n  a. Addresses roles, responsibilities, and configuration management processes and procedures;\n  b. Establishes a process for identifying configuration items throughout the system development life cycle and for managing the configuration of the configuration items;\n  c. Defines the configuration items for the system and places the configuration items under configuration management;\n  d. Is reviewed and approved by [[ insert: param, cm-09_odp ]] ; and\n  e. Protects the configuration management plan from unauthorized disclosure and modification."
    parameters:
      - id: cm-09_odp
        label: personnel or roles
        guidelines:
          - personnel or roles to review and approve the configuration management plan is/are defined;
    guidance: "Configuration management activities occur throughout the system development life cycle. As such, there are developmental configuration management activities (e.g., the control of code and software libraries) and operational configuration management activities (e.g., control of installed components and how the components are configured). Configuration management plans satisfy the requirements in configuration management policies while being tailored to individual systems. Configuration management plans define processes and procedures for how configuration management is used to support system development life cycle activities.\n\nConfiguration management plans are generated during the development and acquisition stage of the system development life cycle. The plans describe how to advance changes through change management processes; update configuration settings and baselines; maintain component inventories; control development, test, and operational environments; and develop, release, and update key documents.\n\nOrganizations can employ templates to help ensure the consistent and timely development and implementation of configuration management plans. Templates can represent a configuration management plan for the organization with subsets of the plan implemented on a system by system basis. Configuration management approval processes include the designation of key stakeholders responsible for reviewing and approving proposed changes to systems, and personnel who conduct security and privacy impact analyses prior to the implementation of changes to the systems. Configuration items are the system components, such as the hardware, software, firmware, and documentation to be configuration-managed. As systems continue through the system development life cycle, new configuration items may be identified, and some existing configuration items may no longer need to be under configuration control."
    related_controls:
      - cm-2
      - cm-3
      - cm-4
      - cm-5
      - cm-8
      - pl-2
      - ra-8
      - sa-10
      - si-12
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: cm-9.1
    title: Assignment of Responsibility
    description: Assign responsibility for developing the configuration management process to organizational personnel that are not directly involved in system development.
    guidance: In the absence of dedicated configuration management teams assigned within organizations, system developers may be tasked with developing configuration management processes using personnel who are not directly involved in system development or system integration. This separation of duties ensures that organizations establish and maintain a sufficient degree of independence between the system development and integration processes and configuration management processes to facilitate quality control and more effective oversight.
    rules: []
    status: pending
  - id: cm-10
    title: Software Usage Restrictions
    description: "  a. Use software and associated documentation in accordance with contract agreements and copyright laws;\n  b. Track the use of software and associated documentation protected by quantity licenses to control copying and distribution; and\n  c. Control and document the use of peer-to-peer file sharing technology to ensure that this capability is not used for the unauthorized distribution, display, performance, or reproduction of copyrighted work."
    guidance: Software license tracking can be accomplished by manual or automated methods, depending on organizational needs. Examples of contract agreements include software license agreements and non-disclosure agreements.
    related_controls:
      - ac-17
      - au-6
      - cm-7
      - cm-8
      - pm-30
      - sc-7
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: cm-10.1
    title: Open-source Software
    description: 'Establish the following restrictions on the use of open-source software: [[ insert: param, cm-10.01_odp ]].'
    parameters:
      - id: cm-10.01_odp
        label: restrictions
        guidelines:
          - restrictions on the use of open-source software are defined;
    guidance: Open-source software refers to software that is available in source code form. Certain software rights normally reserved for copyright holders are routinely provided under software license agreements that permit individuals to study, change, and improve the software. From a security perspective, the major advantage of open-source software is that it provides organizations with the ability to examine the source code. In some cases, there is an online community associated with the software that inspects, tests, updates, and reports on issues found in software on an ongoing basis. However, remediating vulnerabilities in open-source software may be problematic. There may also be licensing issues associated with open-source software, including the constraints on derivative use of such software. Open-source software that is available only in binary form may increase the level of risk in using such software.
    related_controls:
      - si-7
    rules: []
    status: pending
  - id: cm-11
    title: User-installed Software
    description: "  a. Establish [[ insert: param, cm-11_odp.01 ]] governing the installation of software by users;\n  b. Enforce software installation policies through the following methods: [[ insert: param, cm-11_odp.02 ]] ; and\n  c. Monitor policy compliance [[ insert: param, cm-11_odp.03 ]]."
    parameters:
      - id: cm-11_odp.01
        label: policies
        guidelines:
          - policies governing the installation of software by users are defined;
      - id: cm-11_odp.02
        label: methods
        guidelines:
          - methods used to enforce software installation policies are defined;
      - id: cm-11_odp.03
        label: frequency
        guidelines:
          - frequency with which to monitor compliance is defined;
    guidance: If provided the necessary privileges, users can install software in organizational systems. To maintain control over the software installed, organizations identify permitted and prohibited actions regarding software installation. Permitted software installations include updates and security patches to existing software and downloading new applications from organization-approved "app stores." Prohibited software installations include software with unknown or suspect pedigrees or software that organizations consider potentially malicious. Policies selected for governing user-installed software are organization-developed or provided by some external entity. Policy enforcement methods can include procedural methods and automated methods.
    related_controls:
      - ac-3
      - au-6
      - cm-2
      - cm-3
      - cm-5
      - cm-6
      - cm-7
      - cm-8
      - pl-4
      - si-4
      - si-7
    levels:
      - low
      - moderate
      - high
    rules:
      {{% if product in ["rhel10", "rhel8"] %}}
      - package_xorg-x11-server-Xwayland_removed
      {{% endif %}}
      {{% if product == "rhel9" %}}
      - package_xorg-x11-server-common_removed
      - xwindows_runlevel_target
      {{% endif %}}
    status: automated
  - id: cm-11.1
    title: Alerts for Unauthorized Installations
    rules: []
    status: pending
  - id: cm-11.2
    title: Software Installation with Privileged Status
    description: Allow user installation of software only with explicit privileged status.
    guidance: Privileged status can be obtained, for example, by serving in the role of system administrator.
    related_controls:
      - ac-5
      - ac-6
    rules: []
    status: pending
  - id: cm-11.3
    title: Automated Enforcement and Monitoring
    description: 'Enforce and monitor compliance with software installation policies using [[ insert: param, cm-11.3_prm_1 ]].'
    parameters:
      - id: cm-11.3_prm_1
        label: organization-defined automated mechanisms
      - id: cm-11.03_odp.01
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to enforce compliance are defined;
      - id: cm-11.03_odp.02
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to monitor compliance are defined;
    guidance: Organizations enforce and monitor compliance with software installation policies using automated mechanisms to more quickly detect and respond to unauthorized software installation which can be an indicator of an internal or external hostile attack.
    rules: []
    status: pending
  - id: cm-12
    title: Information Location
    description: "  a. Identify and document the location of [[ insert: param, cm-12_odp ]] and the specific system components on which the information is processed and stored;\n  b. Identify and document the users who have access to the system and system components where the information is processed and stored; and\n  c. Document changes to the location (i.e., system or system components) where the information is processed and stored."
    parameters:
      - id: cm-12_odp
        label: information
        guidelines:
          - information for which the location is to be identified and documented is defined;
    guidance: Information location addresses the need to understand where information is being processed and stored. Information location includes identifying where specific information types and information reside in system components and how information is being processed so that information flow can be understood and adequate protection and policy management provided for such information and system components. The security category of the information is also a factor in determining the controls necessary to protect the information and the system component where the information resides (see [FIPS 199](#628d22a1-6a11-4784-bc59-5cd9497b5445) ). The location of the information and system components is also a factor in the architecture and design of the system (see [SA-4](#sa-4), [SA-8](#sa-8), [SA-17](#sa-17)).
    related_controls:
      - ac-2
      - ac-3
      - ac-4
      - ac-6
      - ac-23
      - cm-8
      - pm-5
      - ra-2
      - sa-4
      - sa-8
      - sa-17
      - sc-4
      - sc-16
      - sc-28
      - si-4
      - si-7
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: cm-12.1
    title: Automated Tools to Support Information Location
    description: 'Use automated tools to identify [[ insert: param, cm-12.01_odp.01 ]] on [[ insert: param, cm-12.01_odp.02 ]] to ensure controls are in place to protect organizational information and individual privacy.'
    parameters:
      - id: cm-12.01_odp.01
        label: information by information type
        guidelines:
          - information to be protected is defined by information type;
      - id: cm-12.01_odp.02
        label: system components
        guidelines:
          - system components where the information is located are defined;
    guidance: The use of automated tools helps to increase the effectiveness and efficiency of the information location capability implemented within the system. Automation also helps organizations manage the data produced during information location activities and share such information across the organization. The output of automated information location tools can be used to guide and inform system architecture and design decisions.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: cm-13
    title: Data Action Mapping
    description: Develop and document a map of system data actions.
    guidance: Data actions are system operations that process personally identifiable information. The processing of such information encompasses the full information life cycle, which includes collection, generation, transformation, use, disclosure, retention, and disposal. A map of system data actions includes discrete data actions, elements of personally identifiable information being processed in the data actions, system components involved in the data actions, and the owners or operators of the system components. Understanding what personally identifiable information is being processed (e.g., the sensitivity of the personally identifiable information), how personally identifiable information is being processed (e.g., if the data action is visible to the individual or is processed in another part of the system), and by whom (e.g., individuals may have different privacy perceptions based on the entity that is processing the personally identifiable information) provides a number of contextual factors that are important to assessing the degree of privacy risk created by the system. Data maps can be illustrated in different ways, and the level of detail may vary based on the mission and business needs of the organization. The data map may be an overlay of any system design artifact that the organization is using. The development of this map may necessitate coordination between the privacy and security programs regarding the covered data actions and the components that are identified as part of the system.
    related_controls:
      - ac-3
      - cm-4
      - cm-12
      - pm-5
      - pm-27
      - pt-2
      - pt-3
      - ra-3
      - ra-8
    rules: []
    status: pending
  - id: cm-14
    title: Signed Components
    description: 'Prevent the installation of [[ insert: param, cm-14_prm_1 ]] without verification that the component has been digitally signed using a certificate that is recognized and approved by the organization.'
    parameters:
      - id: cm-14_prm_1
        label: organization-defined software and firmware components
      - id: cm-14_odp.01
        label: software components
        guidelines:
          - software components requiring verification of a digitally signed certificate before installation are defined;
      - id: cm-14_odp.02
        label: firmware components
        guidelines:
          - firmware components requiring verification of a digitally signed certificate before installation are defined;
    guidance: Software and firmware components prevented from installation unless signed with recognized and approved certificates include software and firmware version updates, patches, service packs, device drivers, and basic input/output system updates. Organizations can identify applicable software and firmware components by type, by specific items, or a combination of both. Digital signatures and organizational verification of such signatures is a method of code authentication.
    related_controls:
      - cm-7
      - sc-12
      - sc-13
      - si-7
    rules: []
    status: pending
