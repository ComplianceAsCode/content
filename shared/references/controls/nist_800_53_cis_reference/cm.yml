  - id: cm-7.4
    title: Unauthorized Software — Deny-by-exception
    description: "  a. Identify [[ insert: param, cm-07.04_odp.01 ]];\n  b. Employ an allow-all, deny-by-exception policy to prohibit the execution of unauthorized software programs on the system; and\n  c. Review and update the list of unauthorized software programs [[ insert: param, cm-07.04_odp.02 ]]."
