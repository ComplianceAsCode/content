  - id: sa-20
    title: Customized Development of Critical Components
    description: 'Reimplement or custom develop the following critical system components: [[ insert: param, sa-20_odp ]].'
    parameters:
      - id: sa-20_odp
        label: critical system
        guidelines:
          - critical system components to be reimplemented or custom-developed are defined;
    guidance: Organizations determine that certain system components likely cannot be trusted due to specific threats to and vulnerabilities in those components for which there are no viable security controls to adequately mitigate risk. Reimplementation or custom development of such components may satisfy requirements for higher assurance and is carried out by initiating changes to system components (including hardware, software, and firmware) such that the standard attacks by adversaries are less likely to succeed. In situations where no alternative sourcing is available and organizations choose not to reimplement or custom develop critical system components, additional controls can be employed. Controls include enhanced auditing, restrictions on source code and system utility access, and protection from deletion of system and application files.
    related_controls:
      - cp-2
      - ra-9
      - sa-8
    rules: []
    status: pending
  - id: sa-21
    title: Developer Screening
    description: "Require that the developer of [[ insert: param, sa-21_odp.01 ]]:\n  a. Has appropriate access authorizations as determined by assigned [[ insert: param, sa-21_odp.02 ]] ; and\n  b. Satisfies the following additional personnel screening criteria: [[ insert: param, sa-21_odp.03 ]]."
    parameters:
      - id: sa-21_odp.01
        label: system, systems component, or system service
        guidelines:
          - the system, systems component, or system service that the developer has access to is/are defined;
      - id: sa-21_odp.02
        label: official government duties
        guidelines:
          - official government duties assigned to the developer are defined;
      - id: sa-21_odp.03
        label: additional personnel screening criteria
        guidelines:
          - additional personnel screening criteria for the developer are defined;
    guidance: Developer screening is directed at external developers. Internal developer screening is addressed by [PS-3](#ps-3) . Because the system, system component, or system service may be used in critical activities essential to the national or economic security interests of the United States, organizations have a strong interest in ensuring that developers are trustworthy. The degree of trust required of developers may need to be consistent with that of the individuals who access the systems, system components, or system services once deployed. Authorization and personnel screening criteria include clearances, background checks, citizenship, and nationality. Developer trustworthiness may also include a review and analysis of company ownership and relationships that the company has with entities that may potentially affect the quality and reliability of the systems, components, or services being developed. Satisfying the required access authorizations and personnel screening criteria includes providing a list of all individuals who are authorized to perform development activities on the selected system, system component, or system service so that organizations can validate that the developer has satisfied the authorization and screening requirements.
    related_controls:
      - ps-2
      - ps-3
      - ps-6
      - ps-7
      - sa-4
      - sr-6
    levels:
      - high
    rules: []
    status: pending
  - id: sa-21.1
    title: Validation of Screening
    rules: []
    status: pending
  - id: sa-22
    title: Unsupported System Components
    description: "  a. Replace system components when support for the components is no longer available from the developer, vendor, or manufacturer; or\n  b. Provide the following options for alternative sources for continued support for unsupported components [[ insert: param, sa-22_odp.01 ]]."
    parameters:
      - id: sa-22_odp.01
        label: ''
        choices:
          - in-house support
          - '[[ insert: param, sa-22_odp.02 ]] '
      - id: sa-22_odp.02
        label: support from external providers
        guidelines:
          - support from external providers is defined (if selected);
    guidance: "Support for system components includes software patches, firmware updates, replacement parts, and maintenance contracts. An example of unsupported components includes when vendors no longer provide critical software patches or product updates, which can result in an opportunity for adversaries to exploit weaknesses in the installed components. Exceptions to replacing unsupported system components include systems that provide critical mission or business capabilities where newer technologies are not available or where the systems are so isolated that installing replacement components is not an option.\n\nAlternative sources for support address the need to provide continued support for system components that are no longer supported by the original manufacturers, developers, or vendors when such components remain essential to organizational mission and business functions. If necessary, organizations can establish in-house support by developing customized patches for critical software components or, alternatively, obtain the services of external providers who provide ongoing support for the designated unsupported components through contractual relationships. Such contractual relationships can include open-source software value-added vendors. The increased risk of using unsupported system components can be mitigated, for example, by prohibiting the connection of such components to public or uncontrolled networks, or implementing other forms of isolation."
    related_controls:
      - pl-2
      - sa-3
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-22.1
    title: Alternative Sources for Continued Support
    rules: []
    status: pending
  - id: sa-23
    title: Specialization
    description: 'Employ [[ insert: param, sa-23_odp.01 ]] on [[ insert: param, sa-23_odp.02 ]] supporting mission essential services or functions to increase the trustworthiness in those systems or components.'
    parameters:
      - id: sa-23_odp.01
        label: ''
        choices:
          - design modification
          - augmentation
          - reconfiguration
      - id: sa-23_odp.02
        label: systems or system components
        guidelines:
          - systems or system components supporting mission-essential services or functions are defined;
    guidance: It is often necessary for a system or system component that supports mission-essential services or functions to be enhanced to maximize the trustworthiness of the resource. Sometimes this enhancement is done at the design level. In other instances, it is done post-design, either through modifications of the system in question or by augmenting the system with additional components. For example, supplemental authentication or non-repudiation functions may be added to the system to enhance the identity of critical resources to other resources that depend on the organization-defined resources.
    related_controls:
      - ra-9
      - sa-8
    rules: []
    status: pending
  - id: sa-24
    title: Design For Cyber Resiliency
    description: "  a. Design organizational systems, system components, or system services to achieve cyber resiliency by:\n    1. Defining the following cyber resiliency goals: [[ insert: param, sa-24_odp.01 ]].\n    2. Defining the following cyber resiliency objectives: [[ insert: param, sa-24_odp.02 ]].\n    3. Defining the following cyber resiliency techniques: [[ insert: param, sa-24_odp.03 ]].\n    4. Defining the following cyber resiliency implementation approaches: [[ insert: param, sa-24_odp.04 ]].\n    5. Defining the following cyber resiliency design principles: [[ insert: param, sa-24_odp.05 ]].\n  b. Implement the selected cyber resiliency goals, objectives, techniques, implementation approaches, and design principles as part of an organizational risk management process or systems security engineering process."
    parameters:
      - id: sa-24_odp.01
        label: cyber resiliency goals
        guidelines:
          - cyber resiliency goals are defined;
      - id: sa-24_odp.02
        label: cyber resiliency objectives
        guidelines:
          - cyber resiliency objectives are defined;
      - id: sa-24_odp.03
        label: cyber resiliency techniques
        guidelines:
          - cyber resiliency techniques are defined;
      - id: sa-24_odp.04
        label: cyber resiliency implementation approaches
        guidelines:
          - cyber resiliency implementation approaches are defined;
      - id: sa-24_odp.05
        label: cyber resiliency design principles
        guidelines:
          - cyber resiliency design principles are defined;
    guidance: "Cyber resiliency is critical to ensuring the survivability of mission critical systems and high value assets. Cyber resiliency focuses on limiting the damage from adversity or the conditions that can cause a loss of assets. Damage can affect: (1) organizations (e.g., loss of reputation, increased existential risk); (2) missions or business functions (e.g., decreased capability to complete current missions and to accomplish future missions); (3) security (e.g., decreased capability to achieve security objectives or to prevent, detect, and respond to cyber incidents); (4) systems (e.g., unauthorized use of system resources or decreased capability to meet system requirements); or (5) specific system elements (e.g., physical destruction; corruption, modification, or fabrication of information).\n\nCyber resiliency goals are intended to help organizations maintain a state of informed preparedness for adversity, continue essential mission or business functions despite adversity, restore mission or business functions during and after adversity, and modify mission or business functions and their supporting capabilities in response to predicted changes in technical, operational, or threat environments.\n\nNIST SP 800-160, Volume 2 provides additional information on the Cyber Resiliency Engineering Framework to include detailed descriptions of cyber resiliency goals, objectives, techniques, implementation approaches, and design principles. NIST SP 800-160, Vol 1 provides additional information on achieving cyber resiliency as an emergent property of an engineered system."
