      - moderate
      - high
    rules: []
    status: pending
  - id: sa-4.1
    title: Functional Properties of Controls
    description: Require the developer of the system, system component, or system service to provide a description of the functional properties of the controls to be implemented.
    guidance: Functional properties of security and privacy controls describe the functionality (i.e., security or privacy capability, functions, or mechanisms) visible at the interfaces of the controls and specifically exclude functionality and data structures internal to the operation of the controls.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-4.2
    title: Design and Implementation Information for Controls
    description: 'Require the developer of the system, system component, or system service to provide design and implementation information for the controls that includes: [[ insert: param, sa-04.02_odp.01 ]] at [[ insert: param, sa-04.02_odp.03 ]].'
    parameters:
      - id: sa-04.02_odp.01
        label: ''
        choices:
          - security-relevant external system interfaces
          - high-level design
          - low-level design
          - source code or hardware schematics
          - '[[ insert: param, sa-04.02_odp.02 ]] '
      - id: sa-04.02_odp.02
        label: design and implementation information
        guidelines:
          - design and implementation information is defined (if selected);
      - id: sa-04.02_odp.03
        label: level of detail
        guidelines:
          - level of detail is defined;
    guidance: Organizations may require different levels of detail in the documentation for the design and implementation of controls in organizational systems, system components, or system services based on mission and business requirements, requirements for resiliency and trustworthiness, and requirements for analysis and testing. Systems can be partitioned into multiple subsystems. Each subsystem within the system can contain one or more modules. The high-level design for the system is expressed in terms of subsystems and the interfaces between subsystems providing security-relevant functionality. The low-level design for the system is expressed in terms of modules and the interfaces between modules providing security-relevant functionality. Design and implementation documentation can include manufacturer, version, serial number, verification hash signature, software libraries used, date of purchase or download, and the vendor or download source. Source code and hardware schematics are referred to as the implementation representation of the system.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-4.3
    title: Development Methods, Techniques, and Practices
    description: "Require the developer of the system, system component, or system service to demonstrate the use of a system development life cycle process that includes:\n  a. [[ insert: param, sa-04.03_odp.01 ]];\n  b. [[ insert: param, sa-04.03_odp.02 ]] ; and\n  c. [[ insert: param, sa-04.03_odp.05 ]]."
    parameters:
      - id: sa-04.03_odp.01
        label: systems engineering methods
        guidelines:
          - systems engineering methods are defined;
      - id: sa-04.03_odp.02
        label: ''
        choices:
          - '[[ insert: param, sa-04.03_odp.03 ]] '
          - '[[ insert: param, sa-04.03_odp.04 ]] '
      - id: sa-04.03_odp.03
        label: system security engineering methods
        guidelines:
          - system security engineering methods are defined (if selected);
      - id: sa-04.03_odp.04
        label: privacy engineering methods
        guidelines:
          - privacy engineering methods are defined (if selected);
      - id: sa-04.03_odp.05
        label: ''
        choices:
          - '[[ insert: param, sa-04.03_odp.06 ]] '
          - '[[ insert: param, sa-04.03_odp.07 ]] '
          - '[[ insert: param, sa-04.03_odp.08 ]] '
      - id: sa-04.03_odp.06
        label: software development methods
        guidelines:
          - software development methods are defined (if selected);
      - id: sa-04.03_odp.07
        label: testing, evaluation, assessment, verification, and validation methods
        guidelines:
          - testing, evaluation, assessment, verification, and validation methods are defined (if selected);
      - id: sa-04.03_odp.08
        label: quality control processes
        guidelines:
          - quality control processes are defined (if selected);
    guidance: Following a system development life cycle that includes state-of-the-practice software development methods, systems engineering methods, systems security and privacy engineering methods, and quality control processes helps to reduce the number and severity of latent errors within systems, system components, and system services. Reducing the number and severity of such errors reduces the number of vulnerabilities in those systems, components, and services. Transparency in the methods and techniques that developers select and implement for systems engineering, systems security and privacy engineering, software development, component and system assessments, and quality control processes provides an increased level of assurance in the trustworthiness of the system, system component, or system service being acquired.
    rules: []
    status: pending
  - id: sa-4.4
    title: Assignment of Components to Systems
    rules: []
    status: pending
  - id: sa-4.5
    title: System, Component, and Service Configurations
    description: "Require the developer of the system, system component, or system service to:\n  a. Deliver the system, component, or service with [[ insert: param, sa-04.05_odp ]] implemented; and\n  b. Use the configurations as the default for any subsequent system, component, or service reinstallation or upgrade."
    parameters:
      - id: sa-04.05_odp
        label: security configurations
        guidelines:
          - security configurations for the system, component, or service are defined;
    guidance: Examples of security configurations include the U.S. Government Configuration Baseline (USGCB), Security Technical Implementation Guides (STIGs), and any limitations on functions, ports, protocols, and services. Security characteristics can include requiring that default passwords have been changed.
    levels:
      - high
    rules: []
    status: pending
  - id: sa-4.6
    title: Use of Information Assurance Products
    description: "  a. Employ only government off-the-shelf or commercial off-the-shelf information assurance and information assurance-enabled information technology products that compose an NSA-approved solution to protect classified information when the networks used to transmit the information are at a lower classification level than the information being transmitted; and\n  b. Ensure that these products have been evaluated and/or validated by NSA or in accordance with NSA-approved procedures."
    guidance: Commercial off-the-shelf IA or IA-enabled information technology products used to protect classified information by cryptographic means may be required to use NSA-approved key management. See [NSA CSFC](#3d575737-98cb-459d-b41c-d7e82b73ad78).
    related_controls:
      - sc-8
      - sc-12
      - sc-13
    rules: []
    status: pending
  - id: sa-4.7
    title: 'NIAP-approved Protection Profiles '
    description: "  a. Limit the use of commercially provided information assurance and information assurance-enabled information technology products to those products that have been successfully evaluated against a National Information Assurance partnership (NIAP)-approved Protection Profile for a specific technology type, if such a profile exists; and\n  b. Require, if no NIAP-approved Protection Profile exists for a specific technology type but a commercially provided information technology product relies on cryptographic functionality to enforce its security policy, that the cryptographic module is FIPS-validated or NSA-approved."
    guidance: See [NIAP CCEVS](#795aff72-3e6c-4b6b-a80a-b14d84b7f544) for additional information on NIAP. See [NIST CMVP](#1acdc775-aafb-4d11-9341-dc6a822e9d38) for additional information on FIPS-validated cryptographic modules.
    related_controls:
      - ia-7
      - sc-12
      - sc-13
    rules: []
    status: pending
  - id: sa-4.8
    title: Continuous Monitoring Plan for Controls
    description: Require the developer of the system, system component, or system service to produce a plan for continuous monitoring of control effectiveness that is consistent with the continuous monitoring program of the organization.
    guidance: The objective of continuous monitoring plans is to determine if the planned, required, and deployed controls within the system, system component, or system service continue to be effective over time based on the inevitable changes that occur. Developer continuous monitoring plans include a sufficient level of detail such that the information can be incorporated into continuous monitoring programs implemented by organizations. Continuous monitoring plans can include the types of control assessment and monitoring activities planned, frequency of control monitoring, and actions to be taken when controls fail or become ineffective.
    related_controls:
      - ca-7
    rules: []
    status: pending
  - id: sa-4.9
    title: Functions, Ports, Protocols, and Services in Use
    description: Require the developer of the system, system component, or system service to identify the functions, ports, protocols, and services intended for organizational use.
    guidance: The identification of functions, ports, protocols, and services early in the system development life cycle (e.g., during the initial requirements definition and design stages) allows organizations to influence the design of the system, system component, or system service. This early involvement in the system development life cycle helps organizations avoid or minimize the use of functions, ports, protocols, or services that pose unnecessarily high risks and understand the trade-offs involved in blocking specific ports, protocols, or services or requiring system service providers to do so. Early identification of functions, ports, protocols, and services avoids costly retrofitting of controls after the system, component, or system service has been implemented. [SA-9](#sa-9) describes the requirements for external system services. Organizations identify which functions, ports, protocols, and services are provided from external sources.
    related_controls:
      - cm-7
      - sa-9
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-4.10
    title: Use of Approved PIV Products
    description: Employ only information technology products on the FIPS 201-approved products list for Personal Identity Verification (PIV) capability implemented within organizational systems.
    guidance: Products on the FIPS 201-approved products list meet NIST requirements for Personal Identity Verification (PIV) of Federal Employees and Contractors. PIV cards are used for multi-factor authentication in systems and organizations.
    related_controls:
      - ia-2
      - ia-8
      - pm-9
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-4.11
    title: System of Records
    description: 'Include [[ insert: param, sa-04.11_odp ]] in the acquisition contract for the operation of a system of records on behalf of an organization to accomplish an organizational mission or function.'
    parameters:
      - id: sa-04.11_odp
        label: Privacy Act requirements
        guidelines:
          - Privacy Act requirements for the operation of a system of records are defined;
    guidance: When, by contract, an organization provides for the operation of a system of records to accomplish an organizational mission or function, the organization, consistent with its authority, causes the requirements of the [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) to be applied to the system of records.
    related_controls:
      - pt-6
    rules: []
    status: pending
  - id: sa-4.12
    title: Data Ownership
    description: "  a. Include organizational data ownership requirements in the acquisition contract; and\n  b. Require all data to be removed from the contractor’s system and returned to the organization within [[ insert: param, sa-04.12_odp ]]."
    parameters:
      - id: sa-04.12_odp
        label: time frame
        guidelines:
          - time frame to remove data from a contractor system and return it to the organization is defined;
    guidance: Contractors who operate a system that contains data owned by an organization initiating the contract have policies and procedures in place to remove the data from their systems and/or return the data in a time frame defined by the contract.
    rules: []
    status: pending
  - id: sa-5
    title: System Documentation
    description: "  a. Obtain or develop administrator documentation for the system, system component, or system service that describes:\n    1. Secure configuration, installation, and operation of the system, component, or service;\n    2. Effective use and maintenance of security and privacy functions and mechanisms; and\n    3. Known vulnerabilities regarding configuration and use of administrative or privileged functions;\n  b. Obtain or develop user documentation for the system, system component, or system service that describes:\n    1. User-accessible security and privacy functions and mechanisms and how to effectively use those functions and mechanisms;\n    2. Methods for user interaction, which enables individuals to use the system, component, or service in a more secure manner and protect individual privacy; and\n    3. User responsibilities in maintaining the security of the system, component, or service and privacy of individuals;\n  c. Document attempts to obtain system, system component, or system service documentation when such documentation is either unavailable or nonexistent and take [[ insert: param, sa-05_odp.01 ]] in response; and\n  d. Distribute documentation to [[ insert: param, sa-05_odp.02 ]]."
    parameters:
      - id: sa-05_odp.01
        label: actions
        guidelines:
          - actions to take when system, system component, or system service documentation is either unavailable or nonexistent are defined;
      - id: sa-05_odp.02
        label: personnel or roles
        guidelines:
          - personnel or roles to distribute system documentation to is/are defined;
    guidance: System artifacts and documentation created by the developer helps organizational personnel understand the implementation and operation of controls. Organizations consider establishing specific measures to determine the quality and completeness of the content provided. System documentation may be used to delineate roles, responsibilities and expectations of the developer and organization, support the management of supply chain risk, incident response, flaw remediation, and other functions. Personnel or roles that require documentation include system owners, system security officers, and system administrators. Attempts to obtain documentation include contacting manufacturers or suppliers and conducting web-based searches. The inability to obtain documentation may occur due to the age of the system or component or the lack of support from developers and contractors. When documentation cannot be obtained, organizations may need to recreate the documentation if it is essential to the implementation or operation of the controls. The protection provided for the documentation is commensurate with the security category or classification of the system. Documentation that addresses system vulnerabilities may require an increased level of protection. Secure operation of the system includes initially starting the system and resuming secure system operation after a lapse in system operation. An example of least privilege in software development is minimizing the functions that operate with elevated privileges (e.g., limiting the tools and functionality that operate in kernel mode)
