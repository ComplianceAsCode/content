  - id: sa-15
    title: Development Process, Standards, and Tools
    description: "  a. Require the developer of the system, system component, or system service to follow a documented development process that:\n    1. Explicitly addresses security and privacy requirements;\n    2. Identifies the standards and tools used in the development process;\n    3. Documents the specific tool options and tool configurations used in the development process; and\n    4. Documents, manages, and ensures the integrity of changes to the process and/or tools used in development; and\n  b. Review the development process, standards, tools, tool options, and tool configurations [[ insert: param, sa-15_odp.01 ]] to determine if the process, standards, tools, tool options and tool configurations selected and employed can satisfy the following security and privacy requirements: [[ insert: param, sa-15_prm_2 ]]."
    parameters:
      - id: sa-15_prm_2
        label: organization-defined security and privacy requirements
      - id: sa-15_odp.01
        label: frequency
        guidelines:
          - frequency at which to review the development process, standards, tools, tool options, and tool configurations is defined;
      - id: sa-15_odp.02
        label: security requirements
        guidelines:
          - security requirements to be satisfied by the process, standards, tools, tool options, and tool configurations are defined;
      - id: sa-15_odp.03
        label: privacy requirements
        guidelines:
          - privacy requirements to be satisfied by the process, standards, tools, tool options, and tool configurations are defined;
    guidance: Development tools include programming languages and computer-aided design systems. Reviews of development processes include the use of maturity models to determine the potential effectiveness of such processes. Maintaining the integrity of changes to tools and processes facilitates effective supply chain risk assessment and mitigation. Such integrity requires configuration control throughout the system development life cycle to track authorized changes and prevent unauthorized changes.
    related_controls:
      - ma-6
      - sa-3
      - sa-4
      - sa-8
      - sa-10
      - sa-11
      - sr-3
      - sr-4
      - sr-5
      - sr-6
      - sr-9
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-15.1
    title: Quality Metrics
    description: "Require the developer of the system, system component, or system service to:\n  a. Define quality metrics at the beginning of the development process; and\n  b. Provide evidence of meeting the quality metrics [[ insert: param, sa-15.01_odp.01 ]]."
    parameters:
      - id: sa-15.01_odp.01
        label: ''
        choices:
          - '[[ insert: param, sa-15.01_odp.02 ]] '
          - '[[ insert: param, sa-15.01_odp.03 ]] '
          - upon delivery
      - id: sa-15.01_odp.02
        label: frequency
        guidelines:
          - frequency at which to provide evidence of meeting the quality metrics is defined (if selected);
      - id: sa-15.01_odp.03
        label: program review
        guidelines:
          - program review milestones are defined (if selected);
    guidance: Organizations use quality metrics to establish acceptable levels of system quality. Metrics can include quality gates, which are collections of completion criteria or sufficiency standards that represent the satisfactory execution of specific phases of the system development project. For example, a quality gate may require the elimination of all compiler warnings or a determination that such warnings have no impact on the effectiveness of required security or privacy capabilities. During the execution phases of development projects, quality gates provide clear, unambiguous indications of progress. Other metrics apply to the entire development project. Metrics can include defining the severity thresholds of vulnerabilities in accordance with organizational risk tolerance, such as requiring no known vulnerabilities in the delivered system with a Common Vulnerability Scoring System (CVSS) severity of medium or high.
    rules: []
    status: pending
  - id: sa-15.2
    title: Security and Privacy Tracking Tools
    description: Require the developer of the system, system component, or system service to select and employ security and privacy tracking tools for use during the development process.
    guidance: System development teams select and deploy security and privacy tracking tools, including vulnerability or work item tracking systems that facilitate assignment, sorting, filtering, and tracking of completed work items or tasks associated with development processes.
    related_controls:
      - sa-11
    rules: []
    status: pending
  - id: sa-15.3
    title: Criticality Analysis
    description: "Require the developer of the system, system component, or system service to perform a criticality analysis:\n  a. At the following decision points in the system development life cycle: [[ insert: param, sa-15.03_odp.01 ]] ; and\n  b. At the following level of rigor: [[ insert: param, sa-15.3_prm_2 ]]."
    parameters:
      - id: sa-15.3_prm_2
        label: organization-defined breadth and depth of criticality analysis
      - id: sa-15.03_odp.01
        label: decision points
        guidelines:
          - decision points in the system development life cycle are defined;
      - id: sa-15.03_odp.02
        label: breadth
        guidelines:
          - the breadth of criticality analysis is defined;
      - id: sa-15.03_odp.03
        label: depth
        guidelines:
          - the depth of criticality analysis is defined;
    guidance: Criticality analysis performed by the developer provides input to the criticality analysis performed by organizations. Developer input is essential to organizational criticality analysis because organizations may not have access to detailed design documentation for system components that are developed as commercial off-the-shelf products. Such design documentation includes functional specifications, high-level designs, low-level designs, source code, and hardware schematics. Criticality analysis is important for organizational systems that are designated as high value assets. High value assets can be moderate- or high-impact systems due to heightened adversarial interest or potential adverse effects on the federal enterprise. Developer input is especially important when organizations conduct supply chain criticality analyses.
    related_controls:
      - ra-9
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-15.4
    title: Threat Modeling and Vulnerability Analysis
    rules: []
    status: pending
  - id: sa-15.5
    title: Attack Surface Reduction
    description: 'Require the developer of the system, system component, or system service to reduce attack surfaces to [[ insert: param, sa-15.05_odp ]].'
    parameters:
      - id: sa-15.05_odp
        label: thresholds
        guidelines:
          - thresholds to which attack surfaces are to be reduced are defined;
    guidance: Attack surface reduction is closely aligned with threat and vulnerability analyses and system architecture and design. Attack surface reduction is a means of reducing risk to organizations by giving attackers less opportunity to exploit weaknesses or deficiencies (i.e., potential vulnerabilities) within systems, system components, and system services. Attack surface reduction includes implementing the concept of layered defenses, applying the principles of least privilege and least functionality, applying secure software development practices, deprecating unsafe functions, reducing entry points available to unauthorized users, reducing the amount of code that executes, and eliminating application programming interfaces (APIs) that are vulnerable to attacks.
    related_controls:
      - ac-6
      - cm-7
      - ra-3
      - sa-11
    rules: []
    status: pending
  - id: sa-15.6
    title: Continuous Improvement
    description: Require the developer of the system, system component, or system service to implement an explicit process to continuously improve the development process.
    guidance: Developers of systems, system components, and system services consider the effectiveness and efficiency of their development processes for meeting quality objectives and addressing the security and privacy capabilities in current threat environments.
    rules: []
    status: pending
  - id: sa-15.7
    title: Automated Vulnerability Analysis
    description: "Require the developer of the system, system component, or system service [[ insert: param, sa-15.07_odp.01 ]] to:\n  a. Perform an automated vulnerability analysis using [[ insert: param, sa-15.07_odp.02 ]];\n  b. Determine the exploitation potential for discovered vulnerabilities;\n  c. Determine potential risk mitigations for delivered vulnerabilities; and\n  d. Deliver the outputs of the tools and results of the analysis to [[ insert: param, sa-15.07_odp.03 ]]."
    parameters:
      - id: sa-15.07_odp.01
        label: frequency
        guidelines:
          - frequency at which to conduct vulnerability analysis is defined;
      - id: sa-15.07_odp.02
        label: tools
        guidelines:
          - tools used to perform automated vulnerability analysis are defined;
      - id: sa-15.07_odp.03
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the outputs of tools and results of the analysis are to be delivered is/are defined;
    guidance: Automated tools can be more effective at analyzing exploitable weaknesses or deficiencies in large and complex systems, prioritizing vulnerabilities by severity, and providing recommendations for risk mitigations.
    related_controls:
      - ra-5
      - sa-11
    rules: []
    status: pending
  - id: sa-15.8
    title: Reuse of Threat and Vulnerability Information
    description: Require the developer of the system, system component, or system service to use threat modeling and vulnerability analyses from similar systems, components, or services to inform the current development process.
    guidance: Analysis of vulnerabilities found in similar software applications can inform potential design and implementation issues for systems under development. Similar systems or system components may exist within developer organizations. Vulnerability information is available from a variety of public and private sector sources, including the NIST National Vulnerability Database.
    rules: []
    status: pending
  - id: sa-15.9
    title: Use of Live Data
    rules: []
    status: pending
  - id: sa-15.10
    title: Incident Response Plan
    description: Require the developer of the system, system component, or system service to provide, implement, and test an incident response plan.
    guidance: The incident response plan provided by developers may provide information not readily available to organizations and be incorporated into organizational incident response plans. Developer information may also be extremely helpful, such as when organizations respond to vulnerabilities in commercial off-the-shelf products.
    related_controls:
      - ir-8
    rules: []
    status: pending
  - id: sa-15.11
    title: Archive System or Component
    description: Require the developer of the system or system component to archive the system or component to be released or delivered together with the corresponding evidence supporting the final security and privacy review.
    guidance: Archiving system or system components requires the developer to retain key development artifacts, including hardware specifications, source code, object code, and relevant documentation from the development process that can provide a readily available configuration baseline for system and component upgrades or modifications.
    related_controls:
      - cm-2
    rules: []
    status: pending
  - id: sa-15.12
    title: Minimize Personally Identifiable Information
    description: Require the developer of the system or system component to minimize the use of personally identifiable information in development and test environments.
    guidance: Organizations can minimize the risk to an individual’s privacy by using techniques such as de-identification or synthetic data. Limiting the use of personally identifiable information in development and test environments helps reduce the level of privacy risk created by a system.
    related_controls:
      - pm-25
      - sa-3
      - sa-8
    rules: []
    status: pending
  - id: sa-15.13
    title: Logging Syntax
    description: Require the developer of the system or system component to minimize the use of personally identifiable information in development and test environments.
    parameters:
      - id: sa-15.13_odp.01
        label: secure logging format(s)
        guidelines:
          - secure logging format(s) are defined;
      - id: sa-15.13_odp.02
        label: events types to log
        guidelines:
          - events types to log are defined;
      - id: sa-15.13_odp.03
        label: level of detail to log
        guidelines:
          - level of detail to log is defined;
    guidance: In support of better incident response and the ability to more quickly reconstruct security-related actions, identifying specific requirements for secure logging facilitates the ability to connect application-produced audit event logs with operational data. Event types are consistent with the event types defined in [AU-02](#au-2).
    related_controls:
      - au-2
      - au-3
      - ir-4
      - ir-8
      - sa-5
    rules: []
    status: pending
  - id: sa-16
    title: Developer-provided Training
    description: 'Require the developer of the system, system component, or system service to provide the following training on the correct use and operation of the implemented security and privacy functions, controls, and/or mechanisms: [[ insert: param, sa-16_odp ]].'
    parameters:
      - id: sa-16_odp
        label: training
        guidelines:
          - training on the correct use and operation of the implemented security and privacy functions, controls, and/or mechanisms provided by the developer of the system, system component, or system service is defined;
    guidance: Developer-provided training applies to external and internal (in-house) developers. Training personnel is essential to ensuring the effectiveness of the controls implemented within organizational systems. Types of training include web-based and computer-based training, classroom-style training, and hands-on training (including micro-training). Organizations can also request training materials from developers to conduct in-house training or offer self-training to organizational personnel. Organizations determine the type of training necessary and may require different types of training for different security and privacy functions, controls, and mechanisms.
    related_controls:
      - at-2
      - at-3
      - pe-3
      - sa-4
      - sa-5
    levels:
      - high
    rules: []
    status: pending
  - id: sa-17
    title: Developer Security and Privacy Architecture and Design
    description: "Require the developer of the system, system component, or system service to produce a design specification and security and privacy architecture that:\n  a. Is consistent with the organization’s security and privacy architecture that is an integral part the organization’s enterprise architecture;\n  b. Accurately and completely describes the required security and privacy functionality, and the allocation of controls among physical and logical components; and\n  c. Expresses how individual security and privacy functions, mechanisms, and services work together to provide required security and privacy capabilities and a unified approach to protection."
    guidance: Developer security and privacy architecture and design are directed at external developers, although they could also be applied to internal (in-house) development. In contrast, [PL-8](#pl-8) is directed at internal developers to ensure that organizations develop a security and privacy architecture that is integrated with the enterprise architecture. The distinction between SA-17 and [PL-8](#pl-8) is especially important when organizations outsource the development of systems, system components, or system services and when there is a requirement to demonstrate consistency with the enterprise architecture and security and privacy architecture of the organization. [ISO 15408-2](#87087451-2af5-43d4-88c1-d66ad850f614), [ISO 15408-3](#4452efc0-e79e-47b8-aa30-b54f3ef61c2f) , and [SP 800-160-1](#e3cc0520-a366-4fc9-abc2-5272db7e3564) provide information on security architecture and design, including formal policy models, security-relevant components, formal and informal correspondence, conceptually simple design, and structuring for least privilege and testing.
    related_controls:
      - pl-2
      - pl-8
      - pm-7
      - sa-3
      - sa-4
      - sa-8
      - sc-7
    levels:
      - high
    rules: []
    status: pending
  - id: sa-17.1
    title: Formal Policy Model
    description: "Require the developer of the system, system component, or system service to:\n  a. Produce, as an integral part of the development process, a formal policy model describing the [[ insert: param, sa-17.1_prm_1 ]] to be enforced; and\n  b. Prove that the formal policy model is internally consistent and sufficient to enforce the defined elements of the organizational security and privacy policy when implemented."
    parameters:
      - id: sa-17.1_prm_1
        label: organization-defined elements of organizational security and privacy policy
      - id: sa-17.01_odp.01
        label: organizational security policy
        guidelines:
          - organizational security policy to be enforced is defined;
      - id: sa-17.01_odp.02
        label: organizational privacy policy
        guidelines:
          - organizational privacy policy to be enforced is defined;
    guidance: Formal models describe specific behaviors or security and privacy policies using formal languages, thus enabling the correctness of those behaviors and policies to be formally proven. Not all components of systems can be modeled. Generally, formal specifications are scoped to the behaviors or policies of interest, such as nondiscretionary access control policies. Organizations choose the formal modeling language and approach based on the nature of the behaviors and policies to be described and the available tools.
    related_controls:
      - ac-3
      - ac-4
      - ac-25
    rules: []
    status: pending
  - id: sa-17.2
    title: Security-relevant Components
    description: "Require the developer of the system, system component, or system service to:\n  a. Define security-relevant hardware, software, and firmware; and\n  b. Provide a rationale that the definition for security-relevant hardware, software, and firmware is complete."
    guidance: The security-relevant hardware, software, and firmware represent the portion of the system, component, or service that is trusted to perform correctly to maintain required security properties.
    related_controls:
      - ac-25
      - sa-5
    rules: []
    status: pending
  - id: sa-17.3
    title: Formal Correspondence
    description: "Require the developer of the system, system component, or system service to:\n  a. Produce, as an integral part of the development process, a formal top-level specification that specifies the interfaces to security-relevant hardware, software, and firmware in terms of exceptions, error messages, and effects;\n  b. Show via proof to the extent feasible with additional informal demonstration as necessary, that the formal top-level specification is consistent with the formal policy model;\n  c. Show via informal demonstration, that the formal top-level specification completely covers the interfaces to security-relevant hardware, software, and firmware;\n  d. Show that the formal top-level specification is an accurate description of the implemented security-relevant hardware, software, and firmware; and\n  e. Describe the security-relevant hardware, software, and firmware mechanisms not addressed in the formal top-level specification but strictly internal to the security-relevant hardware, software, and firmware."
    guidance: Correspondence is an important part of the assurance gained through modeling. It demonstrates that the implementation is an accurate transformation of the model, and that any additional code or implementation details that are present have no impact on the behaviors or policies being modeled. Formal methods can be used to show that the high-level security properties are satisfied by the formal system description, and that the formal system description is correctly implemented by a description of some lower level, including a hardware description. Consistency between the formal top-level specification and the formal policy models is generally not amenable to being fully proven. Therefore, a combination of formal and informal methods may be needed to demonstrate such consistency. Consistency between the formal top-level specification and the actual implementation may require the use of an informal demonstration due to limitations on the applicability of formal methods to prove that the specification accurately reflects the implementation. Hardware, software, and firmware mechanisms internal to security-relevant components include mapping registers and direct memory input and output.
    related_controls:
      - ac-3
      - ac-4
      - ac-25
      - sa-4
      - sa-5
    rules: []
    status: pending
  - id: sa-17.4
    title: Informal Correspondence
    description: "Require the developer of the system, system component, or system service to:\n  a. Produce, as an integral part of the development process, an informal descriptive top-level specification that specifies the interfaces to security-relevant hardware, software, and firmware in terms of exceptions, error messages, and effects;\n  b. Show via [[ insert: param, sa-17.04_odp ]] that the descriptive top-level specification is consistent with the formal policy model;\n  c. Show via informal demonstration, that the descriptive top-level specification completely covers the interfaces to security-relevant hardware, software, and firmware;\n  d. Show that the descriptive top-level specification is an accurate description of the interfaces to security-relevant hardware, software, and firmware; and\n  e. Describe the security-relevant hardware, software, and firmware mechanisms not addressed in the descriptive top-level specification but strictly internal to the security-relevant hardware, software, and firmware."
    parameters:
      - id: sa-17.04_odp
        label: ''
        choices:
          - informal demonstration, convincing argument with formal methods as feasible
    guidance: Correspondence is an important part of the assurance gained through modeling. It demonstrates that the implementation is an accurate transformation of the model, and that additional code or implementation detail has no impact on the behaviors or policies being modeled. Consistency between the descriptive top-level specification (i.e., high-level/low-level design) and the formal policy model is generally not amenable to being fully proven. Therefore, a combination of formal and informal methods may be needed to show such consistency. Hardware, software, and firmware mechanisms strictly internal to security-relevant hardware, software, and firmware include mapping registers and direct memory input and output.
    related_controls:
      - ac-3
      - ac-4
      - ac-25
      - sa-4
      - sa-5
    rules: []
    status: pending
  - id: sa-17.5
    title: Conceptually Simple Design
    description: "Require the developer of the system, system component, or system service to:\n  a. Design and structure the security-relevant hardware, software, and firmware to use a complete, conceptually simple protection mechanism with precisely defined semantics; and\n  b. Internally structure the security-relevant hardware, software, and firmware with specific regard for this mechanism."
    guidance: The principle of reduced complexity states that the system design is as simple and small as possible (see [SA-8(7)](#sa-8.7) ). A small and simple design is easier to understand and analyze and is also less prone to error (see [AC-25](#ac-25), [SA-8(13)](#sa-8.13) ). The principle of reduced complexity applies to any aspect of a system, but it has particular importance for security due to the various analyses performed to obtain evidence about the emergent security property of the system. For such analyses to be successful, a small and simple design is essential. Application of the principle of reduced complexity contributes to the ability of system developers to understand the correctness and completeness of system security functions and facilitates the identification of potential vulnerabilities. The corollary of reduced complexity states that the simplicity of the system is directly related to the number of vulnerabilities it will contain. That is, simpler systems contain fewer vulnerabilities. An important benefit of reduced complexity is that it is easier to understand whether the security policy has been captured in the system design and that fewer vulnerabilities are likely to be introduced during engineering development. An additional benefit is that any such conclusion about correctness, completeness, and existence of vulnerabilities can be reached with a higher degree of assurance in contrast to conclusions reached in situations where the system design is inherently more complex.
    related_controls:
      - ac-25
      - sa-8
      - sc-3
    rules: []
    status: pending
  - id: sa-17.6
    title: Structure for Testing
    description: Require the developer of the system, system component, or system service to structure security-relevant hardware, software, and firmware to facilitate testing.
    guidance: Applying the security design principles in [SP 800-160-1](#e3cc0520-a366-4fc9-abc2-5272db7e3564) promotes complete, consistent, and comprehensive testing and evaluation of systems, system components, and services. The thoroughness of such testing contributes to the evidence produced to generate an effective assurance case or argument as to the trustworthiness of the system, system component, or service.
    related_controls:
      - sa-5
      - sa-11
    rules: []
    status: pending
  - id: sa-17.7
    title: Structure for Least Privilege
    description: Require the developer of the system, system component, or system service to structure security-relevant hardware, software, and firmware to facilitate controlling access with least privilege.
    guidance: "The principle of least privilege states that each component is allocated sufficient privileges to accomplish its specified functions but no more (see [SA-8(14)](#sa-8.14) ). Applying the principle of least privilege limits the scope of the component’s actions, which has two desirable effects. First, the security impact of a failure, corruption, or misuse of the system component results in a minimized security impact. Second, the security analysis of the component is simplified. Least privilege is a pervasive principle that is reflected in all aspects of the secure system design. Interfaces used to invoke component capability are available to only certain subsets of the user population, and component design supports a sufficiently fine granularity of privilege decomposition. For example, in the case of an audit mechanism, there may be an interface for the audit manager, who configures the audit settings; an interface for the audit operator, who ensures that audit data is safely collected and stored; and, finally, yet another interface for the audit reviewer, who only has a need to view the audit data that has been collected but no need to perform operations on that data.\n\nIn addition to its manifestations at the system interface, least privilege can be used as a guiding principle for the internal structure of the system itself. One aspect of internal least privilege is to construct modules so that only the elements encapsulated by the module are directly operated upon by the functions within the module. Elements external to a module that may be affected by the module’s operation are indirectly accessed through interaction (e.g., via a function call) with the module that contains those elements. Another aspect of internal least privilege is that the scope of a given module or component includes only those system elements that are necessary for its functionality, and the access modes to the elements (e.g., read, write) are minimal."
    related_controls:
      - ac-5
      - ac-6
      - sa-8
    rules: []
    status: pending
  - id: sa-17.8
    title: Orchestration
    description: 'Design [[ insert: param, sa-17.08_odp.01 ]] with coordinated behavior to implement the following capabilities: [[ insert: param, sa-17.08_odp.02 ]].'
    parameters:
      - id: sa-17.08_odp.01
        label: critical systems
        guidelines:
          - critical systems or system components are defined;
      - id: sa-17.08_odp.02
        label: capabilities
        guidelines:
          - capabilities to be implemented by systems or components are defined;
    guidance: Security resources that are distributed, located at different layers or in different system elements, or are implemented to support different aspects of trustworthiness can interact in unforeseen or incorrect ways. Adverse consequences can include cascading failures, interference, or coverage gaps. Coordination of the behavior of security resources (e.g., by ensuring that one patch is installed across all resources before making a configuration change that assumes that the patch is propagated) can avert such negative interactions.
    rules: []
    status: pending
  - id: sa-17.9
    title: Design Diversity
    description: 'Use different designs for [[ insert: param, sa-17.09_odp ]] to satisfy a common set of requirements or to provide equivalent functionality.'
    parameters:
      - id: sa-17.09_odp
        label: critical systems
        guidelines:
          - critical systems or system components to be designed differently are defined;
    guidance: Design diversity is achieved by supplying the same requirements specification to multiple developers, each of whom is responsible for developing a variant of the system or system component that meets the requirements. Variants can be in software design, in hardware design, or in both hardware and a software design. Differences in the designs of the variants can result from developer experience (e.g., prior use of a design pattern), design style (e.g., when decomposing a required function into smaller tasks, determining what constitutes a separate task and how far to decompose tasks into sub-tasks), selection of libraries to incorporate into the variant, and the development environment (e.g., different design tools make some design patterns easier to visualize). Hardware design diversity includes making different decisions about what information to keep in analog form and what information to convert to digital form, transmitting the same information at different times, and introducing delays in sampling (temporal diversity). Design diversity is commonly used to support fault tolerance.
    rules: []
    status: pending
