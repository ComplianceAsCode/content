# NIST 800-53 SA Family: System and Services Acquisition
controls:
  - id: sa-1
    title: Policy and Procedures
    description: "  a. Develop, document, and disseminate to [[ insert: param, sa-1_prm_1 ]]:\n    1. [[ insert: param, sa-01_odp.03 ]] system and services acquisition policy that:\n    2. Procedures to facilitate the implementation of the system and services acquisition policy and the associated system and services acquisition controls;\n  b. Designate an [[ insert: param, sa-01_odp.04 ]] to manage the development, documentation, and dissemination of the system and services acquisition policy and procedures; and\n  c. Review and update the current system and services acquisition:\n    1. Policy [[ insert: param, sa-01_odp.05 ]] and following [[ insert: param, sa-01_odp.06 ]] ; and\n    2. Procedures [[ insert: param, sa-01_odp.07 ]] and following [[ insert: param, sa-01_odp.08 ]]."
    parameters:
      - id: sa-1_prm_1
        label: organization-defined personnel or roles
      - id: sa-01_odp.01
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the system and services acquisition policy is to be disseminated is/are defined;
      - id: sa-01_odp.02
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the system and services acquisition procedures are to be disseminated is/are defined;
      - id: sa-01_odp.03
        label: ''
        choices:
          - organization-level
          - mission/business process-level
          - system-level
      - id: sa-01_odp.04
        label: official
        guidelines:
          - an official to manage the system and services acquisition policy and procedures is defined;
      - id: sa-01_odp.05
        label: frequency
        guidelines:
          - the frequency at which the current system and services acquisition policy is reviewed and updated is defined;
      - id: sa-01_odp.06
        label: events
        guidelines:
          - events that would require the current system and services acquisition policy to be reviewed and updated are defined;
      - id: sa-01_odp.07
        label: frequency
        guidelines:
          - the frequency at which the current system and services acquisition procedures are reviewed and updated is defined;
      - id: sa-01_odp.08
        label: events
        guidelines:
          - events that would require the system and services acquisition procedures to be reviewed and updated are defined;
    guidance: System and services acquisition policy and procedures address the controls in the SA family that are implemented within systems and organizations. The risk management strategy is an important factor in establishing such policies and procedures. Policies and procedures contribute to security and privacy assurance. Therefore, it is important that security and privacy programs collaborate on the development of system and services acquisition policy and procedures. Security and privacy program policies and procedures at the organization level are preferable, in general, and may obviate the need for mission- or system-specific policies and procedures. The policy can be included as part of the general security and privacy policy or be represented by multiple policies that reflect the complex nature of organizations. Procedures can be established for security and privacy programs, for mission or business processes, and for systems, if needed. Procedures describe how the policies or controls are implemented and can be directed at the individual or role that is the object of the procedure. Procedures can be documented in system security and privacy plans or in one or more separate documents. Events that may precipitate an update to system and services acquisition policy and procedures include assessment or audit findings, security incidents or breaches, or changes in laws, executive orders, directives, regulations, policies, standards, and guidelines. Simply restating controls does not constitute an organizational policy or procedure.
    related_controls:
      - pm-9
      - ps-8
      - sa-8
      - si-12
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-2
    title: Allocation of Resources
    description: "  a. Determine the high-level information security and privacy requirements for the system or system service in mission and business process planning;\n  b. Determine, document, and allocate the resources required to protect the system or system service as part of the organizational capital planning and investment control process; and\n  c. Establish a discrete line item for information security and privacy in organizational programming and budgeting documentation."
    guidance: Resource allocation for information security and privacy includes funding for system and services acquisition, sustainment, and supply chain-related risks throughout the system development life cycle.
    related_controls:
      - pl-7
      - pm-3
      - pm-11
      - sa-9
      - sr-3
      - sr-5
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-3
    title: System Development Life Cycle
    description: "  a. Acquire, develop, and manage the system using [[ insert: param, sa-03_odp ]] that incorporates information security and privacy considerations;\n  b. Define and document information security and privacy roles and responsibilities throughout the system development life cycle;\n  c. Identify individuals having information security and privacy roles and responsibilities; and\n  d. Integrate the organizational information security and privacy risk management process into system development life cycle activities."
    parameters:
      - id: sa-03_odp
        label: system-development life cycle
        guidelines:
          - system development life cycle is defined;
    guidance: "A system development life cycle process provides the foundation for the successful development, implementation, and operation of organizational systems. The integration of security and privacy considerations early in the system development life cycle is a foundational principle of systems security engineering and privacy engineering. To apply the required controls within the system development life cycle requires a basic understanding of information security and privacy, threats, vulnerabilities, adverse impacts, and risk to critical mission and business functions. The security engineering principles in [SA-8](#sa-8) help individuals properly design, code, and test systems and system components. Organizations include qualified personnel (e.g., senior agency information security officers, senior agency officials for privacy, security and privacy architects, and security and privacy engineers) in system development life cycle processes to ensure that established security and privacy requirements are incorporated into organizational systems. Role-based security and privacy training programs can ensure that individuals with key security and privacy roles and responsibilities have the experience, skills, and expertise to conduct assigned system development life cycle activities.\n\nThe effective integration of security and privacy requirements into enterprise architecture also helps to ensure that important security and privacy considerations are addressed throughout the system life cycle and that those considerations are directly related to organizational mission and business processes. This process also facilitates the integration of the information security and privacy architectures into the enterprise architecture, consistent with the risk management strategy of the organization. Because the system development life cycle involves multiple organizations, (e.g., external suppliers, developers, integrators, service providers), acquisition and supply chain risk management functions and controls play significant roles in the effective management of the system during the life cycle."
    related_controls:
      - at-3
      - pl-8
      - pm-7
      - sa-4
      - sa-5
      - sa-8
      - sa-11
      - sa-15
      - sa-17
      - sa-22
      - sr-3
      - sr-4
      - sr-5
      - sr-9
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: sa-3.1
    title: Manage Preproduction Environment
    description: Protect system preproduction environments commensurate with risk throughout the system development life cycle for the system, system component, or system service.
    guidance: The preproduction environment includes development, test, and integration environments. The program protection planning processes established by the Department of Defense are examples of managing the preproduction environment for defense contractors. Criticality analysis and the application of controls on developers also contribute to a more secure system development environment.
    related_controls:
      - cm-2
      - cm-4
      - ra-3
      - ra-9
      - sa-4
    rules: []
    status: pending
  - id: sa-3.2
    title: Use of Live or Operational Data
    description: "  a. Approve, document, and control the use of live data in preproduction environments for the system, system component, or system service; and\n  b. Protect preproduction environments for the system, system component, or system service at the same impact or classification level as any live data in use within the preproduction environments."
    guidance: Live data is also referred to as operational data. The use of live or operational data in preproduction (i.e., development, test, and integration) environments can result in significant risks to organizations. In addition, the use of personally identifiable information in testing, research, and training increases the risk of unauthorized disclosure or misuse of such information. Therefore, it is important for the organization to manage any additional risks that may result from the use of live or operational data. Organizations can minimize such risks by using test or dummy data during the design, development, and testing of systems, system components, and system services. Risk assessment techniques may be used to determine if the risk of using live or operational data is acceptable.
    related_controls:
      - pm-25
      - ra-3
    rules: []
    status: pending
  - id: sa-3.3
    title: Technology Refresh
    description: Plan for and implement a technology refresh schedule for the system throughout the system development life cycle.
    guidance: Technology refresh planning may encompass hardware, software, firmware, processes, personnel skill sets, suppliers, service providers, and facilities. The use of obsolete or nearing obsolete technology may increase the security and privacy risks associated with unsupported components, counterfeit or repurposed components, components unable to implement security or privacy requirements, slow or inoperable components, components from untrusted sources, inadvertent personnel error, or increased complexity. Technology refreshes typically occur during the operations and maintenance stage of the system development life cycle.
    related_controls:
      - ma-6
    rules: []
    status: pending
  - id: sa-4
    title: Acquisition Process
    description: "Include the following requirements, descriptions, and criteria, explicitly or by reference, using [[ insert: param, sa-04_odp.01 ]] in the acquisition contract for the system, system component, or system service:\n  a. Security and privacy functional requirements;\n  b. Strength of mechanism requirements;\n  c. Security and privacy assurance requirements;\n  d. Controls needed to satisfy the security and privacy requirements.\n  e. Security and privacy documentation requirements;\n  f. Requirements for protecting security and privacy documentation;\n  g. Description of the system development environment and environment in which the system is intended to operate;\n  h. Allocation of responsibility or identification of parties responsible for information security, privacy, and supply chain risk management; and\n  i. Acceptance criteria."
    parameters:
      - id: sa-04_odp.01
        label: ''
        choices:
          - standardized contract language
          - '[[ insert: param, sa-04_odp.02 ]] '
      - id: sa-04_odp.02
        label: contract language
        guidelines:
          - contract language is defined (if selected);
    guidance: "Security and privacy functional requirements are typically derived from the high-level security and privacy requirements described in [SA-2](#sa-2) . The derived requirements include security and privacy capabilities, functions, and mechanisms. Strength requirements associated with such capabilities, functions, and mechanisms include degree of correctness, completeness, resistance to tampering or bypass, and resistance to direct attack. Assurance requirements include development processes, procedures, and methodologies as well as the evidence from development and assessment activities that provide grounds for confidence that the required functionality is implemented and possesses the required strength of mechanism. [SP 800-160-1](#e3cc0520-a366-4fc9-abc2-5272db7e3564) describes the process of requirements engineering as part of the system development life cycle.\n\nControls can be viewed as descriptions of the safeguards and protection capabilities appropriate for achieving the particular security and privacy objectives of the organization and for reflecting the security and privacy requirements of stakeholders. Controls are selected and implemented in order to satisfy system requirements and include developer and organizational responsibilities. Controls can include technical, administrative, and physical aspects. In some cases, the selection and implementation of a control may necessitate additional specification by the organization in the form of derived requirements or instantiated control parameter values. The derived requirements and control parameter values may be necessary to provide the appropriate level of implementation detail for controls within the system development life cycle.\n\nSecurity and privacy documentation requirements address all stages of the system development life cycle. Documentation provides user and administrator guidance for the implementation and operation of controls. The level of detail required in such documentation is based on the security categorization or classification level of the system and the degree to which organizations depend on the capabilities, functions, or mechanisms to meet risk response expectations. Requirements can include mandated configuration settings that specify allowed functions, ports, protocols, and services. Acceptance criteria for systems, system components, and system services are defined in the same manner as the criteria for any organizational acquisition or procurement.\n\nOrganizations can determine other requirements that support security and operations, to include responsibilities for the organization and developer, and notification and timing requirements for support, maintenance and updates."
    related_controls:
      - cm-6
      - cm-8
      - ps-7
      - sa-3
