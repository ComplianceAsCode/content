  - id: ca-3.6
    title: Transfer Authorizations
    description: Verify that individuals or systems transferring data between interconnecting systems have the requisite authorizations (i.e., write permissions or privileges) prior to accepting such data.
    guidance: To prevent unauthorized individuals and systems from making information transfers to protected systems, the protected system verifies—via independent means— whether the individual or system attempting to transfer information is authorized to do so. Verification of the authorization to transfer information also applies to control plane traffic (e.g., routing and DNS) and services (e.g., authenticated SMTP relays).
    related_controls:
      - ac-2
      - ac-3
      - ac-4
    levels:
      - high
    rules: []
    status: pending
  - id: ca-3.7
    title: Transitive Information Exchanges
    description: "  a. Identify transitive (downstream) information exchanges with other systems through the systems identified in [CA-3a](#ca-3_smt.a) ; and\n  b. Take measures to ensure that transitive (downstream) information exchanges cease when the controls on identified transitive (downstream) systems cannot be verified or validated."
    guidance: Transitive or "downstream" information exchanges are information exchanges between the system or systems with which the organizational system exchanges information and other systems. For mission-essential systems, services, and applications, including high value assets, it is necessary to identify such information exchanges. The transparency of the controls or protection measures in place in such downstream systems connected directly or indirectly to organizational systems is essential to understanding the security and privacy risks resulting from those information exchanges. Organizational systems can inherit risk from downstream systems through transitive connections and information exchanges, which can make the organizational systems more susceptible to threats, hazards, and adverse impacts.
    related_controls:
      - sc-7
    rules: []
    status: pending
  - id: ca-4
    title: Security Certification
    rules: []
    status: pending
  - id: ca-5
    title: Plan of Action and Milestones
    description: "  a. Develop a plan of action and milestones for the system to document the planned remediation actions of the organization to correct weaknesses or deficiencies noted during the assessment of the controls and to reduce or eliminate known vulnerabilities in the system; and\n  b. Update existing plan of action and milestones [[ insert: param, ca-05_odp ]] based on the findings from control assessments, independent audits or reviews, and continuous monitoring activities."
    parameters:
      - id: ca-05_odp
        label: frequency
        guidelines:
          - the frequency at which to update an existing plan of action and milestones based on the findings from control assessments, independent audits or reviews, and continuous monitoring activities is defined;
    guidance: Plans of action and milestones are useful for any type of organization to track planned remedial actions. Plans of action and milestones are required in authorization packages and subject to federal reporting requirements established by OMB.
    related_controls:
      - ca-2
      - ca-7
      - pm-4
      - pm-9
      - ra-7
      - si-2
      - si-12
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ca-5.1
    title: Automation Support for Accuracy and Currency
    description: 'Ensure the accuracy, currency, and availability of the plan of action and milestones for the system using [[ insert: param, ca-05.01_odp ]].'
    parameters:
      - id: ca-05.01_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to ensure the accuracy, currency, and availability of the plan of action and milestones for the system are defined;
    guidance: Using automated tools helps maintain the accuracy, currency, and availability of the plan of action and milestones and facilitates the coordination and sharing of security and privacy information throughout the organization. Such coordination and information sharing help to identify systemic weaknesses or deficiencies in organizational systems and ensure that appropriate resources are directed at the most critical system vulnerabilities in a timely manner.
    rules: []
    status: pending
  - id: ca-6
    title: Authorization
    description: "  a. Assign a senior official as the authorizing official for the system;\n  b. Assign a senior official as the authorizing official for common controls available for inheritance by organizational systems;\n  c. Ensure that the authorizing official for the system, before commencing operations:\n    1. Accepts the use of common controls inherited by the system; and\n    2. Authorizes the system to operate;\n  d. Ensure that the authorizing official for common controls authorizes the use of those controls for inheritance by organizational systems;\n  e. Update the authorizations [[ insert: param, ca-06_odp ]]."
    parameters:
      - id: ca-06_odp
        label: frequency
        guidelines:
          - frequency at which to update the authorizations is defined;
    guidance: "Authorizations are official management decisions by senior officials to authorize operation of systems, authorize the use of common controls for inheritance by organizational systems, and explicitly accept the risk to organizational operations and assets, individuals, other organizations, and the Nation based on the implementation of agreed-upon controls. Authorizing officials provide budgetary oversight for organizational systems and common controls or assume responsibility for the mission and business functions supported by those systems or common controls. The authorization process is a federal responsibility, and therefore, authorizing officials must be federal employees. Authorizing officials are both responsible and accountable for security and privacy risks associated with the operation and use of organizational systems. Nonfederal organizations may have similar processes to authorize systems and senior officials that assume the authorization role and associated responsibilities.\n\nAuthorizing officials issue ongoing authorizations of systems based on evidence produced from implemented continuous monitoring programs. Robust continuous monitoring programs reduce the need for separate reauthorization processes. Through the employment of comprehensive continuous monitoring processes, the information contained in authorization packages (i.e., security and privacy plans, assessment reports, and plans of action and milestones) is updated on an ongoing basis. This provides authorizing officials, common control providers, and system owners with an up-to-date status of the security and privacy posture of their systems, controls, and operating environments. To reduce the cost of reauthorization, authorizing officials can leverage the results of continuous monitoring processes to the maximum extent possible as the basis for rendering reauthorization decisions."
    related_controls:
      - ca-2
      - ca-3
      - ca-7
      - pm-9
      - pm-10
      - ra-3
      - sa-10
      - si-12
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ca-6.1
    title: Joint Authorization — Intra-organization
    description: Employ a joint authorization process for the system that includes multiple authorizing officials from the same organization conducting the authorization.
    guidance: Assigning multiple authorizing officials from the same organization to serve as co-authorizing officials for the system increases the level of independence in the risk-based decision-making process. It also implements the concepts of separation of duties and dual authorization as applied to the system authorization process. The intra-organization joint authorization process is most relevant for connected systems, shared systems, and systems with multiple information owners.
    related_controls:
      - ac-6
    rules: []
    status: pending
  - id: ca-6.2
    title: Joint Authorization — Inter-organization
    description: Employ a joint authorization process for the system that includes multiple authorizing officials with at least one authorizing official from an organization external to the organization conducting the authorization.
    guidance: Assigning multiple authorizing officials, at least one of whom comes from an external organization, to serve as co-authorizing officials for the system increases the level of independence in the risk-based decision-making process. It implements the concepts of separation of duties and dual authorization as applied to the system authorization process. Employing authorizing officials from external organizations to supplement the authorizing official from the organization that owns or hosts the system may be necessary when the external organizations have a vested interest or equities in the outcome of the authorization decision. The inter-organization joint authorization process is relevant and appropriate for connected systems, shared systems or services, and systems with multiple information owners. The authorizing officials from the external organizations are key stakeholders of the system undergoing authorization.
    related_controls:
      - ac-6
    rules: []
    status: pending
  - id: ca-7
    title: Continuous Monitoring
    description: "Develop a system-level continuous monitoring strategy and implement continuous monitoring in accordance with the organization-level continuous monitoring strategy that includes:\n  a. Establishing the following system-level metrics to be monitored: [[ insert: param, ca-07_odp.01 ]];\n  b. Establishing [[ insert: param, ca-07_odp.02 ]] for monitoring and [[ insert: param, ca-07_odp.03 ]] for assessment of control effectiveness;\n  c. Ongoing control assessments in accordance with the continuous monitoring strategy;\n  d. Ongoing monitoring of system and organization-defined metrics in accordance with the continuous monitoring strategy;\n  e. Correlation and analysis of information generated by control assessments and monitoring;\n  f. Response actions to address results of the analysis of control assessment and monitoring information; and\n  g. Reporting the security and privacy status of the system to [[ insert: param, ca-7_prm_4 ]] [[ insert: param, ca-7_prm_5 ]]."
    parameters:
      - id: ca-7_prm_4
        label: organization-defined personnel or roles
      - id: ca-7_prm_5
        label: organization-defined frequency
      - id: ca-07_odp.01
        label: system-level metrics
        guidelines:
          - system-level metrics to be monitored are defined;
      - id: ca-07_odp.02
        label: frequencies
        guidelines:
          - frequencies at which to monitor control effectiveness are defined;
      - id: ca-07_odp.03
        label: frequencies
        guidelines:
          - frequencies at which to assess control effectiveness are defined;
      - id: ca-07_odp.04
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the security status of the system is reported are defined;
      - id: ca-07_odp.05
        label: frequency
        guidelines:
          - frequency at which the security status of the system is reported is defined;
      - id: ca-07_odp.06
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the privacy status of the system is reported are defined;
      - id: ca-07_odp.07
        label: frequency
        guidelines:
          - frequency at which the privacy status of the system is reported is defined;
    guidance: "Continuous monitoring at the system level facilitates ongoing awareness of the system security and privacy posture to support organizational risk management decisions. The terms \"continuous\" and \"ongoing\" imply that organizations assess and monitor their controls and risks at a frequency sufficient to support risk-based decisions. Different types of controls may require different monitoring frequencies. The results of continuous monitoring generate risk response actions by organizations. When monitoring the effectiveness of multiple controls that have been grouped into capabilities, a root-cause analysis may be needed to determine the specific control that has failed. Continuous monitoring programs allow organizations to maintain the authorizations of systems and common controls in highly dynamic environments of operation with changing mission and business needs, threats, vulnerabilities, and technologies. Having access to security and privacy information on a continuing basis through reports and dashboards gives organizational officials the ability to make effective and timely risk management decisions, including ongoing authorization decisions.\n\nAutomation supports more frequent updates to hardware, software, and firmware inventories, authorization packages, and other system information. Effectiveness is further enhanced when continuous monitoring outputs are formatted to provide information that is specific, measurable, actionable, relevant, and timely. Continuous monitoring activities are scaled in accordance with the security categories of systems. Monitoring requirements, including the need for specific monitoring, may be referenced in other controls and control enhancements, such as [AC-2g](#ac-2_smt.g), [AC-2(7)](#ac-2.7), [AC-2(12)(a)](#ac-2.12_smt.a), [AC-2(7)(b)](#ac-2.7_smt.b), [AC-2(7)(c)](#ac-2.7_smt.c), [AC-17(1)](#ac-17.1), [AT-4a](#at-4_smt.a), [AU-13](#au-13), [AU-13(1)](#au-13.1), [AU-13(2)](#au-13.2), [CM-3f](#cm-3_smt.f), [CM-6d](#cm-6_smt.d), [CM-11c](#cm-11_smt.c), [IR-5](#ir-5), [MA-2b](#ma-2_smt.b), [MA-3a](#ma-3_smt.a), [MA-4a](#ma-4_smt.a), [PE-3d](#pe-3_smt.d), [PE-6](#pe-6), [PE-14b](#pe-14_smt.b), [PE-16](#pe-16), [PE-20](#pe-20), [PM-6](#pm-6), [PM-23](#pm-23), [PM-31](#pm-31), [PS-7e](#ps-7_smt.e), [SA-9c](#sa-9_smt.c), [SR-4](#sr-4), [SC-5(3)(b)](#sc-5.3_smt.b), [SC-7a](#sc-7_smt.a), [SC-7(24)(b)](#sc-7.24_smt.b), [SC-18b](#sc-18_smt.b), [SC-43b](#sc-43_smt.b) , and [SI-4](#si-4)."
    related_controls:
