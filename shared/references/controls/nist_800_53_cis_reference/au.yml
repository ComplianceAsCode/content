  - id: au-12.1
    title: System-wide and Time-correlated Audit Trail
    description: 'Compile audit records from [[ insert: param, au-12.01_odp.01 ]] into a system-wide (logical or physical) audit trail that is time-correlated to within [[ insert: param, au-12.01_odp.02 ]].'
    parameters:
      - id: au-12.01_odp.01
        label: system components
        guidelines:
          - system components from which audit records are to be compiled into a system-wide (logical or physical) audit trail are defined;
      - id: au-12.01_odp.02
        label: level of tolerance
        guidelines:
          - level of tolerance for the relationship between timestamps of individual records in the audit trail is defined;
    guidance: Audit trails are time-correlated if the time stamps in the individual audit records can be reliably related to the time stamps in other audit records to achieve a time ordering of the records within organizational tolerances.
    related_controls:
      - au-8
      - sc-45
    levels:
      - high
    rules: []
    status: pending
  - id: au-12.2
    title: Standardized Formats
    description: Produce a system-wide (logical or physical) audit trail composed of audit records in a standardized format.
    guidance: Audit records that follow common standards promote interoperability and information exchange between devices and systems. Promoting interoperability and information exchange facilitates the production of event information that can be readily analyzed and correlated. If logging mechanisms do not conform to standardized formats, systems may convert individual audit records into standardized formats when compiling system-wide audit trails.
    rules: []
    status: pending
  - id: au-12.3
    title: Changes by Authorized Individuals
    description: 'Provide and implement the capability for [[ insert: param, au-12.03_odp.01 ]] to change the logging to be performed on [[ insert: param, au-12.03_odp.02 ]] based on [[ insert: param, au-12.03_odp.03 ]] within [[ insert: param, au-12.03_odp.04 ]].'
    parameters:
      - id: au-12.03_odp.01
        label: individuals or roles
        guidelines:
          - individuals or roles authorized to change the logging on system components are defined;
      - id: au-12.03_odp.02
        label: system components
        guidelines:
          - system components on which logging is to be performed are defined;
      - id: au-12.03_odp.03
        label: selectable event criteria
        guidelines:
          - selectable event criteria with which change logging is to be performed are defined;
      - id: au-12.03_odp.04
        label: time thresholds
        guidelines:
          - time thresholds in which logging actions are to change is defined;
    guidance: Permitting authorized individuals to make changes to system logging enables organizations to extend or limit logging as necessary to meet organizational requirements. Logging that is limited to conserve system resources may be extended (either temporarily or permanently) to address certain threat situations. In addition, logging may be limited to a specific set of event types to facilitate audit reduction, analysis, and reporting. Organizations can establish time thresholds in which logging actions are changed (e.g., near real-time, within minutes, or within hours).
    related_controls:
      - ac-3
    levels:
      - high
    rules: []
    status: pending
  - id: au-12.4
    title: Query Parameter Audits of Personally Identifiable Information
    description: Provide and implement the capability for auditing the parameters of user query events for data sets containing personally identifiable information.
    guidance: Query parameters are explicit criteria that an individual or automated system submits to a system to retrieve data. Auditing of query parameters for datasets that contain personally identifiable information augments the capability of an organization to track and understand the access, usage, or sharing of personally identifiable information by authorized personnel.
    rules: []
    status: pending
  - id: au-13
    title: Monitoring for Information Disclosure
    description: "  a. Monitor [[ insert: param, au-13_odp.01 ]] [[ insert: param, au-13_odp.02 ]] for evidence of unauthorized disclosure of organizational information; and\n  b. If an information disclosure is discovered:\n    1. Notify [[ insert: param, au-13_odp.03 ]] ; and\n    2. Take the following additional actions: [[ insert: param, au-13_odp.04 ]]."
    parameters:
      - id: au-13_odp.01
        label: open-source information and/or information sites
        guidelines:
          - open-source information and/or information sites to be monitored for evidence of unauthorized disclosure of organizational information is/are defined;
      - id: au-13_odp.02
        label: frequency
        guidelines:
          - the frequency with which open-source information and/or information sites are monitored for evidence of unauthorized disclosure of organizational information is defined;
      - id: au-13_odp.03
        label: personnel or roles
        guidelines:
          - personnel or roles to be notified if an information disclosure is discovered is/are defined;
      - id: au-13_odp.04
        label: additional actions
        guidelines:
          - additional actions to be taken if an information disclosure is discovered are defined;
    guidance: Unauthorized disclosure of information is a form of data leakage. Open-source information includes social networking sites and code-sharing platforms and repositories. Examples of organizational information include personally identifiable information retained by the organization or proprietary information generated by the organization.
    related_controls:
      - ac-22
      - pe-3
      - pm-12
      - ra-5
      - sc-7
      - si-20
    rules: []
    status: pending
  - id: au-13.1
    title: Use of Automated Tools
    description: 'Monitor open-source information and information sites using [[ insert: param, au-13.01_odp ]].'
    parameters:
      - id: au-13.01_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms for monitoring open-source information and information sites are defined;
    guidance: Automated mechanisms include commercial services that provide notifications and alerts to organizations and automated scripts to monitor new posts on websites.
    rules: []
    status: pending
  - id: au-13.2
    title: Review of Monitored Sites
    description: 'Review the list of open-source information sites being monitored [[ insert: param, au-13.02_odp ]].'
    parameters:
      - id: au-13.02_odp
        label: frequency
        guidelines:
          - the frequency at which to review the open-source information sites being monitored is defined;
    guidance: Reviewing the current list of open-source information sites being monitored on a regular basis helps to ensure that the selected sites remain relevant. The review also provides the opportunity to add new open-source information sites with the potential to provide evidence of unauthorized disclosure of organizational information. The list of sites monitored can be guided and informed by threat intelligence of other credible sources of information.
    rules: []
    status: pending
  - id: au-13.3
    title: Unauthorized Replication of Information
    description: Employ discovery techniques, processes, and tools to determine if external entities are replicating organizational information in an unauthorized manner.
    guidance: The unauthorized use or replication of organizational information by external entities can cause adverse impacts on organizational operations and assets, including damage to reputation. Such activity can include the replication of an organizational website by an adversary or hostile threat actor who attempts to impersonate the web-hosting organization. Discovery tools, techniques, and processes used to determine if external entities are replicating organizational information in an unauthorized manner include scanning external websites, monitoring social media, and training staff to recognize the unauthorized use of organizational information.
    rules: []
    status: pending
  - id: au-14
    title: Session Audit
    description: "  a. Provide and implement the capability for [[ insert: param, au-14_odp.01 ]] to [[ insert: param, au-14_odp.02 ]] the content of a user session under [[ insert: param, au-14_odp.03 ]] ; and\n  b. Develop, integrate, and use session auditing activities in consultation with legal counsel and in accordance with applicable laws, executive orders, directives, regulations, policies, standards, and guidelines."
    parameters:
      - id: au-14_odp.01
        label: users or roles
        guidelines:
          - users or roles who can audit the content of a user session are defined;
      - id: au-14_odp.02
        label: ''
        choices:
          - record
          - view
          - hear
          - log
      - id: au-14_odp.03
        label: circumstances
        guidelines:
          - circumstances under which the content of a user session can be audited are defined;
    guidance: Session audits can include monitoring keystrokes, tracking websites visited, and recording information and/or file transfers. Session audit capability is implemented in addition to event logging and may involve implementation of specialized session capture technology. Organizations consider how session auditing can reveal information about individuals that may give rise to privacy risk as well as how to mitigate those risks. Because session auditing can impact system and network performance, organizations activate the capability under well-defined situations (e.g., the organization is suspicious of a specific individual). Organizations consult with legal counsel, civil liberties officials, and privacy officials to ensure that any legal, privacy, civil rights, or civil liberties issues, including the use of personally identifiable information, are appropriately addressed.
    related_controls:
      - ac-3
      - ac-8
      - au-2
      - au-3
      - au-4
      - au-5
      - au-8
      - au-9
      - au-11
      - au-12
    rules: []
    status: pending
  - id: au-14.1
    title: System Start-up
    description: Initiate session audits automatically at system start-up.
    guidance: The automatic initiation of session audits at startup helps to ensure that the information being captured on selected individuals is complete and not subject to compromise through tampering by malicious threat actors.
    rules: []
    status: pending
  - id: au-14.2
    title: Capture and Record Content
    rules: []
    status: pending
  - id: au-14.3
    title: Remote Viewing and Listening
    description: Provide and implement the capability for authorized users to remotely view and hear content related to an established user session in real time.
    guidance: None.
    related_controls:
      - ac-17
    rules: []
    status: pending
  - id: au-15
    title: Alternate Audit Logging Capability
    rules: []
    status: pending
  - id: au-16
    title: Cross-organizational Audit Logging
    description: 'Employ [[ insert: param, au-16_odp.01 ]] for coordinating [[ insert: param, au-16_odp.02 ]] among external organizations when audit information is transmitted across organizational boundaries.'
    parameters:
      - id: au-16_odp.01
        label: methods
        guidelines:
          - methods for coordinating audit information among external organizations when audit information is transmitted across organizational boundaries are defined;
      - id: au-16_odp.02
        label: audit information
        guidelines:
          - audit information to be coordinated among external organizations when audit information is transmitted across organizational boundaries is defined;
    guidance: When organizations use systems or services of external organizations, the audit logging capability necessitates a coordinated, cross-organization approach. For example, maintaining the identity of individuals who request specific services across organizational boundaries may often be difficult, and doing so may prove to have significant performance and privacy ramifications. Therefore, it is often the case that cross-organizational audit logging simply captures the identity of individuals who issue requests at the initial system, and subsequent systems record that the requests originated from authorized individuals. Organizations consider including processes for coordinating audit information requirements and protection of audit information in information exchange agreements.
    related_controls:
      - au-3
      - au-6
      - au-7
      - ca-3
      - pt-7
    rules: []
    status: pending
  - id: au-16.1
    title: Identity Preservation
    description: Preserve the identity of individuals in cross-organizational audit trails.
    guidance: Identity preservation is applied when there is a need to be able to trace actions that are performed across organizational boundaries to a specific individual.
    related_controls:
      - ia-2
      - ia-4
      - ia-5
      - ia-8
    rules: []
    status: pending
  - id: au-16.2
    title: Sharing of Audit Information
    description: 'Provide cross-organizational audit information to [[ insert: param, au-16.02_odp.01 ]] based on [[ insert: param, au-16.02_odp.02 ]].'
    parameters:
      - id: au-16.02_odp.01
        label: organizations
        guidelines:
          - organizations with which cross-organizational audit information is to be shared are defined;
      - id: au-16.02_odp.02
        label: cross-organizational sharing agreements
        guidelines:
          - cross-organizational sharing agreements to be used when providing cross-organizational audit information to organizations are defined;
    guidance: Due to the distributed nature of the audit information, cross-organization sharing of audit information may be essential for effective analysis of the auditing being performed. For example, the audit records of one organization may not provide sufficient information to determine the appropriate or inappropriate use of organizational information resources by individuals in other organizations. In some instances, only individuals’ home organizations have the appropriate knowledge to make such determinations, thus requiring the sharing of audit information among organizations.
    related_controls:
      - ir-4
      - si-4
    rules: []
    status: pending
  - id: au-16.3
    title: Disassociability
    description: 'Implement [[ insert: param, au-16.03_odp ]] to disassociate individuals from audit information transmitted across organizational boundaries.'
    parameters:
      - id: au-16.03_odp
        label: measures
        guidelines:
          - measures to disassociate individuals from audit information transmitted across organizational boundaries are defined;
    guidance: Preserving identities in audit trails could have privacy ramifications, such as enabling the tracking and profiling of individuals, but may not be operationally necessary. These risks could be further amplified when transmitting information across organizational boundaries. Implementing privacy-enhancing cryptographic techniques can disassociate individuals from audit information and reduce privacy risk while maintaining accountability.
    rules: []
    status: pending
