  - id: pt-3
    title: Personally Identifiable Information Processing Purposes
    description: "  a. Identify and document the [[ insert: param, pt-03_odp.01 ]] for processing personally identifiable information;\n  b. Describe the purpose(s) in the public privacy notices and policies of the organization;\n  c. Restrict the [[ insert: param, pt-03_odp.02 ]] of personally identifiable information to only that which is compatible with the identified purpose(s); and\n  d. Monitor changes in processing personally identifiable information and implement [[ insert: param, pt-03_odp.03 ]] to ensure that any changes are made in accordance with [[ insert: param, pt-03_odp.04 ]]."
    parameters:
      - id: pt-03_odp.01
        label: purpose(s)
        guidelines:
          - the purpose(s) for processing personally identifiable information is/are defined;
      - id: pt-03_odp.02
        label: processing
        guidelines:
          - the processing of personally identifiable information to be restricted is defined;
      - id: pt-03_odp.03
        label: mechanisms
        guidelines:
          - mechanisms to be implemented for ensuring any changes in the processing of personally identifiable information are made in accordance with requirements are defined;
      - id: pt-03_odp.04
        label: requirements
        guidelines:
          - requirements for changing the processing of personally identifiable information are defined;
    guidance: "Identifying and documenting the purpose for processing provides organizations with a basis for understanding why personally identifiable information may be processed. The term \"process\" includes every step of the information life cycle, including creation, collection, use, processing, storage, maintenance, dissemination, disclosure, and disposal. Identifying and documenting the purpose of processing is a prerequisite to enabling owners and operators of the system and individuals whose information is processed by the system to understand how the information will be processed. This enables individuals to make informed decisions about their engagement with information systems and organizations and to manage their privacy interests. Once the specific processing purpose has been identified, the purpose is described in the organization’s privacy notices, policies, and any related privacy compliance documentation, including privacy impact assessments, system of records notices, [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) statements, computer matching notices, and other applicable Federal Register notices.\n\nOrganizations take steps to help ensure that personally identifiable information is processed only for identified purposes, including training organizational personnel and monitoring and auditing organizational processing of personally identifiable information.\n\nOrganizations monitor for changes in personally identifiable information processing. Organizational personnel consult with the senior agency official for privacy and legal counsel to ensure that any new purposes that arise from changes in processing are compatible with the purpose for which the information was collected, or if the new purpose is not compatible, implement mechanisms in accordance with defined requirements to allow for the new processing, if appropriate. Mechanisms may include obtaining consent from individuals, revising privacy policies, or other measures to manage privacy risks that arise from changes in personally identifiable information processing purposes."
    related_controls:
      - ac-2
      - ac-3
      - at-3
