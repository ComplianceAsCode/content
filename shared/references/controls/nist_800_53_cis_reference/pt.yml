    parameters:
      - id: pt-03.02_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms for tracking the processing purposes of personally identifiable information are defined;
    guidance: Automated mechanisms augment tracking of the processing purposes.
    related_controls:
