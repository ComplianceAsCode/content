    rules: []
    status: pending
  - id: pt-2.1
    title: Data Tagging
    description: 'Attach data tags containing [[ insert: param, pt-02.01_odp.01 ]] to [[ insert: param, pt-02.01_odp.02 ]].'
    parameters:
      - id: pt-02.01_odp.01
        label: authorized processing
        guidelines:
          - the authorized processing of personally identifiable information is defined;
      - id: pt-02.01_odp.02
        label: elements of personally identifiable information
        guidelines:
          - elements of personally identifiable information to be tagged are defined;
    guidance: Data tags support the tracking and enforcement of authorized processing by conveying the types of processing that are authorized along with the relevant elements of personally identifiable information throughout the system. Data tags may also support the use of automated tools.
    related_controls:
      - ac-16
      - ca-6
      - cm-12
      - pm-5
      - pm-22
      - pt-4
      - sc-16
      - sc-43
      - si-10
      - si-15
      - si-19
    rules: []
    status: pending
  - id: pt-2.2
    title: Automation
    description: 'Manage enforcement of the authorized processing of personally identifiable information using [[ insert: param, pt-02.02_odp ]].'
    parameters:
      - id: pt-02.02_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms used to manage enforcement of the authorized processing of personally identifiable information are defined;
    guidance: Automated mechanisms augment verification that only authorized processing is occurring.
    related_controls:
      - ca-6
      - cm-12
      - pm-5
      - pm-22
      - pt-4
      - sc-16
