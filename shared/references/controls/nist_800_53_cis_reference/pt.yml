# NIST 800-53 PT Family: PII Processing and Transparency
controls:
  - id: pt-1
    title: Policy and Procedures
    description: "  a. Develop, document, and disseminate to [[ insert: param, pt-1_prm_1 ]]:\n    1. [[ insert: param, pt-01_odp.03 ]] personally identifiable information processing and transparency policy that:\n    2. Procedures to facilitate the implementation of the personally identifiable information processing and transparency policy and the associated personally identifiable information processing and transparency controls;\n  b. Designate an [[ insert: param, pt-01_odp.04 ]] to manage the development, documentation, and dissemination of the personally identifiable information processing and transparency policy and procedures; and\n  c. Review and update the current personally identifiable information processing and transparency:\n    1. Policy [[ insert: param, pt-01_odp.05 ]] and following [[ insert: param, pt-01_odp.06 ]] ; and\n    2. Procedures [[ insert: param, pt-01_odp.07 ]] and following [[ insert: param, pt-01_odp.08 ]]."
    parameters:
      - id: pt-1_prm_1
        label: organization-defined personnel or roles
      - id: pt-01_odp.01
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the personally identifiable information processing and transparency policy is to be disseminated is/are defined;
      - id: pt-01_odp.02
        label: personnel or roles
        guidelines:
          - personnel or roles to whom the personally identifiable information processing and transparency procedures are to be disseminated is/are defined;
      - id: pt-01_odp.03
        label: ''
        choices:
          - organization-level
          - mission/business process-level
          - system-level
      - id: pt-01_odp.04
        label: official
        guidelines:
          - an official to manage the personally identifiable information processing and transparency policy and procedures is defined;
      - id: pt-01_odp.05
        label: frequency
        guidelines:
          - the frequency at which the current personally identifiable information processing and transparency policy is reviewed and updated is defined;
      - id: pt-01_odp.06
        label: events
        guidelines:
          - events that would require the current personally identifiable information processing and transparency policy to be reviewed and updated are defined;
      - id: pt-01_odp.07
        label: frequency
        guidelines:
          - the frequency at which the current personally identifiable information processing and transparency procedures are reviewed and updated is defined;
      - id: pt-01_odp.08
        label: events
        guidelines:
          - events that would require the personally identifiable information processing and transparency procedures to be reviewed and updated are defined;
    guidance: Personally identifiable information processing and transparency policy and procedures address the controls in the PT family that are implemented within systems and organizations. The risk management strategy is an important factor in establishing such policies and procedures. Policies and procedures contribute to security and privacy assurance. Therefore, it is important that security and privacy programs collaborate on the development of personally identifiable information processing and transparency policy and procedures. Security and privacy program policies and procedures at the organization level are preferable, in general, and may obviate the need for mission- or system-specific policies and procedures. The policy can be included as part of the general security and privacy policy or be represented by multiple policies that reflect the complex nature of organizations. Procedures can be established for security and privacy programs, for mission or business processes, and for systems, if needed. Procedures describe how the policies or controls are implemented and can be directed at the individual or role that is the object of the procedure. Procedures can be documented in system security and privacy plans or in one or more separate documents. Events that may precipitate an update to personally identifiable information processing and transparency policy and procedures include assessment or audit findings, breaches, or changes in applicable laws, executive orders, directives, regulations, policies, standards, and guidelines. Simply restating controls does not constitute an organizational policy or procedure.
    rules: []
    status: pending
  - id: pt-2
    title: Authority to Process Personally Identifiable Information
    description: "  a. Determine and document the [[ insert: param, pt-02_odp.01 ]] that permits the [[ insert: param, pt-02_odp.02 ]] of personally identifiable information; and\n  b. Restrict the [[ insert: param, pt-02_odp.03 ]] of personally identifiable information to only that which is authorized."
    parameters:
      - id: pt-02_odp.01
        label: authority
        guidelines:
          - the authority to permit the processing (defined in PT-02_ODP[02]) of personally identifiable information is defined;
      - id: pt-02_odp.02
        label: processing
        guidelines:
          - the type of processing of personally identifiable information is defined;
      - id: pt-02_odp.03
        label: processing
        guidelines:
          - the type of processing of personally identifiable information to be restricted is defined;
    guidance: "The processing of personally identifiable information is an operation or set of operations that the information system or organization performs with respect to personally identifiable information across the information life cycle. Processing includes but is not limited to creation, collection, use, processing, storage, maintenance, dissemination, disclosure, and disposal. Processing operations also include logging, generation, and transformation, as well as analysis techniques, such as data mining.\n\nOrganizations may be subject to laws, executive orders, directives, regulations, or policies that establish the organization’s authority and thereby limit certain types of processing of personally identifiable information or establish other requirements related to the processing. Organizational personnel consult with the senior agency official for privacy and legal counsel regarding such authority, particularly if the organization is subject to multiple jurisdictions or sources of authority. For organizations whose processing is not determined according to legal authorities, the organization’s policies and determinations govern how they process personally identifiable information. While processing of personally identifiable information may be legally permissible, privacy risks may still arise. Privacy risk assessments can identify the privacy risks associated with the authorized processing of personally identifiable information and support solutions to manage such risks.\n\nOrganizations consider applicable requirements and organizational policies to determine how to document this authority. For federal agencies, the authority to process personally identifiable information is documented in privacy policies and notices, system of records notices, privacy impact assessments, [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) statements, computer matching agreements and notices, contracts, information sharing agreements, memoranda of understanding, and other documentation.\n\nOrganizations take steps to ensure that personally identifiable information is only processed for authorized purposes, including training organizational personnel on the authorized processing of personally identifiable information and monitoring and auditing organizational use of personally identifiable information."
    related_controls:
      - ac-2
      - ac-3
      - cm-13
      - ir-9
