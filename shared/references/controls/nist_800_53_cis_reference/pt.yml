  - id: pt-3.1
    title: Data Tagging
    description: 'Attach data tags containing the following purposes to [[ insert: param, pt-03.01_odp.02 ]]: [[ insert: param, pt-03.01_odp.01 ]].'
    parameters:
      - id: pt-03.01_odp.01
        label: processing purposes
        guidelines:
          - processing purposes to be contained in data tags are defined;
      - id: pt-03.01_odp.02
        label: elements of personally identifiable information
        guidelines:
          - elements of personally identifiable information to be tagged are defined;
    guidance: Data tags support the tracking of processing purposes by conveying the purposes along with the relevant elements of personally identifiable information throughout the system. By conveying the processing purposes in a data tag along with the personally identifiable information as the information transits a system, a system owner or operator can identify whether a change in processing would be compatible with the identified and documented purposes. Data tags may also support the use of automated tools.
    related_controls:
