  - id: pt-4
    title: Consent
    description: 'Implement [[ insert: param, pt-04_odp ]] for individuals to consent to the processing of their personally identifiable information prior to its collection that facilitate individuals’ informed decision-making.'
    parameters:
      - id: pt-04_odp
        label: tools or mechanisms
        guidelines:
          - the tools or mechanisms to be implemented for individuals to consent to the processing of their personally identifiable information are defined;
    guidance: Consent allows individuals to participate in making decisions about the processing of their information and transfers some of the risk that arises from the processing of personally identifiable information from the organization to an individual. Consent may be required by applicable laws, executive orders, directives, regulations, policies, standards, or guidelines. Otherwise, when selecting consent as a control, organizations consider whether individuals can be reasonably expected to understand and accept the privacy risks that arise from their authorization. Organizations consider whether other controls may more effectively mitigate privacy risk either alone or in conjunction with consent. Organizations also consider any demographic or contextual factors that may influence the understanding or behavior of individuals with respect to the processing carried out by the system or organization. When soliciting consent from individuals, organizations consider the appropriate mechanism for obtaining consent, including the type of consent (e.g., opt-in, opt-out), how to properly authenticate and identity proof individuals and how to obtain consent through electronic means. In addition, organizations consider providing a mechanism for individuals to revoke consent once it has been provided, as appropriate. Finally, organizations consider usability factors to help individuals understand the risks being accepted when providing consent, including the use of plain language and avoiding technical jargon.
    related_controls:
      - ac-16
      - pt-2
      - pt-5
    rules: []
    status: pending
  - id: pt-4.1
    title: Tailored Consent
    description: 'Provide [[ insert: param, pt-04.01_odp ]] to allow individuals to tailor processing permissions to selected elements of personally identifiable information.'
    parameters:
      - id: pt-04.01_odp
        label: mechanisms
        guidelines:
          - tailoring mechanisms for processing selected elements of personally identifiable information permissions are defined;
    guidance: While some processing may be necessary for the basic functionality of the product or service, other processing may not. In these circumstances, organizations allow individuals to select how specific personally identifiable information elements may be processed. More tailored consent may help reduce privacy risk, increase individual satisfaction, and avoid adverse behaviors, such as abandonment of the product or service.
    related_controls:
      - pt-2
    rules: []
    status: pending
  - id: pt-4.2
    title: Just-in-time Consent
    description: 'Present [[ insert: param, pt-04.02_odp.01 ]] to individuals at [[ insert: param, pt-04.02_odp.02 ]] and in conjunction with [[ insert: param, pt-04.02_odp.03 ]].'
    parameters:
      - id: pt-04.02_odp.01
        label: consent mechanisms
        guidelines:
          - consent mechanisms to be presented to individuals are defined;
      - id: pt-04.02_odp.02
        label: frequency
        guidelines:
          - the frequency at which to present consent mechanisms to individuals is defined;
      - id: pt-04.02_odp.03
        label: personally identifiable information processing
        guidelines:
          - personally identifiable information processing to be presented in conjunction with organization-defined consent mechanisms is defined;
    guidance: Just-in-time consent enables individuals to participate in how their personally identifiable information is being processed at the time or in conjunction with specific types of data processing when such participation may be most useful to the individual. Individual assumptions about how personally identifiable information is being processed might not be accurate or reliable if time has passed since the individual last gave consent or the type of processing creates significant privacy risk. Organizations use discretion to determine when to use just-in-time consent and may use supporting information on demographics, focus groups, or surveys to learn more about individuals’ privacy interests and concerns.
    related_controls:
      - pt-2
    rules: []
    status: pending
  - id: pt-4.3
    title: Revocation
    description: 'Implement [[ insert: param, pt-04.03_odp ]] for individuals to revoke consent to the processing of their personally identifiable information.'
    parameters:
      - id: pt-04.03_odp
        label: tools or mechanisms
        guidelines:
          - the tools or mechanisms to be implemented for revoking consent to the processing of personally identifiable information are defined;
    guidance: Revocation of consent enables individuals to exercise control over their initial consent decision when circumstances change. Organizations consider usability factors in enabling easy-to-use revocation capabilities.
    related_controls:
      - pt-2
    rules: []
    status: pending
  - id: pt-5
    title: Privacy Notice
    description: "Provide notice to individuals about the processing of personally identifiable information that:\n  a. Is available to individuals upon first interacting with an organization, and subsequently at [[ insert: param, pt-05_odp.01 ]];\n  b. Is clear and easy-to-understand, expressing information about personally identifiable information processing in plain language;\n  c. Identifies the authority that authorizes the processing of personally identifiable information;\n  d. Identifies the purposes for which personally identifiable information is to be processed; and\n  e. Includes [[ insert: param, pt-05_odp.02 ]]."
    parameters:
      - id: pt-05_odp.01
        label: frequency
        guidelines:
          - the frequency at which a notice is provided to individuals after initial interaction with an organization is defined;
      - id: pt-05_odp.02
        label: information
        guidelines:
          - information to be included with the notice about the processing of personally identifiable information is defined;
    guidance: "Privacy notices help inform individuals about how their personally identifiable information is being processed by the system or organization. Organizations use privacy notices to inform individuals about how, under what authority, and for what purpose their personally identifiable information is processed, as well as other information such as choices individuals might have with respect to that processing and other parties with whom information is shared. Laws, executive orders, directives, regulations, or policies may require that privacy notices include specific elements or be provided in specific formats. Federal agency personnel consult with the senior agency official for privacy and legal counsel regarding when and where to provide privacy notices, as well as elements to include in privacy notices and required formats. In circumstances where laws or government-wide policies do not require privacy notices, organizational policies and determinations may require privacy notices and may serve as a source of the elements to include in privacy notices.\n\nPrivacy risk assessments identify the privacy risks associated with the processing of personally identifiable information and may help organizations determine appropriate elements to include in a privacy notice to manage such risks. To help individuals understand how their information is being processed, organizations write materials in plain language and avoid technical jargon."
    related_controls:
      - pm-20
      - pm-22
      - pt-2
      - pt-3
      - pt-4
      - pt-7
      - ra-3
      - sc-42
      - si-18
    rules: []
    status: pending
  - id: pt-5.1
    title: Just-in-time Notice
    description: 'Present notice of personally identifiable information processing to individuals at a time and location where the individual provides personally identifiable information or in conjunction with a data action, or [[ insert: param, pt-05.01_odp ]].'
    parameters:
      - id: pt-05.01_odp
        label: frequency
        guidelines:
          - the frequency at which to present a notice of personally identifiable information processing is defined;
    guidance: Just-in-time notices inform individuals of how organizations process their personally identifiable information at a time when such notices may be most useful to the individuals. Individual assumptions about how personally identifiable information will be processed might not be accurate or reliable if time has passed since the organization last presented notice or the circumstances under which the individual was last provided notice have changed. A just-in-time notice can explain data actions that organizations have identified as potentially giving rise to greater privacy risk for individuals. Organizations can use a just-in-time notice to update or remind individuals about specific data actions as they occur or highlight specific changes that occurred since last presenting notice. A just-in-time notice can be used in conjunction with just-in-time consent to explain what will occur if consent is declined. Organizations use discretion to determine when to use a just-in-time notice and may use supporting information on user demographics, focus groups, or surveys to learn about users’ privacy interests and concerns.
    related_controls:
      - pm-21
    rules: []
    status: pending
  - id: pt-5.2
    title: Privacy Act Statements
    description: Include Privacy Act statements on forms that collect information that will be maintained in a Privacy Act system of records, or provide Privacy Act statements on separate forms that can be retained by individuals.
    guidance: "If a federal agency asks individuals to supply information that will become part of a system of records, the agency is required to provide a [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) statement on the form used to collect the information or on a separate form that can be retained by the individual. The agency provides a [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) statement in such circumstances regardless of whether the information will be collected on a paper or electronic form, on a website, on a mobile application, over the telephone, or through some other medium. This requirement ensures that the individual is provided with sufficient information about the request for information to make an informed decision on whether or not to respond.\n\n[PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) statements provide formal notice to individuals of the authority that authorizes the solicitation of the information; whether providing the information is mandatory or voluntary; the principal purpose(s) for which the information is to be used; the published routine uses to which the information is subject; the effects on the individual, if any, of not providing all or any part of the information requested; and an appropriate citation and link to the relevant system of records notice. Federal agency personnel consult with the senior agency official for privacy and legal counsel regarding the notice provisions of the [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455)."
    related_controls:
      - pt-6
    rules: []
    status: pending
  - id: pt-6
    title: System of Records Notice
    description: "For systems that process information that will be maintained in a Privacy Act system of records:\n  a. Draft system of records notices in accordance with OMB guidance and submit new and significantly modified system of records notices to the OMB and appropriate congressional committees for advance review;\n  b. Publish system of records notices in the Federal Register; and\n  c. Keep system of records notices accurate, up-to-date, and scoped in accordance with policy."
    guidance: The [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) requires that federal agencies publish a system of records notice in the Federal Register upon the establishment and/or modification of a [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) system of records. As a general matter, a system of records notice is required when an agency maintains a group of any records under the control of the agency from which information is retrieved by the name of an individual or by some identifying number, symbol, or other identifier. The notice describes the existence and character of the system and identifies the system of records, the purpose(s) of the system, the authority for maintenance of the records, the categories of records maintained in the system, the categories of individuals about whom records are maintained, the routine uses to which the records are subject, and additional details about the system as described in [OMB A-108](#3671ff20-c17c-44d6-8a88-7de203fa74aa).
    related_controls:
      - ac-3
      - pm-20
      - pt-2
      - pt-3
      - pt-5
    rules: []
    status: pending
  - id: pt-6.1
    title: Routine Uses
    description: 'Review all routine uses published in the system of records notice at [[ insert: param, pt-06.01_odp ]] to ensure continued accuracy, and to ensure that routine uses continue to be compatible with the purpose for which the information was collected.'
    parameters:
      - id: pt-06.01_odp
        label: frequency
        guidelines:
          - the frequency at which to review all routine uses published in the system of records notice is defined;
    guidance: A [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) routine use is a particular kind of disclosure of a record outside of the federal agency maintaining the system of records. A routine use is an exception to the [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) prohibition on the disclosure of a record in a system of records without the prior written consent of the individual to whom the record pertains. To qualify as a routine use, the disclosure must be for a purpose that is compatible with the purpose for which the information was originally collected. The [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) requires agencies to describe each routine use of the records maintained in the system of records, including the categories of users of the records and the purpose of the use. Agencies may only establish routine uses by explicitly publishing them in the relevant system of records notice.
    rules: []
    status: pending
  - id: pt-6.2
    title: Exemption Rules
    description: 'Review all Privacy Act exemptions claimed for the system of records at [[ insert: param, pt-06.02_odp ]] to ensure they remain appropriate and necessary in accordance with law, that they have been promulgated as regulations, and that they are accurately described in the system of records notice.'
    parameters:
      - id: pt-06.02_odp
        label: frequency
        guidelines:
          - the frequency at which to review all Privacy Act exemptions claimed for the system of records is defined;
    guidance: The [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) includes two sets of provisions that allow federal agencies to claim exemptions from certain requirements in the statute. In certain circumstances, these provisions allow agencies to promulgate regulations to exempt a system of records from select provisions of the [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) . At a minimum, organizations’ [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) exemption regulations include the specific name(s) of any system(s) of records that will be exempt, the specific provisions of the [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) from which the system(s) of records is to be exempted, the reasons for the exemption, and an explanation for why the exemption is both necessary and appropriate.
    rules: []
    status: pending
  - id: pt-7
    title: Specific Categories of Personally Identifiable Information
    description: 'Apply [[ insert: param, pt-07_odp ]] for specific categories of personally identifiable information.'
    parameters:
      - id: pt-07_odp
        label: processing conditions
        guidelines:
          - processing conditions to be applied for specific categories of personally identifiable information are defined;
    guidance: Organizations apply any conditions or protections that may be necessary for specific categories of personally identifiable information. These conditions may be required by laws, executive orders, directives, regulations, policies, standards, or guidelines. The requirements may also come from the results of privacy risk assessments that factor in contextual changes that may result in an organizational determination that a particular category of personally identifiable information is particularly sensitive or raises particular privacy risks. Organizations consult with the senior agency official for privacy and legal counsel regarding any protections that may be necessary.
    related_controls:
      - ir-9
      - pt-2
      - pt-3
      - ra-3
    rules: []
    status: pending
  - id: pt-7.1
    title: Social Security Numbers
    description: "When a system processes Social Security numbers:\n  a. Eliminate unnecessary collection, maintenance, and use of Social Security numbers, and explore alternatives to their use as a personal identifier;\n  b. Do not deny any individual any right, benefit, or privilege provided by law because of such individual’s refusal to disclose his or her Social Security number; and\n  c. Inform any individual who is asked to disclose his or her Social Security number whether that disclosure is mandatory or voluntary, by what statutory or other authority such number is solicited, and what uses will be made of it."
    guidance: Federal law and policy establish specific requirements for organizations’ processing of Social Security numbers. Organizations take steps to eliminate unnecessary uses of Social Security numbers and other sensitive information and observe any particular requirements that apply.
    related_controls:
      - ia-4
    rules: []
    status: pending
  - id: pt-7.2
    title: First Amendment Information
    description: Prohibit the processing of information describing how any individual exercises rights guaranteed by the First Amendment unless expressly authorized by statute or by the individual or unless pertinent to and within the scope of an authorized law enforcement activity.
    guidance: The [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) limits agencies’ ability to process information that describes how individuals exercise rights guaranteed by the First Amendment. Organizations consult with the senior agency official for privacy and legal counsel regarding these requirements.
    rules: []
    status: pending
  - id: pt-8
    title: Computer Matching Requirements
    description: "When a system or organization processes information for the purpose of conducting a matching program:\n  a. Obtain approval from the Data Integrity Board to conduct the matching program;\n  b. Develop and enter into a computer matching agreement;\n  c. Publish a matching notice in the Federal Register;\n  d. Independently verify the information produced by the matching program before taking adverse action against an individual, if required; and\n  e. Provide individuals with notice and an opportunity to contest the findings before taking adverse action against an individual."
    guidance: The [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) establishes requirements for federal and non-federal agencies if they engage in a matching program. In general, a matching program is a computerized comparison of records from two or more automated [PRIVACT](#18e71fec-c6fd-475a-925a-5d8495cf8455) systems of records or an automated system of records and automated records maintained by a non-federal agency (or agent thereof). A matching program either pertains to federal benefit programs or federal personnel or payroll records. A federal benefit match is performed to determine or verify eligibility for payments under federal benefit programs or to recoup payments or delinquent debts under federal benefit programs. A matching program involves not just the matching activity itself but also the investigative follow-up and ultimate action, if any.
