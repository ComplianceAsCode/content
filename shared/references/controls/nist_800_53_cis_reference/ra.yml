  - id: ra-10
    title: Threat Hunting
    description: "  a. Establish and maintain a cyber threat hunting capability to:\n    1. Search for indicators of compromise in organizational systems; and\n    2. Detect, track, and disrupt threats that evade existing controls; and\n  b. Employ the threat hunting capability [[ insert: param, ra-10_odp ]]."
    parameters:
      - id: ra-10_odp
        label: frequency
        guidelines:
          - the frequency at which to employ the threat hunting capability is defined;
    guidance: Threat hunting is an active means of cyber defense in contrast to traditional protection measures, such as firewalls, intrusion detection and prevention systems, quarantining malicious code in sandboxes, and Security Information and Event Management technologies and systems. Cyber threat hunting involves proactively searching organizational systems, networks, and infrastructure for advanced threats. The objective is to track and disrupt cyber adversaries as early as possible in the attack sequence and to measurably improve the speed and accuracy of organizational responses. Indications of compromise include unusual network traffic, unusual file changes, and the presence of malicious code. Threat hunting teams leverage existing threat intelligence and may create new threat intelligence, which is shared with peer organizations, Information Sharing and Analysis Organizations (ISAO), Information Sharing and Analysis Centers (ISAC), and relevant government departments and agencies.
    related_controls:
      - ca-2
      - ca-7
      - ca-8
      - ra-3
