      - high
    rules: []
    status: pending
  - id: ra-3.2
    title: Use of All-source Intelligence
    description: Use all-source intelligence to assist in the analysis of risk.
    guidance: Organizations employ all-source intelligence to inform engineering, acquisition, and risk management decisions. All-source intelligence consists of information derived from all available sources, including publicly available or open-source information, measurement and signature intelligence, human intelligence, signals intelligence, and imagery intelligence. All-source intelligence is used to analyze the risk of vulnerabilities (both intentional and unintentional) from development, manufacturing, and delivery processes, people, and the environment. The risk analysis may be performed on suppliers at multiple tiers in the supply chain sufficient to manage risks. Organizations may develop agreements to share all-source intelligence information or resulting decisions with other organizations, as appropriate.
    rules: []
    status: pending
  - id: ra-3.3
    title: Dynamic Threat Awareness
    description: 'Determine the current cyber threat environment on an ongoing basis using [[ insert: param, ra-03.03_odp ]].'
    parameters:
      - id: ra-03.03_odp
        label: means
        guidelines:
          - means to determine the current cyber threat environment on an ongoing basis;
    guidance: The threat awareness information that is gathered feeds into the organization’s information security operations to ensure that procedures are updated in response to the changing threat environment. For example, at higher threat levels, organizations may change the privilege or authentication thresholds required to perform certain operations.
    related_controls:
      - at-2
    rules: []
    status: pending
  - id: ra-3.4
    title: Predictive Cyber Analytics
    description: 'Employ the following advanced automation and analytics capabilities to predict and identify risks to [[ insert: param, ra-03.04_odp.02 ]]: [[ insert: param, ra-3.4_prm_2 ]].'
    parameters:
      - id: ra-3.4_prm_2
        label: organization-defined advanced automation and analytics capabilities
      - id: ra-03.04_odp.01
        label: advanced automation capabilities
        guidelines:
          - advanced automation capabilities to predict and identify risks are defined;
      - id: ra-03.04_odp.02
        label: systems or system components
        guidelines:
          - systems or system components where advanced automation and analytics capabilities are to be employed are defined;
      - id: ra-03.04_odp.03
        label: advanced analytics capabilities
        guidelines:
          - advanced analytics capabilities to predict and identify risks are defined;
    guidance: A properly resourced Security Operations Center (SOC) or Computer Incident Response Team (CIRT) may be overwhelmed by the volume of information generated by the proliferation of security tools and appliances unless it employs advanced automation and analytics to analyze the data. Advanced automation and analytics capabilities are typically supported by artificial intelligence concepts, including machine learning. Examples include Automated Threat Discovery and Response (which includes broad-based collection, context-based analysis, and adaptive response capabilities), automated workflow operations, and machine assisted decision tools. Note, however, that sophisticated adversaries may be able to extract information related to analytic parameters and retrain the machine learning to classify malicious activity as benign. Accordingly, machine learning is augmented by human monitoring to ensure that sophisticated adversaries are not able to conceal their activities.
    rules: []
    status: pending
  - id: ra-4
    title: Risk Assessment Update
    rules: []
    status: pending
  - id: ra-5
    title: Vulnerability Monitoring and Scanning
    description: "  a. Monitor and scan for vulnerabilities in the system and hosted applications [[ insert: param, ra-5_prm_1 ]] and when new vulnerabilities potentially affecting the system are identified and reported;\n  b. Employ vulnerability monitoring tools and techniques that facilitate interoperability among tools and automate parts of the vulnerability management process by using standards for:\n    1. Enumerating platforms, software flaws, and improper configurations;\n    2. Formatting checklists and test procedures; and\n    3. Measuring vulnerability impact;\n  c. Analyze vulnerability scan reports and results from vulnerability monitoring;\n  d. Remediate legitimate vulnerabilities [[ insert: param, ra-05_odp.03 ]] in accordance with an organizational assessment of risk;\n  e. Share information obtained from the vulnerability monitoring process and control assessments with [[ insert: param, ra-05_odp.04 ]] to help eliminate similar vulnerabilities in other systems; and\n  f. Employ vulnerability monitoring tools that include the capability to readily update the vulnerabilities to be scanned."
    parameters:
      - id: ra-5_prm_1
        label: organization-defined frequency and/or randomly in accordance with organization-defined process
      - id: ra-05_odp.01
        label: frequency and/or randomly in accordance with organization-defined process
        guidelines:
          - frequency for monitoring systems and hosted applications for vulnerabilities is defined;
      - id: ra-05_odp.02
        label: frequency and/or randomly in accordance with organization-defined process
        guidelines:
          - frequency for scanning systems and hosted applications for vulnerabilities is defined;
      - id: ra-05_odp.03
        label: response times
        guidelines:
          - response times to remediate legitimate vulnerabilities in accordance with an organizational assessment of risk are defined;
      - id: ra-05_odp.04
        label: personnel or roles
        guidelines:
          - personnel or roles with whom information obtained from the vulnerability scanning process and control assessments is to be shared;
    guidance: "Security categorization of information and systems guides the frequency and comprehensiveness of vulnerability monitoring (including scans). Organizations determine the required vulnerability monitoring for system components, ensuring that the potential sources of vulnerabilities—such as infrastructure components (e.g., switches, routers, guards, sensors), networked printers, scanners, and copiers—are not overlooked. The capability to readily update vulnerability monitoring tools as new vulnerabilities are discovered and announced and as new scanning methods are developed helps to ensure that new vulnerabilities are not missed by employed vulnerability monitoring tools. The vulnerability monitoring tool update process helps to ensure that potential vulnerabilities in the system are identified and addressed as quickly as possible. Vulnerability monitoring and analyses for custom software may require additional approaches, such as static analysis, dynamic analysis, binary analysis, or a hybrid of the three approaches. Organizations can use these analysis approaches in source code reviews and in a variety of tools, including web-based application scanners, static analysis tools, and binary analyzers.\n\nVulnerability monitoring includes scanning for patch levels; scanning for functions, ports, protocols, and services that should not be accessible to users or devices; and scanning for flow control mechanisms that are improperly configured or operating incorrectly. Vulnerability monitoring may also include continuous vulnerability monitoring tools that use instrumentation to continuously analyze components. Instrumentation-based tools may improve accuracy and may be run throughout an organization without scanning. Vulnerability monitoring tools that facilitate interoperability include tools that are Security Content Automated Protocol (SCAP)-validated. Thus, organizations consider using scanning tools that express vulnerabilities in the Common Vulnerabilities and Exposures (CVE) naming convention and that employ the Open Vulnerability Assessment Language (OVAL) to determine the presence of vulnerabilities. Sources for vulnerability information include the Common Weakness Enumeration (CWE) listing and the National Vulnerability Database (NVD). Control assessments, such as red team exercises, provide additional sources of potential vulnerabilities for which to scan. Organizations also consider using scanning tools that express vulnerability impact by the Common Vulnerability Scoring System (CVSS).\n\nVulnerability monitoring includes a channel and process for receiving reports of security vulnerabilities from the public at-large. Vulnerability disclosure programs can be as simple as publishing a monitored email address or web form that can receive reports, including notification authorizing good-faith research and disclosure of security vulnerabilities. Organizations generally expect that such research is happening with or without their authorization and can use public vulnerability disclosure channels to increase the likelihood that discovered vulnerabilities are reported directly to the organization for remediation.\n\nOrganizations may also employ the use of financial incentives (also known as \"bug bounties\" ) to further encourage external security researchers to report discovered vulnerabilities. Bug bounty programs can be tailored to the organization’s needs. Bounties can be operated indefinitely or over a defined period of time and can be offered to the general public or to a curated group. Organizations may run public and private bounties simultaneously and could choose to offer partially credentialed access to certain participants in order to evaluate security vulnerabilities from privileged vantage points."
    related_controls:
