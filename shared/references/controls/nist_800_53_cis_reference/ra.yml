    rules: []
    status: pending
  - id: ra-5.3
    title: Breadth and Depth of Coverage
    description: Define the breadth and depth of vulnerability scanning coverage.
    guidance: The breadth of vulnerability scanning coverage can be expressed as a percentage of components within the system, by the particular types of systems, by the criticality of systems, or by the number of vulnerabilities to be checked. Conversely, the depth of vulnerability scanning coverage can be expressed as the level of the system design that the organization intends to monitor (e.g., component, module, subsystem, element). Organizations can determine the sufficiency of vulnerability scanning coverage with regard to its risk tolerance and other factors. Scanning tools and how the tools are configured may affect the depth and coverage. Multiple scanning tools may be needed to achieve the desired depth and coverage. [SP 800-53A](#a21aef46-7330-48a0-b2e1-c5bb8b2dd11d) provides additional information on the breadth and depth of coverage.
    rules: []
    status: pending
  - id: ra-5.4
    title: Discoverable Information
    description: 'Determine information about the system that is discoverable and take [[ insert: param, ra-05.04_odp ]].'
    parameters:
      - id: ra-05.04_odp
        label: corrective actions
        guidelines:
          - corrective actions to be taken if information about the system is discoverable are defined;
    guidance: Discoverable information includes information that adversaries could obtain without compromising or breaching the system, such as by collecting information that the system is exposing or by conducting extensive web searches. Corrective actions include notifying appropriate organizational personnel, removing designated information, or changing the system to make the designated information less relevant or attractive to adversaries. This enhancement excludes intentionally discoverable information that may be part of a decoy capability (e.g., honeypots, honeynets, or deception nets) deployed by the organization.
    related_controls:
      - au-13
      - sc-26
    levels:
      - high
    rules: []
    status: pending
  - id: ra-5.5
    title: Privileged Access
    description: 'Implement privileged access authorization to [[ insert: param, ra-05.05_odp.01 ]] for [[ insert: param, ra-05.05_odp.02 ]].'
    parameters:
      - id: ra-05.05_odp.01
        label: system components
        guidelines:
          - system components to which privileged access is authorized for selected vulnerability scanning activities are defined;
      - id: ra-05.05_odp.02
        label: vulnerability scanning activities
        guidelines:
          - vulnerability scanning activities selected for privileged access authorization to system components are defined;
    guidance: In certain situations, the nature of the vulnerability scanning may be more intrusive, or the system component that is the subject of the scanning may contain classified or controlled unclassified information, such as personally identifiable information. Privileged access authorization to selected system components facilitates more thorough vulnerability scanning and protects the sensitive nature of such scanning.
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: ra-5.6
    title: Automated Trend Analyses
    description: 'Compare the results of multiple vulnerability scans using [[ insert: param, ra-05.06_odp ]].'
    parameters:
      - id: ra-05.06_odp
        label: automated mechanisms
        guidelines:
          - automated mechanisms to compare the results of multiple vulnerability scans are defined;
    guidance: Using automated mechanisms to analyze multiple vulnerability scans over time can help determine trends in system vulnerabilities and identify patterns of attack.
    rules: []
    status: pending
  - id: ra-5.7
    title: Automated Detection and Notification of Unauthorized Components
    rules: []
    status: pending
  - id: ra-5.8
    title: Review Historic Audit Logs
    description: 'Review historic audit logs to determine if a vulnerability identified in a [[ insert: param, ra-05.08_odp.01 ]] has been previously exploited within an [[ insert: param, ra-05.08_odp.02 ]].'
    parameters:
      - id: ra-05.08_odp.01
        label: system
        guidelines:
          - a system whose historic audit logs are to be reviewed is defined;
      - id: ra-05.08_odp.02
        label: time period
        guidelines:
          - a time period for a potential previous exploit of a system is defined;
    guidance: Reviewing historic audit logs to determine if a recently detected vulnerability in a system has been previously exploited by an adversary can provide important information for forensic analyses. Such analyses can help identify, for example, the extent of a previous intrusion, the trade craft employed during the attack, organizational information exfiltrated or modified, mission or business capabilities affected, and the duration of the attack.
    related_controls:
      - au-6
      - au-11
    rules: []
    status: pending
  - id: ra-5.9
    title: Penetration Testing and Analyses
    rules: []
    status: pending
  - id: ra-5.10
    title: Correlate Scanning Information
    description: Correlate the output from vulnerability scanning tools to determine the presence of multi-vulnerability and multi-hop attack vectors.
    guidance: An attack vector is a path or means by which an adversary can gain access to a system in order to deliver malicious code or exfiltrate information. Organizations can use attack trees to show how hostile activities by adversaries interact and combine to produce adverse impacts or negative consequences to systems and organizations. Such information, together with correlated data from vulnerability scanning tools, can provide greater clarity regarding multi-vulnerability and multi-hop attack vectors. The correlation of vulnerability scanning information is especially important when organizations are transitioning from older technologies to newer technologies (e.g., transitioning from IPv4 to IPv6 network protocols). During such transitions, some system components may inadvertently be unmanaged and create opportunities for adversary exploitation.
    rules: []
    status: pending
  - id: ra-5.11
    title: Public Disclosure Program
    description: Establish a public reporting channel for receiving reports of vulnerabilities in organizational systems and system components.
    guidance: The reporting channel is publicly discoverable and contains clear language authorizing good-faith research and the disclosure of vulnerabilities to the organization. The organization does not condition its authorization on an expectation of indefinite non-disclosure to the public by the reporting entity but may request a specific time period to properly remediate the vulnerability.
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ra-6
    title: Technical Surveillance Countermeasures Survey
    description: 'Employ a technical surveillance countermeasures survey at [[ insert: param, ra-06_odp.01 ]] [[ insert: param, ra-06_odp.02 ]].'
    parameters:
      - id: ra-06_odp.01
        label: locations
        guidelines:
          - locations to employ technical surveillance countermeasure surveys are defined;
      - id: ra-06_odp.02
        label: ''
        choices:
          - '[[ insert: param, ra-06_odp.03 ]] '
          - 'when [[ insert: param, ra-06_odp.04 ]] '
      - id: ra-06_odp.03
        label: frequency
        guidelines:
          - the frequency at which to employ technical surveillance countermeasure surveys is defined (if selected);
      - id: ra-06_odp.04
        label: events or indicators
        guidelines:
          - events or indicators which, if they occur, trigger a technical surveillance countermeasures survey are defined (if selected);
    guidance: A technical surveillance countermeasures survey is a service provided by qualified personnel to detect the presence of technical surveillance devices and hazards and to identify technical security weaknesses that could be used in the conduct of a technical penetration of the surveyed facility. Technical surveillance countermeasures surveys also provide evaluations of the technical security posture of organizations and facilities and include visual, electronic, and physical examinations of surveyed facilities, internally and externally. The surveys also provide useful input for risk assessments and information regarding organizational exposure to potential adversaries.
    rules: []
    status: pending
  - id: ra-7
    title: Risk Response
    description: Respond to findings from security and privacy assessments, monitoring, and audits in accordance with organizational risk tolerance.
    guidance: Organizations have many options for responding to risk including mitigating risk by implementing new controls or strengthening existing controls, accepting risk with appropriate justification or rationale, sharing or transferring risk, or avoiding risk. The risk tolerance of the organization influences risk response decisions and actions. Risk response addresses the need to determine an appropriate response to risk before generating a plan of action and milestones entry. For example, the response may be to accept risk or reject risk, or it may be possible to mitigate the risk immediately so that a plan of action and milestones entry is not needed. However, if the risk response is to mitigate the risk, and the mitigation cannot be completed immediately, a plan of action and milestones entry is generated.
    related_controls:
      - ca-5
      - ir-9
      - pm-4
      - pm-28
      - ra-2
      - ra-3
      - sr-2
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: ra-8
    title: Privacy Impact Assessments
    description: "Conduct privacy impact assessments for systems, programs, or other activities before:\n  a. Developing or procuring information technology that processes personally identifiable information; and\n  b. Initiating a new collection of personally identifiable information that:\n    1. Will be processed using information technology; and\n    2. Includes personally identifiable information permitting the physical or virtual (online) contacting of a specific individual, if identical questions have been posed to, or identical reporting requirements imposed on, ten or more individuals, other than agencies, instrumentalities, or employees of the federal government."
    guidance: "A privacy impact assessment is an analysis of how personally identifiable information is handled to ensure that handling conforms to applicable privacy requirements, determine the privacy risks associated with an information system or activity, and evaluate ways to mitigate privacy risks. A privacy impact assessment is both an analysis and a formal document that details the process and the outcome of the analysis.\n\nOrganizations conduct and develop a privacy impact assessment with sufficient clarity and specificity to demonstrate that the organization fully considered privacy and incorporated appropriate privacy protections from the earliest stages of the organization’s activity and throughout the information life cycle. In order to conduct a meaningful privacy impact assessment, the organization’s senior agency official for privacy works closely with program managers, system owners, information technology experts, security officials, counsel, and other relevant organization personnel. Moreover, a privacy impact assessment is not a time-restricted activity that is limited to a particular milestone or stage of the information system or personally identifiable information life cycles. Rather, the privacy analysis continues throughout the system and personally identifiable information life cycles. Accordingly, a privacy impact assessment is a living document that organizations update whenever changes to the information technology, changes to the organization’s practices, or other factors alter the privacy risks associated with the use of such information technology.\n\nTo conduct the privacy impact assessment, organizations can use security and privacy risk assessments. Organizations may also use other related processes that may have different names, including privacy threshold analyses. A privacy impact assessment can also serve as notice to the public regarding the organization’s practices with respect to privacy. Although conducting and publishing privacy impact assessments may be required by law, organizations may develop such policies in the absence of applicable laws. For federal agencies, privacy impact assessments may be required by [EGOV](#7b0b9634-741a-4335-b6fa-161228c3a76e) ; agencies should consult with their senior agency official for privacy and legal counsel on this requirement and be aware of the statutory exceptions and OMB guidance relating to the provision."
    related_controls:
      - cm-4
      - cm-9
      - cm-13
      - pt-2
