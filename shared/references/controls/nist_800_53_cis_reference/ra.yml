      - high
    rules: []
    status: pending
  - id: ra-2.1
    title: Impact-level Prioritization
    description: Conduct an impact-level prioritization of organizational systems to obtain additional granularity on system impact levels.
    guidance: 'Organizations apply the "high-water mark" concept to each system categorized in accordance with [FIPS 199](#628d22a1-6a11-4784-bc59-5cd9497b5445) , resulting in systems designated as low impact, moderate impact, or high impact. Organizations that desire additional granularity in the system impact designations for risk-based decision-making, can further partition the systems into sub-categories of the initial system categorization. For example, an impact-level prioritization on a moderate-impact system can produce three new sub-categories: low-moderate systems, moderate-moderate systems, and high-moderate systems. Impact-level prioritization and the resulting sub-categories of the system give organizations an opportunity to focus their investments related to security control selection and the tailoring of control baselines in responding to identified risks. Impact-level prioritization can also be used to determine those systems that may be of heightened interest or value to adversaries or represent a critical loss to the federal enterprise, sometimes described as high value assets. For such high value assets, organizations may be more focused on complexity, aggregation, and information exchanges. Systems with high value assets can be prioritized by partitioning high-impact systems into low-high systems, moderate-high systems, and high-high systems. Alternatively, organizations can apply the guidance in [CNSSI 1253](#4e4fbc93-333d-45e6-a875-de36b878b6b9) for security objective-related categorization.'
    rules: []
    status: pending
  - id: ra-3
    title: Risk Assessment
    description: "  a. Conduct a risk assessment, including:\n    1. Identifying threats to and vulnerabilities in the system;\n    2. Determining the likelihood and magnitude of harm from unauthorized access, use, disclosure, disruption, modification, or destruction of the system, the information it processes, stores, or transmits, and any related information; and\n    3. Determining the likelihood and impact of adverse effects on individuals arising from the processing of personally identifiable information;\n  b. Integrate risk assessment results and risk management decisions from the organization and mission or business process perspectives with system-level risk assessments;\n  c. Document risk assessment results in [[ insert: param, ra-03_odp.01 ]];\n  d. Review risk assessment results [[ insert: param, ra-03_odp.03 ]];\n  e. Disseminate risk assessment results to [[ insert: param, ra-03_odp.04 ]] ; and\n  f. Update the risk assessment [[ insert: param, ra-03_odp.05 ]] or when there are significant changes to the system, its environment of operation, or other conditions that may impact the security or privacy state of the system."
    parameters:
      - id: ra-03_odp.01
        label: ''
        choices:
          - security and privacy plans
          - risk assessment report
          - '[[ insert: param, ra-03_odp.02 ]] '
      - id: ra-03_odp.02
        label: document
        guidelines:
          - a document in which risk assessment results are to be documented (if not documented in the security and privacy plans or risk assessment report) is defined (if selected);
      - id: ra-03_odp.03
        label: frequency
        guidelines:
          - the frequency to review risk assessment results is defined;
      - id: ra-03_odp.04
        label: personnel or roles
        guidelines:
          - personnel or roles to whom risk assessment results are to be disseminated is/are defined;
      - id: ra-03_odp.05
        label: frequency
        guidelines:
          - the frequency to update the risk assessment is defined;
    guidance: "Risk assessments consider threats, vulnerabilities, likelihood, and impact to organizational operations and assets, individuals, other organizations, and the Nation. Risk assessments also consider risk from external parties, including contractors who operate systems on behalf of the organization, individuals who access organizational systems, service providers, and outsourcing entities.\n\nOrganizations can conduct risk assessments at all three levels in the risk management hierarchy (i.e., organization level, mission/business process level, or information system level) and at any stage in the system development life cycle. Risk assessments can also be conducted at various steps in the Risk Management Framework, including preparation, categorization, control selection, control implementation, control assessment, authorization, and control monitoring. Risk assessment is an ongoing activity carried out throughout the system development life cycle.\n\nRisk assessments can also address information related to the system, including system design, the intended use of the system, testing results, and supply chain-related information or artifacts. Risk assessments can play an important role in control selection processes, particularly during the application of tailoring guidance and in the earliest phases of capability determination."
    related_controls:
