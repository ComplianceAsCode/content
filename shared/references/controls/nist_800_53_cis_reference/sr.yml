  - id: sr-3.1
    title: Diverse Supply Base
    description: 'Employ a diverse set of sources for the following system components and services: [[ insert: param, sr-3.1_prm_1 ]].'
    parameters:
      - id: sr-3.1_prm_1
        label: organization-defined system components and services
      - id: sr-03.01_odp.01
        label: system components
        guidelines:
          - system components with a diverse set of sources are defined;
      - id: sr-03.01_odp.02
        label: services
        guidelines:
          - services with a diverse set of sources are defined;
    guidance: Diversifying the supply of systems, system components, and services can reduce the probability that adversaries will successfully identify and target the supply chain and can reduce the impact of a supply chain event or compromise. Identifying multiple suppliers for replacement components can reduce the probability that the replacement component will become unavailable. Employing a diverse set of developers or logistics service providers can reduce the impact of a natural disaster or other supply chain event. Organizations consider designing the system to include diverse materials and components.
    rules: []
    status: pending
  - id: sr-3.2
    title: Limitation of Harm
    description: 'Employ the following controls to limit harm from potential adversaries identifying and targeting the organizational supply chain: [[ insert: param, sr-03.02_odp ]].'
    parameters:
      - id: sr-03.02_odp
        label: controls
        guidelines:
          - controls to limit harm from potential supply chain adversaries are defined;
    guidance: Controls that can be implemented to reduce the probability of adversaries successfully identifying and targeting the supply chain include avoiding the purchase of custom or non-standardized configurations, employing approved vendor lists with standing reputations in industry, following pre-agreed maintenance schedules and update and patch delivery mechanisms, maintaining a contingency plan in case of a supply chain event, using procurement carve-outs that provide exclusions to commitments or obligations, using diverse delivery routes, and minimizing the time between purchase decisions and delivery.
    rules: []
    status: pending
  - id: sr-3.3
    title: Sub-tier Flow Down
    description: Ensure that the controls included in the contracts of prime contractors are also included in the contracts of subcontractors.
    guidance: To manage supply chain risk effectively and holistically, it is important that organizations ensure that supply chain risk management controls are included at all tiers in the supply chain. This includes ensuring that Tier 1 (prime) contractors have implemented processes to facilitate the "flow down" of supply chain risk management controls to sub-tier contractors. The controls subject to flow down are identified in [SR-3b](#sr-3_smt.b).
    related_controls:
      - sr-5
      - sr-8
    rules: []
    status: pending
  - id: sr-4
    title: Provenance
    description: 'Document, monitor, and maintain valid provenance of the following systems, system components, and associated data: [[ insert: param, sr-04_odp ]].'
    parameters:
      - id: sr-04_odp
        label: systems, system components, and associated data
        guidelines:
          - systems, system components, and associated data that require valid provenance are defined;
    guidance: Every system and system component has a point of origin and may be changed throughout its existence. Provenance is the chronology of the origin, development, ownership, location, and changes to a system or system component and associated data. It may also include personnel and processes used to interact with or make modifications to the system, component, or associated data. Organizations consider developing procedures (see [SR-1](#sr-1) ) for allocating responsibilities for the creation, maintenance, and monitoring of provenance for systems and system components; transferring provenance documentation and responsibility between organizations; and preventing and monitoring for unauthorized changes to the provenance records. Organizations have methods to document, monitor, and maintain valid provenance baselines for systems, system components, and related data. These actions help track, assess, and document any changes to the provenance, including changes in supply chain elements or configuration, and help ensure non-repudiation of provenance information and the provenance change records. Provenance considerations are addressed throughout the system development life cycle and incorporated into contracts and other arrangements, as appropriate.
    related_controls:
      - cm-8
      - ma-2
      - ma-6
      - ra-9
      - sa-3
      - sa-8
      - si-4
    rules: []
    status: pending
  - id: sr-4.1
    title: Identity
    description: 'Establish and maintain unique identification of the following supply chain elements, processes, and personnel associated with the identified system and critical system components: [[ insert: param, sr-04.01_odp ]].'
    parameters:
      - id: sr-04.01_odp
        label: supply chain elements, processes, and personnel
        guidelines:
          - supply chain elements, processes, and personnel associated with systems and critical system components that require unique identification are defined;
    guidance: Knowing who and what is in the supply chains of organizations is critical to gaining visibility into supply chain activities. Visibility into supply chain activities is also important for monitoring and identifying high-risk events and activities. Without reasonable visibility into supply chains elements, processes, and personnel, it is very difficult for organizations to understand and manage risk and reduce their susceptibility to adverse events. Supply chain elements include organizations, entities, or tools used for the research and development, design, manufacturing, acquisition, delivery, integration, operations, maintenance, and disposal of systems and system components. Supply chain processes include development processes for hardware, software, and firmware; shipping and handling procedures; configuration management tools, techniques, and measures to maintain provenance; personnel and physical security programs; or other programs, processes, or procedures associated with the production and distribution of supply chain elements. Supply chain personnel are individuals with specific roles and responsibilities related to the secure the research and development, design, manufacturing, acquisition, delivery, integration, operations and maintenance, and disposal of a system or system component. Identification methods are sufficient to support an investigation in case of a supply chain change (e.g. if a supply company is purchased), compromise, or event.
    related_controls:
      - ia-2
      - ia-8
      - pe-16
    rules: []
    status: pending
  - id: sr-4.2
    title: Track and Trace
    description: 'Establish and maintain unique identification of the following systems and critical system components for tracking through the supply chain: [[ insert: param, sr-04.02_odp ]].'
    parameters:
      - id: sr-04.02_odp
        label: systems and critical system components
        guidelines:
          - systems and critical system components that require unique identification for tracking through the supply chain are defined;
    guidance: Tracking the unique identification of systems and system components during development and transport activities provides a foundational identity structure for the establishment and maintenance of provenance. For example, system components may be labeled using serial numbers or tagged using radio-frequency identification tags. Labels and tags can help provide better visibility into the provenance of a system or system component. A system or system component may have more than one unique identifier. Identification methods are sufficient to support a forensic investigation after a supply chain compromise or event.
    related_controls:
      - ia-2
      - ia-8
      - pe-16
      - pl-2
    rules: []
    status: pending
  - id: sr-4.3
    title: Validate as Genuine and Not Altered
    description: 'Employ the following controls to validate that the system or system component received is genuine and has not been altered: [[ insert: param, sr-4.3_prm_1 ]].'
    parameters:
      - id: sr-4.3_prm_1
        label: organization-defined controls
      - id: sr-04.03_odp.01
        label: controls
        guidelines:
          - controls to validate that the system or system component received is genuine are defined;
      - id: sr-04.03_odp.02
        label: controls
        guidelines:
          - controls to validate that the system or system component received has not been altered are defined;
    guidance: For many systems and system components, especially hardware, there are technical means to determine if the items are genuine or have been altered, including optical and nanotechnology tagging, physically unclonable functions, side-channel analysis, cryptographic hash verifications or digital signatures, and visible anti-tamper labels or stickers. Controls can also include monitoring for out of specification performance, which can be an indicator of tampering or counterfeits. Organizations may leverage supplier and contractor processes for validating that a system or component is genuine and has not been altered and for replacing a suspect system or component. Some indications of tampering may be visible and addressable before accepting delivery, such as inconsistent packaging, broken seals, and incorrect labels. When a system or system component is suspected of being altered or counterfeit, the supplier, contractor, or original equipment manufacturer may be able to replace the item or provide a forensic capability to determine the origin of the counterfeit or altered item. Organizations can provide training to personnel on how to identify suspicious system or component deliveries.
    related_controls:
      - at-3
      - sr-9
      - sr-10
      - sr-11
    rules: []
    status: pending
  - id: sr-4.4
    title: Supply Chain Integrity — Pedigree
    description: 'Employ [[ insert: param, sr-04.04_odp.01 ]] and conduct [[ insert: param, sr-04.04_odp.02 ]] to ensure the integrity of the system and system components by validating the internal composition and provenance of critical or mission-essential technologies, products, and services.'
    parameters:
      - id: sr-04.04_odp.01
        label: controls
        guidelines:
          - controls employed to ensure that the integrity of the system and system component are defined;
      - id: sr-04.04_odp.02
        label: analysis method
        guidelines:
          - an analysis method to be conducted to validate the internal composition and provenance of critical or mission-essential technologies, products, and services to ensure the integrity of the system and system component is defined;
    guidance: Authoritative information regarding the internal composition of system components and the provenance of technology, products, and services provides a strong basis for trust. The validation of the internal composition and provenance of technologies, products, and services is referred to as the pedigree. For microelectronics, this includes material composition of components. For software this includes the composition of open-source and proprietary code, including the version of the component at a given point in time. Pedigrees increase the assurance that the claims suppliers assert about the internal composition and provenance of the products, services, and technologies they provide are valid. The validation of the internal composition and provenance can be achieved by various evidentiary artifacts or records that manufacturers and suppliers produce during the research and development, design, manufacturing, acquisition, delivery, integration, operations and maintenance, and disposal of technology, products, and services. Evidentiary artifacts include, but are not limited to, software identification (SWID) tags, software component inventory, the manufacturers’ declarations of platform attributes (e.g., serial numbers, hardware component inventory), and measurements (e.g., firmware hashes) that are tightly bound to the hardware itself.
    related_controls:
      - ra-3
    rules: []
    status: pending
  - id: sr-5
    title: Acquisition Strategies, Tools, and Methods
    description: 'Employ the following acquisition strategies, contract tools, and procurement methods to protect against, identify, and mitigate supply chain risks: [[ insert: param, sr-05_odp ]].'
    parameters:
      - id: sr-05_odp
        label: strategies, tools, and methods
        guidelines:
          - acquisition strategies, contract tools, and procurement methods to protect against, identify, and mitigate supply chain risks are defined;
    guidance: The use of the acquisition process provides an important vehicle to protect the supply chain. There are many useful tools and techniques available, including obscuring the end use of a system or system component, using blind or filtered buys, requiring tamper-evident packaging, or using trusted or controlled distribution. The results from a supply chain risk assessment can guide and inform the strategies, tools, and methods that are most applicable to the situation. Tools and techniques may provide protections against unauthorized production, theft, tampering, insertion of counterfeits, insertion of malicious software or backdoors, and poor development practices throughout the system development life cycle. Organizations also consider providing incentives for suppliers who implement controls, promote transparency into their processes and security and privacy practices, provide contract language that addresses the prohibition of tainted or counterfeit components, and restrict purchases from untrustworthy suppliers. Organizations consider providing training, education, and awareness programs for personnel regarding supply chain risk, available mitigation strategies, and when the programs should be employed. Methods for reviewing and protecting development plans, documentation, and evidence are commensurate with the security and privacy requirements of the organization. Contracts may specify documentation protection requirements.
    related_controls:
      - at-3
      - sa-2
      - sa-3
      - sa-4
      - sa-5
      - sa-8
      - sa-9
      - sa-10
      - sa-15
      - sr-6
      - sr-9
      - sr-10
      - sr-11
    levels:
      - low
      - moderate
      - high
    rules: []
    status: pending
  - id: sr-5.1
    title: Adequate Supply
    description: 'Employ the following controls to ensure an adequate supply of [[ insert: param, sr-05.01_odp.02 ]]: [[ insert: param, sr-05.01_odp.01 ]].'
    parameters:
      - id: sr-05.01_odp.01
        label: controls
        guidelines:
          - controls to ensure an adequate supply of critical system components are defined;
      - id: sr-05.01_odp.02
        label: critical system components
        guidelines:
          - critical system components of which an adequate supply is required are defined;
    guidance: Adversaries can attempt to impede organizational operations by disrupting the supply of critical system components or corrupting supplier operations. Organizations may track systems and component mean time to failure to mitigate the loss of temporary or permanent system function. Controls to ensure that adequate supplies of critical system components include the use of multiple suppliers throughout the supply chain for the identified critical components, stockpiling spare components to ensure operation during mission-critical times, and the identification of functionally identical or similar components that may be used, if necessary.
    related_controls:
      - ra-9
    rules: []
    status: pending
  - id: sr-5.2
    title: Assessments Prior to Selection, Acceptance, Modification, or Update
    description: Assess the system, system component, or system service prior to selection, acceptance, modification, or update.
    guidance: Organizational personnel or independent, external entities conduct assessments of systems, components, products, tools, and services to uncover evidence of tampering, unintentional and intentional vulnerabilities, or evidence of non-compliance with supply chain controls. These include malicious code, malicious processes, defective software, backdoors, and counterfeits. Assessments can include evaluations; design proposal reviews; visual or physical inspection; static and dynamic analyses; visual, x-ray, or magnetic particle inspections; simulations; white, gray, or black box testing; fuzz testing; stress testing; and penetration testing (see [SR-6(1)](#sr-6.1) ). Evidence generated during assessments is documented for follow-on actions by organizations. The evidence generated during the organizational or independent assessments of supply chain elements may be used to improve supply chain processes and inform the supply chain risk management process. The evidence can be leveraged in follow-on assessments. Evidence and other documentation may be shared in accordance with organizational agreements.
    related_controls:
      - ca-8
      - ra-5
      - sa-11
      - si-7
    rules: []
    status: pending
  - id: sr-6
    title: Supplier Assessments and Reviews
    description: 'Assess and review the supply chain-related risks associated with suppliers or contractors and the system, system component, or system service they provide [[ insert: param, sr-06_odp ]].'
    parameters:
      - id: sr-06_odp
        label: frequency
        guidelines:
          - the frequency at which to assess and review the supply chain-related risks associated with suppliers or contractors and the systems, system components, or system services they provide is defined;
    guidance: An assessment and review of supplier risk includes security and supply chain risk management processes, foreign ownership, control or influence (FOCI), and the ability of the supplier to effectively assess subordinate second-tier and third-tier suppliers and contractors. The reviews may be conducted by the organization or by an independent third party. The reviews consider documented processes, documented controls, all-source intelligence, and publicly available information related to the supplier or contractor. Organizations can use open-source information to monitor for indications of stolen information, poor development and quality control practices, information spillage, or counterfeits. In some cases, it may be appropriate or required to share assessment and review results with other organizations in accordance with any applicable rules, policies, or inter-organizational agreements or contracts.
    related_controls:
      - sr-3
      - sr-5
    levels:
      - moderate
      - high
    rules: []
    status: pending
  - id: sr-6.1
    title: Testing and Analysis
    description: 'Employ [[ insert: param, sr-06.01_odp.01 ]] of the following supply chain elements, processes, and actors associated with the system, system component, or system service: [[ insert: param, sr-06.01_odp.02 ]].'
    parameters:
      - id: sr-06.01_odp.01
        label: ''
        choices:
          - organizational analysis
          - independent third-party analysis
          - organizational testing
          - independent third-party testing
      - id: sr-06.01_odp.02
        label: supply chain elements, processes, and actors
        guidelines:
          - supply chain elements, processes, and actors to be analyzed and tested are defined;
    guidance: Relationships between entities and procedures within the supply chain, including development and delivery, are considered. Supply chain elements include organizations, entities, or tools that are used for the research and development, design, manufacturing, acquisition, delivery, integration, operations, maintenance, and disposal of systems, system components, or system services. Supply chain processes include supply chain risk management programs; SCRM strategies and implementation plans; personnel and physical security programs; hardware, software, and firmware development processes; configuration management tools, techniques, and measures to maintain provenance; shipping and handling procedures; and programs, processes, or procedures associated with the production and distribution of supply chain elements. Supply chain actors are individuals with specific roles and responsibilities in the supply chain. The evidence generated and collected during analyses and testing of supply chain elements, processes, and actors is documented and used to inform organizational risk management activities and decisions.
    related_controls:
      - ca-8
      - si-4
    rules: []
    status: pending
  - id: sr-7
    title: Supply Chain Operations Security
    description: 'Employ the following Operations Security (OPSEC) controls to protect supply chain-related information for the system, system component, or system service: [[ insert: param, sr-07_odp ]].'
    parameters:
      - id: sr-07_odp
        label: OPSEC controls
        guidelines:
          - Operations Security (OPSEC) controls to protect supply chain-related information for the system, system component, or system service are defined;
    guidance: Supply chain OPSEC expands the scope of OPSEC to include suppliers and potential suppliers. OPSEC is a process that includes identifying critical information, analyzing friendly actions related to operations and other activities to identify actions that can be observed by potential adversaries, determining indicators that potential adversaries might obtain that could be interpreted or pieced together to derive information in sufficient time to cause harm to organizations, implementing safeguards or countermeasures to eliminate or reduce exploitable vulnerabilities and risk to an acceptable level, and considering how aggregated information may expose users or specific uses of the supply chain. Supply chain information includes user identities; uses for systems, system components, and system services; supplier identities; security and privacy requirements; system and component configurations; supplier processes; design specifications; and testing and evaluation results. Supply chain OPSEC may require organizations to withhold mission or business information from suppliers and may include the use of intermediaries to hide the end use or users of systems, system components, or system services.
    related_controls:
      - sc-38
