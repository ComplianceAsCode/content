      - var_auditd_space_left_action=cis_rhel10
      - var_multiple_time_servers=rhel
      - var_pam_wheel_group_for_su=cis
      - var_password_hashing_algorithm=cis_rhel10
      - var_password_hashing_algorithm_pam=cis_rhel10
