# CEL rule unit-test fixtures. Evaluated by tests/unit/kubernetes/test_cel_rules.py
# via celctl (cel-go, the Compliance Operator scanner engine).
# Seeded from real API objects; see provenance. Versions only, nothing cluster-identifiable.
provenance:
  fetched_with: modeled on real API objects (celctl cac scaffold format)
  date: '2026-07-24'
  openshift_version: 4.21.0
  kubernetes_version: v1.34
  source_api_versions:
    sriovnets: sriovnetwork.openshift.io/v1
cases:
  - name: no SriovNetworks -> compliant
    expect: true
    inputs:
      sriovnets:
        apiVersion: v1
        kind: List
        items: []
  - name: sriov with vlan -> compliant
    expect: true
    inputs:
      sriovnets:
        apiVersion: v1
        kind: List
        items:
          - apiVersion: sriovnetwork.openshift.io/v1
            kind: SriovNetwork
            metadata:
              name: net-a
              namespace: openshift-sriov-network-operator
            spec:
              vlan: 100
              resourceName: sriov_a
  - name: sriov without vlan -> non-compliant
    expect: false
    inputs:
      sriovnets:
        apiVersion: v1
        kind: List
        items:
          - apiVersion: sriovnetwork.openshift.io/v1
            kind: SriovNetwork
            metadata:
              name: net-novlan
              namespace: openshift-sriov-network-operator
            spec:
              resourceName: sriov_b
  - name: sriov with vlan 0 -> non-compliant (untagged)
    expect: false
    inputs:
      sriovnets:
        apiVersion: v1
        kind: List
        items:
          - apiVersion: sriovnetwork.openshift.io/v1
            kind: SriovNetwork
            metadata:
              name: net-zero
              namespace: openshift-sriov-network-operator
            spec:
              vlan: 0
              resourceName: sriov_c
