name: Merge Commit Check

on:
    pull_request:

concurrency:
    group: ${{ github.workflow }}-no-merges-${{ github.event.number || github.run_id }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: read

jobs:
    validate-merge-commits:
        name: Ensure No Merge Commits
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
            -   name: Check for Merge Commits
                uses: NexusPHP/no-merge-commits@4f0fa727cc774b7b0d459b4d2372c3fc14f242d7 # v2.4.0
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}
